[{\"title\":\"Prazo de de 6 MESES contados do prazo de APRESENTACAO\"},{\"title\":\"O prazo de apresenta\u00e7\u00e3o e prescri\u00e7\u00e3o n\u00e3o podem ser considerados um prazo\"},{\"title\":\"Cheque pre-datado tem o mesmo inicio para o prazo?\",\"children\":[{\"title\":\"Se apresentado antes, o inicio do prazo \u00e9 a data que o titulo foi levado ao banco\"}]},{\"title\":\"Pode ser executado contra EMITENTES e AVALISTAS\"},{\"title\":\"Contra Endossantes e Avalistas se cheque est\u00e1 em tempo habil + protesto ou declara\u00e7\u00e3o\"}]},{\"title\":\"Cheque Prescrito Pode ser executado? Existe a\u00e7ao cabivel ainda?\",\"children\":[{\"title\":\"O cheque prescrito n\u00f5a pode mais ser executado. Surge as 2 a\u00e7\u00f5es abaixo:\"},{\"title\":\"A\u00e7\u00e3o de Enriquecimento Ilicito\",\"children\":[{\"title\":\"2 Anos contados do termino do prazo prescricional. \u00c9 a\u00e7\u00e3o de rito ordin\u00e1rio e tida como cambial\"}]},{\"title\":\"Ultrapassado esse prazo o cheque ainda pode ser cobrado\"},{\"title\":\"Comprovando-se seu n\u00e3o pagto, mediante a\u00e7\u00e3o de cobran\u00e7a, na qual cabe ao portador, todavia, provar a rela\u00e7\u00e3o causal que originou o titulo. A a\u00e7\u00e3o n\u00e3o \u00e9 cambial\"},{\"title\":\"A\u00e7ao Monitoria\",\"children\":[{\"title\":\"\u00c9 possivel que seja ajuizada essa a\u00e7\u00e3o lastreada em CHEQUE PRESCRITO\"},{\"title\":\"O credor n\u00e3o precisa demonstrar a causa de emiss\u00e3o do cheque\"},{\"title\":\"Cabe ao devedor negar existencia da divida\"},{\"title\":\"Prazo da A\u00e7\u00e3o Monitoria\",\"children\":[{\"title\":\"5 ANOS\"}]},{\"title\":\"Prazo conta-se\",\"children\":[{\"title\":\"Do dia seguinte a data de emiss\u00e3o estampada na cartula\"}]},{\"title\":\"A\u00e7\u00e3o Monitoria e Aval - STJ\",\"children\":[{\"title\":\"Prescrito o titulo a rela\u00e7\u00e3o cambiaria some, levando junto o aval\"}]}]}]},{\"title\":\"obs\",\"children\":[{\"title\":\"Ap\u00f3s a prescri\u00e7\u00e3o cambial, o cheque perde os atributos cambi\u00e1rios, permitindo na a\u00e7\u00e3o monit\u00f3ria a discuss\u00e3o do neg\u00f3cio jur\u00eddico subjacente e a oposi\u00e7\u00e3o de exce\u00e7\u00f5es pessoais a portadores precedentes ou ao pr\u00f3prio emitente, com o \u00f4nus da prova da ilicitude do neg\u00f3cio jur\u00eddico incumbido ao devedor. STJ. 3\u00aa Turma. REsp 2.020.895-MG, Rel. Min. Nancy Andrighi, julgado em 28/2/2023 (Info 12 \u2013 Edi\u00e7\u00e3o Extraordin\u00e1ria).\"},{\"title\":\"Se o devedor n\u00e3o paga na data prevista o valor que constava no cheque como sendo de sua obriga\u00e7\u00e3o, o credor poder\u00e1 cobr\u00e1-lo e ter\u00e1 direito de receber a quantia acrescida de juros morat\u00f3rios e corre\u00e7\u00e3o monet\u00e1ria por conta do atraso. A partir de quando dever\u00e3o ser computados os juros morat\u00f3rios? \u2022 Se houve apresenta\u00e7\u00e3o do cheque para compensa\u00e7\u00e3o: os juros morat\u00f3rios come\u00e7am a ser contados da primeira apresenta\u00e7\u00e3o \u00e0 institui\u00e7\u00e3o financeira sacada ou c\u00e2mara de compensa\u00e7\u00e3o. \u2022 E se n\u00e3o houve apresenta\u00e7\u00e3o do cheque para compensa\u00e7\u00e3o? Neste caso, os juros incidir\u00e3o a partir do primeiro ato do benefici\u00e1rio no qual ele busque a satisfa\u00e7\u00e3o do cr\u00e9dito. Inexistindo apresenta\u00e7\u00e3o do cheque para a compensa\u00e7\u00e3o ao banco sacado, os juros de mora devem incidir a partir do primeiro ato do benefici\u00e1rio tendente \u00e0 satisfa\u00e7\u00e3o do cr\u00e9dito estampado na c\u00e1rtula, o que pode se dar pelo protesto, notifica\u00e7\u00e3o extrajudicial ou pela cita\u00e7\u00e3o. A Lei do Cheque (Lei n\u00ba 7.357/85) possui regra expressa que disciplina os juros relacionados com a cobran\u00e7a de cr\u00e9dito estampado neste t\u00edtulo. Segundo o art. 52, II, do texto legal, os juros de mora devem ser contados desde a data da primeira apresenta\u00e7\u00e3o do cheque pelo portador \u00e0 institui\u00e7\u00e3o financeira. Por for\u00e7a desse dispositivo, podemos dizer que a obriga\u00e7\u00e3o decorrente do cheque, a despeito de ser uma forma de pagamento \u00e0 vista, ganha os contornos da mora ex persona. Nesse contexto, a melhor interpreta\u00e7\u00e3o a ser dada quando o cheque n\u00e3o for apresentado \u00e0 institui\u00e7\u00e3o financeira sacada para a respectiva compensa\u00e7\u00e3o, \u00e9 aquela que reconhece o termo inicial dos juros de mora a partir do primeiro ato do credor no sentido de satisfazer o seu cr\u00e9dito, o que pode se dar pela apresenta\u00e7\u00e3o, protesto, notifica\u00e7\u00e3o extrajudicial, ou pela cita\u00e7\u00e3o. STJ. 4\u00aa Turma. REsp 1768022-MG, Rel. Min. Marco Buzzi, julgado em 17/08/2021 (Info 705).\"}]}]},{\"title\":\"Execu\u00e7\u00e3o e Protesto\",\"children\":[{\"title\":\"O Protesto \u00e9 necessario para cobrar coobrigados?\"},{\"title\":\"N\u00e3o, basta declara\u00e7\u00e3o do banco de que n\u00e3o tinha fundos\"},{\"title\":\"Deve ser apresentado p/ protesto no lugar do pagamento\"},{\"title\":\"Ou seja, pra\u00e7a em que \u00e9 mantida a conta do emitente OU\"},{\"title\":\"Local de domicilio do emitente\"}]},{\"title\":\"Pagamento\",\"children\":[{\"title\":\"Sacado pode exigir quita\u00e7\u00e3o do portador ao pagar\"},{\"title\":\"O portador n\u00e3o pode recusar pagto parcial, e, nesse caso, o sacado pode exigir que esse\"},{\"title\":\"pagamento conste do cheque e que o portador lhe d\u00ea a respectiva quita\u00e7\u00e3o.\"}]}]},{\"title\":\"Duplicata\",\"children\":[{\"title\":\"Introdu\u00e7\u00e3o\",\"children\":[{\"title\":\"Era instrumento de politica fiscal. Controlava a incidencia do imposto do selo\"},{\"title\":\"Funciona sob a sistematica do aceite obrigatorio, diferente da LC\"},{\"title\":\"Ter cuidado com a sistematica do aceite presumido criado pela doutrina\"}]},{\"title\":\"\u00c9 um titulo(caracteristicas  doutrinarias - Pontes de Miranda)\",\"children\":[{\" processo ser\u00e1 tirado, conforme o caso mediante apresenta\u00e7\u00e3o da duplicata\"},{\"title\":\"Ou por simples indica\u00e7\u00f5es do portador, na falta de devolu\u00e7\u00e3o do titulo\"},{\"title\":\"Ocorre no caso de reten\u00e7\u00e3o do titulo\"},{\"title\":\"O credor n\u00e3o est\u00e1 na posse do titulo, devendo fornecer infos ao cartorio das indica\u00e7\u00f5es do titulo\"},{\"title\":\"A LEi obriga o devedor, no momento da op\u00e7\u00e3o pelo livro, fornecer uma serie de infos\"},{\"title\":\"\u00c9 uma exce\u00e7\u00e3o ao principio da CARTULARIDADE\"},{\"title\":\"Entendimento STJ\",\"children\":[{\"title\":\"N\u00e3o \u00e9 admissivel o protesto por indica\u00e7\u00f5es de meros boletos bancarios, sendo indispensavel que tenha havido\"},{\"title\":\"Emiss\u00e3o de duplicatas e a posterior reten\u00e7\u00e3o delas por parte do comprador\"}]}]},{\"title\":\"obs\",\"children\":[{\"title\":\"Art. 13. A duplicata \u00e9 protest\u00e1vel por falta de aceite de devolu\u00e7\u00e3o ou pagamento.                  (Reda\u00e7\u00e3o dada pelo Decreto-Lei n\u00ba 436, de 27.1.1969) \u00a7 1\u00ba Por falta de aceite, de devolu\u00e7\u00e3o ou de pagamento, o protesto ser\u00e1 tirado, conforme o caso, mediante apresenta\u00e7\u00e3o da duplicata, da triplicata, ou, ainda, por simples indica\u00e7\u00f5es do portador, na falta de devolu\u00e7\u00e3o do t\u00edtulo.                  (Reda\u00e7\u00e3o dada pelo Decreto-Lei n\u00ba 436, de 27.1.1969) \u00a7 2\u00ba O fato de n\u00e3o ter sido exercida a faculdade de protestar o t\u00edtulo, por falta de aceite ou de devolu\u00e7\u00e3o, n\u00e3o elide a possibilidade de protesto por falta de pagamento.                  (Reda\u00e7\u00e3o dada pelo Decreto-Lei n\u00ba 436, de 27.1.1969) \u00a7 3\u00ba O protesto ser\u00e1 tirado na pra\u00e7a de pagamento constante do t\u00edtulo.                  (Reda\u00e7\u00e3o dada pelo Decreto-Lei n\u00ba 436, de 27.1.1969) \u00a7 4\u00ba O portador que n\u00e3o tirar o protesto da duplicata, em forma regular e dentro do prazo da 30 (trinta) dias, contado da data de seu vencimento, perder\u00e1 o direito de regresso contra os endossantes e respectivos avalistas.                 (Reda\u00e7\u00e3o dada pelo Decreto-Lei n\u00ba 436, de 27.1.1969)\"}]}]},{\"title\":\"Triplicata\",\"children\":[{\"title\":\"Pode ser emitida quando h\u00e1 perda ou extravio da duplicata\"},{\"title\":\"Deve conter os mesmos efeitos e requisitos\"}]},{\"title\":\"Prescri\u00e7\u00e3o\",\"children\":[{\"title\":\"Execu\u00e7\u00e3o da Duplicata\",\"children\":[{\"title\":\"3 Anos\",\"children\":[{\"title\":\"contra devedor principal e avalistas\"}]},{\"title\":\"1 ANO\",\"children\":[{\"title\":\"Codevedores e avalistas\"}]}]},{\"title\":\"OBS\",\"children\":[{\"title\":\"Distribuidora de Latic\u00ednios Mantena Ltda. sacou, em 30/11/2017, duplicata de venda em face de Mercado Conselheiro Pena Ltda., no valor de R$ 8.700,00 (oito mil e setecentos reais), com vencimento em 02/02/2018. A duplicata n\u00e3o foi aceita nem o pagamento foi efetuado no vencimento. Em 07/05/2022, o t\u00edtulo foi levado a protesto e o sacado intimado de sua apresenta\u00e7\u00e3o no dia seguinte. Em 09/05/2022, o sacado apresentou ao tabeli\u00e3o suas raz\u00f5es para impedir o protesto, limitando-se a invocar a prescri\u00e7\u00e3o da pretens\u00e3o \u00e0 execu\u00e7\u00e3o da duplicata, tendo em vista as datas de vencimento e apresenta\u00e7\u00e3o a protesto. O protesto foi lavrado em 10/05/2022. Consideradas as datas e os fatos narrados, assinale a afirmativa correta. Est\u00e1 prescrita a pretens\u00e3o \u00e0 execu\u00e7\u00e3o da duplicata em raz\u00e3o do decurso de mais de 3 (tr\u00eas) anos da data do vencimento do t\u00edtulo. FGV - 2022 - AGE-MG - Procurador do Estado\"},{\"title\":\"Art 18 - A pretens\u00e3o \u00e0 execu\u00e7\u00e3o da duplicata prescreve: (Reda\u00e7\u00e3o dada pela Lei n\u00ba 6.458, de 1\u00ba.11.1977) l - contra o sacado e respectivos avalistas, em 3 (tr\u00eas) anos, contados da data do vencimento do t\u00edtulo; (Reda\u00e7\u00e3o dada pela Lei n\u00ba 6.458, de 1\u00ba.11.1977) ll - contra endossante e seus avalistas, em 1 (um) ano, contado da data do protesto; (Reda\u00e7\u00e3o dada pela Lei n\u00ba 6.458, de 1\u00ba.11.1977) Ill - de qualquer dos coobrigados contra os demais, em 1 (um) ano, contado da data em que haja sido efetuado o pagamento do t\u00edtulo. (Reda\u00e7\u00e3o dada pela Lei n\u00ba 6.458, de 1\u00ba.11.1977) \u00a7 1\u00ba - A cobran\u00e7a judicial poder\u00e1 ser proposta contra um ou contra todos os coobrigados, sem observ\u00e2ncia da ordem em que figurem no t\u00edtulo. (Reda\u00e7\u00e3o dada pela Lei n\u00ba 6.458, de 1\u00ba.11.1977) \u00a7 2\u00ba - Os coobrigados da duplicata respondem solidariamente pelo aceite e pelo pagamento. (Reda\u00e7\u00e3o dada pela Lei n\u00ba 6.458, de 1\u00ba.11.1977)\"}]}]}]},{\"title\":\"Clausula s/ Despesa: Transforma o prote- testo obrigatorio em facultativo\"}]},{\"title\":\"Atos Cambi\u00e1rios\",\"children\":[{\"title\":\"Declara\u00e7\u00e3o Cambial(3)\",\"children\":[{\"title\":\"Originaria/Necess\u00e1ria\",\"children\":[{\"title\":\"\u00c9 a assinatura. Chama-se de emiss\u00e3o ou saque. Indispensavel\"}]},{\"title\":\"Eventual/Sucessiva\",\"children\":[{\"title\":\"Pode ou n\u00e3o ocorrer na vida de um titulo de credito. Ex: Endosso, aceite e aval\"}]},{\"title\":\"Suced\u00e2nea -  Art. 8\u02da LUG\",\"children\":[{\"title\":\"Est\u00e1 em DESARMONIA com a Lei. \u00c9 um declarac\u00e3o cambial equivocada\"},{\"title\":\"\u00c9 declarac\u00e3o equivocada no titulo. Torna-se o responsavel que declarou\"},{\"title\":\"Aquele que declara sem ter poder. Ex: Aval feito por PJ por administrador sem poder\"}]}]},{\"title\":\"Endosso\",\"children\":[{\"title\":\"Conceito\",\"children\":[{\"title\":\"Ato cambiario mediante o qual o credor do titulo transmite a outrem seus direitos\"},{\"title\":\"Ato cambiario por botar o titulo e ma\",\"children\":[{\"title\":\"Em regra\",\"children\":[{\"title\":\"Deve ser feito no verso do titulo(COSTAS)\"},{\"title\":\"Basta a assinatura do endossante\"}]},{\"title\":\"Exce\u00e7\u00e3o\",\"children\":[{\"title\":\"Quando feita no anverso(frente)\"},{\"title\":\"Deve conter(2)\",\"children\":[{\"title\":\"Assinatura do endossante\"},{\"title\":\"Men\u00e7\u00e3o EXPRESSA q \u00e9 ENDOSSO\"}]}]}]},{\"title\":\"Especies - 6\",\"children\":[{\"title\":\"Endosso Proprio  x Improprio\",\"children\":[{\"title\":\"Proprio ou Translativo\",\"children\":[{\"title\":\"Translativo, regular, fixo, pleno. Entrega Papel + Propriedade \u00e9 o ato cambi\u00e1rio por meio do qual o endossante transfere ao endossat\u00e1rio o t\u00edtulo de cr\u00e9dito e, em consequ\u00eancia, os direitos nele incorporados\"},{\"title\":\"obs\",\"children\":[{\"title\":\"S\u00famula 475-STJ: Responde pelos danos decorrentes de protesto indevido o endossat\u00e1rio que recebe por endosso translativo t\u00edtulo de cr\u00e9dito contendo v\u00edcio formal extr\u00ednseco ou intr\u00ednseco, ficando ressalvado seu direito de regresso contra os endossantes e avalistas. \u2022 Aprovada em 13/06/2012, DJe 19/06/2012. \u2022 Importante. (2015 \u2013 FCC \u2013 TJAL) N\u00e3o responde pelos danos decorrentes de protesto indevido o endossat\u00e1rio que recebe, por endosso translativo, t\u00edtulo de cr\u00e9dito contendo v\u00edcio formal extr\u00ednseco ou intr\u00ednseco, cabendo ao suposto devedor exigir o valor reparat\u00f3rio diretamente dos endossantes. (Errado)                               (2019 \u2013 CESPE \u2013 TJPR) No que se refere a t\u00edtulos de cr\u00e9dito, assinale a op\u00e7\u00e3o correta, de acordo com a jurisprud\u00eancia sumulada pelo STJ. Em caso de endosso translativo, o endossat\u00e1rio que responder por dano decorrente de protesto indevido de t\u00edtulo com v\u00edcio formal tem direito de regresso contra endossantes e avalistas. (Certo)\"}]}]},{\"title\":\"Improprio\",\"children\":[{\"title\":\"Modalidades\",\"children\":[{\"title\":\"Endosso-cau\u00e7\u00e3o ou Pignoraticio ou  Garantia\",\"children\":[{\"title\":\"Conceito\",\"children\":[{\"title\":\"Previsto no Art. 19 da Lei Uniforme e no Art. 918 do CC. \u00c9 como qlq outra garantia\"},{\"title\":\"Ex: Financiar imovel de 100. O endossante nao tem bens de garantia e da um titulo\"},{\"title\":\"Feito com uso das express\u00f5es \\\"valor em garantia\\\" \\\"valor em penhor\\\"\"},{\"title\":\"O endossatario n\u00e3o assume a titularidade do credito, \u00e9 uma forma de garantia\"}]},{\"title\":\"Se ocorre o vencimento do titulo durante a garantia?\",\"children\":[{\"title\":\"Nada ocorre. O credor pode cobrar o papel e fica dinheiro por dinheiro\"}]},{\"title\":\"Se a garantia se tornar excessiva?\",\"children\":[{\"title\":\"Pode ser ajustada amigavelmente ou judicialmente\"}]},{\"title\":\"Quem tem legitimidade processual?\",\"children\":[{\"title\":\"Endossante. O endossatario pode estar de frente, pq tem um dirieto dele(d. de garantia)\"}]},{\"title\":\"Endossatario pode transmitir o titulo?\",\"children\":[{\"title\":\"Em regra n\u00e3o! Mas pode dar endosso mandato p/ cobran\u00e7a\"}]}]},{\"title\":\"Endosso-mandato ou  Procura\u00e7\u00e3o\",\"children\":[{\"title\":\"O endossante confere poderes ao endossatario. Previsto no art. 18 da Lei Uniforme e 917 do CC.\"},{\"title\":\"Ex: NP de 100.000 reais e nao tenho tempo de cobrar. Transfiro a terceiro p/ isso\"},{\"title\":\"Faz-se, segundo a Lei Com as expressoes \\\"para cobran\u00e7a\\\", \\\"valor a cobrar\\\" ou \\\" por procura\u00e7\u00e3o\\\"\"},{\"title\":\"A morte do endossante ou a incapcidade, n\u00e3o fazem a perda da eficacia\"},{\"title\":\"Quem tem legitimidade processual?\",\"children\":[{\"title\":\"O propriet\u00e1rio do titulo, salvo se representado pelo mandatario\"}]},{\"title\":\"Em regra, a responsa \u00e9 do endossante, salvo se extrapolar poderes(Sum. 476 do STJ)\"},{\"title\":\"obs\" ores e n\u00e3o detentor\"}]},{\"title\":\"Classifica\u00e7\u00e3o\",\"children\":[{\"title\":\"Real - Aperfei\u00e7oa somente com a entrega ao banco\"}]},{\"title\":\"Especies(3)\",\"children\":[{\"title\":\"Deposito a Vista\",\"children\":[{\"title\":\"Banco deve restituir imediatamente a quantia\"}]},{\"title\":\"Deposito a Pr\u00e9-aviso\",\"children\":[{\"title\":\"Restitui\u00e7\u00e3o qnd solicitada deve ser feita no prazo estipulado\"}]},{\"title\":\"Deposito a Prazo Fixo\",\"children\":[{\"title\":\"Restitui\u00e7\u00e3o s\u00f3 pode ocorre apos determinada data(poupan\u00e7a)\"}]}]}]},{\"title\":\"Mutuo Bancario (emprestimo bancario) CEBRASPE - 2023 - DPE-RO - Defensor\",\"children\":[{\"title\":\"Conceito\",\"children\":[{\"title\":\"Trata-se de uma operac\u00e3o ATIVA do banco\"},{\"title\":\"\u00c9 um emprestimo por meio do qual o banco disponibiliza determinada quantia\"},{\"title\":\"Cabendo ao devedor pagar essa quantia, com acrescimos, no prazo fixado\"}]},{\"title\":\"Classifica\u00e7\u00e3o\",\"children\":[{\"title\":\"Contrato Real\"},{\"title\":\"Unilateral(banco n\u00e3o assume obriga\u00e7\u00e3o)\"}]},{\"title\":\"Tx. de Juros aplicavel\",\"children\":[{\"title\":\"Limita\u00e7\u00e3o de 12% a.a n\u00e3o se aplicam as institui\u00e7\u00f5es financeiras\"},{\"title\":\"Juros remune. maiores que 12% a.a por si s\u00f3 n\u00e3o sao abusividade\"}]},{\"title\":\"S. 26 do STJ\",\"children\":[{\"title\":\"Avalista de titulo de credito vinculado ao mutuo bancario tbm responde pelas obriga\u00e7\u00f5es - solidario\"}]}]},{\"title\":\"Desconto Banc\u00e1rio\",\"children\":[{\"title\":\"Conceito\",\"children\":[{\"title\":\"\u00c9 antecipa\u00e7\u00e3o de pagto ao cliente, q em troca cede ao banco determinado credito...\"},{\"title\":\"Ainda que n\u00e3o vencido, contra ele mesmo ou contra terceiro\"},{\"title\":\"Esse credito cedido geralmente \u00e9 documentado por um titulo de credito\"},{\"title\":\"O banco ao ceder o valor, nao antecipa o valor total do credito, h\u00e1 um desagio q \u00e9 oganho economico\"},{\"title\":\"Portador de certo titulo transfere a inst. financeira antes do vencimento\"},{\"title\":\"E recebe valor nominal do titulo h\u00e1 um desagio\"},{\"title\":\"obs\",\"children\":[{\"title\":\"Desconto Banc\u00e1rio \u00e9 a antecipa\u00e7\u00e3o de um direito credit\u00f3rio, ou seja, \u00e9 receber por uma venda antes da data combinada. Esta opera\u00e7\u00e3o de cr\u00e9dito, muito comum no mercado banc\u00e1rio, pode ter como origem dos direitos credit\u00f3rios duplicatas, notas promiss\u00f3rias, cheques pr\u00e9-datados e receb\u00edveis de cart\u00e3o de cr\u00e9dito\"}]}]},{\"title\":\"D. de Regresso\",\"children\":[{\"title\":\"Caso o credito nao seja honrado pelo devedor o banco tem d. de regresso\"},{\"title\":\"Geralmente o direito \u00e9 cedido por endosso do banco, o que acaba por protege-lo\"}]}]},{\"title\":\"Credito Document\u00e1rio\",\"children\":[{\"title\":\"Tem rela\u00e7\u00e3o com cartas de credito do comercio internacional\"},{\"title\":\"Em q frequentemente nao ha confian\u00e7a reciproca entre os contratantes\"},{\"title\":\"Pela ausencia de rela\u00e7\u00f5es comerciais anteriores\"},{\"title\":\"Contratantes p/ garantir q o contrato ser\u00e1 seguido a risca, confiam em uma inst. bancaria\"},{\"title\":\"Para intermediar a negocia\u00e7\u00e3o. Ex: Importador fornece carta de credito ao banco\"},{\"title\":\"Deve ter comprova\u00e7\u00e3o do negocio juridico, que ocorre pela carta de credito\"}]},{\"title\":\"Abertura de Cr\u00e9dito\",\"children\":[{\"title\":\"Conceito\",\"children\":[{\"title\":\"Banco poe a disposi\u00e7\u00e3o do cliente determinada quantia de dinheiro que ele pode usar\"},{\"title\":\"Ganho do banco est\u00e1 no juros, praticamente. Existe tb possibildade de comiss\u00e3o\"},{\"title\":\"\u00c9 o chamado \\\"cheque especial\\\"\"},{\"title\":\"As duas esp\u00e9cies mais comuns desse contrato s\u00e3o: a) Contrato de abertura de cr\u00e9dito fixo; b) Contrato de abertura de cr\u00e9dito rotativo\"}]},{\"title\":\"CONTRATO DE ABERTURA DE CREDITO FIXO\",\"children\":[{\"title\":\"O contrato de cr\u00e9dito fixo consiste na concess\u00e3o, por parte da institui\u00e7\u00e3o financeira ao seu cliente, de valor certo, com termo e encargos pr\u00e9-definidos. No momento da assinatura do contrato, o contratante j\u00e1 sabe de antem\u00e3o o valor total da d\u00edvida. O contrato de abertura de cr\u00e9dito fixo equivale a um contrato de m\u00fatuo fenerat\u00edcio. Depois de assinado o pacto, o banco credita o valor certo e determinado da quantia ao cliente e este assume a obriga\u00e7\u00e3o de devolv\u00ea-la com juros e corre\u00e7\u00e3o monet\u00e1ria, quando chegar o termo ajustado.\"}]},{\"title\":\"STJ - S. 233\",\"children\":[{\"title\":\"N\u00e3o \u00e9 titulo executivo extrajudicial, ainda q tenha extrato pormenorizado do debito\"},{\"title\":\"Mas pode embasar eventual a\u00e7ao monit\u00f3ria - S. 247 do STJ\"}]},{\"title\":\"S. 322 do STJ\",\"children\":[{\"title\":\"P/ repeti\u00e7\u00e3o do indebito, em contratos de abertura de credito, nao se exige prova do erro\"}]},{\"title\":\"OBS\",\"children\":[{\"title\":\"N\u00e3o h\u00e1 veda\u00e7\u00e3o \u00e0 ado\u00e7\u00e3o da varia\u00e7\u00e3o dos Certificados de Dep\u00f3sitos Interbanc\u00e1rios - CDI como encargo financeiro em contratos banc\u00e1rios, devendo o abuso ser observado caso a caso, em cotejo com as taxas m\u00e9dias de mercado regularmente divulgadas pelo Banco Central do Brasil para as opera\u00e7\u00f5es de mesma esp\u00e9cie, o que n\u00e3o ocorre na esp\u00e9cie. STJ. 4\u00aa Turma.REsp 1.630.706-SP, Rel. Min. Maria Isabel Gallotti, julgado em 07/06/2022 (Info 742).\"},{\"title\":\"\u00c9 admiss\u00edvel a estipula\u00e7\u00e3o dos encargos financeiros de contrato de abertura de cr\u00e9dito em percentual sobre a taxa m\u00e9dia aplic\u00e1vel aos Certificados de Dep\u00f3sitos Interbanc\u00e1rios (CDIs). Nos dep\u00f3sitos interbanc\u00e1rios, como em qualquer outro tipo de empr\u00e9stimo, a institui\u00e7\u00e3o tomadora paga juros \u00e0 institui\u00e7\u00e3o emitente. A denominada Taxa CDI, ou simplesmente DI, \u00e9 calculada com base nas taxas aplicadas em tais opera\u00e7\u00f5es, refletindo, portanto, o custo de capta\u00e7\u00e3o de moeda suportado pelos bancos. STJ. 3\u00aa Turma. REsp 1.781.959-SC, Rel. Min. Ricardo Villas B\u00f4as Cueva, julgado em 11/02/2020 (Info 665).\"}]}]}]},{\"title\":\"Contratos Bancarios Improprios\",\"children\":[{\"title\":\"Intro\",\"children\":[{\"title\":\"Modalidades contratuais q a doutrina diverge acerca de sua natureza tipica bancaria\"}]},{\"title\":\"Aliena\u00e7\u00e3o Fiduci\u00e1ria\",\"children\":[{\"title\":\"Conceito\",\"children\":[{\"title\":\"Contrato INSTRUMENTAL no qual uma das partes em confian\u00e7a\",\"children\":[{\"title\":\"Pq instrumental?\",\"children\":[{\"title\":\"\u00c9 utilizado como meio para outro negocio\"},{\"title\":\"Geralmente associado a um MUTUO, servindo-lhe de garantia\"}]}]},{\"title\":\"ALIENA a outra a propriedade de certo bem, movel ou imovel,\"},{\"title\":\"Ficando esta parte obrigada a devolver a outra\"},{\"title\":\"O bem que foi alienado qnd verificada a ocorrencia de certo fato\"},{\"title\":\"Leis do CC aplicam-se de forma subsidiaria\"},{\"title\":\"H\u00e1 uma propriedade resoluvel\"},{\"title\":\"Na aliena\u00e7\u00e3o fiduci\u00e1ria \u00e9 necess\u00e1rio a prova por escrito\"}]},{\"title\":\"Disciplina Legal 2022 - TRF - 3\u00aa REGI\u00c3O - Juiz\",\"children\":[{\"title\":\"Bem imovel -  9.514/1997\"},{\"title\":\"Se de mercado financ. e capitais no Art. 68-B da Lei 4.728/65\"},{\"title\":\"H\u00e1 o Dec.-Lei 911/1969 - Bens Moveis\"},{\"title\":\"H\u00e1 ainda o CC no art. 1.361 a 1.368(Prop. Fiduciaria)\"},{\"title\":\"De aeronaves(codigo de aeronautica) - inst. publico ou particular\"},{\"title\":\"obs\",\"children\":[{\"title\":\"MUTUO COM ALIENA\u00c7\u00c3O FIDUCIARIA PRAZO DE PRESCRI\u00c7\u00c3O. INICIO\",\"children\":[{\"title\":\"Caso hipot\u00e9tico: Valdir comprometeu-se a administrar a fazenda de Paulo e, como contrapartida, quando este a vendesse, o administrador teria direito a 20% do valor obtido. Em 01/04/2013, Paulo celebrou, com a CEF, contrato de m\u00fatuo com aliena\u00e7\u00e3o fiduci\u00e1ria. A fazenda foi institu\u00edda como garantia da aliena\u00e7\u00e3o fiduci\u00e1ria, ou seja, passou \u00e0 propriedade resol\u00favel da CEF. Como Paulo n\u00e3o pagou o m\u00fatuo, em 25/05/2015, houve a consolida\u00e7\u00e3o da propriedade do im\u00f3vel rural em nome da CEF. Qual \u00e9 o prazo para Valdir cobrar os 20% a que ele teria direito? 5 anos. \u00c9 de 5 anos o prazo prescricional para a pretens\u00e3o de cobran\u00e7a de d\u00edvidas l\u00edquidas constantes de instrumento particular (art. 205, \u00a7 5\u00ba, I, do C\u00f3digo Civil). Esse prazo teve in\u00edcio com a institui\u00e7\u00e3o da garantia da aliena\u00e7\u00e3o fiduci\u00e1ria ou com a consolida\u00e7\u00e3o da propriedade do im\u00f3vel em nome do banco? Com a consolida\u00e7\u00e3o da propriedade. No contrato de m\u00fatuo com aliena\u00e7\u00e3o fiduci\u00e1ria, o prazo quinquenal de prescri\u00e7\u00e3o \u00e9 contado da  D A T A  E M  Q U E  C O N S O L I D A D A  a propriedade do im\u00f3vel em nome da institui\u00e7\u00e3o financeira (transfer\u00eancia definitiva da propriedade do im\u00f3vel), e n\u00e3o da data em que institu\u00edda a garantia da aliena\u00e7\u00e3o fiduci\u00e1ria. STJ. 4\u00aa Turma. REsp 2018619-SP, Rel. Min. Raul Ara\u00fajo, julgado em 04/10/2022 (Info 752).\"}]},{\"title\":\"ATRASO EM BAIXAR O GRAVAME DANO MORAL IN RE IPSA?\",\"children\":[{\"title\":\"O atraso, por parte de institui\u00e7\u00e3o financeira, na baixa de gravame de aliena\u00e7\u00e3o fiduci\u00e1ria no registro de ve\u00edculo n\u00e3o caracteriza, por si s\u00f3, dano moral in re ipsa. (REsp. 1.881.453-RS, Rel. Min. Marco Aur\u00e9lio Bellizze, Segunda Se\u00e7\u00e3o, por unanimidade, julgado em 30/11/2021, DJe 07/12/2021. (Tema 1078).\"}]},{\"title\":\"EXTRAPETITA E BAP\",\"children\":[{\"title\":\"O contrato de aliena\u00e7\u00e3o fiduci\u00e1ria em garantia de bem m\u00f3vel n\u00e3o se extingue somente por for\u00e7a da consolida\u00e7\u00e3o da propriedade em nome do credor fiduci\u00e1rio. A revers\u00e3o da propriedade plena (consolida\u00e7\u00e3o) em favor do credor fiduci\u00e1rio (banco) constitui apenas uma etapa da execu\u00e7\u00e3o do contrato, n\u00e3o pondo fim a ele. O julgamento extra petita est\u00e1 configurado quando o magistrado concede presta\u00e7\u00e3o jurisdicional diversa da pleiteada na inicial. No caso concreto, mesmo sem pedido de rescis\u00e3o do contrato de aliena\u00e7\u00e3o fiduci\u00e1ria, a senten\u00e7a reconheceu extinta a rela\u00e7\u00e3o contratual, sendo, portanto, considerada extra petita. H\u00e1 julgamento extra petita na hip\u00f3tese em que, julgado procedente o pedido de busca e apreens\u00e3o de bem alienado fiduciariamente, o juiz, sem o requerimento expresso do autor, extingue o contrato firmado entre o devedor fiduciante e o credor fiduci\u00e1rio. STJ. 3\u00aa Turma. REsp 1779751-DF, Rel. Min. Ricardo Villas B\u00f4as Cueva, julgado em 16/06/2020 (Info 678).\"}]},{\"title\":\"RESCIS\u00c3O E DEVOLU\u00c7\u00c3O DO VALOR PAGO CDC X LEI ESPECIFICA\",\"children\":[{\"title\":\"Exemplo: Jo\u00e3o celebrou contrato de compra e venda com aliena\u00e7\u00e3o fiduci\u00e1ria em garantia de um im\u00f3vel. O ajuste previa o pagamento em 120 presta\u00e7\u00f5es mensais. Ap\u00f3s 60 presta\u00e7\u00f5es pagas, Jo\u00e3o ajuizou a\u00e7\u00e3o de resolu\u00e7\u00e3o do contrato contra a construtora alegando que n\u00e3o tinha mais condi\u00e7\u00f5es de continuar pagando as parcelas. Na a\u00e7\u00e3o, o autor pediu a dissolu\u00e7\u00e3o do v\u00ednculo obrigacional, afirmando que entrega o im\u00f3vel e que, como consequ\u00eancia, quer receber de volta as presta\u00e7\u00f5es pagas, podendo o vendedor reter 10% dos valores j\u00e1 recebidos a t\u00edtulo de despesas que eventualmente tenha sido, nos termos do art. 53 do CDC. O pedido do autor deve ser acolhido? N\u00e3o. No caso concreto, o que houve foi uma quebra antecipada do contrato por parte do comprador. De acordo com a quebra antecipada do contrato (chamada de antecipatory breach, na common law), h\u00e1 inadimplemento, mesmo antes do vencimento, quando o devedor pratica atos abertamente contr\u00e1rios ao cumprimento do contrato. Neste caso, \u00e9 poss\u00edvel o desfazimento do contrato, no entanto, a devolu\u00e7\u00e3o dos valores pagos pelo autor n\u00e3o se dar\u00e1 na forma do art. 53 do CDC, mas sim segundo o procedimento estabelecido nos arts. 26 e 27 da Lei n\u00ba 9.514/97, pelo qual, resolvido o contrato de compra e venda, consolida-se a propriedade do bem na pessoa do credor fiduci\u00e1rio que ir\u00e1 vende-lo por meio de leil\u00e3o. Com o resultado, ser\u00e3o pagos os d\u00e9bitos, devolvendo-se ao antigo adquirente o que sobrar. STJ. 3\u00aa Turma. REsp 1867209-SP, Rel. Min. Paulo de Tarso Sanseverino, julgado em 08/09/2020 (Info 680).\"}]}]}]},{\"title\":\"Partes no Contrato\",\"children\":[{\"title\":\"Devedor-fiduciante(Adquire o bem)\"},{\"title\":\"Credor-fiduciario(empresta o valor)\"},{\"title\":\"Terceiro(vendedor do bem)\"},{\"title\":\"OBS\",\"children\":[{\"title\":\"Entendimento STJ - Bem FCC - 2018 - MPE-PB - Promotor CESPE / CEBRASPE - 2023 - AGU - PFN\",\"children\":[{\"title\":\"Esse contrato pode recair sobre bem do proprio devedor fiduciante(REFINANCIAMENTO)\"}]}]}]},{\"title\":\"Bens Imoveis (Lei 9.514/1997) FAURGS - 2022 - TJ-RS - Juiz IESES - 2021 - TJ-RO -Cart.  FCC - 2021 - DPE-GO - Defensor 2022 - TRF - 3\u00aa REGI\u00c3O - Juiz\",\"children\":[{\"title\":\"Conceito  FCC - 2022 - TJ-CE - Oficial de Justi\u00e7a\",\"children\":[{\"title\":\"\u00c9 o neg. juridico pelo qual o devedor, ou fiduciante, com escopo de garantia\"},{\"title\":\"Contrata transferencia ao credor, ou fiduciario, da propriedade resoluvel de coisa imovel\"},{\"title\":\"transfere ao CREDOR o DOM\u00cdNIO RESOL\u00daVEL(NAO \u00c9 PROPRIEDADE)\"},{\"title\":\"tornando-se o alienante ou devedor em possuidor direto e deposit\u00e1rio\"},{\"title\":\"Pode ser contratada por PF ou PJ, nao sendo privativa das entidades do SFI\"},{\"title\":\"O contrato tem requisitos formais. Ex: Valor da divida\"},{\"title\":\"Pode ter por objeto direitos reais de uso e direito especial de uso para fins de moradia.\"},{\"title\":\"OBS\",\"children\":[{\"title\":\"\u00c9 constitucional o procedimento da Lei n\u00ba 9.514/1997 para a execu\u00e7\u00e3o extrajudicial da cl\u00e1usula de aliena\u00e7\u00e3o fiduci\u00e1ria em garantia, haja vista sua compatibilidade com as garantias processuais previstas na Constitui\u00e7\u00e3o Federal. STF. Plen\u00e1rio. RE 860.631/SP, Rel. Min. Luiz Fux, julgado em 26/10/2023 (Repercuss\u00e3o Geral \u2013 Tema 982) (Info 1114).\"}]}]},{\"title\":\"Constitui\u00e7\u00e3o da Prop. Fiduciaria  FCC - 2022 - TJ-CE - Oficial de Justi\u00e7a\",\"children\":[{\"title\":\"Constitui-se a propriedade fiduci\u00e1ria de coisa im\u00f3vel mediante registro, no competente Registro de Im\u00f3veis, do contrato que lhe serve de t\u00edtulo. Par\u00e1grafo \u00fanico. Com a constitui\u00e7\u00e3o da propriedade fiduci\u00e1ria, d\u00e1-se o desdobramento da posse, tornando-se o fiduciante possuidor direto e o fiduci\u00e1rio possuidor indireto da coisa im\u00f3vel.\"},{\"title\":\"obs\",\"children\":[{\"title\":\"Ausencia de Registro E EXIGENCIA DE VENDA EXTRAJUDICIAL\",\"children\":[{\"title\":\"No regime especial da Lei 9.514/97, o registro do contrato tem natureza constitutiva, sem o qual a propriedade fiduci\u00e1ria e a garantia dela decorrente n\u00e3o se perfazem. N A  A U S E N C I A  de registro do contrato que serve de t\u00edtulo \u00e0 propriedade fiduci\u00e1ria no competente Registro de Im\u00f3veis, como determina o art. 23 da Lei n\u00ba 9.514/97, N \u00c3 O  \u00c9  E X I G I V E L do adquirente que se submeta ao procedimento de venda extrajudicial do bem para s\u00f3 ent\u00e3o receber eventuais diferen\u00e7as do vendedor. STJ. 3\u00aa Turma. REsp 1835598-SP, Rel. Min. Nancy Andrighi, julgado em 09/02/2021 (Info 685). O julgado acima foi parcialmente superado pelo seguinte entendimento proferido pela 2\u00aa Se\u00e7\u00e3o do STJ em embargos de diverg\u00eancia: A aus\u00eancia de registro do contrato que serve de t\u00edtulo \u00e0 propriedade fiduci\u00e1ria no Registro de Im\u00f3veis n\u00e3o retira a validade do ajuste entre os contratantes. Vale ressaltar, no entanto, que, para poder promover a aliena\u00e7\u00e3o extrajudicial do bem, \u00e9 necess\u00e1rio que se providencie registro do contrato. STJ. 2\u00aa Se\u00e7\u00e3o. EREsp 1.866.844-SP, Rel. Min. Nancy Andrighi, Rel. para ac\u00f3rd\u00e3o Min. Ricardo Villas B\u00f4as Cueva, julgado em 27/9/2023 (Info 789).\"}]}]}]},{\"title\":\"Paga a DIVIDA e Encargos\",\"children\":[{\"title\":\"Prop. fiduciaria se resolve e emite-se termo de quita\u00e7\u00e3o em 30 dias\"},{\"title\":\"obs\",\"children\":[{\"title\":\"O credor fiduci\u00e1rio, antes da consolida\u00e7\u00e3o da propriedade e da imiss\u00e3o na posse no im\u00f3vel objeto da aliena\u00e7\u00e3o fiduci\u00e1ria, n\u00e3o pode ser considerado sujeito passivo do IPTU, uma vez que n\u00e3o se enquadra em nenhuma das hip\u00f3teses previstas no art. 34 do CTN. Al\u00e9m disso, o \u00a7 8\u00ba do art. 27 da Lei n\u00ba 9.514/97 afirma expressamente que o credor fiduci\u00e1rio s\u00f3 responde pelo pagamento dos impostos relacionados com o bem se houver a consolida\u00e7\u00e3o da propriedade e a imiss\u00e3o na posse. STJ. 1\u00aa Turma. AREsp 1796224-SP, Rel. Min. Gurgel de Faria, julgado em 16/11/2021 (Info 720\"}]}]},{\"title\":\"N\u00e3o Paga a DIVIDA e Encargos\",\"children\":[{\"title\":\"Consolida-se a propriedade em nome do credor fiduciario\"},{\"title\":\"Credor fiduciario promoveR\u00c1 leilao publico para venda do bem (\u00c9 obrigat\u00f3rio, o credor nao ficar com a propriedae plena)\"},{\"title\":\"Leilao deve ser promovido em 60 dias e dependendo do valor outro em 15d\"},{\"title\":\"H\u00e1 um prazo de 15 dias p/ pagamento(intima\u00e7\u00e3o pessoal). a Lei preve expressamente a possibilidade de cita\u00e7\u00e3o por hora certa e dps edital\"},{\"title\":\"Purgada a mora no Registro de Im\u00f3veis, convalescer\u00e1 o contrato de aliena\u00e7\u00e3o\"},{\"title\":\"OBS\",\"children\":[{\"title\":\"Em contrato de compra e venda de im\u00f3vel com garantia de aliena\u00e7\u00e3o fiduci\u00e1ria devidamente registrado em cart\u00f3rio, a resolu\u00e7\u00e3o do pacto, na hip\u00f3tese de inadimplemento do devedor, devidamente constitu\u00eddo em mora, dever\u00e1 observar a forma prevista na Lei n\u00ba 9.514/97, por se tratar de legisla\u00e7\u00e3o espec\u00edfica, afastando-se, por conseguinte, a aplica\u00e7\u00e3o do C\u00f3digo de Defesa do Consumidor. STJ. 2\u00aa Se\u00e7\u00e3o. REsp 1.891.498-SP, Rel. Min. Marco Buzzi, julgado 26/10/2022 (Recurso Repetitivo \u2013 Tema 1095) (Info 755)\"},{\"title\":\"Se o devedor fiduciante se escusa, por diversas vezes, de receber as intima\u00e7\u00f5es para purgar a mora em seu endere\u00e7o comercial, conforme expressamente indicado no contrato de aliena\u00e7\u00e3o fiduci\u00e1ria de im\u00f3vel, induzindo os Correios a erro ao indicar poss\u00edvel mudan\u00e7a de domic\u00edlio que nunca existiu, n\u00e3o h\u00e1 \u00f3bice \u00e0 sua intima\u00e7\u00e3o por edital. STJ. 4\u00aa Turma. REsp 1.733.777-SP, Rel. Min. Maria Isabel Gallotti, julgado em 17/10/2023 (Info 794).\"},{\"title\":\"Antes da Lei 13.465/2017: mesmo que j\u00e1 consolidada a propriedade do im\u00f3vel dado em garantia em nome do credor fiduci\u00e1rio, era poss\u00edvel a purga\u00e7\u00e3o da mora. A purga\u00e7\u00e3o era admitida at\u00e9 a assinatura do auto de arremata\u00e7\u00e3o. Ap\u00f3s a Lei 13.465/2017: n\u00e3o se admite a purga\u00e7\u00e3o da mora ap\u00f3s a consolida\u00e7\u00e3o da propriedade em favor do credor fiduci\u00e1rio, sendo assegurado ao devedor fiduciante t\u00e3o somente o exerc\u00edcio do direito de prefer\u00eancia. Desse modo, n\u00e3o se admite a purga\u00e7\u00e3o da mora, nos contratos de m\u00fatuo imobili\u00e1rio com pacto adjeto de aliena\u00e7\u00e3o fiduci\u00e1ria, submetidos \u00e0 Lei n\u00ba 9.514/97 com a reda\u00e7\u00e3o dada pela Lei n\u00ba 13.465/2017, nas hip\u00f3teses em que a consolida\u00e7\u00e3o da propriedade em favor do credor fiduci\u00e1rio ocorreu na vig\u00eancia da nova lei, sendo assegurado ao devedor fiduciante t\u00e3o somente o exerc\u00edcio do direito de prefer\u00eancia. STJ. 2\u00aa Se\u00e7\u00e3o. REsp 1.942.898-SP, Rel. Min. Ricardo Villas B\u00f4as Cueva, julgado em 23/8/2023 (Info 15 \u2013 Edi\u00e7\u00e3o Extraordin\u00e1ria).\"}]}]},{\"title\":\"Inadimplemento\",\"children\":[{\"title\":\"Revers\u00e3o do bem deve ser processada pelo of. do cart\u00f3rio, independendo de a\u00e7\u00e3o judicial\"}]},{\"title\":\"Taxa de Ocupa\u00e7\u00e3o\",\"children\":[{\"title\":\"O art. 37-A da Lei n\u00ba 9.514/97 prev\u00ea que, se o fiduciante, mesmo estando inadimplente, continuar morando no im\u00f3vel, o fiduci\u00e1rio (credor) poder\u00e1 exigir o pagamento de um valor chamado de \u201ctaxa de ocupa\u00e7\u00e3o\u201d. A Lei 13.465/2017 alterou o art. 37-A da Lei n\u00ba 9.514/97 e passou a dizer expressamente que a taxa de ocupa\u00e7\u00e3o ser\u00e1 exig\u00edvel do fiduciante em mora desde a data da consolida\u00e7\u00e3o da propriedade fiduci\u00e1ria no patrim\u00f4nio do credor fiduciante. STJ - Se o imovel nao esta construido nao faz sentido a taxa de ocupa\u00e7\u00e3o\"},{\"title\":\"obs\",\"children\":[{\"title\":\"O  L O C A T A R I O  do im\u00f3vel cuja propriedade foi consolidada nas m\u00e3os do credor fiduci\u00e1rio diante da inadimpl\u00eancia do devedor fiduciante (antigo locador do bem)  N \u00c3 O  \u00e9 parte leg\u00edtima para responder pela taxa de ocupa\u00e7\u00e3o, prevista no art. 37-A da Lei n\u00ba 9.514/97, por n\u00e3o fazer parte da rela\u00e7\u00e3o jur\u00eddica que fundamenta a cobran\u00e7a da taxa em quest\u00e3o. Exemplo hipot\u00e9tico: Pedro (devedor fiduciante) alugou o im\u00f3vel objeto da aliena\u00e7\u00e3o fiduci\u00e1ria para Carlos. Pedro n\u00e3o pagou as presta\u00e7\u00f5es do m\u00fatuo ao banco e houve a consolida\u00e7\u00e3o da propriedade em nome do credor fiduci\u00e1rio (institui\u00e7\u00e3o financeira). O banco n\u00e3o pode cobrar a taxa de ocupa\u00e7\u00e3o de Carlos. STJ. 4\u00aa Turma. REsp 1966030-SP, Rel. Min. Antonio Carlos Ferreira, julgado em 23/11/2021 (Info 720).\"},{\"title\":\"Em opera\u00e7\u00f5es de financiamento imobili\u00e1rio garantidas por aliena\u00e7\u00e3o fiduci\u00e1ria,                         N \u00c3 O  \u00e9 poss\u00edvel a flexibiliza\u00e7\u00e3o do percentual da taxa de ocupa\u00e7\u00e3o de im\u00f3vel estabelecido no art. 37-A da Lei n\u00ba 9.514/97 a crit\u00e9rio do julgador. STJ. 3\u00aa Turma. REsp 1999485-DF, Rel. Min. Nancy Andrighi, Rel. para ac\u00f3rd\u00e3o Min. Ricardo Villas B\u00f4as Cueva, julgado em 6/12/2022 (Info 762).\"}]}]}]},{\"title\":\"BENS MOVEIS Inadimplemento ou Mora Procedimento Dec.-Lei 911/1969 - Bens Moveis\",\"children\":[{\"title\":\"Intro\",\"children\":[{\"title\":\"Proprietario ou credor pode vender a coisa a terceiros\"},{\"title\":\"Independente de leilao, hasta publica, aval. previa ou qlq outra medida jud. ou extrajud.\"},{\"title\":\"Salvo disposi\u00e7\u00e3o expressa no contrato\"},{\"title\":\"Deve aplicar o preco da venda no pagto do credito e das despesas\"},{\"title\":\"E entregar ao credor o saldo apurado, se houver\"},{\"title\":\"O mora decorre de simples inadimplemento(vencimento do prazo)\"},{\"title\":\"O pedido de recupera\u00e7\u00e3o judicial nao impede o BAP\"}]},{\"title\":\"Notifica\u00e7\u00e3o do Devedor Comprova\u00e7\u00e3o da Mora\",\"children\":[{\"title\":\"\u00c9 extrajudicial e ocorre para comprovar a mora\"},{\"title\":\"A notifica\u00e7\u00e3o \u00e9 indispensavel para o ajuizamento do BAP\"},{\"title\":\"\u00c9 imprescindivel p/ o BAP?\",\"children\":[{\"title\":\"Sim, segundo STJ\"}]},{\"title\":\"Essa notifica\u00e7\u00e3o dispensa indica\u00e7\u00e3o do valor do debito\"},{\"title\":\"Notifica\u00e7\u00e3o \u00e9 feita por carta registrada com AR(nao precisa ser cartorio - RTD)\"},{\"title\":\"N\u00e3o exige assinatura do AR pelo proprio destinatario(basta a entrega)\"},{\"title\":\"Decorre de simples vencimento do prazo. Independe de aviso ou notifica\u00e7\u00e3o\"},{\"title\":\"Pode ser comprovada por carta expedida por CARTORIO ou por PROTESTO\"},{\"title\":\"obs\",\"children\":[{\"title\":\"S\u00famula 92-STJ:A terceiro de boa-f\u00e9 n\u00e3o \u00e9 opon\u00edvel a aliena\u00e7\u00e3o fiduci\u00e1ria n\u00e3o anotada no certificado de registro do ve\u00edculo automotor.\"},{\"title\":\"S\u00famula 72-STJ: A comprova\u00e7\u00e3o da mora \u00e9 imprescind\u00edvel \u00e0 busca e apreens\u00e3o do bem alienado fiduciariamente. \u2022 Importante. \u2022 O credor pode demonstrar a mora do devedor por meio de carta registrada com aviso de recebimento. N\u00e3o mais se exige que a carta registrada seja expedida pelo Cart\u00f3rio de T\u00edtulos e Documentos. \u00c9 dispens\u00e1vel que haja o protesto do t\u00edtulo. S\u00famula 245-STJ: A notifica\u00e7\u00e3o destinada a comprovar a mora nas d\u00edvidas garantidas por aliena\u00e7\u00e3o fiduci\u00e1ria dispensa a indica\u00e7\u00e3o do valor do d\u00e9bito.\"},{\"title\":\"Para a comprova\u00e7\u00e3o da mora nos contratos garantidos por aliena\u00e7\u00e3o fiduci\u00e1ria, \u00e9 suficiente o envio de notifica\u00e7\u00e3o extrajudicial ao devedor no endere\u00e7o indicado no instrumento contratual, dispensando-se a prova do recebimento, quer seja pelo pr\u00f3prio destinat\u00e1rio, quer por terceiros. STJ. 2\u00aa Se\u00e7\u00e3o.REsp 1.951.662-RS e REsp 1.951.888-RS, Rel. Min. Marco Buzzi, Rel. para ac\u00f3rd\u00e3o Min. Jo\u00e3o Ot\u00e1vio de Noronha, julgados em 9/8/2023(Recurso Repetitivo \u2013 Tema 1132) (Info 782).\"},{\"title\":\"Exige anota\u00e7ao no CRV?\",\"children\":[{\"title\":\"Exemplo hipot\u00e9tico: Ant\u00f4nio queria comprar o carro de Jo\u00e3o (Honda Civic).Ant\u00f4nio procurou o Banco \u201cX\u201d, que celebrou com ele contrato de financiamento com garantia de aliena\u00e7\u00e3o fiduci\u00e1ria.Assim, o Banco \u201cX\u201d emprestou R$ 40 mil a Ant\u00f4nio, que comprou o ve\u00edculo de Jo\u00e3o. Ocorre que o autom\u00f3vel, nos registros do DETRAN, continuou em nome de Jo\u00e3o, antigo propriet\u00e1rio, estranho \u00e0 rela\u00e7\u00e3o contratual firmada entre Ant\u00f4nio e o Banco \u201cX\u201d. N\u00e3o foi feita a anota\u00e7\u00e3o da aliena\u00e7\u00e3o fiduci\u00e1ria no CRV. Ant\u00f4nio deixou de pagar as presta\u00e7\u00f5es. Mesmo sem a anota\u00e7\u00e3o da aliena\u00e7\u00e3o fiduci\u00e1ria no CRV, o Banco pode ajuizar a\u00e7\u00e3o de busca e apreens\u00e3o do autom\u00f3vel. A anota\u00e7\u00e3o da aliena\u00e7\u00e3o fiduci\u00e1ria no certificado de registro do ve\u00edculo n\u00e3o constitui requisito para a propositura da a\u00e7\u00e3o de busca e apreens\u00e3o, uma vez que o registro \u00e9 condi\u00e7\u00e3o de efic\u00e1cia da garantia perante terceiros e n\u00e3o entre os contratantes. Os documentos indispens\u00e1veis ao ajuizamento da a\u00e7\u00e3o de busca e apreens\u00e3o s\u00e3o os seguintes: 1) a comprova\u00e7\u00e3o da mora do devedor fiduciante (S\u00famula 72/STJ); e 2) o contrato escrito celebrado entre as partes. Al\u00e9m disso, se o bem objeto da aliena\u00e7\u00e3o fiduci\u00e1ria estiver registrado em nome de terceiro, a peti\u00e7\u00e3o inicial dever\u00e1 ser instru\u00edda com prova de que a posse do bem foi transferida ao devedor. STJ. 3\u00aa Turma.REsp 2.095.740-DF, Rel. Min. Nancy Andrighi, julgado em 6/2/2024 (Info 800).\"}]}]},{\"title\":\"obs\",\"children\":[{\"title\":\"No caso de aliena\u00e7\u00e3o fiduci\u00e1ria de bem im\u00f3vel a mora \u00e9 ex re, segundo o disposto no \u00a7 2\u00b0 do art. 2\u00b0 do Decreto-Lei n. 911/1969, com a notifica\u00e7\u00e3o servindo apenas a sua comprova\u00e7\u00e3o, n\u00e3o sendo de exigir-se, para esse efeito, mais do que a refer\u00eancia ao contrato inadimplido. J\u00e1 em rela\u00e7\u00e3o ao bem m\u00f3vel: Art. 26. Vencida e n\u00e3o paga a d\u00edvida, no todo ou em parte, e constitu\u00eddos em mora o devedor e, se for o caso, o terceiro fiduciante, ser\u00e1 consolidada, nos termos deste artigo, a propriedade do im\u00f3vel em nome do fiduci\u00e1rio.    - fica claro que o mero inadimplemento n\u00e3o culmina em mora, devendo haver a interpela\u00e7\u00e3o do sujeito para tanto\"}]}]},{\"title\":\"Ajjuizamento da A\u00e7\u00e3o Ap\u00f3s a mora 2 op\u00e7\u00f5es\",\"children\":[{\"title\":\"1) poder\u00e1 ingressar com uma a\u00e7\u00e3o de busca e apreens\u00e3o requerendo que lhe seja entregue o bem (art. 3\u00ba do DL 911/69). Essa busca e apreens\u00e3o prevista no DL 911/69 \u00e9 uma a\u00e7\u00e3o especial aut\u00f4noma e independente de qualquer procedimento posterior; ou\"},{\"title\":\"2) ajuizar uma a\u00e7\u00e3o de execu\u00e7\u00e3o (arts. 4\u00ba e 5\u00ba do DL 911/69).\"},{\"title\":\"A\u00e7\u00f5es nao pode ser ajuizadas concomitantemente\"},{\"title\":\"STJ\",\"children\":[{\"title\":\"A quem compete comprovar a venda do bem? \u00c9 necessario ajuizar a\u00e7\u00e3o de prest. de contas?\",\"children\":[{\"title\":\"No procedimento da consolida\u00e7\u00e3o da propriedade fiduci\u00e1ria pelo Decreto-Lei n\u00ba 911/69, compete ao credor fiduci\u00e1rio, ap\u00f3s a consolida\u00e7\u00e3o da propriedade decorrente da mora do devedor, o \u00f4nus de comprovar a venda do bem e o valor auferido com a aliena\u00e7\u00e3o. Vale ressaltar, contudo, que as quest\u00f5es concernentes \u00e0 venda extrajudicial do bem, imputa\u00e7\u00e3o do valor alcan\u00e7ado no pagamento do d\u00e9bito e apura\u00e7\u00e3o acerca de eventual saldo remanescente em favor do devedor, em princ\u00edpio, n\u00e3o podem ser discutidas, incidentalmente, no bojo da a\u00e7\u00e3o de busca e apreens\u00e3o que visa t\u00e3o somente \u00e0 consolida\u00e7\u00e3o da propriedade do bem no patrim\u00f4nio do credor fiduci\u00e1rio. \u00c9 necess\u00e1rio o ajuizamento de a\u00e7\u00e3o de exigir contas. STJ. 4\u00aa Turma. REsp 1742102-MG, Rel. Min. Marco Buzzi, julgado em 23/3/2023 (Info 769).\"}]},{\"title\":\"TITULO ORIGINAL\",\"children\":[{\"title\":\"Exemplo: Jo\u00e3o queria comprar um carro de R$ 100 mil, mas s\u00f3 tinha R$ 40 mil. Diante disso, ele procurou o banco para obter um empr\u00e9stimo de R$ 60 mil. A institui\u00e7\u00e3o financeira aceitou emprestar a quantia, no entanto, exigiu que o neg\u00f3cio fosse assim materializado: i) Jo\u00e3o deveria emitir uma c\u00e9dula de cr\u00e9dito banc\u00e1rio em favor da BV; ii) o carro adquirido deveria ficar em nome da BV como garantia em aliena\u00e7\u00e3o fiduci\u00e1ria. Como Jo\u00e3o se tornou inadimplente, o banco ajuizou a\u00e7\u00e3o de busca e apreens\u00e3o contra ele. \u00c9 indispens\u00e1vel que o autor junte o original do t\u00edtulo de cr\u00e9dito (no caso, a c\u00e9dula de cr\u00e9dito banc\u00e1rio). Isso porque, se o bem n\u00e3o for encontrado, a busca e apreens\u00e3o se converter\u00e1 em execu\u00e7\u00e3o e na execu\u00e7\u00e3o \u00e9 indispens\u00e1vel, como regra, a juntada do t\u00edtulo original. Obs: a c\u00e9dula de cr\u00e9dito pode ser emitida de forma cartular (\u201cem papel\u201d) ou escritural (eletr\u00f4nica). Se a CCB for escritural, por \u00f3bvio, n\u00e3o h\u00e1 que se falar em juntada do original j\u00e1 que n\u00e3o \u00e9 um documento f\u00edsico. STJ. 3\u00aa Turma. REsp 1946423-MA, Rel. Min. Nancy Andrighi, julgado em 09/11/2021 (Info 717).\"}]}]}]},{\"title\":\"Concessao de Liminar\",\"children\":[{\"title\":\"O juiz conceder\u00e1 a busca e apreens\u00e3o de forma liminar (sem ouvir o devedor), desde que comprovada a mora ou o inadimplemento do devedor (art. 3\u00ba do DL 911/69).\"},{\"title\":\"Callout\",\"children\":[{\"title\":\"COMPETENCIA\",\"children\":[{\"title\":\"Caso adaptado: Alfa Ltda. celebrou, em Pinhais (PR), contrato de financiamento com garantia de aliena\u00e7\u00e3o fiduci\u00e1ria com o Banco para aquisi\u00e7\u00e3o de um caminh\u00e3o. Ap\u00f3s alguns meses, a Alfa parou de pagar as presta\u00e7\u00f5es do contrato. O Banco ajuizou, na comarca de Pinhais (PR), a\u00e7\u00e3o de busca e apreens\u00e3o contra a empresa requerendo que lhe seja entregue o bem (art. 3\u00ba do DL 911/69). O magistrado concedeu a liminar determinando que o ve\u00edculo fosse devolvido. O Banco solicitou o cumprimento da decis\u00e3o ao ju\u00edzo de S\u00e3o Luiz (MA), onde o caminh\u00e3o estava localizado. Esse requerimento foi formulado com base no art. 3\u00ba, \u00a7 12 do DL 911/69. A empresa quer interp\u00f4s Alfa agravo de instrumento contra a decis\u00e3o que concedeu a liminar. A compet\u00eancia para julgar esse agravo \u00e9 do TJ/PR (e n\u00e3o do TJ/MA). A efetiva\u00e7\u00e3o de medida liminar concedida em a\u00e7\u00e3o de busca e apreens\u00e3o de bem m\u00f3vel, por Ju\u00edzo onde se localize o bem, a pedido da parte interessada, com fundamento no art. 3\u00ba, \u00a7 12, do Decreto-Lei n. 911/1969, n\u00e3o atrai a compet\u00eancia desse Ju\u00edzo para eventual impugna\u00e7\u00e3o ao conte\u00fado de tal liminar, que dever\u00e1 ser postulada perante o Ju\u00edzo da causa que concedeu a liminar, afigurando-se igualmente competente para o julgamento de eventual recurso interposto contra essa decis\u00e3o o Tribunal ao qual se encontra vinculado esse Ju\u00edzo natural. STJ. 2\u00aa Se\u00e7\u00e3o. CC 186.137-PR, Rel. Min. Marco Aur\u00e9lio Bellizze, julgado em 8/11/2023 (Info 794).\"}]}]}]},{\"title\":\"Possibilidade de Pagto Integral da Divida FGV - 2022 - AGE-MG - Procurador\",\"children\":[{\"title\":\"No prazo de 5 dias ap\u00f3s o cumprimento da liminar (apreens\u00e3o do bem)\",\"children\":[{\"title\":\"stj\",\"children\":[{\"title\":\"O prazo de cinco dias para pagamento da integralidade da d\u00edvida, previsto no art. 3\u00ba, \u00a7 2\u00ba, do Decreto-Lei n\u00ba 911/1969, deve ser considerado de DIREITO MATERIAL, N \u00c3 O  se sujeitando, assim, \u00e0 contagem em dias \u00fateis, prevista no art. 219, caput, do CPC/2015. STJ. 3\u00aa Turma. REsp 1770863-PR, Rel. Min. Nancy Andrighi, julgado em 09/06/2020 (Info 673).\"}]}]},{\"title\":\"o devedor fiduciante poder\u00e1 pagar a integralidade da d\u00edvida\"},{\"title\":\"segundo os valores apresentados pelo credor fiduci\u00e1rio na inicial\"},{\"title\":\"hip. na qual o bem lhe ser\u00e1 restitu\u00eddo livre do \u00f4nus (\u00a7 2\u00ba do art. 3\u00ba do DL 911/69).\"},{\"title\":\"\u00e9 possivel adimplemento substancial? \u00e9 descabida devido \u00e0 exig\u00eancia do pagamento da integralidade da d\u00edvida para o bem ser restitu\u00eddo ao devedor livre de \u00f4nus.\"},{\"title\":\"Sendo que o fiduciario nao poderia vender o bem durante esse prazo\"},{\"title\":\"obs\",\"children\":[{\"title\":\"Esse prazo \u00e9 em dia util?\",\"children\":[{\"title\":\"O prazo de cinco dias para pagamento da integralidade da d\u00edvida, previsto no art. 3\u00ba, \u00a7 2\u00ba, do Decreto-Lei n\u00ba 911/1969, deve ser considerado de direito material, n\u00e3o se sujeitando, assim, \u00e0 contagem em dias \u00fateis, prevista no art. 219, caput, do CPC/2015. STJ. 3\u00aa Turma. REsp 1770863-PR, Rel. Min. Nancy Andrighi, julgado em 09/06/2020 (Info 673).\"}]},{\"title\":\"O que \u00e9 a integralidade?\",\"children\":[{\"title\":\"Nos contratos firmados na vig\u00eancia da Lei 10.931/2004, compete ao devedor, no prazo de 5 (cinco) dias ap\u00f3s a execu\u00e7\u00e3o da liminar na a\u00e7\u00e3o de busca e apreens\u00e3o, pagar a integralidade da d\u00edvida - entendida esta como os valores apresentados e comprovados pelo credor na inicial -, sob pena de consolida\u00e7\u00e3o da propriedade do bem m\u00f3vel objeto de aliena\u00e7\u00e3o fiduci\u00e1ria. STJ. 2\u00aa Se\u00e7\u00e3o. REsp 1.418.593-MS, Rel. Min. Luis Felipe Salom\u00e3o, julgado em 14/5/2014 (recurso repetitivo) (Info 540).\"}]}]}]},{\"title\":\"Resposta\",\"children\":[{\"title\":\"No prazo de 15 dias ap\u00f3s o cumprimento da liminar (apreens\u00e3o do bem)\"},{\"title\":\"o devedor fiduciante apresentar\u00e1 resposta (uma esp\u00e9cie de contesta\u00e7\u00e3o).\"},{\"title\":\"Termo inicial dos 15d: Mandado de cita\u00e7\u00e3o cumprido\"},{\"title\":\"A contesta\u00e7\u00e3o pode ser apresentada antes\"},{\"title\":\"Mesmo com contesta\u00e7\u00e3o a liminar ser\u00e1 concedida\"},{\"title\":\"obs\",\"children\":[{\"title\":\"Na a\u00e7\u00e3o de busca e apreens\u00e3o de que trata o DL 911/1969, a an\u00e1lise da contesta\u00e7\u00e3o somente deve ocorrer ap\u00f3s a execu\u00e7\u00e3o da medida liminar. STJ. 2\u00aa Se\u00e7\u00e3o. REsp 1.892.589-MG, Rel. Min. Paulo de Tarso Sanseverino, Rel. Acd. Min. Ricardo Villas B\u00f4as Cueva, julgado em 16/09/2021 (Recurso Repetitivo \u2013 Tema 1040) (Info 710).\"}]}]},{\"title\":\"BAP Abusivo\",\"children\":[{\"title\":\"A Lei traz mecanismos pra evitar\"}]},{\"title\":\"Bem n\u00e3o encontrado ou  N\u00e3o estiver na POSSE do DEVEDOR\",\"children\":[{\"title\":\"Pode ser requerida conversao do BAP em A\u00e7\u00e3o de DEPOSITO\"},{\"title\":\"\u00c9 uma regra polemica\"},{\"title\":\"Permitiria prisao do depositario infiel\"},{\"title\":\"A regra foi afastada pelo STJ, pois nao seria contrato de deposito, mas deposito ficto\"},{\"title\":\"Posteriormente, depois de entender que sim e que nao, STF jugou definitivamente\"}]}]}]},{\"title\":\"Arrendamento Mercantil(Leasing)\",\"children\":[{\"title\":\"Conceito\",\"children\":[{\"title\":\"Contrato especial de LOCACAO q assegura ao locatario a prerrogativa de adquirir\"},{\"title\":\"O bem ao final da aven\u00e7a pagando uma diferenca chamada VALOR RESIDUAL\"},{\"title\":\"Neg. Juridico celebrando entre PJ(Arrendadora) e PF ou PJ(Arrendatario)\"},{\"title\":\"Tem por objeto arrendamento de bens adquiridos pela arrendadora\"},{\"title\":\"OBS - Nem todo contrato de locacao com opcao de compra \u00e9 LEASING\"},{\"title\":\"OBS - Para ser leasing precisa atender a Lei, sen\u00e3o \u00e9 Compra e Venda a prestac\u00e3o\"}]},{\"title\":\"Op\u00e7\u00f5es ao Final  do ALUGUEL(3)\",\"children\":[{\"title\":\"- Renovar a locacao, prorrogando o contrato;\"},{\"title\":\"- Encerrar contrato;\"},{\"title\":\"- Comprar o bem alugado, pagando-se valor RESIDUAL; \u00c9 clausula obrigat\u00f3ria? SIM!\"}]},{\"title\":\"Disciplina\",\"children\":[{\"title\":\"N\u00e3o \u00e9 contrato tipico\"},{\"title\":\"Aspectos tributarios pela Lei alem do COCNEITO(Lei 6.099/1974)\"},{\"title\":\"Leasing Automotivo - Lei 11.649/2008\"}]},{\"title\":\"Objeto do Contrato FCC - 2018 - MPE-PB - Promotor\",\"children\":[{\"title\":\"Bens M\u00d3VEIS e IM\u00d3VEIS de fabrico nacional OU ESTRANGEIRO\"}]},{\"title\":\"Leasing Automotivo Regramento - Art. 1\u02da\",\"children\":[{\"title\":\"Nesses contratos, apos quita\u00e7\u00e3o de todas parcelas vencidas e vincendas\"},{\"title\":\"Das obrig. pecuniarias previstas em contrato e do envio ao arrendador DE\"},{\"title\":\"Comprovante de pagto dos IPVA e DPVAT e multas nas esferas U, E, M\"},{\"title\":\"Documentos esses acompanhados da op\u00e7\u00e3o pela compra do bem\"},{\"title\":\"A sociedade de arrendamento mercantil devem em at\u00e9 30 dias uteis, apos receber docs.\"},{\"title\":\"Remeter ao arrendatario\",\"children\":[{\"title\":\"I \u2013 DUT do ve\u00edculo devidamente assinado pela arrendadora, a fim de possibilitar que o arrendat\u00e1rio providencie a respectiva transf. de prop. do ve\u00edculo junto ao DETRAN\"},{\"title\":\"II \u2013 a NP vinculada ao contrato e emitida pelo arrendat\u00e1rio, se houver, com o devido carimbo de \u2018liquidada\u2019 ou \u2018sem efeito\u2019, bem como o termo de quita\u00e7\u00e3o do (leasing)\u201d.\u201d\"}]},{\"title\":\"Considera-se nula de PLENO DIREITO\",\"children\":[{\"title\":\"Qlq clausula contratual que seja contraria ao art.\"}]},{\"title\":\"Descumprimento do Art. 1\u02da\",\"children\":[{\"title\":\"Sujeita ao pagto de multa equivalente a 2% do valor de venda\"},{\"title\":\"Pode a parte cobrar a multa em proc. de execu\u00e7\u00e3o\"}]}]},{\"title\":\"Especies de Leasing\",\"children\":[{\"title\":\"Financeiro (modalidade tipica)\",\"children\":[{\"title\":\"Bem arrendado nao pertence a arrendadora q apos a indica\u00e7\u00e3o compra o bem\"},{\"title\":\"O bem \u00e9 indicado pelo arrendatario\"},{\"title\":\"A arrendadora tem alto custo inicial. Aluguel deve ser suficentes p/ recup. o credito\"},{\"title\":\"Na opcao de compra o Valor Residual \u00e9 de pouca monta\"}]},{\"title\":\"Operacional\",\"children\":[{\"title\":\"O bem j\u00e1 \u00e9 da arrendadora. N\u00e3o h\u00e1 custo inicial de aquisi\u00e7\u00e3o\"},{\"title\":\"Arrendadora compromete-se a assistencia tecnica\"},{\"title\":\"Por nao ter custo inicial a soma das prestacoes(alugel) nao pode passar 75% do valor do bem\"},{\"title\":\"Valor residual \u00e9 alto\"},{\"title\":\"O proprio fabricante ou arrendador \u00e9 o arrendante\"}]},{\"title\":\"Lease Back - Leasing de Retorno\",\"children\":[{\"title\":\"O bem era do arrendatario que o vende a arrendadora p/ arrenda-lo\"},{\"title\":\"Pode readquirir o bem ao final do contrato\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"Art. 6\u00ba Considera-se arrendamento mercantil operacional a modalidade em que: I - as contrapresta\u00e7\u00f5es a serem pagas pela arrendat\u00e1ria contemplem o custo de arrendamento do bem e os servi\u00e7os inerentes a sua coloca\u00e7\u00e3o \u00e0 disposi\u00e7\u00e3o da arrendat\u00e1ria, n\u00e3oResolu\u00e7\u00e3o n\u00ba 2.309, de 28 de agosto de 1996. podendo o valor presente dos pagamentos ultrapassar 90% (noventa por cento) do \\\"custo do bem; Art. 8\u00ba Os contratos devem estabelecer os seguintes prazos m\u00ednimos de arrendamento: I - para o arrendamento mercantil financeiro: a) 2 (dois) anos, compreendidos entre a data de entrega dos bens \u00e0 arrendat\u00e1ria, consubstanciada em termo de aceita\u00e7\u00e3o e recebimento dos bens, e a data de vencimento da \u00faltima contrapresta\u00e7\u00e3o, quando se tratar de arrendamento de bens com vida \u00fatil igual \\\"ou inferior a 5 (cinco) anos;Resolu\u00e7\u00e3o n\u00ba 2.309, de 28 de agosto de 1996. b) 3 (tr\u00eas) anos, observada a defini\u00e7\u00e3o do prazo constante da al\u00ednea anterior, para o arrendamento de outros bens; II - para o arrendamento mercantil operacional, 90 (noventa) dias. FONTE: Resolu\u00e7\u00e3o n\u00ba 2.309, de 28 de agosto de 1996, do BACEN.\"}]}]},{\"title\":\"Diferenca com Aliena\u00e7\u00e3o Fiduciaria FCC - 2018 - MPE-PB - Promotor\",\"children\":[{\"title\":\"S\u00e3o modalidades muito diferentes\"},{\"title\":\"Na pratica o leasing \u00e9 sempre usado como financiamento\"},{\"title\":\"Leasing \u00e9 uma loca\u00e7\u00e3o com OPCAO de COMPRA\"},{\"title\":\"A alienac\u00e3o fiduciaria \u00e9 um contrato de aquisicao\"},{\"title\":\"No leasing usa-se REINTEG. de POSSE ao inves de BAP\"}]},{\"title\":\"Sum. 369 STJ - consittui\u00e7\u00e3o em Mora CESPE / CEBRASPE - 2023 - AGU - PFN\",\"children\":[{\"title\":\"Nesse contrato, ainda que haja clausula resolutiva expressa\"},{\"title\":\"\u00c9 necessaria notifcac\u00e3o previa do arrendatario, p/ constituir em mora\"}]},{\"title\":\"OBS\",\"children\":[{\"title\":\"Titulo executivo?\",\"children\":[{\"title\":\"O contrato de arrendamento mercantil \u00e9 t\u00edtulo executivo extrajudicial, tendo em vista que preenche os elementos exigidos pelo sistema processual p\u00e1trio, em especial o art. 784, III, do CPC: Art. 784. S\u00e3o t\u00edtulos executivos extrajudiciais: (...) III - o documento particular assinado pelo devedor e por 2 (duas) testemunhas; O contrato de arrendamento mercantil \u00e9 um documento particular que, em regra, cont\u00e9m a assinatura do devedor e de duas testemunhas. STJ. 4\u00aa Turma. REsp 1699184-SP, Rel. Min. Luis Felipe Salom\u00e3o, julgado em 25/10/2022 (Info 755).\"}]},{\"title\":\"receber pagto antes do termo + VENCIMENTO ANTECIPADO\",\"children\":[{\"title\":\"Haver\u00e1 situa\u00e7\u00f5es excepcionais em que o credor poder\u00e1 receber o pagamento, mesmo antes do termo estabelecido originalmente no contrato. O pr\u00f3prio C\u00f3digo Civil prev\u00ea, em seu art. 333, uma s\u00e9rie de situa\u00e7\u00f5es em que se d\u00e1 o vencimento antecipado, conferindo ao credor ao direito de cobrar a d\u00edvida antes de vencido prazo estipulado no contrato ou marcado na legisla\u00e7\u00e3o. Esse rol do art. 333 do CC n\u00e3o \u00e9 taxativo (numerus clausus), sendo, portanto, exemplificativo (numerus apertus). Nesse sentido, \u00e9 comum que alguns contratos prevejam o vencimento antecipado da d\u00edvida pelo inadimplemento. Essa previs\u00e3o \u00e9, em regra, V \u00c1 L I D A. STJ. 4\u00aa Turma. REsp 1699184-SP, Rel. Min. Luis Felipe Salom\u00e3o, julgado em 25/10/2022 (Info 755).\"}]},{\"title\":\"resili\u00e7\u00e3o e mora\",\"children\":[{\"title\":\"Caso adaptado: Alfa Ltda. produz m\u00e1quinas industriais. Ela celebrou contrato de arrendamento mercantil com a Delta. A Delta arrendou uma m\u00e1quina industrial e se comprometeu a pagar 60 presta\u00e7\u00f5es mensais de R$ 50 mil (5 anos de contrato). Depois de 3 anos de contrato, a Delta tornou-se inadimplente. Havia uma cl\u00e1usula no contrato dizendo que, na hip\u00f3tese de inadimplemento, todas as parcelas seriam consideradas vencidas antecipadamente. Diante disso, a Alfa ingressou com execu\u00e7\u00e3o de t\u00edtulo extrajudicial cobrando as parcelas referentes aos 2 anos que faltavam. Depois de ter recebido a cita\u00e7\u00e3o da execu\u00e7\u00e3o de t\u00edtulo extrajudicial, a Delta (devedora) fez notifica\u00e7\u00e3o extrajudicial dirigida \u00e0 Alfa informando que queria fazer a resili\u00e7\u00e3o do contrato (desfazimento imotivado do contrato), colocando o bem arrendado \u00e0 disposi\u00e7\u00e3o da arrendante. No arrendamento mercantil, a resili\u00e7\u00e3o n\u00e3o poder\u00e1 ser exercida se o contratante se encontrar em mora, devendo, nesses casos, o devedor, suportar todos os riscos de sua inadimpl\u00eancia, sob pena de configurar-se abuso do direito por parte do contratante que pretende resilir. STJ. 4\u00aa Turma. REsp 1699184-SP, Rel. Min. Luis Felipe Salom\u00e3o, julgado em 25/10/2022 (Info 755).\"}]},{\"title\":\"cobran\u00e7a antecipada do VRG CESPE / CEBRASPE - 2023 - AGU - PFN FGV - 2022 - AGE-MG - Procurador\",\"children\":[{\"title\":\"S\u00famula 293 do STJ: \\\"A cobran\u00e7a antecipada do valor residual garantido (VRG) n\u00e3o descaracteriza o contrato de arrendamento mercantil.\\\"\"}]},{\"title\":\"ARRENDAMENTO MERCANTIL IMPEDE  USUCAPIAO? FGV - 2023 - TJ-ES - Juiz Substituto\",\"children\":[{\"title\":\"A exist\u00eancia de contrato de arrendamento mercantil do bem m\u00f3vel impede a aquisi\u00e7\u00e3o de sua propriedade pela usucapi\u00e3o, contudo, verificada a prescri\u00e7\u00e3o da d\u00edvida, inexiste \u00f3bice legal para prescri\u00e7\u00e3o aquisitiva. STJ. 4\u00aa Turma. REsp 1528626-RS, Rel. Min. Luis Felipe Salom\u00e3o, Rel. Acd. Min. Raul Ara\u00fajo, julgado em 17/12/2019 (Info 667).\"}]},{\"title\":\"iNEXECU\u00c7\u00c3O CONTRATUAL caso fortuito ou de for\u00e7a maior\",\"children\":[{\"title\":\"A resolu\u00e7\u00e3o por inexecu\u00e7\u00e3o contratual involunt\u00e1ria em fun\u00e7\u00e3o de caso fortuito ou for\u00e7a maior enseja ao arrendat\u00e1rio o dever de pagar ao arrendante o valor correspondente ao bem recebido (descontado, por \u00f3bvio, o valor das parcelas vencidas e quitadas), de modo a restabelecer a situa\u00e7\u00e3o pret\u00e9rita ao contrato, especialmente na hip\u00f3tese em que o possuidor direto deixa de proceder \u00e0 contrata\u00e7\u00e3o de seguro do bem arrendado\u201d (REsp n. 1.089.579/MG, relator Ministro Marco Buzzi, Quarta Turma, julgado em 20/6/2013, DJe de 4/9/2013).\"}]}]}]},{\"title\":\"Faturiza\u00e7\u00e3o ou Factoring ou  Fomento Mercantil\",\"children\":[{\"title\":\"Conceito\",\"children\":[{\"title\":\"empresario concede credito a seus clientes. AO CONCEDER ESSE CR\u00c9DITO\"},{\"title\":\"Alem de assumir a insolvencia, chama pra si a tarefa de admin seus devedores\"},{\"title\":\"Serve ao empresario p/ permitir uma melhor organiza\u00e7\u00e3o do seu negocio\"},{\"title\":\"Empresario transfere a uma inst. financeira atribui\u00e7\u00f5es atinentes a admin. de seu credito\"},{\"title\":\"Algumas vezes h\u00e1 antecipa\u00e7\u00e3o desse credito ao empresario\"},{\"title\":\"Inst financeira orienta o empresario acerca da concess\u00e3o de credito aos seus clentes....\"},{\"title\":\"...Antecipa valor dos creditos que empresario possui e assume risco de inadimplencia\"},{\"title\":\"\u00c9 uma tecnica de gest\u00e3o comercial, caracterizada pela participa\u00e7\u00e3o do faturizador nos negocios\"},{\"title\":\"N\u00e3o se reconhece como sendo pro solvendo, embora o contrato pode prever\"},{\"title\":\"Factoring n\u00e3o \u00e9 institui\u00e7\u00e3o financeira pq nao faz capta\u00e7ao de recursos\"},{\"title\":\"H\u00e1 utiliza\u00e7ao de recursos proprios em suas atividades\"},{\"title\":\"Callout\",\"children\":[{\"title\":\"A palavra factoring pode ser utilizada tanto para designar o contrato (contrato de factoring) como tamb\u00e9m a sociedade empres\u00e1ria que celebra esse tipo de ajusta, ou seja, que desenvolve essa atividade. Para entendermos ent\u00e3o o que \u00e9 uma empresa de factoring, \u00e9 necess\u00e1rio primeiramente sabermos o que \u00e9 um contrato de factoring. Factoring (ou faturiza\u00e7\u00e3o) \u00e9 o contrato por meio do qual um empres\u00e1rio (faturizado) cede a uma institui\u00e7\u00e3o de factoring (faturizadora), total ou parcialmente, os t\u00edtulos de cr\u00e9ditos recebidos com a atividade empres\u00e1ria para que a factoring antecipe os pagamentos a prazo ou fa\u00e7a apenas a administra\u00e7\u00e3o desses cr\u00e9ditos. As empresas popularmente conhecidas como factoring desempenham atividades de fomento mercantil, de cunho meramente comercial, em que se ajusta a compra de cr\u00e9ditos venc\u00edveis, mediante pre\u00e7o certo e ajustado, e com recursos pr\u00f3prios, n\u00e3o podendo ser caracterizadas como institui\u00e7\u00f5es financeiras. STJ. 3\u00aa Se\u00e7\u00e3o. CC 98.062/SP, Rel. Min. Jorge Mussi, julgado em 25/08/2010.\"}]}]},{\"title\":\"Especies\",\"children\":[{\"title\":\"Conventional Factoring\",\"children\":[{\"title\":\"H\u00e1 antecipa\u00e7\u00e3o dos valores referentes ao credito do faturizado\"},{\"title\":\"Ou seja, Admin do credito, seguro e financiamento\"}]},{\"title\":\"Maturity Factoring\",\"children\":[{\"title\":\"H\u00e1 apenas prestac\u00e3o dos servi\u00e7os de administra\u00e7\u00e3o de credito\"},{\"title\":\"Admin do credito e seguro\"}]}]},{\"title\":\"Caracteristicas\",\"children\":[{\"title\":\"Faturizador n\u00e3o \u00e9 obrigado a aceitar todos os creditos passados. Pode analisa-los\"},{\"title\":\"Empresas de factoring nao precisam de autoriza\u00e7\u00e3o do BACEN, n\u00e3o s\u00e3o inst. financeiras\"},{\"title\":\"Clausula de Exclusividade - N\u00e3o contratar outro faturizador\"},{\"title\":\"C. de Totalidade - Faturizado transmite todos os creditos ao faturizador, cabe a este escolher\"},{\"title\":\"Clausula de aprova\u00e7\u00e3o - Prevista pelo faturizador\"}]},{\"title\":\"Factoring X Agiotagem\",\"children\":[{\"title\":\"Agiotagem \u00e9 atividade ilicita\"},{\"title\":\"Deve-se analisar se s\u00e3o prestados servi\u00e7os  de admin. de credito e se s\u00e3o op. constantes ou esporad.\"}]},{\"title\":\"Callout\",\"children\":[{\"title\":\"Pode celebrar mutuo fenerat\u00edcio?\",\"children\":[{\"title\":\"Embora n\u00e3o constitua institui\u00e7\u00e3o financeira, n\u00e3o \u00e9 vedado \u00e0 sociedade empres\u00e1ria de factoring celebrar contrato de m\u00fatuo fenerat\u00edcio, devendo apenas serem respeitadas as regras dessa esp\u00e9cie contratual aplic\u00e1veis aos particulares, especialmente quanto aos juros devidos e \u00e0 capitaliza\u00e7\u00e3o. STJ. 3\u00aa Turma. REsp 1987016-RS, Rel. Min. Nancy Andrighi, julgado em 06/09/2022 (Info 750).\"}]},{\"title\":\"Faturizada responde pela insolvencia?\",\"children\":[{\"title\":\"A empresa faturizada n\u00e3o responde pela insolv\u00eancia dos cr\u00e9ditos cedidos, sendo nulos a disposi\u00e7\u00e3o contratual em sentido contr\u00e1rio e eventuais t\u00edtulos de cr\u00e9ditos emitidos com o fim de garantir a solv\u00eancia dos cr\u00e9ditos cedidos no bojo de opera\u00e7\u00e3o de factoring. A natureza do contrato de factoring, diversamente do que se d\u00e1 no contrato de cess\u00e3o de cr\u00e9dito puro, n\u00e3o permite que os contratantes, ainda que sob o argumento da autonomia de vontades, estipulem a responsabilidade da cedente (faturizada) pela solv\u00eancia do devedor/sacado. STJ. 3\u00aa Turma. REsp 1711412-MG, Rel. Min. Marco Aur\u00e9lio Bellizze, julgado em 04/05/2021 (Info 695). Observa\u00e7\u00e3o: o entendimento acima \u00e9 diferente do caso das factorings. N\u00e3o se admite a estipula\u00e7\u00e3o de garantia em favor da empresa de factoring no que se refere, especificamente, ao inadimplemento dos t\u00edtulos cedidos, salvo na hip\u00f3tese em que a inadimpl\u00eancia \u00e9 provocada pela pr\u00f3pria empresa faturizada (STJ. 4\u00aa Turma. AgInt no AREsp 1385554/SE, Rel. Min. Antonio Carlos Ferreira, julgado em 09/09/2019).\"}]},{\"title\":\"\u00c9 desnecess\u00e1ria a notifica\u00e7\u00e3o de emitente de cheque com cl\u00e1usula \\\"\u00e0 ordem\\\", para que o faturizador que tenha recebido a c\u00e1rtula por meio de endosso possa cobrar o cr\u00e9dito decorrente de opera\u00e7\u00e3o de factoring. STJ. 4\u00aa Turma. REsp 1236701-MG, Rel. Min. Luis Felipe Salom\u00e3o, julgado em 5/11/2015 (Info 573).\"},{\"title\":\"POLO PASSIVO DE DEMANDAS Q VISEM REVISAO DE CLAUSULAS\",\"children\":[{\"title\":\"A empresa de factoring, que figura como cession\u00e1ria dos direitos e obriga\u00e7\u00f5es estabelecidos em contrato de compra e venda em presta\u00e7\u00f5es, de cuja cess\u00e3o foi regularmente cientificado o devedor, tem legitimidade para figurar no polo passivo de demandas que visem \u00e0 revis\u00e3o das condi\u00e7\u00f5es contratuais. Ex: Pedro comprou da loja uma moto parcelada. No mesmo instrumento contratual, a loja cedeu esse cr\u00e9dito para uma factoring. Assim, no pr\u00f3prio contrato de compra e venda havia uma cl\u00e1usula dizendo que a loja estava cedendo o cr\u00e9dito para a factoring, a quem o devedor deveria pagar as parcelas e que, em caso de inadimplemento, a factoring iria pleitear a restitui\u00e7\u00e3o do bem vendido. Se Pedro desejar propor a\u00e7\u00e3o pedindo a revis\u00e3o deste contrato, poder\u00e1 ajuiz\u00e1-la diretamente contra a factoring. STJ. 4\u00aa Turma.REsp 1343313-SC, Rel. Min. Luis Felipe Salom\u00e3o, Rel. para ac\u00f3rd\u00e3o Min. Ant\u00f4nio Carlos Ferreira, julgado em 1/6/2017 (Info 608).\"}]}]}]},{\"title\":\"Cart\u00e3o de Cr\u00e9dito\",\"children\":[{\"title\":\"Conceito\",\"children\":[{\"title\":\"Contrato por meio do qual uma institui\u00e7\u00e3o financeira, a operadora do cart\u00e3o, permite\"},{\"title\":\"Aos seus clientes a compra de bens e servi\u00e7os em estabelecimentos comerciais cadastrados\"},{\"title\":\"Que receber\u00e3o os valores das compras diretamente das operadoras\"},{\"title\":\"A op. cobra dos clientes, mensalmente, o valor de todas suas compras\"},{\"title\":\"S\u00f3 h\u00e1 rela\u00e7\u00e3o de consumo quando tem o cliente presente\"},{\"title\":\"Entre operadora e estab. comercial n\u00e3o h\u00e1 rela\u00e7\u00e3o consumeirista\"}]},{\"title\":\"Sujeitos Envolvidos\",\"children\":[{\"title\":\"Operadora com cliente\"},{\"title\":\"Cliente com estab. comercial\"},{\"title\":\"Estab. comercial com a operadora\"}]},{\"title\":\"STJ\",\"children\":[{\"title\":\"N\u00e3o incide a limita\u00e7\u00e3o de juros e 12% a.a(s\u00e3o inst. financeiras)\"},{\"title\":\"Cliente tem dirieto a presta\u00e7\u00e3o de contas por parte da operadora\"},{\"title\":\"Estab. comercial deve conferir a assinatura do titular do cart\u00e3o\"}]}]}]},{\"title\":\"Contrato de Seguro\",\"children\":[{\"title\":\"Intro\",\"children\":[{\"title\":\"Contrato bem antigo que atualmente est\u00e1 regulado no Art. 757 do CC\"}]},{\"title\":\"Conceito\",\"children\":[{\"title\":\"O segurador se obriga, mediante pagto do premio\"},{\"title\":\"A garantir interesse legitimo do segurado relativo a pessoa ou coisa\"},{\"title\":\"Contra riscos PREDETERMINADOS\"}]},{\"title\":\"Natureza Juridica\",\"children\":[{\"title\":\"Contrato aleatorio? Com CC/02 a obriga\u00e7\u00e3o tornou-se certa? Doutrina diverge\"}]},{\"title\":\"Caracteristicas\",\"children\":[{\"title\":\"Contrato consensual\"},{\"title\":\"Contrato de Ades\u00e3o\"},{\"title\":\"Contrato Dirigido(regulado pela SUSEP)\",\"children\":[{\"title\":\"Art. 762\",\"children\":[{\"title\":\"Nulo \u00e9 o contrato p/ risco decorrente de ato doloso\"}]}]},{\"title\":\"Mutualidade\",\"children\":[{\"title\":\"Reparti\u00e7\u00e3o dos riscos entre segurados\"}]},{\"title\":\"Forte regulamenta\u00e7\u00e3o estatal (CNSP - SUSEP - Resseguradores - S.A autorizadas - Corretores PF ou PJ\",\"children\":[{\"title\":\"Art. 775\",\"children\":[{\"title\":\"Ag. autorizados do segurador presumem-se seus representa- ntes p/ todos atos relativos ao contratos que agenciarem\"}]}]}]},{\"title\":\"Seguradora\",\"children\":[{\"title\":\"Entidade legalmente autorizada para tal fim\"},{\"title\":\"Atividade deve ser exercida por S.A, MUTUAS ou COOPERATIVAS\"},{\"title\":\"Necessitam autoriza\u00e7\u00e3o do Gov. Federal\"},{\"title\":\"Enunciado n\u02da 185 do CJF/STJ - COPIAR\"}]},{\"title\":\"Partes do Contrato\",\"children\":[{\"title\":\"Segurado que paga o premio\"},{\"title\":\"Segurador q recebe o premio\"}]},{\"title\":\"Prova do Contrato\",\"children\":[{\"title\":\"Apolice ou BILHETE DO SEGURO. E na falta deles?\"},{\"title\":\"Doc. comprobatorio do pagto do respectivo premio\"},{\"title\":\"Entendimento STJ\",\"children\":[{\"title\":\"Seguradora de veiculos nao pode, sob justificativa de nao ter sido emitida apolice\"},{\"title\":\"Negar-se a indenizar o sinistro se nao houve recusa da proposta pela seguradora\"},{\"title\":\"O seguro \u00e9 contrato consensual e aperfei\u00e7oa-se na manif. de vontade\"},{\"title\":\"Independentemente da emiss\u00e3o da apoline, que \u00e9 ato unilateral da seguradora\"}]}]},{\"title\":\"Regras Gerais\",\"children\":[{\"title\":\"Intro\",\"children\":[{\"title\":\"Aplica\u00e7\u00e3o do CC \u00e9 supletiva, visto que o contrato tem regulamenta\u00e7\u00e3o propria\"}]},{\"title\":\"Apolice\",\"children\":[{\"title\":\"Precedida de proposta escrita com declara\u00e7\u00e3o dos elementos essenciais do garantido e do risco\"},{\"title\":\"Ser\u00e1 nominativo, a ordem ou ao portador. OBS: Seguro de pessoas n\u00e3o podem ser AO PORTADOR\"},{\"title\":\"Mencionar\u00e1 os riscos e o inicio e fim da prote\u00e7ao e o limite do premio\"},{\"title\":\"Qnd for o caso mencionara o segurado e os beneficiarios\"}]},{\"title\":\"Boa-f\u00e9 e Veracidade(765)\",\"children\":[{\"title\":\"Se o segurado fizer declara\u00e7\u00f5es inexatas ou omitir circunstancias pode perder o direito ao premio\"},{\"title\":\"SE a inexatid\u00e3o nao for de m\u00e1-f\u00e9 segurador pode resolver o contrato ou cobrar a
