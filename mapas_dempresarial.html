ildren\":[{\"title\":\"CRIs s\u00e3o t\u00edtulos de renda fixa de cr\u00e9dito privado que representam a promessa de um pagamento futuro referente a im\u00f3veis. Tratam-se de t\u00edtulos lastreados em cr\u00e9ditos imobili\u00e1rios, representativos de parcelas de um direito credit\u00f3rio. Neste caso, o investidor de CRI ajuda a financiar o mercado imobili\u00e1rio ao antecipar os cr\u00e9ditos que ser\u00e3o recebidos pelo setor. O instrumento permite que exista, por parte de institui\u00e7\u00f5es financeiras que possuem lastro imobili\u00e1rio, a possibilidade destas capitalizarem recursos no mercado financeiro \u00e0 vista, securitizando fluxos de receb\u00edveis de m\u00e9dio e longo prazos. Os CRIs s\u00f3 podem ser emitidos por companhias securitizadoras de cr\u00e9ditos imobili\u00e1rios, as quais N\u00c3O fazem o papel de devedoras na opera\u00e7\u00e3o. O ativo dever\u00e1 ser registrado em sistema de registro e de liquida\u00e7\u00e3o financeira de ativos autorizados a funcionar pelo Banco Central do Brasil. artigo 22, IV, Lei 14.430,/22: \\\"Os Certificados de Receb\u00edveis integrantes de cada emiss\u00e3o da companhia securitizadora ser\u00e3o formalizados por meio de termo de securitiza\u00e7\u00e3o, do qual constar\u00e3o as seguintes informa\u00e7\u00f5es: IV - valor nominal\\\" . artigo 6\u00ba, Lei 9.514/97: \\\"Do Certificado de Receb\u00edveis Imobili\u00e1rios - Art. 6\u00ba O Certificado de Receb\u00edveis Imobili\u00e1rios - CRI \u00e9 t\u00edtulo de cr\u00e9dito nominativo, de livre negocia\u00e7\u00e3o, lastreado em cr\u00e9ditos imobili\u00e1rios e constitui promessa de pagamento em dinheiro.\\\" artigo 21, \u00a71\u00ba, Lei 14.430/22: \\\" Aos Certificados de Receb\u00edveis aplica-se, no que couber, o disposto na legisla\u00e7\u00e3o cambial. (PODE SER GARANTIDO POR AVAL)\"}]},{\"title\":\"Contrato de Concess\u00e3o Comercial entre Produtores e Distribuidores de Veiculos Automotores Lei n\u00ba 6.729/78  FGV - 2022 - Senado Federal - Consultor FGV - 2023 - SMF-RJ - Fiscal de Rendas\"},{\"title\":\"C\u00e9dula de Cr\u00e9dito Industrial DL 413/69 FGV - 2023 - TJ-ES - Juiz Substituto\"},{\"title\":\"C\u00e9dula de Cr\u00e9dito Rural\",\"children\":[{\"title\":\"obs\",\"children\":[{\"title\":\"A c\u00e9dula de cr\u00e9dito rural \u00e9 t\u00edtulo executivo extrajudicial com os atributos de certeza, liquidez e exigibilidade. A exist\u00eancia de cl\u00e1usula/contrato de seguro relacionado \u00e0 c\u00e9dula de cr\u00e9dito rural n\u00e3o retira os atributos pr\u00f3prios do t\u00edtulo. STJ. 4\u00aa Turma. AgInt no AREsp 2.144.537-GO, Rel. Min. Marco Buzzi, julgado em 17/4/2023 (Info 774).\"}]}]},{\"title\":\"Certificado de Direitos Credit\u00f3rios do Agroneg\u00f3cio \u2013 CDCA\"}]}]}}";const DATA = JSON.parse(RAW);

const CHAPTERS = ["cap0","cap1","cap2","cap3","cap4","cap5","cap6","cap7"];
const LABELS = {"cap0": "0. Evolução Histórica do D. Comercial", "cap1": "1. Regras do D. de Empresa no CC/02", "cap2": "2. Direito de Propriedade Industrial", "cap3": "3. Direito Societário (Itens 1–6)", "cap4": "4. Operações Societárias", "cap5": "5. Dissolução, Liquidação e Extinção das Soc.", "cap6": "6. Títulos de Crédito", "cap7": "7. Contratos Bancários"};

let cur = CHAPTERS[0];
let expanded = new Set();
let term = "";
let hits = 0;

function detectType(t){
  const s=(t||"").toLowerCase();
  if(/cespe|cebraspe|fgv|vunesp|fundatec|ibfc|prova/.test(s)) return "cespe";
  if(/stj|stf|resp|adi|adpf|adc|\bre\b|rms|agrg|info \d|súmula|sumula|julgado/.test(s)) return "stj";
  return "obs";
}

function extractText(n,d=0){
  if(d>4) return n.title||"";
  let p=[n.title||""];
  (n.children||[]).forEach(c=>p.push(extractText(c,d+1)));
  (n.callouts||[]).forEach(c=>p.push(extractText(c,d+1)));
  return p.filter(Boolean).join(" • ");
}

function matches(n,t){
  if(!t) return true;
  if((n.title||"").toLowerCase().includes(t)) return true;
  if((n.children||[]).some(c=>matches(c,t))) return true;
  if((n.callouts||[]).some(c=>matches(c,t))) return true;
  return false;
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function hilite(s,t){
  if(!t) return esc(s);
  const re=new RegExp(`(${t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`,"gi");
  return esc(s).replace(re,"<mark>$1</mark>");
}

function renderCallout(node){
  const tipo=detectType(node.title||"");
  const label={cespe:"CESPE/CEBRASPE",stj:"STF/STJ",obs:"OBS"}[tipo];
  const text=extractText(node);
  const isTrivial=!node.title||/^(obs|callout|atenção)$/i.test((node.title||"").trim());
  const titleHtml=isTrivial?"":(`<div class="callout-title">${hilite(node.title,term)}</div>`);
  return `<div class="callout-box ${tipo}"><div class="callout-label">${label}</div>${titleHtml}<div class="callout-body">${esc(text)}</div></div>`;
}


var _EXAM_RE=/^\s*(CESPE\s*[\/]?\s*CEBRASPE|CEBRASPE|CESPE|FCC|FGV|VUNESP|ESAF|CESGRANRIO|MPT|AOCP|IBFC|IADES|FUNCAB|FUNDEP|QUADRIX|SELECON|OBJETIVA|NUCEPE|CS-UFG|INAZ|CONSULPLAN|NC-UFPR)\b/i;
var _YEAR_RE=/\b(20\d{2}|199\d)\b/;
function _isExam(t){return _EXAM_RE.test(t)&&_YEAR_RE.test(t);}
function _examShort(t){
  var b=t.match(_EXAM_RE);var y=t.match(_YEAR_RE);
  var banca=(b?b[1].replace(/\s*\/\s*CEBRASPE/i,'').replace(/\s*CEBRASPE\s*\/\s*/i,'').trim():'');
  return banca+(y?' '+y[0]:'');
}
var _BANCA_PAT=/(CESPE\s*[\/]?\s*CEBRASPE|CEBRASPE|CESPE|FCC|FGV|VUNESP|ESAF|CESGRANRIO|MPT|AOCP|IBFC|IADES|FUNCAB|FUNDEP|QUADRIX|SELECON|OBJETIVA|NUCEPE|CS-UFG|INAZ|CONSULPLAN|NC-UFPR)\b/gi;
function _inlineExams(t){
  var m,first=null,p=new RegExp(_BANCA_PAT.source,'gi');
  while((m=p.exec(t))!==null){if(_YEAR_RE.test(t.slice(m.index,Math.min(t.length,m.index+120)))){first=m.index;break;}}
  if(first===null||first===0)return null;
  var content=t.slice(0,first).trim(),ep=t.slice(first);
  p.lastIndex=0;var cuts=[0];
  while((m=p.exec(ep))!==null){if(m.index>0)cuts.push(m.index);}
  var tags=[];
  for(var i=0;i<cuts.length;i++){
    var ref=ep.slice(cuts[i],i+1<cuts.length?cuts[i+1]:ep.length).trim().replace(/[-–,\s]+$/,'');
    if(!_YEAR_RE.test(ref))continue;
    var b=ref.match(_EXAM_RE),y=ref.match(_YEAR_RE);
    var sh=(b?b[1].replace(/\s*\/\s*CEBRASPE/i,'').replace(/CEBRASPE\s*\/\s*/i,'').trim():'')+(y?' '+y[0]:'');
    tags.push({full:ref,short:sh.trim()});
  }
  return tags.length?{content:content,tags:tags}:null;
}

function xpand(el,ev){el.classList.toggle('open');ev.stopPropagation();}
function renderNode(n,depth,path){
  const id=path;
  const hasKids=(n.children&&n.children.length)||(n.callouts&&n.callouts.length);
  const isExp=expanded.has(id)||(term&&matches(n,term));
  const isHit=term&&(n.title||"").toLowerCase().includes(term);
  if(isHit) hits++;

  if(n.callout) return renderCallout(n);

  // Exam reference node → pill
  if(_isExam(n.title||'')&&depth>0){
    const full=esc(n.title||'');const short=esc(_examShort(n.title||''));
    return `<div class="node exam-node" id="n${id}"><div class="row"><span class="exam-tag" data-full="${full}">${short}</span></div></div>`;
  }

  const tog=hasKids?(isExp?"▾":"▸"):"·";
  const dc=depth===0?"d0":depth===1?"d1":depth===2?"d2":"dn";
  const rowCls=`row${isHit?" hit":""}`;
  const _ie=_inlineExams(n.title||'');
  let titleHtml;
  if(_ie){
    const pills=_ie.tags.map(function(t){return `<span class="exam-tag" data-full="${esc(t.full)}">${esc(t.short)}</span>`;}).join(' ');
    const _xl=_ie.content.length>120;
    titleHtml=`<span class="txt ${dc}${_xl?' long':''}"${_xl?' onclick="xpand(this,event)"':''} >${hilite(_ie.content,term)}</span> ${pills}`;
  } else {
    const _long=(n.title||"").length>120&&depth>0;
    titleHtml=_long?`<span class="txt ${dc} long" onclick="xpand(this,event)">${hilite(n.title||"",term)}</span>`:`<span class="txt ${dc}">${hilite(n.title||"",term)}</span>`;
  }

  let childHtml="";
  if(isExp&&hasKids){
    childHtml='<div class="children">';
    (n.children||[]).forEach((c,i)=>{if(!term||matches(c,term)) childHtml+=renderNode(c,depth+1,path+"_"+i);});
    (n.callouts||[]).forEach((c,i)=>{if(!term||matches(c,term)) childHtml+=renderNode({...c,callout:true},depth+1,path+"_c"+i);});
    childHtml+="</div>";
  }
  return `<div class="node" id="n${id}"><div class="${rowCls}" onclick="toggle('${id}')"><span class="tog">${tog}</span>${titleHtml}</div>${childHtml}</div>`;
}

function render(){
  const tree=DATA[cur];
  hits=0;
  let html="";
  if(tree.children){
    tree.children.forEach((n,i)=>{
      if(!term||matches(n,term)) html+=renderNode(n,0,"r"+i);
    });
  }
  document.getElementById("content").innerHTML=html||`<p class="no-res">Nenhum resultado para "${esc(term)}"</p>`;const em=document.getElementById("empty-msg");if(em)em.remove();
  const mb=document.getElementById("matchBar");
  if(term){mb.style.display="block";mb.textContent=`${hits} ocorrência(s) para "${term}"`;}
  else{mb.style.display="none";}
}

function renderTabs(){
  document.getElementById("tabs").innerHTML=CHAPTERS.map((k,i)=>{
    const cid='dempresarial_'+i;
    const isDone=_TRK&&_TRK.done&&_TRK.done[cid];
    return `<div class="tab${k===cur?' active':''}" onclick="selChap('${k}')">
      <input type="checkbox" class="_trk_chk" data-cid="${cid}" ${isDone?'checked':''} onclick="event.stopPropagation();_trkToggle('${cid}',this.checked,this)"/>
      <span>${LABELS[k]||k}</span>
    </div>`;
  }).join("");
}

function selChap(k){cur=k;expanded.clear();document.getElementById("search").value="";term="";document.getElementById("matchBar").style.display="none";renderTabs();render();}
function toggle(id){if(expanded.has(id))expanded.delete(id);else expanded.add(id);render();}
function expandAll(){function add(n,p){expanded.add(p);(n.children||[]).forEach((c,i)=>add(c,p+"_"+i));(n.callouts||[]).forEach((c,i)=>add(c,p+"_c"+i));}const t=DATA[cur];(t.children||[]).forEach((n,i)=>add(n,"r"+i));render();}
function collapseAll(){expanded.clear();render();}

let deb;
document.getElementById("search").addEventListener("input",function(){
  clearTimeout(deb);
  deb=setTimeout(()=>{term=this.value.toLowerCase().trim();render();},250);
});

renderTabs();
render();
</script>

<script>
// ── TRACKER INTEGRATION ──
var _TRK = {
  mapId: 'dempresarial',
  total: 8,
  done: {},  // chapter_id -> true
  user: null,
};

// Auth
window.addEventListener('DOMContentLoaded', function(){
  _sb.auth.getSession().then(function(r){
    if(r.data&&r.data.session&&r.data.session.user){
      _TRK.user = r.data.session.user;
      _trkLoad();
    } else {
      _trkRender();
    }
  });
});

async function _trkLoad(){
  try{
    var r = await _sb.from('progress')
      .select('chapter_id,done')
      .eq('user_id', _TRK.user.id);
    _TRK.done = {};
    if(r.data) r.data.forEach(function(row){
      if(row.done && row.chapter_id.startsWith(_TRK.mapId+'_'))
        _TRK.done[row.chapter_id] = true;
    });
    try{ Object.keys(_TRK.done).forEach(function(cid){ localStorage.setItem('_pgprog_'+cid,JSON.stringify({done:true,date:null})); }); }catch(_){}
    _trkRender();
  }catch(e){ console.warn('tracker load err', e); }
}

function _trkRender(){
  var count = Object.keys(_TRK.done).length;
  var pct = _TRK.total ? Math.round(count/_TRK.total*100) : 0;
  // Update both injected header bar and sidebar bar
  ['_trk_fill','trk-fill'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.width=pct+'%';});
  ['_trk_pct','trk-pct'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=pct+'%';});
  ['_trk_cnt','trk-cnt'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=count+'/'+_TRK.total;});
  // Update checkboxes
  document.querySelectorAll('._trk_chk').forEach(function(chk){
    var cid = chk.getAttribute('data-cid');
    chk.checked = !!_TRK.done[cid];
    var w = chk.closest('._chk_wrap');
    if(w) w.classList.toggle('_chk_done', !!_TRK.done[cid]);
  });
  renderTabs();
}

async function _trkToggle(chapterId, done, chk){
  if(!_TRK.user){
    // Try to recover session
    try {
      const r = await _sb.auth.getSession();
      if(r.data && r.data.session && r.data.session.user){
        _TRK.user = r.data.session.user;
      } else {
        console.warn('No session found, cannot save tracker');
        return;
      }
    } catch(e) { console.error('getSession error:', e); return; }
  }
  var now = done ? new Date().toISOString() : null;
  if(done) _TRK.done[chapterId] = true;
  else delete _TRK.done[chapterId];
  _trkRender();
  try{
    await _sb.from('progress').upsert({
      user_id: _TRK.user.id,
      chapter_id: chapterId,
      done: done,
      done_at: now
    }, {onConflict: 'user_id,chapter_id'});
  }catch(e){ console.warn('tracker save err', e); }
  try{ localStorage.setItem('_pgprog_'+chapterId, JSON.stringify({done, date:now})); }catch(_){}
}
</script>
