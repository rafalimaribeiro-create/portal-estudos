\"title\":\"A doutrina instituiu a figura das subcategorias economicas\"},{\"title\":\"Esse grupo de sub categorias foi substituido pelo grupo de natureza de despesas\"},{\"title\":\"\u00c9 a agrega\u00e7\u00e3o de elementos de despesa que apresentam as mesmas caracteristicas quando ao objeto do gasto\"},{\"title\":\"Agrega elementos de despesa com caracteristicas comuns, e NAO MODALIDADES DE APLICACAO\"},{\"title\":\"agregando elementos de despesa com as mesmas caracter\u00edsticas quanto ao objeto de gasto\"},{\"title\":\"Dentro de cada grupo encontra-se os correspondentes elementos de despesa, que trar\u00e3o a DIMENSAO CONCRETA da despesa no momento de sua execu\u00e7\u00e3o\"}]},{\"title\":\"Grupos\",\"children\":[{\"title\":\"Correntes PJO\",\"children\":[{\"title\":\"1\",\"children\":[{\"title\":\"Pessoal e encargos sociais(MCAPS)\",\"children\":[{\"title\":\"Efetivo ex. de cargo, emprego ou fun\u00e7\u00e3o de confian\u00e7a\"},{\"title\":\"Pagto de aposentadorias, reformas e pensoes\"},{\"title\":\"Obrig. Trabalhistas de resp. do empregador, incidentes sobre fl. de salarios\"},{\"title\":\"Contrib. a entidades fechadas de previd.\"},{\"title\":\"Outros beneficios classificaveis nesse grupo\"},{\"title\":\"Outras parcelas de cunho remuneratorio\"},{\"title\":\"Sempre s\u00e3o despesas correntes\"}]}]},{\"title\":\"2\",\"children\":[{\"title\":\"Juros e encargos da divida\",\"children\":[{\"title\":\"DESPESAS  O R \u00c7 A M E N T A R I A S  com pagto de juros, comissoes e outros encargos de op. de credito internas e externas contratadas\"},{\"title\":\"Assim como a divida publica mobiliaria\"},{\"title\":\"obs\",\"children\":[{\"title\":\"Classifica-se o pagamento de juros da d\u00edvida p\u00fablica como despesa de correntes. CONSULPAM - 2023 - TCM-PA - Auditor de Controle Externo - \u00c1rea Jur\u00eddica\"}]}]}]},{\"title\":\"3\",\"children\":[{\"title\":\"Outras despesas correntes\",\"children\":[{\"title\":\"Despesas orcamentarias com aquisicao de material de consumo, pagto de diarias, contribuicoes, subvencoes, aux. alimentacao, aux. transporte\"}]}]}]},{\"title\":\"CAPITAL IIA\",\"children\":[{\"title\":\"4\",\"children\":[{\"title\":\"Investimentos\",\"children\":[{\"title\":\"a) ao planejamento e a execu\u00e7\u00e3o de obras, inclusive as destinadas \u00e0 aquisi\u00e7\u00e3o de im\u00f3veis considerados necess\u00e1rios \u00e0 realiza\u00e7\u00e3o destas \u00faltimas; b) aos programas especiais de trabalho; c) aquisi\u00e7\u00e3o de instala\u00e7\u00f5es, equipamentos e material permanente; e  d) constitui\u00e7\u00e3o ou aumento do capital de empresas que n\u00e3o sejam de car\u00e1ter comercial ou financeiro.\"},{\"title\":\"obs\",\"children\":[{\"title\":\"\u00a7 4\u00ba Classificam-se como investimentos as dota\u00e7\u00f5es para o planejamento e a execu\u00e7\u00e3o de obras, inclusive as destinadas \u00e0 aquisi\u00e7\u00e3o de im\u00f3veis considerados necess\u00e1rios \u00e0 realiza\u00e7\u00e3o destas \u00faltimas, bem como para os programas especiais de trabalho, aquisi\u00e7\u00e3o de instala\u00e7\u00f5es, equipamentos e material permanente e constitui\u00e7\u00e3o ou aumento do capital de empr\u00easas que n\u00e3o sejam de car\u00e1ter comercial ou financeiro.\"}]}]}]},{\"title\":\"5\",\"children\":[{\"title\":\"Inversoes Financeiras \\\"J\u00e1\\\"\",\"children\":[{\"title\":\"Aquisicao de imoveis ou bens de capital ja em utilizacao\"},{\"title\":\"Aquisicao de titulos representativos do capital de empresas ou entidades de qlq especie, ja constituidas, qnd a op. N\u00c3O importe aumento do capital, e cm constituicao ou aumento do capital de emrpesas\"},{\"title\":\"obs\",\"children\":[{\"title\":\"CESPE / CEBRASPE - 2023 - AGU - Advogado da Uni\u00e3o A aquisi\u00e7\u00e3o de im\u00f3veis \u00e9 exemplo de despesa de capital na modalidade de INVERS\u00c3O FINANCEIRA, conforme art. 12, \u00a7 5\u00ba, I, da Lei n\u00ba 4.320/64. Vale lembrar que a aquisi\u00e7\u00e3o de im\u00f3veis somente ser\u00e1 despesa de capital na modalidade investimento, caso essa aquisi\u00e7\u00e3o seja necess\u00e1ria \u00e0 realiza\u00e7\u00e3o de obras, conforme art. 12, \u00a7 4\u00ba, da Lei n\u00ba 4.320/64;\"},{\"title\":\"Cobrada na prova PGE-RO-2022-CESPE De acordo com o \u00a7 5.\u00ba do art. 12 da Lei n.\u00ba 4.320/1964, classificam-se como invers\u00f5es financeiras as dota\u00e7\u00f5es destinadas \u00e0: aquisi\u00e7\u00e3o de im\u00f3veis, ou de bens de capital j\u00e1 em utiliza\u00e7\u00e3o; aquisi\u00e7\u00e3o de t\u00edtulos representativos do capital de empresas ou entidades de qualquer esp\u00e9cie, j\u00e1 constitu\u00eddas, quando a opera\u00e7\u00e3o n\u00e3o importar aumento do capital; ou constitui\u00e7\u00e3o ou aumento do capital de entidades ou empresas que visem a objetivos comerciais ou financeiros, inclusive opera\u00e7\u00f5es banc\u00e1rias ou de seguros. Em s\u00edntese, as invers\u00f5es financeiras est\u00e3o relacionadas \u00e0 aquisi\u00e7\u00e3o de bens de capital j\u00e1 em utiliza\u00e7\u00e3o e \u00e0 aquisi\u00e7\u00e3o de t\u00edtulos representativos do capital de empresas j\u00e1 constitu\u00eddas, se a opera\u00e7\u00e3o n\u00e3o resultar em aumento de capital. Na perspectiva macroecon\u00f4mica, a invers\u00e3o financeira n\u00e3o gera novos servi\u00e7os ou incremento ao produto interno bruto (PIB), sendo apenas uma altera\u00e7\u00e3o quanto \u00e0 propriedade do bem, ponto central da sua distin\u00e7\u00e3o em rela\u00e7\u00e3o aos investimentos. De acordo com a Lei n.\u00ba 4.3240/1964, as invers\u00f5es financeiras s\u00e3o consideradas despesas de capital, conceito que se op\u00f5e ao de despesa corrente. Todavia, as invers\u00f5es financeiras n\u00e3o se confundem com os investimentos. Isso porque, no investimento, as dota\u00e7\u00f5es s\u00e3o usadas para o planejamento e a execu\u00e7\u00e3o de obras, inclusive as destinadas \u00e0 aquisi\u00e7\u00e3o de im\u00f3veis considerados necess\u00e1rios \u00e0 realiza\u00e7\u00e3o destas \u00faltimas, bem como para a aquisi\u00e7\u00e3o de instala\u00e7\u00f5es, equipamentos e material permanente e constitui\u00e7\u00e3o ou aumento do capital de empresas que n\u00e3o sejam de car\u00e1ter comercial ou financeiro, enquanto nas invers\u00f5es financeiras n\u00e3o h\u00e1 cria\u00e7\u00e3o de riqueza (bens ou servi\u00e7os), mas, simplesmente, altera\u00e7\u00e3o da titularidade dos bens em quest\u00e3o.\"}]}]}]},{\"title\":\"6\",\"children\":[{\"title\":\"Amortiza\u00e7\u00e3o da divida\",\"children\":[{\"title\":\"Despesas com pagto e ou financiamento do principal e da att. monetaria ou cambial da divida publica interna e externa, contratual ou mobiliaria\"}]}]}]}]},{\"title\":\"OBS: RESERVA DE CONTINGENCIA\",\"children\":[{\"title\":\"\u00c9 uma dota\u00e7\u00e3o global assim como as PET. \u00c9 uma despesa autorizada pela LOA\"},{\"title\":\"Mas sem aplica\u00e7\u00e3o definida para a reserva de contingencia\"},{\"title\":\"Como n\u00e3o tem defini\u00e7\u00e3o de onde sera aplicada, nao \u00e9 classificada em categ. economicas\"},{\"title\":\"Portaria STN/SOF determina qu seja classificada como uma codificacao neutra\"}]}]},{\"title\":\"3\u02da Nivel - MODALIDADES DE APLICA\u00c7AO\",\"children\":[{\"title\":\"Indica a forma como a despesa ser\u00e1 executada\"},{\"title\":\"Pode ser executada DIRETAMENTE ou por TRANSFERENCIA\"},{\"title\":\"A ideia da classifica\u00e7\u00e3o \u00e9 eliminar a dupla ocntagem no caso de transferencia\"},{\"title\":\"Para evitar a dupla contagem utilizam-se receita intraor\u00e7amentarias e despesa intraor\u00e7amentarias\"},{\"title\":\"\u00c9 uma tabela cheia de codigos\"},{\"title\":\"Exemplo\",\"children\":[{\"title\":\"COD: 90\",\"children\":[{\"title\":\"Destina-se a aplica\u00e7\u00f5es diretas\"}]},{\"title\":\"COD: 91\",\"children\":[{\"title\":\"Destina-se a aplica\u00e7\u00f5es diretas decorrentes de op. entre Org\u00e3os, Fundos e Entidades integrantes do OF e OS\"}]}]}]},{\"title\":\"4\u02 licas e da atividade financeira do Estado, assinale a op\u00e7\u00e3o correta. A distin\u00e7\u00e3o entre entradas e receitas p\u00fablicas se d\u00e1 no \u00e2mbito do princ\u00edpio da unidade de tesouraria.(E)  O crit\u00e9rio diferenciado entre entradas/ingressos p\u00fablicos e receitas p\u00fablicas \u00e9 o car\u00e1ter de definitividade.  A primeira \u00e9 aquela que integra ao patrim\u00f4nio sem reserva, n\u00e3o havendo qualquer necessidade de devolv\u00ea-lo em esp\u00e9cie, enquanto o ingresso p\u00fablico \u00e9 aquele recurso que poder\u00e1 ser devolvido ao particular, visto que a sua entrada se deu condicionada a um posterior levantamento.\"},{\"title\":\"\u2022 Origin\u00e1rias: originam-se no patrim\u00f4nio do Estado. Ex: pre\u00e7os p\u00fablicos. \u2022 Derivadas: derivam do patrim\u00f4nio do particular, sendo arrecadadas de forma coercitiva. Ex: impostos. Receitas p\u00fablicas origin\u00e1rias, segundo a doutrina, s\u00e3o as arrecadadas por meio da explora\u00e7\u00e3o de atividades econ\u00f4micas pela Administra\u00e7\u00e3o P\u00fablica.  J\u00e1 as Receitas p\u00fablicas derivadas, tamb\u00e9m segundo a doutrina, s\u00e3o as obtidas pelo poder p\u00fablico por meio da soberania estatal. Trata-se de classifica\u00e7\u00e3o quanto a origem da receita.  J\u00e1 quanto \u00e0 categoria econ\u00f4mica, a receita pode ser dividida em Receitas Correntes e Receitas de Capital. CESPE / CEBRASPE - 2023 - AGU - Procurador da Fazenda Nacional\"}]}]},{\"title\":\"Receitas Primarias e  N\u00e3o Primarias\",\"children\":[{\"title\":\"Essa classifica\u00e7\u00e3o aproxima-se da classifica\u00e7\u00e3o por categ. econ., estudada abaixo\"},{\"title\":\"A diferen\u00e7a \u00e9 \u00e9 sua correla\u00e7\u00e3o com op. da divida, emprestimos, rolagem e etc.\"},{\"title\":\"As receitas primarias n\u00f5a tem envolvimento com a vertente financeira\"}]},{\"title\":\"Niveis de Classifica\u00e7\u00e3o 6 NIVEIS de classifica\u00e7\u00e3o\",\"children\":[{\"title\":\"Categoria  Economica\",\"children\":[{\"title\":\"RECEITAS CORRENTES FGV - 2008 - TCM-RJ - Procurador\",\"children\":[{\"title\":\"S\u00e3o as receitas de custeio. Visam manuten\u00e7\u00e3o e funcionamento da ativ. admin.\"},{\"title\":\"Em regra, s\u00e3o consideradas RECEITAS EFETIVAS(Aumentam o patrimonio publico)\"},{\"title\":\"Seu registro corresponde a fatos contabeis modificativos aumentativos da situa\u00e7\u00e3o patrimonial(Aliomar Baleeiro - Comentario de acordo cm o grau de afeta\u00e7\u00e3o da receita)\"},{\"title\":\"as receitas tribut\u00e1ria, de contribui\u00e7\u00f5es, patrimonial, agropecu\u00e1ria, industrial, de servi\u00e7os\"},{\"title\":\"e outras e, ainda, as provenientes de recursos financeiros recebidos de outras pessoas\"},{\"title\":\"de direito p\u00fablico ou privado, quando destinadas a atender despesas\"},{\"title\":\"classific\u00e1veis em Despesas Correntes\"},{\"title\":\"N\u00e3o sao utilizadas somente p/ despesas correntes, h\u00e1 outras destina\u00e7\u00f5es CESPE / CEBRASPE - 2004 - Prefeitura de Boa Vista - RR - Contador\"},{\"title\":\"Detalhamento\",\"children\":[{\"title\":\"receita TrIbutaria\"},{\"title\":\"receita de Contrbuicoes\"},{\"title\":\"receita Patrimonial\",\"children\":[{\"title\":\"Ex:\",\"children\":[{\"title\":\"Loca\u00e7\u00e3o de patrimonio publico para entidade privada\"}]}]},{\"title\":\"receita Agropecuaria\"},{\"title\":\"receita Industrial\"},{\"title\":\"receita de Servi\u00e7os\"},{\"title\":\"TRANSferencias correntes\"},{\"title\":\"OUtras receitas correntes\",\"children\":[{\"title\":\"Receitas provenientes da D. Ativa\"}]}]},{\"title\":\"obs\",\"children\":[{\"title\":\"os royalties (art. 20, \u00a71\u00ba, da CF) s\u00e3o indeniza\u00e7\u00f5es que os entes federativos recebem pela explora\u00e7\u00e3o de recursos naturais. S\u00e3o classificados como outras receitas correntes. Embora haja diverg\u00eancia doutrin\u00e1ria de classifica\u00e7\u00e3o, aparentemente o constituinte derivado entendeu dessa forma quando incluiu o \u00a718 no art. 100 da CF. Quanto \u00e0 fonte, s\u00e3o receitas origin\u00e1rias. O art. 9\u00ba da Lei n\u00ba 7.990/89 previu que os Estados deveriam repassar aos Munic\u00edpios 25% dos royalties recebidos pela explora\u00e7\u00e3o dos recursos naturais (petr\u00f3leo, recursos h\u00eddricos para produ\u00e7\u00e3o de energia el\u00e9trica e recursos minerais) em seu territ\u00f3rio. De acordo com esse dispositivo, esses 25% seriam divididos entre todos os Munic\u00edpios do respectivo Estado (e n\u00e3o apenas entre os Munic\u00edpios onde h\u00e1 explora\u00e7\u00e3o desses recursos naturais. Para o STF, essa previs\u00e3o \u00e9 constitucional e est\u00e1 em harmonia com o \u00a7 1\u00ba do art. 20 da CF/88. (STF. Plen\u00e1rio. ADI 4846/ES, Rel. Min. Edson Fachin, julgado em 9/10/2019 (Info 955).\"},{\"title\":\"\u00a7 1\u00ba - S\u00e3o Receitas Correntes as receitas tribut\u00e1ria, de contribui\u00e7\u00f5es, patrimonial, agropecu\u00e1ria, industrial, de servi\u00e7os e outras e, ainda, as provenientes de recursos financeiros recebidos de outras pessoas de direito p\u00fablico ou privado, quando destinadas a atender despesas classific\u00e1veis em Despesas Correntes.\"}]}]},{\"title\":\"RECEITAS DE CAPITAL FGV - 2008 - TCM-RJ - Procurador FGV - 2008 - TCM-RJ - Auditor CEBRASPE \u2013 PGE/PB 2021)\",\"children\":[{\"title\":\"\u00a7 2\u00ba - S\u00e3o as provenientes da realiza\u00e7\u00e3o de recursos financeiros oriundos de\"},{\"title\":\"constitui\u00e7\u00e3o de d\u00edvidas; da convers\u00e3o, em esp\u00e9cie, de bens e direitos\"},{\"title\":\"os recursos recebidos de outras pessoas de direito p\u00fablico ou privado\"},{\"title\":\"destinados a atender despesas classific\u00e1veis em Despesas de Capital e\"},{\"title\":\"ainda, o super\u00e1vit do Or\u00e7amento Corrente.(SOC)\"},{\"title\":\"N\u00e3o sao consideradas receitas EFETIVAS\"},{\"title\":\"Servem para aquisi\u00e7ao e forma\u00e7\u00e3o de bens de capital\"},{\"title\":\"Segundo a econ., bens de capital s\u00e3o os capazes de gerar novos bens ou servicos\"},{\"title\":\"S\u00e3o consideradas receitas por mutac\u00e3o(por permuta\u00e7\u00e3o) n\u00e3o efetivas. N\u00e3o afetam o patrimonio(Aliomar Baleeiro - Comentario de acordo cm o grau de afeta\u00e7\u00e3o da receita)\"},{\"title\":\"Detalhamento OPERA-ALI-AMOR-TRANSOU\",\"children\":[{\"title\":\"OPERAcoes de credito\"},{\"title\":\"ALIenacao de bens\",\"children\":[{\"title\":\"Ex: Venda de Imoveis\"}]},{\"title\":\"AMORtizacao de emprestimos\"},{\"title\":\"TRANSferencias de capital\"},{\"title\":\"OUtras receitas de capital\"}]},{\"title\":\"OBS\",\"children\":[{\"title\":\"\\\"(...) todo gestor tende a arrecadar o m\u00e1ximo poss\u00edvel (receitas correntes) para pagar as despesas de manuten\u00e7\u00e3o da m\u00e1quina (despesas correntes), e se esfor\u00e7ar ao m\u00e1ximo para obter sobras (super\u00e1vit do or\u00e7amento corrente), para investir esses recursos nas chamadas despesas de capital, onde se incluem as obras, aquisi\u00e7\u00f5es de bens p\u00fablicos, dentre outros.  Sendo assim, o super\u00e1vit do or\u00e7amento corrente, contabilizado no or\u00e7amento, \u00e9 usado como receita de capital, da\u00ed sua classifica\u00e7\u00e3o. No entanto, como A aludida receita foi contabilizada no or\u00e7amento corrente, por \u00f3bvio n\u00e3o poderia ser computada novamente. Portanto, ela deve fazer parte da receita extraor\u00e7ament\u00e1ria, na modalidade receita de capital, evitando-se, com isso, um novo registro da mesma receita.\\\" (HARRISON LEITE, p. 294).\"},{\"title\":\"\\\"OR\u00c7AMENTO \u2013 SUPER\u00c1VIT \u2013 INCORPORA\u00c7\u00c3O \u2013 CONTA \u00daNICA DO TESOURO. Na forma do artigo 43, inciso I, \u00a7 1\u00ba, da Lei n\u00ba 4.320/1964, eventual super\u00e1vit apurado ao final do exerc\u00edcio financeiro h\u00e1 de ser incorporado \u00e0 conta \u00fanica do Tesouro, viabilizando aos Poderes Executivo, respons\u00e1vel pela contabilidade das receitas, e Legislativo a defini\u00e7\u00e3o do or\u00e7amento estadual, observado o princ\u00edpio da separa\u00e7\u00e3o dos poderes \u2013 artigo 2\u00ba da Constitui\u00e7\u00e3o Federal\\\" (Informativo 985 do STF, ADI 6045) CESPE / CEBRASPE - 2023 - AGU - Advogado da Uni\u00e3o\"},{\"title\":\"Receitas de Capital: analogamente, estas s\u00e3o receitas que tamb\u00e9m aumentam as disponibilidades financeiras do Estado. Por\u00e9m, de forma diversa das Receitas Correntes, as Receitas de Capital N\u00c3O PROVOCAM EFEITO SOBRE O PATRIM\u00d4NIO L\u00cdQUIDO.\"}]}]},{\"title\":\"OBS\",\"children\":[{\"title\":\"OBS IMPORTANTE - CONCURSOS Portaria STN/SOF n\u02da 338/2006\",\"children\":[{\"title\":\"Receitas Correntes Intraor\u00e7amentarias\"},{\"title\":\"Receitas de Capital Intraor\u00e7amentarias\"},{\"title\":\"Introdu\u00e7\u00e3o\",\"children\":[{\"title\":\"N\u00e3o s\u00e3o novas categorias economicas, mas ESPECIFICACOES das categorias\"},{\"title\":\"A fun\u00e7\u00e3o delas \u00e9 a mesma das receitas correntes e de capital\"},{\"title\":\"Est\u00e3o relacionadas a realiza\u00e7\u00e3o de desp. dentro de uma mesma esfera de governo\"},{\"title\":\"Tem objetivos distintos da classifica\u00e7\u00e3o por RECEITA ECON., visto que por receita \u00e9 o nivel menos analitico da classifica\u00e7\u00e3o\"},{\"title\":\"Devem ser excluidas da consolida\u00e7\u00e3o das contas publicas, pois em algum momento j\u00e1 foram contabilizadas\"}]}]},{\"title\":\"Importancia da classifica\u00e7\u00e3o do ponto de vista politico\",\"children\":[{\"title\":\"Serve para indicar o perfil de participa\u00e7ao do Estado na Econ.\"}]},{\"title\":\"Receitas provenientes de outras pessoas\",\"children\":[{\"title\":\"Podem ser correntes ou de capital, de acordo com a destina\u00e7\u00e3o\"}]}]}]},{\"title\":\"Origens\",\"children\":[{\"title\":\"S\u00e3o os detalhamentos da Receita Corrente e da Receita de Capital\"},{\"title\":\"\u00c9 a classifica\ o empenho pode haver transacoes entre orgaos e entidades, com empregos de creditos autorizados e recursos correspondentes\"},{\"title\":\"A fase de descentraliza\u00e7ao de despesa foi vista acima\"},{\"title\":\"Para descentraliza\u00e7\u00e3o com Adm. Indireta n\u00e3o \u00e9 necessario convenio, pode sr feita por outros meios. O procedimento \u00e9 feito pelo SIAFI\"},{\"title\":\"A descentraliza\u00e7\u00e3o s\u00f3 \u00e9 possivel entre entidades integrantes do OS e o OF\"}]},{\"title\":\"Instrumentos de Descentraliza\u00e7\u00e3o\",\"children\":[{\"title\":\"A primeira descentraliza\u00e7\u00e3o ocorre qnd a lOA \u00e9 aprovada\"},{\"title\":\"As UO recebem dotacoes\"},{\"title\":\"A partir de entrao, podem ocorrer outras descentraliza\u00e7\u00f5es\"},{\"title\":\"Entre orgaos e entidades de estruturas diferentes ou de um mesmo orgao\"},{\"title\":\"Descentraliza\u00e7ao externa \u00e9 CHAMADA DE DESTAQUE\"},{\"title\":\"A Descentraliza\u00e7\u00e3o interna chama-se PROVISAO\"}]},{\"title\":\"MOVIMENTACAO FINANCEIRA\",\"children\":[{\"title\":\"Paralelamente aos instrumentos acima\"},{\"title\":\"H\u00e1 uma centralizacao inicial dos recursos p/ utilziacao das unidades gestoras e administrativas\"},{\"title\":\"ISso ocorre no STN\"},{\"title\":\"Ao contrario da SOF que libera tudo de uma vez, o STN vai liberando aos poucos\"},{\"title\":\"As libera\u00e7\u00f5es do STN chama-se de COTAS\"},{\"title\":\"Existem movimentacoes ifnanceiras internas e externas\",\"children\":[{\"title\":\"Movimenacoes entre entidades diferentes chama-se de REPASSE\"},{\"title\":\"Unidades de mesma estrutura chamase de SUBR-EPASSE\"}]}]},{\"title\":\"CONCLUSAO\",\"children\":[{\"title\":\"AS DOTACOES transferidas pela SOF sao suportadas financeiramente pelas COTAS da STN\"},{\"title\":\"Destaques de um orgao para uniadde diferente correpodem a libera\u00e7\u00e3o de REPASSES as mesmas unidades beneficiarias\"},{\"title\":\"As PROVISOES or\u00e7amentarias correpondem a libera\u00e7\u00e3o de SUB-REPASSES\"}]}]}]},\"cap7\":{\"title\":\"7. Lei de Responsabilidade Fiscal\",\"children\":[{\"title\":\"Introdu\u00e7\u00e3o\",\"children\":[{\"title\":\"Previs\u00e3o Constitucional PGR - 2005 - PGR - Procurador da Rep\u00fablica\",\"children\":[{\"title\":\"A LRF baseou-se no Cap. II do Titulo VI da CF. \u00c9 o cap. chamado \\\"DAS FINANCAS PUBLICAS\\\"\"},{\"title\":\"A LRF nao revogou a Lei 4.320/1964\"},{\"title\":\"A Lei Complementar 101/00, que alterou a Lei 4320/64, classifica as despesas em despesas correntes e despesas de capital.\"},{\"title\":\"A origem hist\u00f3rica da LRF foi a press\u00e3o internacional do FMI, que s\u00f3 aceitou emprestar dinheiro ao Brasil mediante a cria\u00e7\u00e3o de um c\u00f3digo de conduta.\"},{\"title\":\"Na LRF nao tem previsao de san\u00e7ao aos administradores, apenas aos entes\"},{\"title\":\"MP tem ampla atua\u00e7\u00e3o no tocante a LRF\"},{\"title\":\"N\u00e3o traz crimes de responsabilidade\"},{\"title\":\"Cria o fundo do RGPS na forma da disposi\u00e7\u00e3o CF(art. 68)\"},{\"title\":\"Contem alguma tipologia de natureza PENAL?\",\"children\":[{\"title\":\"N\u00e3o!\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"A LRF funciona como um \u201cC\u00f3digo de Boas Condutas Fiscais\u201d buscando estabelecer um novo paradigma para as finan\u00e7as p\u00fablicas de nosso pa\u00eds. Baseia-se nos princ\u00edpios da administra\u00e7\u00e3o p\u00fablica e tem como objetivos a diminui\u00e7\u00e3o da d\u00edvida p\u00fablica, estabiliza\u00e7\u00e3o dos pre\u00e7os, o desenvolvimento sustent\u00e1vel, dentre outros, de modo que o or\u00e7amento p\u00fablico seja efetivamente mecanismo de limita\u00e7\u00e3o de gastos, organiza\u00e7\u00e3o estatal e representa\u00e7\u00e3o dos anseios sociais. De acordo com a Doutrina, o seu objetivo foi a instrumentaliza\u00e7\u00e3o dos princ\u00edpios norteadores da administra\u00e7\u00e3o p\u00fablica: legalidade, publicidade, moralidade, impessoalidade e efici\u00eancia, a partir de um eixo de quatro premissas b\u00e1sicas: planejamento, transpar\u00eancia, controle e responsabiliza\u00e7\u00e3o.\"},{\"title\":\"A Lei de Responsabilidade Fiscal \u2013 LRF (Lei Complementar n\u00ba 101/2000) \u00e9 formalmente constitucional, n\u00e3o houve qualquer v\u00edcio na tramita\u00e7\u00e3o do projeto, tendo sido respeitado o devido processo legislativo. No que tange ao aspecto material, o STF declarou a constitucionalidade dos arts. 4\u00ba, \u00a7 2\u00ba, II, e \u00a7 4\u00ba; 7\u00ba, caput e \u00a7 1\u00ba; 11, par\u00e1grafo \u00fanico; 14, II; 17, \u00a7\u00a7 1\u00ba a 7\u00ba; 18, \u00a7 1\u00ba; 20; 24; 26, \u00a7 1\u00ba; 28, \u00a7 2\u00ba; 29, I, e \u00a7 2\u00ba; 39; 59, \u00a7 1\u00ba, IV; 60; e 68, caput, da LRF. Por outro lado, o STF julgou inconstitucionais o art. 9\u00ba, \u00a7 3\u00ba, o caput dos arts. 56 e 57 e o \u00a7 2\u00ba do art. 23. Quanto ao \u00a7 1\u00ba do art. 23, da LRF, o STF declarou a inconstitucionalidade parcial, sem redu\u00e7\u00e3o de texto, de modo a obstar interpreta\u00e7\u00e3o segundo a qual \u00e9 poss\u00edvel reduzir valores de fun\u00e7\u00e3o ou cargo que estiver provido. Art. 9\u00ba, \u00a7 3\u00ba Veja o que diz o \u00a7 3\u00ba do art. 9\u00ba: Art. 9\u00ba Se verificado, ao final de um bimestre, que a realiza\u00e7\u00e3o da receita poder\u00e1 n\u00e3o comportar o cumprimento das metas de resultado prim\u00e1rio ou nominal estabelecidas no Anexo de Metas Fiscais, os Poderes e o Minist\u00e9rio P\u00fablico promover\u00e3o, por ato pr\u00f3prio e nos montantes necess\u00e1rios, nos trinta dias subsequentes, limita\u00e7\u00e3o de empenho e movimenta\u00e7\u00e3o financeira, segundo os crit\u00e9rios fixados pela lei de diretrizes or\u00e7ament\u00e1rias.  STF. Plen\u00e1rio. ADI 2238/DF, Rel. Min. Alexandre de Moraes, julgado em 24/6/2020 (Info 983).\"},{\"title\":\"As veda\u00e7\u00f5es \u00e0 reposi\u00e7\u00e3o de vac\u00e2ncias de cargos p\u00fablicos durante a vig\u00eancia do Regime de Recupera\u00e7\u00e3o Fiscal afrontam a autonomia dos Estados e Munic\u00edpios, o princ\u00edpio da proporcionalidade, bem como o princ\u00edpio da continuidade do servi\u00e7o p\u00fablico. Contudo, a realiza\u00e7\u00e3o de concursos p\u00fablicos e o provimento de cargos pelos entes aderentes devem respeitar os requisitos legais usuais: a) autoriza\u00e7\u00e3o da autoridade estadual ou municipal competente; b) avalia\u00e7\u00e3o das prioridades do ente pol\u00edtico; e  c) exist\u00eancia de viabilidade or\u00e7ament\u00e1ria na admiss\u00e3o. Em regra, o legislador nacional pode limitar a admiss\u00e3o de pessoal por entes federados em recupera\u00e7\u00e3o fiscal, sobretudo considerando que um dos problemas cr\u00f4nicos da Federa\u00e7\u00e3o brasileira consiste no controle das despesas p\u00fablicas com pessoal. Contudo, limita\u00e7\u00f5es dessa natureza devem respeitar a intangibilidade do pacto federativo e a necess\u00e1ria harmonia das rela\u00e7\u00f5es pol\u00edticas entre os entes estatais brasileiros. A submiss\u00e3o da referida reposi\u00e7\u00e3o de vac\u00e2ncias \u00e0 autoriza\u00e7\u00e3o no Plano de Recupera\u00e7\u00e3o Fiscal \u2014 ato administrativo complexo que demanda anu\u00eancia de diversos \u00f3rg\u00e3os federais, al\u00e9m de aprova\u00e7\u00e3o final do Presidente da Rep\u00fablica \u2014 viola a autonomia dos estados e munic\u00edpios, o princ\u00edpio da proporcionalidade, na vertente da proibi\u00e7\u00e3o do excesso e interfere diretamente na continuidade administrativa dos servi\u00e7os p\u00fablicos estaduais e municipais. A submiss\u00e3o dos investimentos executados por fundos p\u00fablicos especiais ao teto de gastos ofende os princ\u00edpios da efici\u00eancia e da proporcionalidade, na medida em que n\u00e3o atinge o objetivo pretendido de contribuir ou de fomentar a responsabilidade fiscal dos entes subnacionais. Essa vincula\u00e7\u00e3o, quando n\u00e3o destinada ao pagamento de despesas obrigat\u00f3rias, especialmente as relacionadas ao custeio de pessoal, compromete a execu\u00e7\u00e3o de investimentos em melhorias efetivas nos respectivos servi\u00e7os p\u00fablicos, j\u00e1 que as verbas p\u00fablicas n\u00e3o retornar\u00e3o ao caixa \u00fanico do Tesouro por expressa veda\u00e7\u00e3o legal e, por isso, n\u00e3o poder\u00e3o ser empregados em investimentos p\u00fablicos. STF. Plen\u00e1rio. ADI 6.930/DF, Rel. Min. Roberto Barroso, julgado em 01/7/2023 (Info 1101).\"}]}]},{\"title\":\"Art. 1\u02da \u00a71 da LRF -  Responsa na gest\u00e3o fiscal  pressupoe\",\"children\":[{\"title\":\"A a\u00e7\u00e3o planejada e transparente, em que se previnem riscos e corrigem desvios\"},{\"title\":\"capazes de afetar o equil\u00edbrio das contas p\u00fablicas, mediante o CUMPRIMENTO DE METAS DE\"},{\"title\":\"RESULTADOS entre receitas e despesas e a obedi\u00eancia a limites e\"},{\"title\":\"condi\u00e7\u00f5es no que tange a ren\u00fancia de receita, gera\u00e7\u00e3o de despesas com pessoal, da seguridade\"},{\"title\":\"social e outras, d\u00edvidas consolidada e mobili\u00e1ria, op. de cr\u00e9dito, inclusive\"},{\"title\":\"antecipacao de receita, concess\u00e3o de garantia e inscri\u00e7\u00e3o em RP\"}]},{\"title\":\"Aplicabilidade/Abrangencia FCC - 2005 - TCE-MA - Analista\",\"children\":[{\"title\":\"LRF tem abrangencia NACIONAL. Aplica a Adm. Direta e Indireta de todos os entes\"},{\"title\":\"EXCETO empresas estatais independentes(empresas dependentes se submetem) (OU SEJA, NAO EXCLUI SEM E EP)\"},{\"title\":\"OBS\",\"children\":[{\"title\":\"O que leva a dependencia?\",\"children\":[{\"title\":\"A capacidade de AUTOSSUSTENTABILIDADE qnt as atividades normais de manuten\u00e7ao e investi\"},{\"title\":\"O tipo de recurso que \u00e9 transferido pelo ente reflete essa caracteristica\"},{\"title\":\"Estatais dependentes recebem recursos p/ suas despesas correntes e de invest.\"},{\"title\":\"Estatais dependentes geralmente estao abrangidas pelo OF e OS\ c\u00edcio anterior.  Esse resultado, que deve ser publicado no relat\u00f3rio de gest\u00e3o fiscal, \u00e9 denominador para a verifica\u00e7\u00e3o dos limites de pessoal, d\u00edvida consolidada, opera\u00e7\u00f5es de antecipa\u00e7\u00e3o da receita or\u00e7ament\u00e1ria e garantias concedidas, constantes do referido relat\u00f3rio. A Receita Corrente L\u00edquida \u00e9 Par\u00e2metro para Diversos Institutos Legais, como a reserva de conting\u00eancia (art. 5\u00ba, III, da LRF), d\u00edvida Consolidada dos entes federativos (art. 30, I, II e \u00a73 da LRF), limite de despesas com pessoal  (art. 19 da LRF), formaliza\u00e7\u00e3o de parcerias p\u00fablico-privadas, pagamento de precat\u00f3rios (art. 100, \u00a7\u00a7 17 e 18, da CF). O art. 166, \u00a716 da CF (EC n. 86/2015) disp\u00f5e que as transfer\u00eancias advindas das emendas constitucionais impositivas n\u00e3o integrar\u00e3o a base de c\u00e1lculo da RCL para fins de observ\u00e2ncia dos limites de pessoal. Lembra daquele \u00a79\u00ba alterado pela EC 126/2022? Manteve a utiliza\u00e7\u00e3o da receita corrente l\u00edquida como par\u00e2metro de c\u00e1lculo do percentual das emendas. MAS N\u00c3O CONFUNDA!!! Base de c\u00e1lculo do \u00edndice de sa\u00fade previsto na CF: Na Uni\u00e3o: receita corrente l\u00edquida; Nos estados, DF e munic\u00edpios: produto da arrecada\u00e7\u00e3o de determinados impostos\"}]}]}]},{\"title\":\"LRF e LDO\",\"children\":[{\"title\":\"Tras diversos req. sobre funcoes e conteudo da LDO. Amplia fun\u00e7\u00f5es da LDO\"},{\"title\":\"A LDO deve tratar sobre: ELCC FCC - 2002 - PGE-SP - Procurador CESPE - 2008 - PGE-PI - Procurador do Estado CESPE - 2008 - SEMAD-ARACAJU - Procurador Municipal CEBRASPE - 2023 - PGM - SP - Procurador do Munic\u00edpio VUNESP - 2024 - TRF - 3\u00aa REGI\u00c3O - Analista Judici\u00e1rio VUNESP - 2023 - C\u00e2mara de Tanabi - SP - Advogado CESPE / CEBRASPE - 2024 - PGE-RN - Procurador\",\"children\":[{\"title\":\"a) equil\u00edbr e\":\"No caso de os PL PJ e MP n\u00e3o promoverem a limita\u00e7\u00e3o no prazo estabelecido no caput\"},{\"title\":\"O PE \u00e9 autorizado a limitar os valores financeiros segundo os crit\u00e9rios fixados pela LDO\"}]},{\"title\":\"Existem tbm as metas QUADRIMESTRAIS\",\"children\":[{\"title\":\"At\u00e9 o final dos meses de maio, setembro e fevereiro\"},{\"title\":\"O PE demonstrara e avaliara o cumprimento das metas quadrim.\"},{\"title\":\"Ocorre como? Em aud. publica na CMO ou equivalente nas AL\u00b4s\"}]},{\"title\":\"OBS\",\"children\":[{\"title\":\"Por outro lado, o STF julgou inconstitucionais o art. 9\u00ba, \u00a7 3\u00ba, o caput dos arts. 56 e 57 e o \u00a7 2\u00ba do art. 23. Quanto ao \u00a7 1\u00ba do art. 23, da LRF, o STF declarou a inconstitucionalidade parcial, sem redu\u00e7\u00e3o de texto, de modo a obstar interpreta\u00e7\u00e3o segundo a qual \u00e9 poss\u00edvel reduzir valores de fun\u00e7\u00e3o ou cargo que estiver provido. Art. 9\u00ba, \u00a7 3\u00ba Veja o que diz o \u00a7 3\u00ba do art. 9\u00ba: Art. 9\u00ba Se verificado, ao final de um bimestre, que a realiza\u00e7\u00e3o da receita poder\u00e1 n\u00e3o comportar o cumprimento das metas de resultado prim\u00e1rio ou nominal estabelecidas no Anexo de Metas Fiscais, os Poderes e o Minist\u00e9rio P\u00fablico promover\u00e3o, por ato pr\u00f3prio e nos montantes necess\u00e1rios, nos trinta dias subsequentes, limita\u00e7\u00e3o de empenho e movimenta\u00e7\u00e3o financeira, segundo os crit\u00e9rios fixados pela lei de diretrizes or\u00e7ament\u00e1rias.  Com rela\u00e7\u00e3o ao \u00a7 3\u00ba do art. 9\u00ba, o STF entendeu que a norma prevista n\u00e3o guarda pertin\u00eancia com o modelo de freios e contrapesos estabelecido constitucionalmente para assegurar o exerc\u00edcio respons\u00e1vel da autonomia financeira por parte dos Poderes Legislativo e Judici\u00e1rio e do Minist\u00e9rio P\u00fablico. Isso porque o dispositivo estabelece inconstitucional hierarquiza\u00e7\ obran\u00e7a\"}]},{\"title\":\"LC 192/2022\",\"children\":[{\"title\":\"afasta, por meio de lei de mesma hierarquia da Lei de Responsabilidade Fiscal, a necessidade de a Uni\u00e3o, ao conceder benef\u00edcio tribut\u00e1rio sobre combust\u00edveis e energia, renunciando receita, apresentar estimativa do impacto or\u00e7ament\u00e1rio-financeiro no exerc\u00edcio em que deva iniciar sua vig\u00eancia e nos dois seguintes, bem como todos os demais crit\u00e9rios do art. 14 da Lei de Responsabilidade Fiscal.  Art. 8\u00ba O disposto nos incisos I e II do caput e no \u00a7 2\u00ba do art. 14 da LRF, e nos arts. 124, 125, 126, 127 e 136 da Lei n\u00ba 14.194, de 20 de agosto de 2021, N\u00c3O SE APLICA \u00e0s proposi\u00e7\u00f5es legislativas e aos atos do Poder Executivo que entrarem em vigor no exerc\u00edcio de 2022, relativamente aos impostos e \u00e0s contribui\u00e7\u00f5es previstos no inciso II do caput do art. 155, no \u00a7 4\u00ba do art. 177, na al\u00ednea b do inciso I e no inciso IV do caput do art. 195 e no art. 239 da Constitui\u00e7\u00e3o Federal,  nas opera\u00e7\u00f5es que envolvam biodiesel, \u00f3leo diesel, querosene de avia\u00e7\u00e3o, g\u00e1s liquefeito de petr\u00f3leo, derivado de petr\u00f3leo e de g\u00e1s natural, gasolina, exceto de avia\u00e7\u00e3o, \u00e1lcool, inclusive para fins carburantes, e g\u00e1s natural veicular no referido exerc\u00edcio.      (Reda\u00e7\u00e3o dada pela Lei Complementar n\u00ba 194, de 2022)\"}]},{\"title\":\"OBS\",\"children\":[{\"title\":\"\u00c9 inconstitucional lei estadual que concede benef\u00edcio fiscal sem a pr\u00e9via estimativa de impacto or\u00e7ament\u00e1rio e financeiro exigida pelo art. 113 do ADCT. STF. Plen\u00e1rio. ADI 6303/RR, Rel. Min. Roberto Barroso, julgado em 11/3/2022 (Info 1046). O STF firmou o entendimento de que o art. 113 do ADCT \u00e9 aplic\u00e1vel a todos os entes da Federa\u00e7\u00e3o, de forma que eventual proposi\u00e7\u00e3o legislativa federal, estadual, distrital ou municipal que crie ou altere despesa obrigat\u00f3ria ou ren\u00fancia de receita dever\u00e1 ser acompanhada de estimativa de impacto or\u00e7ament\u00e1rio e financeiro, sob pena de incorrer em v\u00edcio de inconstitucionalidade formal. A afirma\u00e7\u00e3o de que o art. 113 do ADCT se aplica apenas \u00e0 Uni\u00e3o n\u00e3o \u00e9 compat\u00edvel com as interpreta\u00e7\u00f5es literal, teleol\u00f3gica e sistem\u00e1tica. Fonte: https://www.dizerodireito.com.br/2022/04/e-inconstitucional-lei-estadual-que.html  CESPE / CEBRASPE - 2022 - PGM Recife - PE - Procurador Judicial Municipal\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"B) em qualquer hip\u00f3tese, deve estar acompanhado de demonstra\u00e7\u00e3o pelo proponente de que a ren\u00fancia for considerada na estimativa de receita da lei or\u00e7ament\u00e1ria; Errada D) poderia optar por uma medida de compensa\u00e7\u00e3o consistente na majora\u00e7\u00e3o da al\u00edquota de outro tributo, no exerc\u00edcio em que deva iniciar a vig\u00eancia da redu\u00e7\u00e3o de al\u00edquota do ISS e nos dois seguintes; Correta A l\u00f3gica do art. 14 da LRF \u00e9 que, se vai haver a ren\u00fancia de uma receita, o gestor precisa dar conta da perda dessa renda para a administra\u00e7\u00e3o p\u00fablica, ent\u00e3o ele, em qualquer caso, deve apresentar a estimativa de impacto or\u00e7ament\u00e1rio-financeiro para que ele e toda a coletividade (publicidade) saiba de quanto se trata, de onde sair\u00e1 e para onde ir\u00e1 o dinheiro.  Junto a isso, se vai deixar de entrar dinheiro, OU ele demonstra que essa ren\u00fancia j\u00e1 foi considerada na estimativa de receita, que est\u00e1 tudo certo E isso n\u00e3o vai afetar as metas de resultados fiscais, OU, se n\u00e3o houve esse preparo pr\u00e9vio, que ele demonstre as medidas de compensa\u00e7\u00e3o. FGV - 2023 - SMF-RJ - Analista de Planejamento e Or\u00e7amento - Tarde\"}]}]},{\"title\":\"DESPESA PUBLICA\",\"children\":[{\"title\":\"Cria\u00e7a ei)\"}]}]},{\"title\":\"OBS\",\"children\":[{\"title\":\"Quanto ao \u00a7 2\u00ba do art. 23, declarou a sua inconstitucionalidade. \u00c9 inconstitucional qualquer interpreta\u00e7\u00e3o de dispositivos da Lei de Responsabilidade Fiscal que permita a redu\u00e7\u00e3o de vencimentos de servidores p\u00fablicos para a adequa\u00e7\u00e3o de despesas com pessoal. \u00c9 inconstitucional o \u00a7 2\u00ba do art. 23 da LRF, que faculta a redu\u00e7\u00e3o tempor\u00e1ria da jornada de trabalho com adequa\u00e7\u00e3o dos vencimentos \u00e0 nova carga hor\u00e1ria, caso sejam ultrapassados os limites definidos na lei para despesas com pessoal nas diversas esferas do poder p\u00fablico. Essa possibilidade de redu\u00e7\u00e3o fere o princ\u00edpio constitucional da irredutibilidade de vencimentos (art. 37, XV, da CF/88). STF. Plen\u00e1rio. ADI 2238/DF, Rel. Min. Alexandre de Moraes, julgado em 24/6/2020 (Info 983)\"},{\"title\":\"S\u00e3o constitucionais dispositivos da Lei Complementar n\u00ba 159/2017 e do Decreto n\u00ba 10.681/2021, que estabelecem e regulamentam o Regime de Recupera\u00e7\u00e3o Fiscal dos estados e do Distrito Federal. \u00c9 tamb\u00e9m constitucional o art. 20, \u00a7 7\u00ba, da LC 101/2000 (Lei de Responsabilidade Fiscal), que prev\u00ea que as despesas com inativos e pensionistas integram o c\u00f4mputo da despesa total com pessoal dos respectivos Poderes e \u00f3rg\u00e3os. STF. Plen\u00e1rio. ADI 6.892/RJ, Rel. Min. Roberto Barroso, julgado em 15/8/2023 (Info 1103).\"},{\"title\":\"S\u00e3o constitucionais \u2014 \u00e0 luz do regime constitucional de reparti\u00e7\u00e3o de compet\u00eancias (arts. 24, I; e 169, \u201ccaput\u201d, da CF/88) e do equil\u00edbrio federativo \u2014 dispositivos da Lei Complementar 101/2000 (Lei de Responsabilidade Fiscal) que incluem, no c\u00e1lculo dos gastos com pessoal pela Administra\u00e7\u00e3o P\u00fablica, as despesas com inativos e pensionistas, bem como o imposto de renda retido na fonte. No plano financeiro, o art. 169 da CF/88 estabelece que a despesa com pessoal ativo e inativo da Uni\u00e3o, dos estados, do Distrito Federal e dos munic\u00edpios deve respeitar os limites fixados em lei complementar de car\u00e1ter nacional, no caso, a Lei de Responsabilidade Fiscal - LRF. Uma vez atribu\u00edda compet\u00eancia ao ente central para regular a quest\u00e3o de modo geral e uniforme por meio de uma lei nacional, os entes subnacionais devem obedi\u00eancia ao regramento editado, sendo-lhes vedado escolher as regras que ir\u00e3o adotar. Nesse contexto, o entendimento que fundamenta a exclus\u00e3o do imposto de renda retido na fonte do limite de despesa de pessoal contraria diretamente o disposto no art. 19 da LRF \u2014 que enumera as parcelas n\u00e3o integrantes do referido c\u00e1lculo \u2014, de forma que manifesta\u00e7\u00f5es subnacionais em sentido ampliativo usurpam a compet\u00eancia legislativa da Uni\u00e3o para editar normas gerais sobre direito financeiro (art. 24, I, da CF/88). Ademais, excepcionadas as hip\u00f3teses previstas na LRF (art. 19, \u00a7 1\u00ba, VI), a desconsidera\u00e7\u00e3o dos valores pagos a inativos e pensionistas para o c\u00e1lculo do limite de gastos com pessoal afronta a sistem\u00e1tica prevista pela referida lei (art. 18, caput), bem como os dispositivos constitucionais acima referidos. Logo, s\u00e3o constitucionais o art. 18, caput, e o art. 19, caput, e \u00a7\u00a7 1\u00ba e 2\u00ba, da LRF. STF. Plen\u00e1rio. ADC 69/DF, Rel. Min. Alexandre de Moraes, julgado em 01/7/2023 (Info 1101).\"}]}]},{\"title\":\"Despesas com Seguridade social - Art. 24\"},{\"title\":\"obs\",\"children\":[{\"title\":\"Suspens\u00e3o das san\u00e7\u00f5es frente \u00e0 queda das receitas. Inova\u00e7\u00e3o da LC n. 164/2018\"}]}]},{\"title\":\"Trasnferencias Voluntarias -  Art. 25 da LRF Abrange recursos correntes ou de capital? CESPE - 2022 - PGE-PA - Procurador CESPE / CEBRASPE - 2023 - PGE-SE - Procurador CESPE / CEBRASPE - 2023 - PG proibe o BACEN De conceder as institui\u00e7\u00f5es financeiras\"},{\"title\":\"Op. de REDESCONTO e de eMPRESTIMO de prazo inferior a 360 dias\"}]}]},{\"title\":\"obs\",\"children\":[{\"title\":\"Art. 164. A compet\u00eancia da Uni\u00e3o para emitir moeda ser\u00e1 exercida exclusivamente pelo banco central. \u00a7 1\u00ba \u00c9 vedado ao banco central conceder, direta ou indiretamente, empr\u00e9stimos ao Tesouro Nacional e a qualquer \u00f3rg\u00e3o ou entidade que n\u00e3o seja institui\u00e7\u00e3o financeira.(ou seja, PODEM SER CONCEDIDOS EMPRESTIMOS A INSTITUI\u00c7OES FINANCEIRAS) \u00a7 2\u00ba O banco central poder\u00e1 comprar e vender t\u00edtulos de emiss\u00e3o do Tesouro Nacional, com o objetivo de regular a oferta de moeda ou a taxa de juros. \u00a7 3\u00ba As disponibilidades de caixa da Uni\u00e3o ser\u00e3o depositadas no banco central; as dos Estados, do Distrito Federal, dos Munic\u00edpios e dos \u00f3rg\u00e3os ou entidades do Poder P\u00fablico e das empresas por ele controladas, em institui\u00e7\u00f5es financeiras oficiais, ressalvados os casos previstos em lei. _______________________________________________________________ Art. 28. Salvo mediante lei espec\u00edfica, n\u00e3o poder\u00e3o ser utilizados recursos p\u00fablicos, inclusive de opera\u00e7\u00f5es de cr\u00e9dito, para socorrer institui\u00e7\u00f5es do Sistema Financeiro Nacional, ainda que mediante a concess\u00e3o de empr\u00e9stimos de recupera\u00e7\u00e3o ou financiamentos para mudan\u00e7a de controle acion\u00e1rio.  \u00a7 1o A preven\u00e7\u00e3o de insolv\u00eancia e outros riscos ficar\u00e1 a cargo de fundos, e outros mecanismos, constitu\u00eddos pelas institui\u00e7\u00f5es do Sistema Financeiro Nacional, na forma da lei. \u00a7 2o O disposto no caput n\u00e3o pro\u00edbe o Banco Central do Brasil de conceder \u00e0s institui\u00e7\u00f5es financeiras opera\u00e7\u00f5es de redesconto e de empr\u00e9stimos de prazo inferior a trezentos e sessenta dias.\"},{\ "title\":\"Tomado pelas Unidades Administrativas\"}]},{\"title\":\"Municipal\",\"children\":[{\"title\":\"Tomado pelos Municipios\"}]}]}]},{\"title\":\"Fases\",\"children\":[{\"title\":\"Emissao\",\"children\":[{\"title\":\"Estado se propoe a obter e explicita as condicoes\"}]},{\"title\":\"Divida Publica\",\"children\":[{\"title\":\"Flutuante ou Fundada\"}]}]},{\"title\":\"Garantias\",\"children\":[{\"title\":\"Garantia de devolucao da quantia emprestada\",\"children\":[{\"title\":\"Exemplo\",\"children\":[{\"title\":\"Indicacao de fiadores\"},{\"title\":\"Vinculacao de receita\"}]}]},{\"title\":\"Garantia contra desvalozrizacao da Moeda\",\"children\":[{\"title\":\"Exemplo\",\"children\":[{\"title\":\"Vinculacao ao valor da moeda estrangeira ou ao padrao ouro\"}]}]}]},{\"title\":\"Formas de Extin\u00e7\u00e3o\",\"children\":[{\"title\":\"Amortizacao\",\"children\":[{\"title\":\"feita por compra no mercado, sorteio ou junto ao credor\"}]},{\"title\":\"Compensacao\"},{\"title\":\"Conversao\",\"children\":[{\"title\":\"Estado altera condicoes anteriores, geralmente reduzindo juros\"}]},{\"title\":\"Repudio\",\"children\":[{\"title\":\"Estado cancela divida por falta de legitimidade\"},{\"title\":\"Exemplo\",\"children\":[{\"title\":\"dividas assumidas em atos de corrupcao\"}]}]}]}]}]},{\"title\":\"Art. 73 - Infra\u00e7\u00f5es a LRF CESPE - 2022 - PGE-PA - Procurador\",\"children\":[{\"title\":\"As infra\u00e7\u00f5es dos dispositivos desta Lei Complementar ser\u00e3o punidas segundo o Decreto-Lei no 2.848, de 7 de dezembro de 1940 (C\u00f3digo Penal); a Lei no 1.079, de 10 de abril de 1950; o Decreto-Lei no 201, de 27 de fevereiro de 1967; a Lei no 8.429, de 2 de junho de 1992; e demais normas da legisla\u00e7\u00e3o pertinente\"},{\"title\":\"OBS: a LRF nao preve crimes\"},{\"title\":\"obs\",\"children\":[{\"title\":\"D\u00ea uma olhada nas san\u00e7\u00f5es pela n\u00e3o efici\u00eancia arrecadat\u00f3ria. Art. 58 da LRF, art. 10, X e XXII, da Lei de Improbidade Administrativa. Lembre-se que direito financeiro derruba at\u00e9 presidente!\"}]}]},{\"title\":\"Disposi\u00e7oes Finais - Sempre ler\"}]}}";const DATA = JSON.parse(RAW);

const CHAPTERS = ["cap0","cap1","cap2","cap3","cap4","cap5","cap6","cap7"];
const LABELS = {"cap0": "0. Finanças Públicas na CF — PPA, LDO e LOA", "cap1": "1. Finanças Públicas na CF — Ciclo Orçamentário", "cap2": "2. Orçamento Público — Princípios", "cap3": "3. Despesa Pública", "cap4": "4. Receitas Públicas", "cap5": "5. Créditos Adicionais", "cap6": "6. Restos a Pagar e Despesas de Ex. Anteriores", "cap7": "7. Lei de Responsabilidade Fiscal"};

let cur = CHAPTERS[0];
let expanded = new Set();
let term = "";
let hits = 0;

function detectType(t){
  const s=(t||"").toLowerCase();
  if(/cespe|cebraspe|fgv|vunesp|fundatec|ibfc|prova/.test(s)) return "cespe";
  if(/stj|stf|resp|adi|adpf|adc|\bre\b|rms|agrg|info \d|súmula|sumula|julgado/.test(s)) return "stj";
  return "obs";
}

function extractText(n,d=0){
  if(d>4) return n.title||"";
  let p=[n.title||""];
  (n.children||[]).forEach(c=>p.push(extractText(c,d+1)));
  (n.callouts||[]).forEach(c=>p.push(extractText(c,d+1)));
  return p.filter(Boolean).join(" • ");
}

function matches(n,t){
  if(!t) return true;
  if((n.title||"").toLowerCase().includes(t)) return true;
  if((n.children||[]).some(c=>matches(c,t))) return true;
  if((n.callouts||[]).some(c=>matches(c,t))) return true;
  return false;
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function hilite(s,t){
  if(!t) return esc(s);
  const re=new RegExp(`(${t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`,"gi");
  return esc(s).replace(re,"<mark>$1</mark>");
}

function renderCallout(node){
  const tipo=detectType(node.title||"");
  const label={cespe:"CESPE/CEBRASPE",stj:"STF/STJ",obs:"OBS"}[tipo];
  const text=extractText(node);
  const isTrivial=!node.title||/^(obs|callout|atenção)$/i.test((node.title||"").trim());
  const titleHtml=isTrivial?"":(`<div class="callout-title">${hilite(node.title,term)}</div>`);
  return `<div class="callout-box ${tipo}"><div class="callout-label">${label}</div>${titleHtml}<div class="callout-body">${esc(text)}</div></div>`;
}


var _EXAM_RE=/^\s*(CESPE\s*[\/]?\s*CEBRASPE|CEBRASPE|CESPE|FCC|FGV|VUNESP|ESAF|CESGRANRIO|MPT|AOCP|IBFC|IADES|FUNCAB|FUNDEP|QUADRIX|SELECON|OBJETIVA|NUCEPE|CS-UFG|INAZ|CONSULPLAN|NC-UFPR)\b/i;
var _YEAR_RE=/\b(20\d{2}|199\d)\b/;
function _isExam(t){return _EXAM_RE.test(t)&&_YEAR_RE.test(t);}
function _examShort(t){
  var b=t.match(_EXAM_RE);var y=t.match(_YEAR_RE);
  var banca=(b?b[1].replace(/\s*\/\s*CEBRASPE/i,'').replace(/\s*CEBRASPE\s*\/\s*/i,'').trim():'');
  return banca+(y?' '+y[0]:'');
}

function xpand(el,ev){el.classList.toggle('open');ev.stopPropagation();}
function renderNode(n,depth,path){
  const id=path;
  const hasKids=(n.children&&n.children.length)||(n.callouts&&n.callouts.length);
  const isExp=expanded.has(id)||(term&&matches(n,term));
  const isHit=term&&(n.title||"").toLowerCase().includes(term);
  if(isHit) hits++;

  if(n.callout) return renderCallout(n);

  const tog=hasKids?(isExp?"▾":"▸"):"·";
  const dc=depth===0?"d0":depth===1?"d1":depth===2?"d2":"dn";
  const rowCls=`row${isHit?" hit":""}`;
  const _long=(n.title||"").length>120&&depth>0;
  const titleHtml=_long?`<span class="txt ${dc} long" onclick="xpand(this,event)">${hilite(n.title||"",term)}</span>`:`<span class="txt ${dc}">${hilite(n.title||"",term)}</span>`;

  let childHtml="";
  if(isExp&&hasKids){
    childHtml='<div class="children">';
    (n.children||[]).forEach((c,i)=>{if(!term||matches(c,term)) childHtml+=renderNode(c,depth+1,path+"_"+i);});
    (n.callouts||[]).forEach((c,i)=>{if(!term||matches(c,term)) childHtml+=renderNode({...c,callout:true},depth+1,path+"_c"+i);});
    childHtml+="</div>";
  }
  return `<div class="node" id="n${id}"><div class="${rowCls}" onclick="toggle('${id}')"><span class="tog">${tog}</span>${titleHtml}</div>${childHtml}</div>`;
}

function render(){
  const tree=DATA[cur];
  hits=0;
  let html="";
  if(tree.children){
    tree.children.forEach((n,i)=>{
      if(!term||matches(n,term)) html+=renderNode(n,0,"r"+i);
    });
  }
  document.getElementById("content").innerHTML=html||`<p class="no-res">Nenhum resultado para "${esc(term)}"</p>`;const em=document.getElementById("empty-msg");if(em)em.remove();
  const mb=document.getElementById("matchBar");
  if(term){mb.style.display="block";mb.textContent=`${hits} ocorrência(s) para "${term}"`;}
  else{mb.style.display="none";}
}

function renderTabs(){
  document.getElementById("tabs").innerHTML=CHAPTERS.map((k,i)=>{
    const cid='dfinanceiro_'+i;
    const isDone=_TRK&&_TRK.done&&_TRK.done[cid];
    return `<div class="tab${k===cur?' active':''}" onclick="selChap('${k}')">
      <input type="checkbox" class="_trk_chk" data-cid="${cid}" ${isDone?'checked':''} onclick="event.stopPropagation();_trkToggle('${cid}',this.checked,this)"/>
      <span>${LABELS[k]||k}</span>
    </div>`;
  }).join("");
}

function selChap(k){cur=k;expanded.clear();document.getElementById("search").value="";term="";document.getElementById("matchBar").style.display="none";renderTabs();render();}
function toggle(id){if(expanded.has(id))expanded.delete(id);else expanded.add(id);render();}
function expandAll(){function add(n,p){expanded.add(p);(n.children||[]).forEach((c,i)=>add(c,p+"_"+i));(n.callouts||[]).forEach((c,i)=>add(c,p+"_c"+i));}const t=DATA[cur];(t.children||[]).forEach((n,i)=>add(n,"r"+i));render();}
function collapseAll(){expanded.clear();render();}

let deb;
document.getElementById("search").addEventListener("input",function(){
  clearTimeout(deb);
  deb=setTimeout(()=>{term=this.value.toLowerCase().trim();render();},250);
});

renderTabs();
render();
</script>

<script>
// ── TRACKER INTEGRATION ──
var _TRK = {
  mapId: 'dfinanceiro',
  total: 8,
  done: {},  // chapter_id -> true
  user: null,
};

// Auth
window.addEventListener('DOMContentLoaded', function(){
  _sb.auth.getSession().then(function(r){
    if(r.data&&r.data.session&&r.data.session.user){
      _TRK.user = r.data.session.user;
      _trkLoad();
    } else {
      _trkRender();
    }
  });
});

async function _trkLoad(){
  try{
    var r = await _sb.from('progress')
      .select('chapter_id,done')
      .eq('user_id', _TRK.user.id);
    _TRK.done = {};
    if(r.data) r.data.forEach(function(row){
      if(row.done && row.chapter_id.startsWith(_TRK.mapId+'_'))
        _TRK.done[row.chapter_id] = true;
    });
    try{ Object.keys(_TRK.done).forEach(function(cid){ localStorage.setItem('_pgprog_'+cid,JSON.stringify({done:true,date:null})); }); }catch(_){}
    _trkRender();
  }catch(e){ console.warn('tracker load err', e); }
}

function _trkRender(){
  var count = Object.keys(_TRK.done).length;
  var pct = _TRK.total ? Math.round(count/_TRK.total*100) : 0;
  // Update both injected header bar and sidebar bar
  ['_trk_fill','trk-fill'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.width=pct+'%';});
  ['_trk_pct','trk-pct'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=pct+'%';});
  ['_trk_cnt','trk-cnt'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=count+'/'+_TRK.total;});
  // Update checkboxes
  document.querySelectorAll('._trk_chk').forEach(function(chk){
    var cid = chk.getAttribute('data-cid');
    chk.checked = !!_TRK.done[cid];
    var w = chk.closest('._chk_wrap');
    if(w) w.classList.toggle('_chk_done', !!_TRK.done[cid]);
  });
  renderTabs();
}

async function _trkToggle(chapterId, done, chk){
  if(!_TRK.user){
    // Try to recover session
    try {
      const r = await _sb.auth.getSession();
      if(r.data && r.data.session && r.data.session.user){
        _TRK.user = r.data.session.user;
      } else {
        console.warn('No session found, cannot save tracker');
        return;
      }
    } catch(e) { console.error('getSession error:', e); return; }
  }
  var now = done ? new Date().toISOString() : null;
  if(done) _TRK.done[chapterId] = true;
  else delete _TRK.done[chapterId];
  _trkRender();
  try{
    await _sb.from('progress').upsert({
      user_id: _TRK.user.id,
      chapter_id: chapterId,
      done: done,
      done_at: now
    }, {onConflict: 'user_id,chapter_id'});
  }catch(e){ console.warn('tracker save err', e); }
  try{ localStorage.setItem('_pgprog_'+chapterId, JSON.stringify({done, date:now})); }catch(_){}
}
</script>
