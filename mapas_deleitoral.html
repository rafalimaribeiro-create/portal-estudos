<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--border:#2a3348;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --accent:#0284c7;--accent2:#0369a1;
  --cespe:#c2440a;--cespe-bg:#0f0f2e;--cespe-border:#312e81;
  --stj:#3b82f6;--stj-bg:#0c1426;--stj-border:#1e3a5f;
  --obs:#10b981;--obs-bg:#061410;--obs-border:#064e3b;
  --h1:#a5b4fc;--h2:#818cf8;--h3:#0284c7;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.6}
#app{display:flex;flex-direction:row;height:100vh;overflow:hidden;}
#sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;height:calc(100vh - 46px);}
#sb-header{padding:10px 12px 8px;border-bottom:1px solid var(--border);flex-shrink:0;}
#sb-title{font-size:13px;font-family:monospace;color:var(--accent);font-weight:500;margin-bottom:6px;}
#search{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:11px;color:var(--text);font-family:monospace;outline:none;}
#search:focus{border-color:var(--accent);}
#trk-bar{padding:8px 12px 6px;border-bottom:1px solid var(--border);flex-shrink:0;}
#trk-label{font-size:10px;font-family:monospace;letter-spacing:.08em;text-transform:uppercase;color:#7c8db5;display:flex;justify-content:space-between;margin-bottom:5px;}
#trk-pct{color:var(--accent);font-weight:700;}
#trk-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
#trk-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s;}
#tabs{overflow-y:auto;flex:1;padding:4px 0;}
.tab{display:flex;align-items:center;gap:6px;padding:7px 12px;cursor:pointer;transition:background .12s;font-size:12px;color:var(--text);font-family:monospace;border-left:3px solid transparent;}
.tab:hover{background:var(--bg);}
.tab.active{border-left-color:var(--accent);background:rgba(200,169,110,0.08);color:var(--accent);}
.tab input[type=checkbox]{width:13px;height:13px;accent-color:var(--accent);flex-shrink:0;cursor:pointer;}
#main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.match-bar{padding:6px 16px;font-size:12px;font-family:monospace;color:var(--accent);background:var(--bg2);border-bottom:1px solid var(--border);display:none;}
.content{flex:1;overflow-y:auto;padding:20px 24px;}
#empty-msg{display:flex;align-items:center;justify-content:center;height:100%;font-family:monospace;font-size:12px;letter-spacing:.15em;opacity:.3;color:var(--text);}
.node{margin:0}
.row{display:flex;align-items:flex-start;gap:6px;padding:3px 6px;border-radius:5px;cursor:pointer;transition:background .1s}
.row:hover{background:var(--bg3)}
.row.hit{background:#1a2e1a}
.tog{width:14px;height:14px;flex-shrink:0;margin-top:1px;font-size:10px;color:var(--text3);display:flex;align-items:center;justify-content:center}
.txt{flex:1;word-break:break-word}
.txt.d0{font-size:14px;font-weight:600;color:var(--h1)}
.txt.d1{font-size:13px;font-weight:500;color:var(--h2)}
.txt.d2{font-size:13px;color:var(--h3)}
.txt.dn{font-size:13px;color:var(--text)}
.txt.callout{font-size:12px;color:var(--text2);border-left:2px solid var(--cespe);padding-left:6px;font-style:italic}
.children{padding-left:18px;border-left:1px solid var(--border);margin-left:7px}
mark{background:#312e81;color:#a5b4fc;border-radius:2px;padding:0 1px}
.callout-box{border-radius:6px;padding:8px 12px;margin:6px 0;font-size:12px;line-height:1.6}
.callout-box.cespe{background:var(--cespe-bg);border:1px solid var(--cespe-border)}
.callout-box.stj{background:var(--stj-bg);border:1px solid var(--stj-border)}
.callout-box.obs{background:var(--obs-bg);border:1px solid var(--obs-border)}
.callout-label{font-size:11px;font-weight:700;letter-spacing:.05em;margin-bottom:4px}
.cespe .callout-label{color:var(--cespe)}
.stj .callout-label{color:var(--stj)}
.obs .callout-label{color:var(--obs)}
.callout-title{font-weight:600;margin-bottom:3px;font-size:12px}
.cespe .callout-title{color:#a5b4fc}
.stj .callout-title{color:#93c5fd}
.obs .callout-title{color:#6ee7b7}
.callout-body{color:#94a3b8}
.no-res{color:var(--text3);padding:24px;text-align:center}

/* Toggle button */
#theme-toggle-btn {
  position: fixed;

#_wtb{
  position:fixed;top:0;left:0;right:0;z-index:9999;

body{padding-top:42px!important;}

#_wtb ._grp-label{
  font-size:9px;font-family:monospace;letter-spacing:0.08em;

}

/* Toolbar buttons */
._tb-btn{
  background:none;border:1px solid transparent;border-radius:4px;

  display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0;

}
._tb-btn:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.15);}

/* Color swatches inline */

}
._sw:hover{transform:scale(1.25);}

/* Font size */

}

/* Selected node indicator */

}

 que sobraram\"}]},{\"title\":\"Como se determina  o quociente eleitoral?(QE)\",\"children\":[{\"title\":\"Determina-se o quociente eleitoral dividindo-se o n\u00famero de votos v\u00e1lidos apurados pelo de lugares a preencher em cada circunscri\u00e7\u00e3o eleitoral, desprezada a fra\u00e7\u00e3o se igual ou inferior a meio, equivalente a um, se superior.(Art. 106 do CE) QE = n\u00famero de votos v\u00e1lidos \u00f7 n\u00famero de vagas a preencher Ex: na elei\u00e7\u00e3o para vereador houve 134 mil votos v\u00e1lidos e eram 20 vagas. Logo, o quociente eleitoral ser\u00e1 6.700 (134.000 \u00f7 20 = 6.700). Estar\u00e3o eleitos, entre os candidatos registrados por um partido que tenham obtido votos em n\u00famero igual ou superior a 10% (dez por cento) do QE, tantos quantos o respectivoQP indicar, na ordem da vota\u00e7\u00e3o nominal que cada um tenha recebido\"},{\"title\":\"obs\",\"children\":[{\"title\":\"++ (Juiz TJRJ 2016 VUNESP) O quociente eleitoral \u00e9 instrumento do sistema proporcional, sendo determinado dividindo-se o n\u00famero de votos v\u00e1lidos apurados pelo de lugares a preencher em cada circunscri\u00e7\u00e3o eleitoral, desprezada a fra\u00e7\u00e3o se igual ou inferior a meio, equivalente a um, se superior. (CERTO)\"}]}]},{\"title\":\"Como se determina o quociente partidario?(QP)\",\"children\":[{\"title\":\"Determina-se para cada partido o quociente partid\u00e1rio dividindo-se pelo quociente eleitoral o n\u00famero de votos v\u00e1lidos dados sob a mesma legenda, desprezada a fra\u00e7\u00e3o(art. 107 do CE) QP = n\u00famero de votos v\u00e1lidos atribu\u00eddos ao partido ou \u00e0 coliga\u00e7\u00e3o \u00f7 quociente eleitoral Ex: o Partido X e seus candidatos tiveram 30 mil votos. Esses 30 mil ser\u00e3o divididos pelo quociente eleitoral (6.700). Logo, esse partido ter\u00e1 direito a 4 vagas de Vereador (30.000 \u00f7 6.700 = 4,477611940298507). Indica em princ\u00edpio, as cadeiras do partido, considerando-se eleitos os candidatos que, alcan\u00e7ados pelo QP, tenham obtido votos em n\u00famero igual ou superior a 10% do QE, sem preju\u00edzo da distribui\u00e7\u00e3o dos restos.\"}]},{\"title\":\"EXIGENCIA DE VOTA\u00c7\u00c3O MINIMA Art. 108 -  Vota\u00e7\u00e3o Min.\",\"children\":[{\"title\":\"Estar\u00e3o eleitos, entre os candidatos registrados por um partido que tenham obtido votos em n\u00famero igual ou superior a 10% (dez por cento) do QE, tantos quantos o respectivo QP indicar, na ordem da vota\u00e7\u00e3o nominal que cada um tenha recebido A pessoa que est\u00e1 sendo eleita pelo partido tem que ter o m\u00ednimo de representatividade popular e, por isso, se estabeleceu esses 10%. Os lugares n\u00e3o preenchidos em raz\u00e3o da exig\u00eancia da vota\u00e7\u00e3o nominal m\u00ednima ser\u00e3o distribu\u00eddos de acordo com as regras do art. 109. Vale ressaltar que esse limite de 10% foi inserido pela Lei n\u00ba 13.165/2015\"},{\"title\":\"obs\",\"children\":[{\"title\":\"A altera\u00e7\u00e3o trazida pelo art. 4\u00ba da Lei n\u00ba 13.165/2015 n\u00e3o viola o princ\u00edpio democr\u00e1tico ou o sistema proporcional, consistindo, antes, em valoriza\u00e7\u00e3o da representatividade e do voto nominal, em conson\u00e2ncia com o sistema de listas abertas e com o comportamento cultural do eleitor brasileiro. O objetivo do legislador foi o de acabar com a figura do \u201cpuxador de votos\u201d, excluindo da participa\u00e7\u00e3o, no parlamento, candidatos que pessoalmente tenham obtido vota\u00e7\u00e3o inexpressiva e, por isso, tenham representatividade popular \u00ednfima. STF. Plen\u00e1rio. ADI 5920/DF, Rel. Min. Luiz Fux, julgado em 4/3/2020 (Info 968).\"}]}]},{\"title\":\"Em raz\u00e3o das fra\u00e7\u00f5es, sempre sobra vaga  sem preenchimento. Como ocorre? At\u00e9 2014 Art. 109 do Cod. Eleitoral Lugares nao preencihos sao distribuidos de acordo com algumas regraS\",\"children\":[{\"title\":\"I - dividir-se-\u00e1 o n\u00famero de votos v\u00e1lidos atribu\u00eddos a cada partido pelo n\u00famero de lugares por ele obtido mais 1 (um), cabendo ao partido que apresentar a maior m\u00e9dia um dos lugares a preencher, desde que tenha candidato que atenda \u00e0 exig\u00eancia de vota\u00e7\u00e3o nominal m\u00ednima;    (Reda\u00e7\u00e3o dada pela Lei n\u00ba14.211, de 2021)\"},{\"title\":\"II - repetir-se-\u00e1 a opera\u00e7\u00e3o para cada um dos lugares a preencher;            (Reda\u00e7\u00e3o dada pela Lei n\u00ba 13.165, de 2015)\"},{\"title\":\"III - quando n\u00e3o houver mais partidos com candidatos que atendam \u00e0s duas exig\u00eancias do inciso I deste caput, as cadeiras ser\u00e3o distribu\u00eddas aos partidos que apresentarem as maiores m\u00e9dias.    (Reda\u00e7\u00e3o dada pela Lei n\u00ba14.211, de 2021)\"},{\"title\":\"obs\",\"children\":[{\"title\":\"CESPE / CEBRASPE - 2023 - MPE-BA - Promotor de Justi\u00e7a Substituto \u00a7 1\u00ba O preenchimento dos lugares com que cada partido for contemplado far-se-\u00e1 segundo a ordem de vota\u00e7\u00e3o recebida por seus candidatos.    (Reda\u00e7\u00e3o dada pela Lei n\u00ba14.211, de 2021) \u00a7 2\u00ba Poder\u00e3o concorrer \u00e0 distribui\u00e7\u00e3o dos lugares todos os partidos que participaram do pleito, desde que tenham obtido pelo menos 80% (oitenta por cento) do quociente eleitoral, e os candidatos que tenham obtido votos em n\u00famero igual ou superior a 20% (vinte por cento) desse quociente.    (Reda\u00e7\u00e3o dada pela Lei n\u00ba14.211, de 2021) A vota\u00e7\u00e3o nominal m\u00ednima para distribui\u00e7\u00e3o das sobras \u00e9 de 20% (para aqueles partidos que n\u00e3o alcan\u00e7aram o QE inicialmente), conforme artigo 109, \u00a72\u00ba, do CE: \u201c\u00a72\u00ba Poder\u00e3o concorrer \u00e0 distribui\u00e7\u00e3o dos lugares todos os partidos que participaram do pleito, desde que tenham obtido pelo menos 80% (oitenta por cento) do quociente eleitoral, e os candidatos que tenham obtido votos em n\u00famero igual ou superior a 20% (vinte por cento) desse quociente\u201d.\"}]}]},{\"title\":\"2016 - Mudan\u00e7as\",\"children\":[{\"title\":\"Essencia da sistematica se mantem. A distrib. de cadeiras entre partidos e colig. mudou\"},{\"title\":\"Mudan\u00e7as decorrem das novas reda\u00e7\u00f5es dos Arts. 108, 109 e 112, parag. \u00fanico do CE\"},{\"title\":\"Os famosos puxadores de voto, que beneficiavam candidatos nao votados, foi alterado\"}]},{\"title\":\"Suplentes(Art. 112) pela nova regra CESPE / CEBRASPE - 2023 - MPE-BA - Promotor\",\"children\":[{\"title\":\"Nao precisam obter o min. de 10%\"},{\"title\":\"obs\",\"children\":[{\"title\":\"Segundo o STF, \u00e9 constitucional a dispensa de vota\u00e7\u00e3o nominal m\u00ednima para defini\u00e7\u00e3o dos suplentes, prevista no par\u00e1grafo \u00fanico do art. 112 do C\u00f3digo Eleitoral. \u00c9 constitucional \u2014 por aus\u00eancia de viola\u00e7\u00e3o ao princ\u00edpio democr\u00e1tico ou ao sistema proporcional das elei\u00e7\u00f5es para o Poder Legislativo \u2014 a inexig\u00eancia de cl\u00e1usula de desempenho individual para a defini\u00e7\u00e3o de suplentes de vereador e de deputados federal e estadual. STF. Plen\u00e1rio. ADI 6657/DF, Rel. Min. Roberto Barroso, julgado em 17/02/2023 (Info 1083).\"}]}]},{\"title\":\"Se nenhum partido atingir o QE\",\"children\":[{\"title\":\"Se nenhum partido alcan\u00e7ar o quociente eleitoral, considerar-se-\u00e3o eleitos, at\u00e9 serem preenchidos todos os lugares, os candidatos mais votados.  Caso nenhum partido atinja o quociente eleitoral, a regra da proporcionalidade ser\u00e1 abandonada em favor do princ\u00edpio majorit\u00e1rio. CESPE / CEBRASPE - 2023 - MPE-BA - Promotor de Justi\u00e7a Substituto\"}]}]},{\"title\":\"Lei 14.211/2021\",\"children\":[{\"title\":\"Altera a Lei n\u00ba 4.737, de 15 de julho de 1965 (C\u00f3digo Eleitoral), e a Lei n \u00ba 9.504, de 30 de setembro de 1997 (Lei das Elei\u00e7\u00f5es), para ajustar a sua reda\u00e7\u00e3o \u00e0 veda\u00e7\u00e3o co ess\u00e3o de julgamento desta quinta-feira (30), realizada por meio de videoconfer\u00eancia, o Plen\u00e1rio do Tribunal Superior Eleitoral (TSE) afirmou que embargos de declara\u00e7\u00e3o que tratem sobre anula\u00e7\u00e3o geral de elei\u00e7\u00f5es ou perda de diplomas s\u00f3 poder\u00e3o ser apreciados com a presen\u00e7a de todos os membros que comp\u00f5em o Colegiado. A discuss\u00e3o foi suscitada durante o julgamento de um recurso relatado pelo ministro Edson Fachin, no qual um deputado estadual reeleito alegou que a an\u00e1lise dos embargos de declara\u00e7\u00e3o que resultaram na nega\u00e7\u00e3o de seu registro de candidatura foi feita sem a manifesta\u00e7\u00e3o de todos os ministros do Tribunal. O caso se refere ao julgamento ocorrido em 5 de setembro de 2019, que atendia a jurisprud\u00eancia at\u00e9 ent\u00e3o consolidada. Diante do questionamento proposto, o ministro Edson Fachin ressaltou a necessidade de cumprimento da norma prevista no artigo 19\u00ba do C\u00f3digo Eleitoral (), que atrela a aprecia\u00e7\u00e3o de recursos similares ao apresentado pelo pol\u00edtico \u00e0 exig\u00eancia de qu\u00f3rum completo para o julgamento da Corte Eleitoral. Ao acompanhar o relator, a presidente do TSE, ministra Rosa Weber, observou que, al\u00e9m de constar no C\u00f3digo Eleitoral, a norma tamb\u00e9m est\u00e1 disposta no artigo 6\u00ba do . FONTE: www.tse.jus.br /imprensa/ noticias-tse/ 2020/ Abril/embargos-de-declaracao-que-tratem-de-anulacao-geral-de-eleicoes-ou-perda-de-diplomas-devem-ser-apreciados-com-quorum-completo\"}]}]},{\"title\":\"TRE\",\"children\":[{\"title\":\"Sede\",\"children\":[{\"title\":\"1 na capital de cada Estado\"}]},{\"title\":\"Composi\u00e7\u00e3o\",\"children\":[{\"title\":\"7 membros eleitos pelo voto secreto\"},{\"title\":\"OBS - LC de iniciativa do TSE pode aumentar o n\u02da\"}]},{\"title\":\"Membros FCC - 2003 - TRE-BA - T\u00e9cnico Jud. FCC - 2003 - TRE-AM - T\u00e9cnico Jud.\",\"children\":[{\"title\":\"2 \"children\":[{\"title\":\"A quest\u00e3o relativa ao atendimento aos percentuais m\u00ednimos exigidos para as candidaturas de cada sexo na elei\u00e7\u00e3o proporcional, previstos no art. 10, \u00a7 3\u00ba, da Lei n\u00ba 9.504/97 consubstancia mat\u00e9ria a ser discutida nos autos do Demonstrativo de Regularidade de Atos Partid\u00e1rios (DRAP). N \u00c3 O  \u00e9 cab\u00edvel a propositura de representa\u00e7\u00e3o com fundamento no art. 96, \u00a7 8\u00ba, da Lei n\u00ba 9.504/97, para questionar o preenchimento dos percentuais de g\u00eanero, \u00e0 m\u00edngua de expressa previs\u00e3o legal (Ac. de 8.10.2013 no AgR-AI n\u00ba 21838, rel. Min. Henrique Neves da Silva.)\"},{\"title\":\"Houve recente altera\u00e7\u00e3o no C\u00f3digo Eleitoral para acrescentar como crime eleitoral a conduta daquele que assedia, constrange, humilha, persegue ou amea\u00e7a, por qualquer meio, candidata a cargo eletivo ou detentora de mandato eletivo, utilizando-se de menosprezo ou discrimina\u00e7\u00e3o \u00e0 condi\u00e7\u00e3o de mulher ou \u00e0 sua cor, ra\u00e7a ou etnia, com a finalidade de impedir ou de dificultar a sua campanha eleitoral ou desempenho de seu mandato eletivo. INSTITUTO AOCP - 2022 - MPE-MS - Promotor de Justi\u00e7a Substituto\"},{\"title\":\"O tempo de propaganda gratuita no r\u00e1dio e na televis\u00e3o a ser distribu\u00eddo pelos partidos \u00e0s respectivas candidatas dever\u00e1 ser de no m\u00ednimo 30% (trinta por cento), proporcional ao n\u00famero de candidatas, e a distribui\u00e7\u00e3o dever\u00e1 ser realizada conforme crit\u00e9rios definidos pelos respectivos \u00f3rg\u00e3os de dire\u00e7\u00e3o e pelas normas estatut\u00e1rias. INSTITUTO AOCP - 2022 - MPE-MS - Promotor de Justi\u00e7a Substituto\"},{\"title\":\"Para fins de distribui\u00e7\u00e3o entre os partidos pol\u00edticos dos recursos do fundo partid\u00e1rio e do Fundo Especial de Financiamento de Campanha (FEFC), os votos dados a candidatas mulheres para a C\u00e2mara dos Deputados, nas elei\u00e7\u00f5es realizadas de 2022 a 2030, ser\u00e3o contados em dobro.INSTITUTO AOCP - 2022 - MPE-MS - Promotor de Justi\u00e7a Substituto\"},{\"title\":\"CESPE / CEBRASPE - 2023 - MPE-AM - Promotor de Justi\u00e7a Substituto \u201c[...] 1. A fraude \u00e0 cota de g\u00eanero de candidaturas femininas representa afronta aos princ\u00edpios da igualdade, da cidadania e do pluralismo pol\u00edtico, na medida em que a ratio do art. 10, \u00a7 3\u00ba, da Lei 9.504/1997 \u00e9 ampliar a participa\u00e7\u00e3o das mulheres no processo pol\u00edtico\u2013eleitoral. [...]. Caracterizada a fraude e, por conseguinte, comprometida a disputa, a consequ\u00eancia jur\u00eddica em sede de A\u00e7\u00e3o de Investiga\u00e7\u00e3o Judicial Eleitoral \u00e9: i) a cassa\u00e7\u00e3o dos candidatos vinculados ao Demonstrativo de Regularidade de Atos Partid\u00e1rios (Drap), independentemente de prova da participa\u00e7\u00e3o, ci\u00eancia ou anu\u00eancia deles; ii) a inelegibilidade daqueles que efetivamente praticaram ou anu\u00edram com a conduta; e iii) a nulidade dos votos obtidos pela Coliga\u00e7\u00e3o, com a recontagem do c\u00e1lculo dos quocientes eleitoral e partid\u00e1rios, nos termos do art. 222 do C\u00f3digo Eleitoral. [...]\u201d(Ac. de 12.8.2022 no REspEl n\u00ba 060023973, rel. Min. Alexandre de Moraes.) \u00c9 constitucional o entendimento jurisprudencial do Tribunal Superior Eleitoral (TSE) segundo o qual \u00e9: i) cab\u00edvel a utiliza\u00e7\u00e3o da A\u00e7\u00e3o de Investiga\u00e7\u00e3o Judicial Eleitoral (AIJE) para apura\u00e7\u00e3o de fraude \u00e0 cota de g\u00eanero; e ii) imperativa a cassa\u00e7\u00e3o do registro ou do diploma de todos os candidatos beneficiados por essa fraude. STF. Plen\u00e1rio. ADI 6338/DF, Rel. Min. Rosa Weber, julgado em 03/04/2023 (Info 1089).\"}]}]},{\"title\":\"Docs. necess\u00e1rios  p/ o Reg. da Candidatura\",\"children\":[{\"title\":\"Prazo p/ pedir registro de candidatos\",\"children\":[{\"titl bilidade de candidaturas avulsas. Existe um precedente da Corte Africana de Direitos Humanos no sentido de permitir as candidaturas avulsas, pelo fato de que a exig\u00eancia, na legisla\u00e7\u00e3o interna, de pr\u00e9via filia\u00e7\u00e3o partid\u00e1ria \u00e9 inconvencional. A Conven\u00e7\u00e3o Americana de Direitos Humanos traz rol taxativo de requisitos afetos \u00e0s elei\u00e7\u00f5es, e n\u00e3o elenca a filia\u00e7\u00e3o partid\u00e1ria como fundamento para impedir o candidato de concorrer ao pleito, vejamos: Art. 23 (...) 1.    Todos os cidad\u00e3os devem gozar dos seguintes direitos e oportunidades: 2.    b) de votar e se eleitos em elei\u00e7\u00f5es peri\u00f3dicas aut\u00eanticas, realizadas por sufr\u00e1gio universal e igual e por voto secreto que garanta a livre express\u00e3o da vontade dos eleitores; e Ent\u00e3o, h\u00e1 uma corrente que defende a supralegalidade da Conven\u00e7\u00e3o Americana de Direitos Humanos e entende que a exig\u00eancia de filia\u00e7\u00e3o partid\u00e1ria na legisla\u00e7\u00e3o interna de status inferior \u00e9 inconvencional. A CF fala em filia\u00e7\u00e3o partid\u00e1ria nos termos da lei (art. 14, \u00a73\u00ba CF) e se a lei \u00e9 inconvencional (art. 11, \u00a7 1\u00ba, III e \u00a7 14 da Lei 9.404/97) ent\u00e3o n\u00e3o se aplicaria o dispositivo, assim como ocorreu com a pris\u00e3o do deposit\u00e1rio infiel. Por\u00e9m, para o cargo de Presidente da Rep\u00fablica a CF reza que ser\u00e1 empossado aquele que, filiado a partido pol\u00edtico, tiver alcan\u00e7ado a maioria absoluta de votos (art. 77, \u00a7 2\u00ba CF). Hoje o entendimento do MPE \u00e9 o de que deve ser admitida a candidatura avulsa, isso porque h\u00e1 uma esp\u00e9cie de ditadura interna nos partidos. Os partidos n\u00e3o s\u00e3o democr\u00e1ticos na escolha de seus candidatos (exce\u00e7\u00e3o: pr\u00e9vias do PSDB). H\u00e1 comiss\u00f5es provis\u00f3rias no Congresso em que seus representantes ocupam os cargos indefinidamente. Assim, prevalece o entendimento no MPE de que somente no \u00e2mbito da candidatura para presidente, deve haver a filia\u00e7\u00e3o partid\u00e1ria por expressa previs\u00e3o na CF, por ter estatura superior ao Pacto de San Jos\u00e9, todavia, no que tange \u00e0 Lei 9.504, por ter estatura inferior ao pacto com status supralegal, estaria derrogada nesse ponto.\"}]},{\"title\":\"OBS\",\"children\":[{\"title\":\"\u00c9 condi\u00e7\u00e3o de elegibilidade que o interessado tenha domic\u00edlio eleitoral na circunscri\u00e7\u00e3o perante a qual pretende ser eleito. Nas elei\u00e7\u00f5es presidenciais, a circunscri\u00e7\u00e3o ser\u00e1 o pa\u00eds; nas elei\u00e7\u00f5es federais, o estado. INSTITUTO AOCP - 2022 - MPE-MS - Promotor de Justi\u00e7a Substituto\"}]}]},{\"title\":\"Causas de Inelegibilidade -  P. 227 - No\u00e7\u00f5es Conceituais\",\"children\":[{\"title\":\"Tipos\",\"children\":[{\"title\":\"Inatas e San\u00e7\u00e3o\",\"children\":[{\"title\":\"Inelegibilidades San\u00e7\u00e3o\",\"children\":[{\"title\":\"Decorrem de atos ilicitos\"},{\"title\":\"Chamam-se inelegibilidades san\u00e7\u00e3o, que podem ser simples ou potenciadas\"},{\"title\":\"Simples ocorrem em unica elei\u00e7\u00e3o\"},{\"title\":\"As potenciadas ocorrem em varias elei\u00e7\u00f5es\"}]},{\"title\":\"Inelegibilidades Inatas\",\"children\":[{\"title\":\"Tem inelegibilidades que visam preservar moralidade, equilibrio e outros (Ex: Parentesco)\"},{\"title\":\"N\u00e3o resultam de atos ilcitos\"}]}]},{\"title\":\"Relativas e Absolutas\",\"children\":[{\"title\":\"Absolutas\",\"children\":[{\"title\":\"Valem p/ qlq cargo. S\u00e3o taxativamente previstas na CF\"},{\"title\":\"Ex: Analfabetos inelegiveis p qlq cargo\"},{\"title\":\"LC pode trazer hip. de inelegibilidades absolutas/?\",\"children\":[{\"title\":\"N\u00e3o\"}]}]},{\"title\":\"Relativas\",\"children\":[{\"title\":\"Se referem a determinados cargos\"},{\"title\":\"Originam-se de motivos funcionais ou parentesco\"},{\"title\":\"Ex: PR inelegivel p/ terceiro mandato\"}]}]}]},{\"title\":\"CF\",\"children\":[{\"title\":\"Inalistaveis e Analfabetos CESPE / CEBRASPE - 2023 - MPE-AM - Promotor\",\"children\":[{\"title\":\"S\u00e3o inelegiveis os inalistaveis e os analfabetos\"},{\"title\":\"Quem s\u00e3o os inalistaveis?\",\"children\":[{\"title\":\"Estrangeiros\"},{\"title\":\"Conscritos\"},{\"title\":\"Menores de 16 anos\",\"children\":[{\"title\":\"Com 15 podem alistar-se?\",\"children\":[{\"title\":\"Sim, se na data da elei\u00e7\u00e3o tiverem 16 anos\"}]}]}]},{\"title\":\"Analfabeto funcional?(Caso Tiririca)\",\"children\":[{\"title\":\"Pode concorrer as elei\u00e7\u00f5es\"}]},{\"title\":\"Havendo duvida qnt ao analfabetismo? Entendimento TSE\",\"children\":[{\"title\":\"Deve ser realizado teste de alfabetizac\u00e3o, exceto se trouxer constrangimento\"}]},{\"title\":\"Inelegibilidade acrreta inalisstabilidade?\",\"children\":[{\"title\":\"N\u00e3o. \u00c9 ao contrario.\"},{\"title\":\"Inalistabilidade acarreta inelegibilidade\"}]},{\"title\":\"OBS\",\"children\":[{\"title\":\"O militar federal ou estadual, enquanto em servi\u00e7o ativo, n\u00e3o pode estar filiado a partidos pol\u00edticos, bastando, para concorrer a cargo eletivo, o pedido de registro de candidatura ap\u00f3s pr\u00e9via escolha em conven\u00e7\u00e3o partid\u00e1ria.  INSTITUTO AOCP - 2022 - MPE-MS - Promotor de Justi\u00e7a Substituto\"}]}]},{\"title\":\"Reelei\u00e7\u00e3o p/ Cargos do PE\",\"children\":[{\"title\":\"PR, Gov. e Prefeitos, poder\u00e3o ser reeleitos p/ um unico periodo subsequente\",\"children\":[{\"title\":\"Prefeitos - Quest\u00e3o Polemica\",\"children\":[{\"title\":\"Pode ser reeleito pela 3x consecutiva, mas em outro municipio?\"},{\"title\":\"TSE diz que \u00e9 vedada essa manobra\"}]}]},{\"title\":\"Instituto foi implementado a partir da EC 16/1997, exceto para VICES, que era possivel desde 46\",\"children\":[{\"title\":\"Entenidmento TSE(atual)\",\"children\":[{\"title\":\"N\u00e3o podem exercer os cargos por 3x consecutivas\"}]}]},{\"title\":\"Cargos do PL?\",\"children\":[{\"title\":\"N\u00e3o h\u00e1 vedac\u00e3o qnt a varias reelei\u00e7\u00f5es. Ex: SF\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"A pessoa que j\u00e1 exerceu dois mandatos consecutivos de Prefeito, ou seja, foi eleito e reeleito, fica ineleg\u00edvel para um terceiro mandato, ainda que seja em munic\u00edpio diferente. N\u00e3o se admite a figura do \u201cPrefeito itinerante\u201d. O art. 14, \u00a7 5\u00ba, da CF deve ser interpretado no sentido de que a proibi\u00e7\u00e3o da segunda reelei\u00e7\u00e3o \u00e9 absoluta e torna ineleg\u00edvel para determinado cargo de Chefe do Poder Executivo o cidad\u00e3o que j\u00e1 cumpriu 2 mandatos consecutivos (reeleito uma \u00fanica vez) em cargo da mesma natureza, ainda que em ente da federa\u00e7\u00e3o diverso. As decis\u00f5es do TSE que acarretem mudan\u00e7a de jurisprud\u00eancia no curso do pleito eleitoral ou logo ap\u00f3s o seu encerramento n\u00e3o se aplicam imediatamente ao caso concreto e somente t\u00eam efic\u00e1cia sobre outras situa\u00e7\u00f5es em pleito eleitoral posterior. STF. Plen\u00e1rio. RE 637485/RJ, rel. Min. Gilmar Mendes, 1\u00ba/8/2012 (repercuss\u00e3o geral) (Info 673).\"},{\"title\":\"Da mesma forma, aquele que ocupou o cargo de prefeito no \u00faltimo mandato teria que renunciar no prazo estabelecido para poder se candidatar a vice-prefeito ou a vereador. Contudo, se o prefeito j\u00e1 se reelegeu para o segundo mandato consecutivo, n\u00e3o pode, em seguida, se candidatar para o cargo de vice-prefeito, independentemente de ter renunciado at\u00e9 seis meses antes da elei\u00e7\u00e3o (Res-TSE n\u00ba 21.483/DF). Isso porque \u201cpoderia tornar-se titular pela terceira vez consecutiva nas hip\u00f3teses de substitui\u00e7\u00e3o e sucess\u00e3o\u201d (GOMES, 2010, p. 155). A Lei Complementar n\u00ba 64/90 prev\u00ea, em seu art. 1\u00ba, \u00a7 2\u00ba, uma regra espec\u00edfica para os vices (vice-presidente, vice-governador e vice-prefeito), segundo a qual eles poder\u00e3o candidatar-se a outros cargos, preservando seus mandatos, desde que, nos seis meses anteriores ao pleito, n\u00e3o tenham sucedido ou substitu\u00eddo o titular. O vice-prefeito que estiver exercendo segundo mandato consecutivo pode concorrer ao cargo de prefeito numa terceira elei\u00e7\u00e3o, sendo que, se ele (como vice) substituiu o titular nos seis meses anteriores \u00e0 elei\u00e7\u00e3o, n\u00e3o poder\u00e1 posteriormente se reeleger como prefeito (Res.-TSE n\u00ba 22.757/DF)\"}]}]},{\"title\":\"Desincompatibiliza\u00e7\u00e3o p/ PR, Gov e Pref. \u00a76 Art. 14 da CF CESPE / CEBRASPE - 2023 - MPE-BA - Promotor\",\"children\":[{\"title\":\"Para concorrerem a outros cargos, o PR, Gov. e Pref.\"},{\"title\":\"Devem renunciar aos mandatos at\u00e9 6 meses antes do pleito\"},{\"title\":\"Para concorrer ao mesmo cargo, n\u00e3o \u00e9 necessario desimcompatibilizar, \u00e9 a reelei\u00e7\u00e3o\"},{\"title\":\"Qnd o TITULAR do mandato desejar outro cargo, deve desincompatibilziar\"},{\"title\":\"Ex: Aecio Neves teve que fazer p/ concorrer ao Senado e a Presidencia\"},{\"title\":\"Esse mandamento  N \u00c3 O  se aplica aos vices\"},{\"title\":\"Entendimento TSE - Licen\u00e7a\",\"children\":[{\"title\":\"Nao atende ao req. da CF a circunstancia do chefe do PE licenciar-se do cargo\"},{\"title\":\"6 meses antes do pleito, querendo concorrer a outro cargo\"}]}]},{\"title\":\"Inelegibilidade Reflexa -  \u00a77 do Art. 14 da CF FCC - 2022 - MPE-PE - Promotor FCC - 2021 - TJ-GO - Juiz Substituto fUNDEP - 2022 - MPE-MG - Promotor FGV - 2023 - AL-MA - Consultor Legislativo CESPE / CEBRASPE - 2023 - MPE-BA - Promotor\",\"children\":[{\"title\":\"Texto Legal\",\"children\":[{\"title\":\"S\u00e3o inelegiveis, no territorio de jurisdi\u00e7\u00e3o do titular\"},{\"title\":\"Conjuge, parentes consanguineos ou afins, ate o 2\u02da grau ou por ado\u00e7\u00e3o\"},{\"title\":\"Do PR, Gov. },{\"title\":\"OBS\",\"children\":[{\"title\":\"STF: \u201cO artigo 14, \u00a7 7\u00ba, da Constitui\u00e7\u00e3o do Brasil, deve ser interpretado de maneira a dar efic\u00e1cia e efetividade aos postulados republicanos e democr\u00e1ticos da Constitui\u00e7\u00e3o, evitando-se a perpetuidade ou alongada presen\u00e7a de familiares no poder\u201d (RE 543117 AgR / AM \u2013 AMAZONAS, Relator(a): Min. EROS GRAU).\"},{\"title\":\"A veda\u00e7\u00e3o n\u00e3o est\u00e1 limitada a munic\u00edpios da mesma microrregi\u00e3o administrativa. Isso porque, de acordo com o STF, no RE 637.485, deixou claro que o instituto da reelei\u00e7\u00e3o tem fundamento n\u00e3o somente no postulado da continuidade administrativa, mas tamb\u00e9m no princ\u00edpio republicano \u2013 o que impede a perpetua\u00e7\u00e3o de uma mesma pessoa ou grupo no poder.  Dessa forma: \u201cO princ\u00edpio republicano condiciona a interpreta\u00e7\u00e3o e a aplica\u00e7\u00e3o do pr\u00f3prio comando da norma constitucional, de modo que a reelei\u00e7\u00e3o \u00e9 permitida por apenas uma \u00fanica vez. Esse princ\u00edpio impede a terceira elei\u00e7\u00e3o n\u00e3o apenas no mesmo munic\u00edpio, mas em rela\u00e7\u00e3o a qualquer outro munic\u00edpio da federa\u00e7\u00e3o. Entendimento contr\u00e1rio tornaria poss\u00edvel a figura do denominado \u201cprefeito itinerante\u201d ou do \u201cprefeito profissional\u201d, o que claramente \u00e9 incompat\u00edvel com esse princ\u00edpio, que tamb\u00e9m traduz um postulado de temporariedade /altern\u00e2ncia do exerc\u00edcio do poder. Portanto, ambos os princ\u00edpios \u2013 continuidade administrativa e republicanismo \u2013 condicionam a interpreta\u00e7\u00e3o e a aplica\u00e7\u00e3o teleol\u00f3gicas do art. 14, \u00a7 5\u00ba, da Constitui\u00e7\u00e3o. O cidad\u00e3o que exerce dois mandatos consecutivos como prefeito de determinado munic\u00edpio fica ineleg\u00edvel para o cargo da mesma natureza em qualquer outro munic\u00edpio da federa\u00e7\u00e3o\u201d. fUNDEP - 2022 - MPE-MG - Promotor\"},{\"title\":\"S\u00famula Vinculante 18-STF. A dissolu\u00e7\u00e3o da sociedade ou do v\u00ednculo conjugal, no curso do mandato, n\u00e3o afasta a inelegibilidade prevista no \u00a7 7\u00ba do artigo 14 da Constitui\u00e7\u00e3o Federal. Exce\u00e7\u00e3o: a inelegibilidade do art. 14, \u00a7 7\u00ba, da Constitui\u00e7\u00e3o N\u00c3O ALCAN\u00c7A o c\u00f4njuge sup\u00e9rstite (sobrevivente, vi\u00favo) quando o falecimento tiver ocorrido no primeiro mandato, com regular sucess\u00e3o do vice-prefeito, e tendo em conta a constru\u00e7\u00e3o de novo n\u00facleo familiar. A S\u00famula Vinculante 18 do STF n\u00e3o se aplica aos casos de extin\u00e7\u00e3o do v\u00ednculo conjugal pela morte de um dos c\u00f4njuges. STF. Plen\u00e1rio. RE 758461/PB, Rel. Min. Teori Zavascki, julgado em 22/5/2014 (repercuss\u00e3o geral) (Info 747). S\u00famula 6-TSE. S\u00e3o ineleg\u00edveis para o cargo de chefe do Executivo o c\u00f4njuge e os parentes, indicados no \u00a7 7\u00ba do art. 14 da Constitui\u00e7\u00e3o Federal, do titular do mandato, salvo se este, reeleg\u00edvel, tenha falecido, renunciado ou se afastado definitivamente do cargo at\u00e9 seis meses antes do pleito. FGV- TJ/SC JUIZ SUBSTITUTO- 2022: FGV - 2022 - Senado Federal - Consultor Legislativo - Direito Constitucional, Administrativo, Eleitoral e Processo Legislativo\"}]}]},{\"title\":\"Qnd podem ser alegadas?\",\"children\":[{\"title\":\"Ate mesmo apos o prazo da AIRC\"},{\"title\":\"As inelegibilidades infra nao podem\"}]}]},{\"title\":\"obs\",\"children\":[{\"title\":\"Elei\u00e7oes suplementares\",\"children\":[{\"title\":\"As hip\u00f3teses de inelegibilidade previstas no art. 14, \u00a7 7\u00ba, da CF, inclusive quanto ao prazo de seis meses, s\u00e3o aplic\u00e1veis \u00e0s elei\u00e7\u00f5es suplementares. STF. Plen\u00e1rio. RE 843455/DF, Rel. Min. Teori Zavascki, julgado em 7/10/2015 (repercuss\u00e3o geral) (Info 802).\"}]}]}]},{\"title\ s por ocasi\u00e3o do pedido de registro de candidatura dos seus candidatos ao cargo eletivo de Deputado Federal, constatou que alguns deles tinham tido certas irregularidades detectadas pela Justi\u00e7a Eleitoral em campanhas eleitorais anteriores. Essas irregularidades eram de quatro ordens:  (1) condena\u00e7\u00e3o ao pagamento de multa, j\u00e1 paga, mas h\u00e1 menos de 5 (cinco) anos;  (2) condena\u00e7\u00e3o ao pagamento de multa, com parcelamento deferido e em curso;  (3) aprova\u00e7\u00e3o, com ressalvas, das contas de campanha da \u00faltima elei\u00e7\u00e3o; e  (4) rejei\u00e7\u00e3o das contas de campanha da \u00faltima elei\u00e7\u00e3o. Para fins de obten\u00e7\u00e3o da certid\u00e3o de quita\u00e7\u00e3o eleitoral, \u00e9 correto afirmar, em rela\u00e7\u00e3o a essas irregularidades, que nenhuma delas obsta a emiss\u00e3o da certid\u00e3o. FGV - 2022 - Senado Federal - Consultor Legislativo - Direito Constitucional, Administrativo, Eleitoral e Processo Legislativo\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"No que tange \u00e0 aprova\u00e7\u00e3o das contas, seja com ou sem ressalvas, n\u00e3o haver\u00e1 repercuss\u00e3o negativa na esfera do candidato. J\u00e1 em rela\u00e7\u00e3o \u00e0 n\u00e3o presta\u00e7\u00e3o de contas, ao candidato que n\u00e3o as apresentar ser\u00e1 negada a certid\u00e3o de quita\u00e7\u00e3o eleitoral (comprovante de que est\u00e1 regular perante a Justi\u00e7a Eleitoral) pelo prazo do mandato ao qual concorreu e, ultrapassado esse prazo, at\u00e9 que as contas sejam apresentadas.  Diante das v\u00e1rias discuss\u00f5es quanto \u00e0 express\u00e3o \u201capresenta\u00e7\u00e3o regular das contas de campanha\u201d, prevista na Resolu\u00e7\u00e3o-TSE n\u00ba 23.221/2010, o que prevaleceu foi o entendimento de que a rejei\u00e7\u00e3o das contas de campanha, por si s\u00f3, n\u00e3o teria o poder de impedir a obten\u00e7\u00e3o da certid\u00e3o de quita\u00e7\u00e3o eleitoral. S\u00famula-TSE n\u00ba 57 A apresenta\u00e7\u00e3o das contas de campanha \u00e9 suficiente para a obten\u00e7\u00e3o da quita\u00e7\u00e3o eleitoral, nos termos da nova reda\u00e7\u00e3o conferida ao art. 11, \u00a7 7\u00ba, da Lei n\u00ba 9.504/97, pela Lei n\u00ba 12.034/2009. Publicada no DJE de 24, 27 e 28.6.2016.\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"Lei das elei\u00e7\u00f5es Art. 11 \u00a7 7 A certid\u00e3o de quita\u00e7\u00e3o eleitoral abranger\u00e1 exclusivamente a plenitude do gozo dos direitos pol\u00edticos, o regular exerc\u00edcio do voto, o atendimento a convoca\u00e7\u00f5es da Justi\u00e7a Eleitoral para auxiliar os trabalhos relativos ao pleito, a inexist\u00eancia de multas aplicadas, em car\u00e1ter definitivo, pela Justi\u00e7a Eleitoral e n\u00e3o remitidas, e a apresenta\u00e7\u00e3o de contas de campanha eleitoral.              \u00a7 8 Para fins de expedi\u00e7\u00e3o da certid\u00e3o de que trata o \u00a7 7, considerar-se-\u00e3o quites aqueles que:               I - condenados ao pagamento de multa, tenham, at\u00e9 a data da formaliza\u00e7\u00e3o do seu pedido de registro de candidatura, comprovado o pagamento ou o parcelamento da d\u00edvida regularmente cumprido;           II - pagarem a multa que lhes couber individualmente, excluindo-se qualquer modalidade de responsabilidade solid\u00e1ria, mesmo quando imposta concomitantemente com outros candidatos e em raz\u00e3o do mesmo fato.\"}]},{\"title\":\"Callout\",\"children\":[{\"title\":\"A decis\u00e3o de julgar as contas eleitorais como n\u00e3o prestadas acarretar\u00e1: ao candidato, o impedimento de obter a certid\u00e3o de quita\u00e7\u00e3o eleitoral at\u00e9 o final do mandato ao qual concorreu ou enquanto perdurar a omiss\u00e3o; ao partido pol\u00edtico, a perda do direito ao recebimento de recursos do Fundo Partid\u00e1rio, nos termos dos \u00a7\u00a7 3o e 4o do art. 54 da Resolu\u00e7\u00e3o-TSE no 23.406/2014. A Justi\u00e7a Eleitoral encaminhar\u00e1 as contas desaprovadas ao Minist\u00e9rio P\u00fablico Eleitoral para an\u00e1lise de abertura de investiga\u00e7\u00e3o judicial, nos termos do art. 22 da Lei Complementar n\u00ba 64/1990. Ap\u00f3s a publica\u00e7\u00e3o da decis\u00e3o dos tribunais regionais eleitorais no Di\u00e1rio da Justi\u00e7a Eletr\u00f4nico (DJE) sobre as contas, caber\u00e1 recurso especial ao Tribunal Superior Eleitoral (TSE), no prazo de tr\u00eas dias. Das decis\u00f5es proferidas pelo TSE, s\u00f3 \u00e9 poss\u00edvel recorrer se contrariarem a Constitui\u00e7\u00e3o Federal\"}]}]},{\"title\":\"Representac\u00e3o do Art. 30-A\",\"children\":[{\"title\":\"Conceito\",\"children\":[{\"title\":\"Ocorre em caso de irregularidades na arrecadac\u00e3o e gastos da campanha\"},{\"title\":\"Chama-se a\u00e7\u00e3o de capta\u00e7\u00e3o e gastos ilicitos de recursos\"},{\"title\":\"Entendimento TSE\",\"children\":[{\"title\":\"\u00c9 necessario prova da relevancia juridica do ilicito e nao a simples potencialidade do dano\"}]}]},{\"title\":\"Proced. a ser adotado\",\"children\":[{\"title\":\"Mesmo da AIJE\"}]},{\"title\":\"Legitimidade\",\"children\":[{\"title\":\"PP ou Coligac\u00e3o\"}]},{\"title\":\"Prazo\",\"children\":[{\"title\":\"15 dias da Diplo\"}]},{\"title\":\"Forma\",\"children\":[{\"title\":\"Deve relatar fatos e indicar provas\"},{\"title\":\"E pedir abertura da investigac\u00e3o de fatos ocorridos a arrecad. e gastos\"}]},{\"title\":\"Comprovados capta\u00e7ao ou gastos ilicitos\",\"children\":[{\"title\":\"ser\u00e1 negado diploma ao candidato ou cassado o mandato\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"EMENTA Agravo regimental no recurso extraordin\u00e1rio com agravo. Direito Eleitoral. Presta\u00e7\u00e3o de contas de partido pol\u00edtico. Exerc\u00edcio de 2014. Pretendida aplica\u00e7\u00e3o retroativa da Lei n\u00ba 13.165/2015. Legisla\u00e7\u00e3o infraconstitucional. Ofensa reflexa. Precedente. 1. N\u00e3o se presta o recurso extraordin\u00e1rio para a an\u00e1lise da legisla\u00e7\u00e3o infr a a C\u00e2mara dos Deputados;    III - 48% (quarenta e oito por cento), divididos entre os partidos, na propor\u00e7\u00e3o do n\u00famero de representantes na C\u00e2mara dos Deputados, consideradas as legendas dos titulares;    IV - 15% (quinze por cento), divididos entre os partidos, na propor\u00e7\u00e3o do n\u00famero de representantes no Senado Federal, consideradas as legendas dos titulares.\"},{\"title\":\"OBS\",\"children\":[{\"title\":\"Se, no momento da formaliza\u00e7\u00e3o das ren\u00fancias por candidatas, j\u00e1 tinha sido ultrapassado o prazo para substitui\u00e7\u00e3o das candidaturas, previsto no art. 13, \u00a7 3\u00ba, da Lei 9.504/97, N A O pode o partido ser penalizado, considerando, em especial, que n\u00e3o havia possibilidade jur\u00eddica de serem apresentadas substitutas, de modo a readequar os percentuais legais de g\u00eanero . (Ac. de 23.5.2013 no REspe n\u00ba 21498, rel. Min. Henrique Neves da Silva.)\"},{\"title\":\"A Lei n\u00ba 13.487/2017 inseriu o art. 16-C na Lei n\u00ba 9.504/97 prevendo a cria\u00e7\u00e3o de um fundo para custear as campanhas eleitorais, o FEFC, Fundo Especial de Financiamento de Campanha. Essa cria\u00e7\u00e3o foi impugnada sob o argumento de que somente por emenda constitucional seria poss\u00edvel criar um novo fundo, al\u00e9m do que j\u00e1 existia, qual seja, o Fundo Partid\u00e1rio. O STF n\u00e3o concordou com o argumento. N\u00e3o existe na Constitui\u00e7\u00e3o nenhuma norma que estabele\u00e7a a exclusividade do Fundo Partid\u00e1rio e impe\u00e7a a cria\u00e7\u00e3o de novos fundos para financiamento de partidos e campanhas eleitorais. Tamb\u00e9m n\u00e3o h\u00e1 dispositivo que imponha \u00e0 tem\u00e1tica sua veicula\u00e7\u00e3o somente por meio de Emenda \u00e0 Constitui\u00e7\u00e3o. Desse modo, \u00c9 C O N S T I T U C I O N A L a cria\u00e7\u00e3o do Fundo Especial de Financiamento de Campanha (FEFC) por meio de norma infraconstitucional, dada a inexist\u00eancia de obriga\u00e7\u00e3o ou proibi\u00e7\u00e3o sobre o tema na CF/88. STF. Plen\u00e1rio. ADI 5795/DF, Rel. Min. Rosa Weber, julgado em 19/8/2022 (Info 1065).\"},{\"title\":\"N\u00e3o cabe ao Supremo Tribunal Federal adentrar o m\u00e9rito da op\u00e7\u00e3o legislativa para redesenhar a forma de c\u00e1lculo do valor do Fundo Especial de Financiamento de Campanha (FEFC) (Lei 14.194/2021, art. 12, XXVII). STF. Plen\u00e1rio. ADI 7058 MC/DF, Rel. Min. Andr\u00e9 Mendon\u00e7a, redator do ac\u00f3rd\u00e3o Min. Nunes Marques, julgado em 3/3/2022 (Info 1045).\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"CESPE / CEBRASPE - 2023 - MPE-BA - Promotor de Justi\u00e7a Substituto \u00c9 facultada aos partidos a ren\u00fancia ao Fundo Especial de Financiamento de Campanha (FEFC). (c) 98% dos recursos do Fundo Especial de Financiamento de Campanha (FEFC) s\u00e3o distribu\u00eddos entre os partidos na propor\u00e7\u00e3o de seu desempenho nas elei\u00e7\u00f5es para a C\u00e2mara dos Deputados Federal, no que se refere ao n\u00famero de votos ou ao n\u00famero de representantes eleitos. (e) A regra vigente n\u00e3o imp\u00f5e condi\u00e7\u00f5es para o acesso dos partidos aos recursos do Fundo Especial de Financiamento de Campanha (FEFC) que lhes cabem. (e)\"}]}]},{\"title\":\"MULTAS ELEITORAIS\"}]},\"cap9\":{\"title\":\"9. Pesquisas Eleitorais e Propaganda Pol\u00edtica\",\"children\":[{\"title\":\"Intro\",\"children\":[{\"title\":\"Discute-se o limite da liberdade de expressao\"},{\"title\":\"Prevista na Lei das Elei\u00e7\u00f5es, em Res. do TSE, Lei dos PP\"},{\"title\":\"Abrange a propag. politica em suas 3 especies: Partidaria, Intrapartidaria e Eleitoral\"}]},{\"title\":\"Pesquisas Eleitorais CESPE / CEBRASPE - 2023 - MPE-AM - Promotor\",\"children\":[{\"title\":\"Previs\u00e3o\",\"children\":[{\"title\":\"Art. 33 e seguintes da Lei 9.504/1997\"}]},{\"title\":\"Intro\",\"children\":[{\"title\":\"\u00c9 alvo de criticas em virtude de grandes erros que acontecem\"},{\"title\":\"H\u00e1 da, que n\u00e3o se pode estender a proibi\u00e7\u00e3o de \u201cshowm\u00edcio\u201d a eventos destinados \u00e0 arrecada\u00e7\u00e3o de verbas de campanha, nos quais n\u00e3o exista a participa\u00e7\u00e3o ou propaganda de candidatos, sob pena de se fechar mais ainda, neste grave momento de pandemia da Covid-19, as portas para aqueles que concorrem ao pleito deste ano possam encontrar maneiras l\u00edcitas de conseguir verbas para custear seus gastos eleitorais.\"}]}]},{\"title\":\"Boca de Urna e Manif. Individual e Silenciosa do Eleitor no dia da Elei\u00e7\u00f5a Art. 39-A MPE-PR - 2021 - Promotor CESPE / CEBRASPE - 2023 - MPE-AM - Promotor\",\"children\":[{\"title\":\"Art. 30 \u00a75 da Lei 9.504 -  \u00e9 crime no dia da eleic\u00e3o:\",\"children\":[{\"title\":\"Pena\",\"children\":[{\"title\":\"Puniveis com deten\u00e7\u00e3o de 6 meses a 1 ano\"},{\"title\":\"Com alternativa de prest. de servicos a comunidade e multa de 5 a 15 mil UFIR\"}]},{\"title\":\"I - o uso de alto-falantes e amplificadores de som ou a promo\u00e7\u00e3o de com\u00edcio ou carreata;\"},{\"title\":\"II - a distribui\u00e7\u00e3o de material de propaganda pol\u00edtica, inclusive volantes e outros impressos, ou a pr\u00e1tica de aliciamento, coa\u00e7\u00e3o ou manifesta\u00e7\u00e3o tendentes a influir na vontade do eleitor.\"},{\"title\":\"II - a arregimenta\u00e7\u00e3o de eleitor ou a propaganda de boca de urna;\"},{\"title\":\"III - a divulga\u00e7\u00e3o de qualquer esp\u00e9cie de propaganda de PP ou de seus candidatos\"}]},{\"title\":\"E a manif. Individual e Silenciosa do Eleitor no dia da Elei\u00e7\u00e3o?\",\"children\":[{\"title\":\"A CF garante a liberdade de express\u00e3o. Nessa quest\u00e3o o TSE permitiu no art. 70 da Res. 22718\"},{\"title\":\"Por meio de broches, bones, camisas, bandeiras e adesivos\"},{\"title\":\"\u00c9 permitida manif. individual e silenciosa do eleitor por PP, candidato ou coliga\u00e7\u00e3o\"},{\"title\":\"Exclusivamente por broches, bandeira r de servi\u00e7o de internet estabelecido no Pa\u00eds;   (Inclu\u00eddo pela Lei n\u00ba 12.034, de 2009) II - em s\u00edtio do partido ou da coliga\u00e7\u00e3o, com endere\u00e7o eletr\u00f4nico comunicado \u00e0 Justi\u00e7a Eleitoral e hospedado, direta ou indiretamente, em provedor de servi\u00e7o de internet estabelecido no Pa\u00eds;   (Inclu\u00eddo pela Lei n\u00ba 12.034, de 2009) III - por meio de mensagem eletr\u00f4nica para endere\u00e7os cadastrados gratuitamente pelo candidato, partido ou coliga\u00e7\u00e3o;   (Inclu\u00eddo pela Lei n\u00ba 12.034, de 2009) IV - por meio de blogs, redes sociais, s\u00edtios de mensagens instant\u00e2neas e aplica\u00e7\u00f5es de internet assemelhadas cujo conte\u00fado seja gerado ou editado por:   (Reda\u00e7\u00e3o dada pela Lei n\u00ba 13.488, de 2017) a) candidatos, partidos ou coliga\u00e7\u00f5es; ou   (Inclu\u00eddo pela Lei n\u00ba 13.488, de 2017) b) qualquer pessoa natural, desde que n\u00e3o contrate impulsionamento de conte\u00fados.   (Inclu\u00eddo pela Lei n\u00ba 13.488, de 2017)\"}]},{\"title\":\"Livre manif. de Pensamento - Art. 54-D\",\"children\":[{\"title\":\"Assegurado na intenet, com direito a resposta sob pena de multa ao lesado\"},{\"title\":\"A JE pode determinar a retirada de publica\u00e7\u00f5es\"}]},{\"title\":\"Art. 57-H tipos penais\",\"children\":[{\"title\":\"Sem prejuizo das demais san\u00e7\u00f5es\"},{\"title\":\"Ser\u00e1 punido com multa de 5000 a 30000 quem realizar prog. na internet\"},{\"title\":\"Atribuindo a autoria a terceiro\"},{\"title\":\"Reforma ainda criou 2 tipos penais no \u00a7\u00a7 1 e 2\"}]},{\"title\":\"Solidariedade - Art. 57-F\",\"children\":[{\"title\":\"Possibildiade de solidariedade entre provedor com PP, candidato ou colig.\"},{\"title\":\"Se no prazo determinado nao retirar o ocnteudo e caso nao tenha previo conhecimento\"}]},{\"title\":\"Suspens\u00e3o - Art. 57-I\",\"children\":[{\"title\":\"Art. 57-I.  A requerimento de candidato, partido ou coli ratar-se de mat\u00e9ria urgente, relevante e caracter\u00edstica das fun\u00e7\u00f5es de governo;\"},{\"title\":\"OBS\",\"children\":[{\"title\":\"De acordo com o TSE: \u201c[...] o art. 73, VI, b, da Lei n\u00ba 9.504/1997 veda, no per\u00edodo de tr\u00eas meses que antecede o pleito, toda e qualquer publicidade institucional, independentemente de termo inicial de veicula\u00e7\u00e3o e de suposta falta de car\u00e1ter eleitoreiro, com exce\u00e7\u00e3o da propaganda de produtos e servi\u00e7os que tenham concorr\u00eancia no mercado e os casos de grave e urgente necessidade p\u00fablica, reconhecida previamente pela Justi\u00e7a Eleitoral. Precedentes. [...]\u201d (Ac. de 1\u00ba.7.2020 no AgR-AI n\u00ba 49130, rel. Min. Edson Fachin.)\"},{\"title\":\"CESPE / CEBRASPE - 2023 - AGU - Advogado da Uni\u00e3o TSE (Recurso Especial Eleitoral 060020624/BA) entende que basta manter durante o per\u00edodo vedado, independente se foi lan\u00e7ada anteriormente: \u201cA manuten\u00e7\u00e3o de publicidade institucional em per\u00edodo vedado caracterizado o il\u00edcito, ainda que autorizado e veiculado anteriormente.\u201d\"}]}]},{\"title\":\"Inciso VII EMPENHO DE DESPESAS COM PUBLICIDADE FGV - 2023 - TJ-PR - Juiz Substituto\",\"children\":[{\"title\":\"VII - empenhar, no primeiro semestre do ano de elei\u00e7\u00e3o, despesas com publicidade dos \u00f3rg\u00e3os p\u00fablicos federais, estaduais ou municipais, ou das respectivasentidades da administra\u00e7\u00e3o indireta, que excedam a 6 (seis) vezes a m\u00e9dia mensal dos valores empenhados e n\u00e3o cancelados nos 3 (tr\u00eas) \u00faltimos anos queantecedem o pleito; (Reda\u00e7\u00e3o dada pela Lei n\u00ba 14.356, de 2022)\"},{\"title\":\"OBS\",\"children\":[{\"title\":\"\u00c9 constitucional a modifica\u00e7\u00e3o dos crit\u00e9rios de c\u00e1lculo para a fixa\u00e7\u00e3o do limite de gastos com publicidade institucional dos \u00f3rg\u00e3os p\u00fablicos no primeiro semestre do ano eleitoral, promovendo ajustes na reda\u00e7\u00e3o do art. 73, VII, da Lei n\u00ba 9.504/97 (Lei das Elei\u00e7\u00f5es). Entretanto, essa altera\u00e7\u00e3o n\u00e3o se aplica ao pleito eleitoral de 2022, em raz\u00e3o do princ\u00edpio da anterioridade eleitoral (art. 16 da CF/88). A amplia\u00e7\u00e3o dos limites para gasto com publicidade institucional \u00e0s v\u00e9speras das elei\u00e7\u00f5es pode afetar significativamente as condi\u00e7\u00f5es da disputa eleitoral, sendo necess\u00e1rio postergar, em obedi\u00eancia ao princ\u00edpio da anterioridade eleitoral (art. 16 da CF/88), a efic\u00e1cia de altera\u00e7\u00f5es normativas nesse sentido. STF. Plen\u00e1rio. ADI 7178/DF e ADI 7182/DF, Rel. Min. Dias Toffoli, julgados em 17/12/2022 (Info 1081) A Lei 14.356/2022 alterou os limites de despesas com propaganda institucional no ano eleitoral. Antes era: VII - realizar, no primeiro semestre do ano de elei\u00e7\u00e3o, despesas com publicidade dos \u00f3rg\u00e3os p\u00fablicos federais, estaduais ou municipais, ou das respectivas entidades da administra\u00e7\u00e3o indireta, que excedam a m\u00e9dia dos gastos no primeiro semestre dos tr\u00eas \u00faltimos anos que antecedem o pleito; (Reda\u00e7\u00e3o dada pela Lei n\u00ba 13.165, de 2015). Depois: VII - empenhar, no primeiro semestre do ano de elei\u00e7\u00e3o, despesas com publicidade dos \u00f3rg\u00e3os p\u00fablicos federais, estaduais ou municipais, ou das respectivas entidades da administra\u00e7\u00e3o indireta, que excedam a 6 (seis) vezes a m\u00e9dia mensal dos valores empenhados e n\u00e3o cancelados nos 3 (tr\u00eas) \u00faltimos anos que antecedem o pleito; (Reda\u00e7\u00e3o dada pela Lei n\u00ba 14.356, de 2022)\"}]}]},{\"title\":\"Inciso VIII REVIS\u00c3O GERAL DA REMUNERA\u00c7AO\",\"children\":[{\"title\":\"VIII - fazer, na circunscri\u00e7\u00e3o do pleito, REVIS\u00c3O GERAL da remunera\u00e7\u00e3o dos servidores p\u00fablicos que exceda a recomposi\u00e7\u00e3o da perda de seu poder aquisitivo ao long so indevido dos meios de comunica\u00e7\u00e3o social independe do resultado do pleito, devendo ser aferida de acordo com a gravidade da situa\u00e7\u00e3o revelada pela prova dos autos. [...]\u201d (Ac. de 7.2.2017 no RO n\u00ba 138069, rel. Min. Henrique Neves da Silva.) Assim, as condutas vedadas dispensam comprova\u00e7\u00e3o de dolo ou culpa do agente, sendo cl\u00e1usulas de responsabilidade objetiva. Torna-se, portanto, desnecess\u00e1ria a an\u00e1lise da potencialidade lesiva para influenciar o pleito (Respe TSE n\u00ba 38704, rel. Min. Edson Fachin de 13.8.2019 e Agravo de Instrumento TSE n\u00ba 5747, rel. Min. Edson Fachin de 07/02/2020).\"},{\"title\":\"CESPE / CEBRASPE - 2023 - AGU - Advogado da Uni\u00e3o [...] Propaganda institucional. Excesso de gastos. Conduta vedada. Art. 73 da Lei 9.504/97. [...] 2. Para o reconhecimento do abuso de poder, indispens\u00e1vel a comprova\u00e7\u00e3o do desvirtuamento da propaganda com o consequente benef\u00edcio do candidato, aliado \u00e0 gravidade dos fatos. 3. O il\u00edcito eleitoral previsto no art. 73, VI, da Lei 9.504/1997 se perfaz de modo objetivo, independente do comprometimento \u00e0 isonomia ou do benef\u00edcio do agente. [...]. Ac. de 1\u00ba.7.2021 no AgR-REspEl n\u00ba 65654, rel. Min. Alexandre de Moraes.\"}]}]},{\"title\":\"Uso de Veiculo Oficial CESPE / CEBRASPE - 2023 - AGU\",\"children\":[{\"title\":\"Art. 76. Lei 9.504/97. O ressarcimento das despesas com o uso de transporte oficial pelo Presidente da Rep\u00fablica e sua comitiva em campanha eleitoral ser\u00e1 de responsabilidade do partido pol\u00edtico ou coliga\u00e7\u00e3o a que esteja vinculado. \ufeff Ac. de 27.9.2022 no Ref-AIJE n\u00ba 060121232, rel. Min. Benedito Gon\u00e7alves. [...] 11. A primeira delas diz respeito ao transporte oficial pelo Presidente da Rep\u00fablica. Nesse caso, a lei permite que o candidato \u00e0 reelei\u00e7\u00e3o e sua comitiva desloquem-se utilizando ve\u00edculos e aeronaves p\u00fablicos disponib  a distribui\u00e7\u00e3o de sopas e rem\u00e9dios em centros assistenciais ou comit\u00eas de campanha, por seu car\u00e1ter humanit\u00e1rio, descaracteriza a capta\u00e7\u00e3o il\u00edcita de sufr\u00e1gio; Embora a jurisprud\u00eancia do TSE admita a realiza\u00e7\u00e3o de assistencialismo sem que isso configure capta\u00e7\u00e3o de sufr\u00e1gio, isso n\u00e3o pode ser feito por comit\u00eas de campanha.\"},{\"title\":\"\u201c[...] Capta\u00e7\u00e3o il\u00edcita de sufr\u00e1gio (art. 41-A da Lei n\u00ba 9.504/97). Abuso do poder econ\u00f4mico (art. 22, inciso XIV, da LC n\u00ba 64/90) [...] 2. A absolvi\u00e7\u00e3o do r\u00e9u, por falta de provas, da imputa\u00e7\u00e3o de crime de corrup\u00e7\u00e3o eleitoral (art. 299 do CE), nos autos de a\u00e7\u00e3o penal, por si s\u00f3, n\u00e3o tem o cond\u00e3o de afastar a condena\u00e7\u00e3o por capta\u00e7\u00e3o il\u00edcita de sufr\u00e1gio e abuso do poder econ\u00f4mico em sede de a\u00e7\u00e3o de investiga\u00e7\u00e3o judicial eleitoral, pois a jurisprud\u00eancia desta Corte consolidou-se no sentido da incomunicabilidade das esferas criminal e civil-eleitoral. Precedentes. [...]\u201d. (Ac. de 9.8.2016 nos ED-REspe n\u00ba 82911, rel. Min. Admar Gonzaga.)\"},{\"title\":\"2.2 O TSE entende que, para a caracteriza\u00e7\u00e3o da capta\u00e7\u00e3o de sufr\u00e1gio, \u00e9 indispens\u00e1vel a prova de participa\u00e7\u00e3o direta ou indireta dos representados, permitindo-se at\u00e9 que o seja na forma de expl\u00edcita anu\u00eancia da conduta objeto da investiga\u00e7\u00e3o, n\u00e3o bastando, para a configura\u00e7\u00e3o, o proveito eleitoral que com os fatos tenham auferido, ou a presun\u00e7\u00e3o de que desses tivessem ci\u00eancia. [...] (REspe no 21.327, rel. Min. Ellen Gracie, de 04.03.2004) 2. A caracteriza\u00e7\u00e3o da capta\u00e7\u00e3o il\u00edcita de sufr\u00e1gio pressup\u00f5e a ocorr\u00eancia simult\u00e2nea dos seguintes requisitos: a) pr\u00e1tica de uma das condutas previstas no art. 41-A da Lei 9.504/97; b) fim espec\u00edfico de obter o voto do eleitor; c) participa\u00e7\u00e3o ou anu\u00eancia do candidato benefici\u00e1rio na pr\u00e1tica do ato. [...] (AgR-REspe no 815659, rel. Min. Nancy Andrighi, de 01.12.2011)\"}]}]},{\"title\":\"Fornecimento de Transporte e Alimentac\u00e3o\",\"children\":[{\"title\":\"Transportes\",\"children\":[{\"title\":\"Nenhum veiculo ou embarca\u00e7\u00e3o pode fazer transp. de eleitores\"},{\"title\":\"Desde o dia anterior at\u00e9 o posterior a elei\u00e7\u00e3o\"},{\"title\":\"Salvo:\",\"children\":[{\"title\":\"A servico da JE\"},{\"title\":\"Coletivos de linhas regulares nao fretados\"},{\"title\":\"Uso individual do proprietario, p/ ex. do proprio voto e da familia\"},{\"title\":\"Servico normal, sem finalidade eleioral\"}]},{\"title\":\"Somente a JE pode fazer o transporte, somente para os residentes na zona rural\"},{\"title\":\"Ser\u00e1 feito dentro no M e qnd da zona Rural ate a mesa receptora distar pelo menos de 2km\"},{\"title\":\"!5 dias antes do pleito a JE deve divulgar os itinerarios\"},{\"title\":\"OS PP ter\u00e3o copia\"},{\"title\":\"PP, candidatos ou eleitores, em n\u02da de 20 podem oferecer reclamac\u00f5es em 3 dias\"},{\"title\":\"Deficiencia no trnsporte nao exime eleitor de votar\"}]},{\"title\":\"Alimentac\u00e3o\",\"children\":[{\"title\":\"Somente pode a JE qnd imprescindivel, em face de ABSOLUTA carencia de recursos na zona rural\"},{\"title\":\"As despesas correm por conta do FP\"},{\"title\":\"JE pode oferecer vale refei\u00e7\u00f5es ou mesmo ajuda em dinheiro para ajuda de cidadaos q trabalhem no pleito, sem ser irregularidade\"}]}]}]},\"cap12\":{\"title\":\"12. A\u00e7\u00f5es e Recursos Eleitorais\",\"children\":[{\"title\":\"intro\",\"children\":[{\"title\":\"S\u00e3o a\u00e7\u00f5es eleitorais que podem levar \u00e0 cassa\u00e7\u00e3o do registro ou diploma a A\u00e7\u00e3o de Impugna\u00e7\u00e3o de Registro de Candidatura (LC n\u00ba 64/90, art. 3\u00ba); o foi tempestivamente ajuizada e poderia ter alcan\u00e7ado atos que tamb\u00e9m configuram abuso do poder pol\u00edtico, sendo incorreta, ademais, a sua extin\u00e7\u00e3o com o t\u00e9rmino do mandato. A AIME foi tempestivamente ajuizada [prazo de 15 dias (CF, art. 14, \u00a7 10)] e poderia ter alcan\u00e7ado atos que tamb\u00e9m configuram abuso do poder econ\u00f4mico-pol\u00edtico (conforme doutrina e jurisprud\u00eancia), sendo incorreta, ademais, a sua extin\u00e7\u00e3o com o t\u00e9rmino do mandato [porque ainda poderia ser aplicada a san\u00e7\u00e3o de inelegibilidade por oito anos dos infratores (LC 64/90, art. 22, inc. XIV, com reda\u00e7\u00e3o dada pela LC n.\u00ba 135/10).\"}]}]},{\"title\":\"Fontes Formais da AIME\",\"children\":[{\"title\":\"CF\"},{\"title\":\"Leis Especificas\"},{\"title\":\"Res. do TSE\"},{\"title\":\"Jurisp.\"}]},{\"title\":\"OBS\",\"children\":[{\"title\":\"TSE: \u201c[...] A\u00e7\u00e3o de impugna\u00e7\u00e3o de mandato eletivo. Segredo de justi\u00e7a. Art. 14, \u00a711 e art. 93, IX da Constitui\u00e7\u00e3o da Rep\u00fablica. 1. O tr\u00e2mite da a\u00e7\u00e3o de impugna\u00e7\u00e3o de mandato eletivo deve ser realizado em segredo de justi\u00e7a, mas o seu julgamento deve ser p\u00fablico [...] (Res. n\u00ba. 23210 na Cta n\u00ba 1716, de 11.2.2010, rel. Min. Felix Fischer.)\"}]}]},{\"title\":\"CAUSA DE PEDIR AOCP - 2022 - MPE-MS - Promotor\",\"children\":[{\"title\":\"a)     Abuso de poder econ\u00f4mico b)     Corrup\u00e7\u00e3o (ex.: art.299 C.E. \u00e0 corrup\u00e7\u00e3o eleitoral) c)      Fraude (ex.: manipula\u00e7\u00e3o sobre a totaliza\u00e7\u00e3o do sistema eletr\u00f4nico de vota\u00e7\u00e3o)\"}]},{\"title\":\"NAT. JURIDICA\",\"children\":[{\"title\":\"A AIME \u00e9 a\u00e7\u00e3o p\u00fablica, constitucional, de natureza desconstitutiva e de car\u00e1ter c\u00edvel e eleitoral.\"}]},{\"title\":\"Objetivo\",\"children\":[{\"title\":\"\u201cO objetivo da AIME \u00e9 a desconstitui\u00e7\u00e3o do mandato iploma em elei\u00e7\u00f5es federais e estaduais\"},{\"title\":\"Anula\u00e7\u00e3o de Diploma ou decreta\u00e7\u00e3o de perda de mandatos federais e estaudais\"},{\"title\":\"Denegatorias de HC, HD, MS ou MI\"}]},{\"title\":\"Prazo\",\"children\":[{\"title\":\"3 dias\"}]},{\"title\":\"OBS\",\"children\":[{\"title\":\"Art. 276. As decis\u00f5es dos tribunais regionais s\u00e3o terminativas, salvo os casos seguintes em que cabe recurso para o Tribunal Superior: II \u2013 ordin\u00e1rio: a) quando versarem sobre expedi\u00e7\u00e3o de diplomas nas elei\u00e7\u00f5es federais e estaduais; Ac.-TSE, de 10.3.2022, no AgR-RO-El n\u00ba 5827; de 27.11.2014, no REspe n\u00ba 44853 e, de 26.11.2013, no REspe n\u00ba 504871: cabimento de recurso ordin\u00e1rio se o feito versa sobre inelegibilidade ou envolve cassa\u00e7\u00e3o de diploma ou mandato nas elei\u00e7\u00f5es federais ou estaduais. FGV - 2022 - Senado Federal - Consultor Legislativo - Direito Constitucional, Administrativo, Eleitoral e Processo Legislativo\"}]}]},{\"title\":\"RESP eleitoral\",\"children\":[{\"title\":\"Previsao\",\"children\":[{\"title\":\"Art. 276, I\"}]},{\"title\":\"Cabimento\",\"children\":[{\"title\":\"Decisoes proferidas contra expressa disposic\u00e3o legal\"},{\"title\":\"Divergencia na interpret. de leis entre 2 ou mais TRE\"}]},{\"title\":\"Prazo\",\"children\":[{\"title\":\"3 dias\"},{\"title\":\"OBS - Em direito de resposta \u00e9 24hrs\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"Lei Complementar 64/90, Art. 26-C. O \u00f3rg\u00e3o colegiado do tribunal ao qual couber a aprecia\u00e7\u00e3o do recurso contra as decis\u00f5es colegiadas a que se referem as al\u00edneas d, e, h, j, l e n do inciso I do art. 1\u00ba poder\u00e1, em car\u00e1ter cautelar, suspender a inelegibilidade sempre que existir plausibilidade da pretens\u00e3o recursal e desde que a provid\u00eancia tenha sido expressamente requerida, sob pena de preclus\u00e3o, por ocasi\u00e3o da interposi\u00e7\u00e3o do recurso. V. S\u00fam.-TSE n\u00ba 44/2016. Ac.-TSE, de 23.9.2014, no RO n\u00ba 119158; de 13.12.2012, no REspe n\u00ba 52771; de 30.10.2012, no AgR-REspe n\u00ba 68767 e, de 22.6.2010, na QO-AC n\u00ba 142085: o disposto neste artigo n\u00e3o \\\"[...] transfere ao Plen\u00e1rio a compet\u00eancia para examinar, inicialmente, pedido de concess\u00e3o de medida liminar, ainda que a quest\u00e3o envolva inelegibilidade\\\". \u00a7 1\u00ba Conferido efeito suspensivo, o julgamento do recurso ter\u00e1 prioridade sobre todos os demais, \u00e0 exce\u00e7\u00e3o dos de mandado de seguran\u00e7a e de habeas corpus. \u00a7 2\u00ba Mantida a condena\u00e7\u00e3o de que derivou a inelegibilidade ou revogada a suspens\u00e3o liminar mencionada no caput, ser\u00e3o desconstitu\u00eddos o registro ou o diploma eventualmente concedidos ao recorrente. V. S\u00fam.-TSE n\u00ba 66/2016. Ac.-TSE, de 5.12.2018, no RO n\u00ba 060097244 e, de 23.9.2014, no REspe n\u00ba 38375: a manuten\u00e7\u00e3o da decis\u00e3o que causa a inelegibilidade ou a revoga\u00e7\u00e3o da liminar que suspendia seus efeitos podem ser conhecidas pelas inst\u00e2ncias ordin\u00e1rias, no processo de registro de candidatura, desde que observados os princ\u00edpios do contradit\u00f3rio e da ampla defesa. Ac.-TSE, de 28.11.2016, no AgR-RO n\u00ba 288787: a revoga\u00e7\u00e3o dos efeitos da liminar que eventualmente tenha dado suporte \u00e0 decis\u00e3o de deferimento do registro de candidato eleito somente produz efeitos, na seara eleitoral, se ocorrida no prazo das a\u00e7\u00f5es eleitorais. \u00a7 3\u00ba A pr\u00e1tica de atos manifestamente protelat\u00f3rios por parte da defesa, ao longo da tramita\u00e7\u00e3o do recurso, acarretar\u00e1 a revoga\u00e7\u00e3o do efeito suspensivo. Art. 26-C e \u00a7\u00a7 1\u00ba a 3\u00ba acrescidos pelo art. 2\u00ba da LC n\u00ba 135/2010. S\u00famulas 44, 45 e 66 do TSE.\"}]}]},{\"title\":\"AI eleitoral\",\"children\":[{\"title\":\"Cabimento\",\"children\":[{\"ti 1c[...] Foro por prerrogativa de fun\u00e7\u00e3o. Prefeito. Compet\u00eancia do Tribunal Regional Eleitoral. [...] I. A compet\u00eancia criminal por prerrogativa de fun\u00e7\u00e3o 1. A partir da decis\u00e3o do STF na Quest\u00e3o de Ordem na A\u00e7\u00e3o Penal n\u00ba 937/RJ, relator o Ministro Lu\u00eds Roberto Barroso (DJe de 10.12.2018), adota\u2013se, \u00e0 guisa de premissas para o deslinde da presente causa, que:  (i) o foro por prerrogativa de fun\u00e7\u00e3o aplica\u2013se apenas aos crimes cometidos durante o exerc\u00edcio do cargo e relacionados \u00e0s fun\u00e7\u00f5es desempenhadas;  e (ii) a prerrogativa de foro relaciona\u2013se \u00e0s fun\u00e7\u00f5es desempenhadas na atualidade.  2. Compete, originariamente, ao Tribunal Regional Eleitoral o julgamento das condutas penalmente repreens\u00edveis imputadas a prefeito. Intelig\u00eancia da S\u00famula n\u00ba 702/STF.  3. Tendo em vista que o recorrente exerce mandato de prefeito do Munic\u00edpio de Juazeiro do Norte/CE e que as condutas em apura\u00e7\u00e3o foram praticadas, em tese, em decorr\u00eancia do exerc\u00edcio do cargo, ao menos em princ\u00edpio, as premissas fixadas pelo STF para a determina\u00e7\u00e3o da compet\u00eancia por prerrogativa de foro estariam atendidas na esp\u00e9cie [...]\u201d Investiga\u00e7\u00e3o envolvendo autoridades com foro privativo no STF: \u00e9 necess\u00e1ria pr\u00e9via autoriza\u00e7\u00e3o judicial. (H\u00e1 previs\u00e3o expressa no regimento interno do STF) Investiga\u00e7\u00e3o envolvendo autoridades com foro privativo em outros tribunais:N\u00c3O \u00e9 necess\u00e1ria autoriza\u00e7\u00e3o judicial. FONTE: DIZER O DIREITO\"}]}]},{\"title\":\"Quem n\u00e3o tem foro privilegiado\",\"children\":[{\"title\":\"\u00c9 julgado por juiz eleitoral. Inclue-se vereadores e vices-prefeitos\"},{\"title\":\"Ex: Candidatos em campanha\"}]},{\"title\":\"Se o candidato vence as elei\u00e7\u00f5es?\",\"children\":[{\"title\":\"A partir da diploma\u00e7\u0 al. Isso n\u00e3o \u00e9 poss\u00edvel. A senten\u00e7a da Justi\u00e7a Eleitoral foi proferida no exerc\u00edcio de verdadeira jurisdi\u00e7\u00e3o criminal, de modo que o prosseguimento da a\u00e7\u00e3o penal na Justi\u00e7a Estadual pelos mesmos fatos encontra \u00f3bice no princ\u00edpio da veda\u00e7\u00e3o \u00e0 dupla incrimina\u00e7\u00e3o, tamb\u00e9m conhecido como double jeopardy clause ou, como \u00e9 mais comum no direito brasileiro, o postulado do ne bis in idem (proibi\u00e7\u00e3o da dupla persecu\u00e7\u00e3o penal). Embora n\u00e3o tenha previs\u00e3o expressa na Constitui\u00e7\u00e3o Federal de 1988, a garantia do ne bis in idem \u00e9 um limite impl\u00edcito ao poder estatal, derivada da pr\u00f3pria coisa julgada e decorrente de compromissos internacionais assumidos pelo Brasil. A Conven\u00e7\u00e3o Americana de Direitos Humanos e o Pacto Internacional sobre Direitos Civis e Pol\u00edticos, incorporados ao direito brasileiro com status supralegal, tratam da veda\u00e7\u00e3o \u00e0 dupla incrimina\u00e7\u00e3o. STJ. 5\u00aa Turma. REsp 1.847.488-SP, Rel. Min. Ribeiro Dantas, julgado em 20/04/2021 (Info 719)\\\" Fonte: DOD https://dizerodireitodotnet.files.wordpress.com/2022/01/info-719-stj.pdf\"}]}]},{\"title\":\"Crimes Eleitorais em Especie FGV - 2022 - TJ-AP - Juiz\",\"children\":[{\"title\":\"Previs\u00e3o\",\"children\":[{\"title\":\"Cod. Eleitoral\"},{\"title\":\"LC 64\"},{\"title\":\"Lei 6.091/1974\"},{\"title\":\"Lei 9.504/1997\"}]},{\"title\":\"Intro VUNESP - 2020 - Boituva - SP - Analista Jud.\",\"children\":[{\"title\":\"Segundo a doutrina dividem-se em 8 grandes grupos\"},{\"title\":\"\u00c9 o Cod. Eleitoral que traz disposi\u00e7\u00f5es preliminares aplicaveis ao crimes de forma geral\"},{\"title\":\"Traz a famosa equipara\u00e7\u00e3o a servidor publico\",\"children\":[{\"title\":\"OBS\",\"children\":[{\"title\":\"N\u00e3o h\u00e1 men\u00e7\u00e3o a funda\u00e7\u00f5es\"},{\"title\":\"Menciona membros de SEM e entidades paraest
