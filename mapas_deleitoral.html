 60 dias-multa.\"}]},{\"title\":\"\u00a7 1\u00ba O juiz pode deixar  a pena: - PERDAO JUDICIAL\",\"children\":[{\"title\":\"I - se o ofendido, de forma reprov\u00e1vel, provocou diretamente a inj\u00faria;\"},{\"title\":\"II - no caso de retors\u00e3o imediata, que consista em outra inj\u00faria.(PERDAO JUDICIAL)\"}]},{\"title\":\"Se a injuria \u00e9 violencia ou vias de fato e que sejam aviltantes por sua nat.\",\"children\":[{\"title\":\"Pena \u00e9 Deten\u00e7\u00e3o e Multa + penas da violencia\"}]}]}]},{\"title\":\"As penas da Calunia,  Injuria e Difa\u00e7\u00e3o -  Aumenta-se em 1/3(3)\",\"children\":[{\"title\":\"I - contra o Presidente da Rep\u00fablica ou chefe de governo estrangeiro;\"},{\"title\":\"II - contra funcion\u00e1rio p\u00fablico, em raz\u00e3o de suas fun\u00e7\u00f5es;\"},{\"title\":\"III - na presen\u00e7a de v\u00e1rias pessoas, ou por meio que facilite a divulga\u00e7\u00e3o da ofensa.\"}]}]},{\"title\":\"Art. 326-B - Assedio e Constrangimento\",\"children\":[{\"title\":\"\u201cArt. 326-B. Assediar, constranger, humilhar, perseguir ou amea\u00e7ar, por qualquer meio, candidata a cargo eletivo ou detentora de mandato eletivo, utilizando-se de menosprezo ou discrimina\u00e7\u00e3o \u00e0 condi\u00e7\u00e3o de mulher ou \u00e0 sua cor, ra\u00e7a ou etnia, com a finalidade de impedir ou de dificultar a sua campanha eleitoral ou o desempenho de seu mandato eletivo. Pena - reclus\u00e3o, de 1 (um) a 4 (quatro) anos, e multa. Par\u00e1grafo \u00fanico. Aumenta-se a pena em 1/3 (um ter\u00e7o), se o crime \u00e9 cometido contra mulher: I - gestante; II - maior de 60 (sessenta) anos; III - com defici\u00eancia.\u201d\"}]},{\"title\":\"\u201cArt. 327. As penas cominadas nos arts. 324, 325 e 326 aumentam-se de 1/3 (um ter\u00e7o) at\u00e9 metade, se qualquer dos crimes \u00e9 cometido: ................................................................................................................. IV - com menosprezo ou discrimina\u00e7\u00e3o \u00e0 condi\u00e7\u00e3o de mulher ou \u00e0 sua cor, ra\u00e7a ou etnia; V - por meio da internet ou de rede social ou com transmiss\u00e3o em tempo real.\"},{\"title\":\"Denuncia\u00e7ao caluniosa eleitoral FGV - 2023 - TJ-MS - Juiz Substituto\",\"children\":[{\"title\":\"Art. 326-A. Dar causa \u00e0 instaura\u00e7\u00e3o de investiga\u00e7\u00e3o policial, de processo judicial, de investiga\u00e7\u00e3o administrativa, de inqu\u00e9rito civil ou a\u00e7\u00e3o de improbidade administrativa, atribuindo a algu\u00e9m a pr\u00e1tica de crime ou ato infracional de que o sabe inocente, com finalidade eleitoral: (Inclu\u00eddo pela Lei n\u00ba13.834, de 2019) Pena - reclus\u00e3o, de 2 (dois) a 8 (oito) anos, e multa. (Inclu\u00eddo pela Lei n\u00ba13.834, de 2019) \u00a7 1\u00ba A pena \u00e9 aumentada de sexta parte, se o agente se serve do anonimato ou de nome suposto. (Inclu\u00eddo pela Lei n\u00ba13.834, de 2019) \u00a7 2\u00ba A pena \u00e9 diminu\u00edda de metade, se a imputa\u00e7\u00e3o \u00e9 de pr\u00e1tica de contraven\u00e7\u00e3o. (Inclu\u00eddo pela Lei n\u00ba13.834, de 2019) \u00a7 3\u00ba Incorrer\u00e1 nas mesmas penas deste artigo quem, comprovadamente ciente da inoc\u00eancia do denunciado e com finalidade eleitoral, divulga ou propala, por qualquer meio ou forma, o ato ou fato que lhe foi falsamente atribu\u00eddo.(Inclu\u00eddo pela Lei n\u00ba13.834, de 2019)\"}]}]},{\"title\":\"Art. 331 ao 337\"},{\"title\":\"OBS - Revoga\u00e7\u00e3o\",\"children\":[{\"title\":\"Art. 328, 329, 330 e 333 revogados\"},{\"title\":\"Art. 327 remete ao 324, 325 e 326\"}]}]},{\"title\":\"Lei de Elei\u00e7\u00f5es\",\"children\":[{\"title\":\"Art. 39 \u00a75, Art. 40, Art. 33 \u00a74, Art. 34 \u00a72 e \u00a73\",\"children\":[{\"title\":\"obs\",\"children\":[{\"title\":\"Art. 40. O uso, na propaganda eleitoral, de s\u00edmbolos, frases ou imagens, associadas ou semelhantes \u00e0s empregadas por \u00f3rg\u00e3o de governo, empresa p\u00fablica ou sociedade de economia mista constitui crime, pun\u00edvel com deten\u00e7\u00e3o, de seis meses a um ano, com a alternativa de presta\u00e7\u00e3o de servi\u00e7os \u00e0 comunidade pelo mesmo per\u00edodo, e multa no valor de dez mil a vinte mil Ufirs. No entanto, de acordo com a Res.-TSE n\u00ba 22268/2006, n\u00e3o h\u00e1 veda\u00e7\u00e3o para o uso, na propaganda eleitoral, dos s\u00edmbolos nacionais, estaduais e municipais (bandeira, hino, cores), sendo pun\u00edvel apenas a utiliza\u00e7\u00e3o indevida nos termos da legisla\u00e7\u00e3o de reg\u00eancia.\"},{\"title\":\"Art. 33 (...) \u00a7 4\u00ba A divulga\u00e7\u00e3o de pesquisa fraudulenta constitui crime, pun\u00edvel com deten\u00e7\u00e3o de seis meses a um ano e multa no valor de cinq\u00fcenta mil a cem mil UFIR.\"},{\"title\":\"Art. 39 (...) \u00a7 5\u00ba Constituem crimes, no dia da elei\u00e7\u00e3o, pun\u00edveis com deten\u00e7\u00e3o, de seis meses a um ano, com a alternativa de presta\u00e7\u00e3o de servi\u00e7os \u00e0 comunidade pelo mesmo per\u00edodo, e multa no valor de cinco mil a quinze mil UFIR: (...) IV - a publica\u00e7\u00e3o de novos conte\u00fados ou o impulsionamento de conte\u00fados nas aplica\u00e7\u00f5es de internet de que trata o art. 57-B desta Lei, podendo ser mantidos em funcionamento as aplica\u00e7\u00f5es e os conte\u00fados publicados anteriormente\"}]}]},{\"title\":\"Art. 57-H \u00a7\u00a7 1 e 2(2013)\"},{\"title\":\"Art. 100-A\"}]}]},{\"title\":\"5\u02da Grupo - Crimes relativos a votac\u00e3o CESPE / CEBRASPE - 2022 - TJ-MA VUNESP - 2020 - Boituva - SP - Agente Leg. FGV - 2023 - TJ-PR - Juiz Substituto\",\"children\":[{\"title\":\"Previsto no Cod. Eleitoral  nos art.s 296 a 312 e 316. Ex:\",\"children\":[{\"title\":\"Corrup\u00e7\u00e3o Eleitoral FGV - 2023 - TJ-PR - Juiz Substituto\",\"children\":[{\"title\":\"Dar, oferecer, prometer, solicitar ou receber, para si ou para outrem, dinheiro, d\u00e1diva, ou qualquer outra vantagem, para obter ou dar voto e para conseguir ou prometer absten\u00e7\u00e3o, ainda que a oferta n\u00e3o seja aceita:\"},{\"title\":\"OBS\",\"children\":[{\"title\":\"Pode ser cometido por qlq pessoa, candidato ou n\u00e3o! ou seja, N\u00c3O \u00e9 imprescind\u00edvel que a conduta t\u00edpica seja praticada por candidato devidamente registrado na justi\u00e7a eleitoral.\"},{\"title\":\"Entendimento TSE\",\"children\":[{\"title\":\"exige-se que o corruptor passivo seja apto a votar. ESTANDO COM DIREITO SUSPENSOS FATO \u00c9 ATIPICO\"}]},{\"title\":\"Entendimento TSE\",\"children\":[{\"title\":\"P/ configura\u00e7\u00e3o desse crime \u00e9 necessario dolo especifico(FINALIDADE DE OBTER VOTO OU ABSTEN\u00c7\u00c3O)\"}]},{\"title\":\"Diferen\u00e7a com Capta\u00e7\u00e3o Ilicita\",\"children\":[{\"title\":\"Capta\u00e7\u00e3o s\u00f3 pode ser cometida pelo candidato. A corrup\u00e7\u00e3o pode ser por qlq pessoa\"}]},{\"title\":\"\u00c9 crime formal. A promessa deve ter rela\u00e7\u00e3o com o voto. Indepdne do resultado das elei\u00e7\u00f5es\"},{\"title\":\"N\u00c3O ADMITE TENTATIVA. CRIME \u00c9 FORMAL\"},{\"title\":\"Pena\",\"children\":[{\"title\":\"Reclus\u00e3o de 1 a 4 anos\"}]}]},{\"title\":\"Callout\",\"children\":[{\"title\":\"\u201c[...] 4. Em se tratando de corrup\u00e7\u00e3o eleitoral, irrelevante \u00e9 o per\u00edodo em que se deu a conduta t\u00edpica, pois a condi\u00e7\u00e3o de candidato n\u00e3o \u00e9 fundamental para a consuma\u00e7\u00e3o do crime, que pode ocorrer em qualquer tempo. Para a configura\u00e7\u00e3o deste tipo penal, basta que a vantagem oferecida esteja vinculada \u00e0 obten\u00e7\u00e3o de votos. Precedente. [...]\u201d\"},{\"title\":\"O delito do art. 299 do CE, exige \u201cdolo espec\u00edfico\u201d (elemento subjetivo especial). No caso da corrup\u00e7\u00e3o eleitoral ativa, esse \u201cdolo espec\u00edfico\u201d \u00e9 a inten\u00e7\u00e3o do agente de obter voto ou conseguir absten\u00e7\u00e3o. Na corrup\u00e7\u00e3o eleitoral passiva, a finalidade espec\u00edfica do sujeito \u00e9 a de dar seu voto ou prometer absten\u00e7\u00e3o. STF. Plen\u00e1rio. Inq 3693/PA, Rel. Min. C\u00e1rmen L\u00facia, julgado em 10/4/2014 (Info 742).\"}]}]},{\"title\":\"Art. 309. Votar ou tentar votar mais de uma vez, ou em lugar de outrem:\",\"children\":[{\"title\":\"OBS\",\"children\":[{\"title\":\"Pena - reclus\u00e3o at\u00e9 tr\u00eas anos.\"}]}]},{\"title\":\"Art. 312. Violar ou tentar violar o sigilo do voto: Pena \u2013 deten\u00e7\u00e3o at\u00e9 dois anos\",\"children\":[{\"title\":\"OBS\",\"children\":[{\"title\":\"Pena - deten\u00e7\u00e3o at\u00e9 dois anos.\"}]}]},{\"title\":\"Art. 306. N\u00e3o observar a ordem em que os eleitores devem ser chamados a votar\",\"children\":[{\"title\":\"OBS\",\"children\":[{\"title\":\"Pena \u00e9 MULTA\"}]}]},{\"title\":\"Art. 305. Intervir autoridade estranha \u00e0 mesa receptora, salvo o juiz eleitoral, no seu funcionamento sob qualquer pretexto\",\"children\":[{\"title\":\"OBS\",\"children\":[{\"title\":\"deten\u00e7\u00e3o at\u00e9 seis meses e pagamento de 60 a 90 dias-multa.\"}]}]},{\"title\":\"Usar de viol\u00eancia ou grave amea\u00e7a para coagir algu\u00e9m a votar, ou n\u00e3o votar, em determinado candidato ou partido, ainda que os fins visados n\u00e3o sejam conseguidos\",\"children\":[{\"title\":\"Pena\",\"children\":[{\"title\":\"Reclus\u00e3o e multa\"}]}]},{\"title\":\"CRIME somente no DIA DA ELEI\u00c7AO - Art. 302 Promover, no dia da elei\u00e7\u00e3o, com o fim de impedir, embara\u00e7ar ou fraudar o exerc\u00edcio do voto a concentra\u00e7\u00e3o de eleitores, sob qualquer forma, inclusive o fornecimento gratuito de alimento e transporte coletivo: Pena: Reclus\u00e3o e Multa\"},{\"title\":\"Majorar pre\u00e7os de utilidades e serv. necessarios a realiza\u00e7\u00e3o das elei\u00e7\u00f5es\",\"children\":[{\"title\":\"OBS\",\"children\":[{\"title\":\"Multa\"}]}]}]},{\"title\":\"Art. 11 da Lei 6.091/1974\",\"children\":[{\"title\":\"Forneciment de transporte e alimentac\u00f5a irregular Pena: Reclusao de 4 a 6 anos e multa\"}]}]},{\"title\":\"6\u02da Grupo - Pertinentes a garantia do rsultado legitmo das elei\u00e7\u00f5es\",\"children\":[{\"title\":\"Cod. Eleitoral - Arts. 313 ao 318\",\"children\":[{\"title\":\"Art. 317. Violar ou tentar violar o sigilo da urna ou dos inv\u00f3lucros. Pena - reclus\u00e3o de tr\u00eas a cinco anos\"}]},{\"title\":\"Lei de elei\u00e7\u00f5es - Arts. 68 e 72\",\"children\":[{\"title\":\"Causar dano fisico ao equipamento da votac\u00e3o\"}]}]},{\"title\":\"7\u02da Grupo - Concernentes a Organiza\u00e7\u00e3o  e Funcionamentos dos Servi\u00e7os Eleitorais\",\"children\":[{\"title\":\"Intro\",\"children\":[{\"title\":\"Nao se restringem a uma fase do proced. eleitoral\"}]},{\"title\":\"Cod. Eleitoral - Arts. 296, 339, 340 ao 347\"},{\"title\":\"Ex:\",\"children\":[{\"title\":\"Recusar ou abandonar o servico eleitoral sem justa causa(art. 344)\",\"children\":[{\"title\":\"OBS\",\"children\":[{\"title\":\"Pena\",\"children\":[{\"title\":\"Deten\u00e7\u00e3o de at\u00e9 2 meses ou Multa 90 a 120 dias\"}]},{\"title\":\"Entendimento TSE - Mesario\",\"children\":[{\"title\":\"Mesario que nao comparece no dia da elei\u00e7\u00e3o\"},{\"title\":\"Mesmo sem justificativa, nao comete esse crime\"}]}]}]}]}]},{\"title\":\"8\u02da Grupo - Crimes contra F\u00e9 Publica Eleitoral FUNDEP - 2021 - MPE-MG - Promotor INSTITUTO AOCP - 2021 - PC-PA - Delegado\",\"children\":[{\"title\":\"Cod. Eleitoral - Art. 351, 348 a 350 e 352 ao 354\"},{\"title\":\"Art. 354-A. Apropriar-se o candidato, o administrador financeiro da campanha, ou quem de fato exer\u00e7a essa fun\u00e7\u00e3o, de bens, recursos ou valores destinados ao financiamento eleitoral, em proveito pr\u00f3prio ou alheio:  Pena - reclus\u00e3o, de dois a seis anos, e multa.\"},{\"title\":\"OBS\",\"children\":[{\"title\":\"\u201c[...] 5. Esta Corte Superior j\u00e1 decidiu que a doa\u00e7\u00e3o eleitoral por meio de caixa dois e a omiss\u00e3o de recursos na presta\u00e7\u00e3o de contas de campanha eleitoral podem configurar o crime previsto no art. 350 do CE, n\u00e3o sendo exigido que a conduta il\u00edcita tenha sido cometida necessariamente durante o per\u00edodo eleitoral, porquanto a caracteriza\u00e7\u00e3o da finalidade eleitoral est\u00e1 relacionada ao potencial dano \u00e0s atividades\u2013fins desta Justi\u00e7a especializada.  6. O tipo penal da falsidade ideol\u00f3gica eleitoral objetiva proteger a f\u00e9 p\u00fablica eleitoral do falso conte\u00fado posto em documento verdadeiro, consumando\u2013se com a simples potencialidade do dano, de natureza eleitoral, visado pelo agente, n\u00e3o sendo imprescind\u00edvel, para a sua configura\u00e7\u00e3o, a efetiva ocorr\u00eancia de preju\u00edzo. \u00c9 delito formal, cuja consuma\u00e7\u00e3o independe de qualquer resultado natural\u00edstico ou efetiva les\u00e3o \u00e0 administra\u00e7\u00e3o eleitoral.  7. No caso, a potencialidade lesiva do il\u00edcito de falsidade ideol\u00f3gica eleitoral surgiu quando foi instrumentalizada a inten\u00e7\u00e3o de prejudicar a regularidade da presta\u00e7\u00e3o de contas pelo candidato que participou da disputa eleitoral. A investiga\u00e7\u00e3o [...] est\u00e1 relacionada \u00e0 inser\u00e7\u00e3o de declara\u00e7\u00e3o ideologicamente falsa no conjunto da presta\u00e7\u00e3o de contas de campanha, composta por diversos documentos (id\u00f4neos e inid\u00f4neos), apresentada \u00e0 Justi\u00e7a Eleitoral. [...]\u201d\"},{\"title\":\"Apesar da alternativa retratar conduta semelhante ao delito conhecido como \\\"Caixa 2\\\", ou falsidade ideol\u00f3gica eleitoral (art. 350 do CE), n\u00e3o \u00e9 poss\u00edvel dizer que movimentar QUALQUER recurso configuraria crime. Vejamos a reda\u00e7\u00e3o: Art. 350. Omitir, em documento p\u00fablico ou particular, declara\u00e7\u00e3o que d\u00eale devia constar, ou nele inserir ou fazer inserir declara\u00e7\u00e3o falsa ou diversa da que devia ser escrita, para fins eleitorais: Pena - reclus\u00e3o at\u00e9 cinco anos e pagamento de 5 a 15 dias-multa, se o documento \u00e9 p\u00fablico, e reclus\u00e3o at\u00e9 tr\u00eas anos e pagamento de 3 a 10 dias-multa se o documento \u00e9 particular. Par\u00e1grafo \u00fanico. Se o agente da falsidade documental \u00e9 funcion\u00e1rio p\u00fablico e comete o crime prevalecendo-se do cargo ou se a falsifica\u00e7\u00e3o ou altera\u00e7\u00e3o \u00e9 de assentamentos de registro civil, a pena \u00e9 agravada.\"},{\"title\":\"A doa\u00e7\u00e3o eleitoral por meio de \u201ccaixa 2\u201d \u00e9 uma conduta que configura crime eleitoral de falsidade ideol\u00f3gica (art. 350 do C\u00f3digo Eleitoral). A compet\u00eancia para processar e julgar este delito \u00e9 da Justi\u00e7a Eleitoral. A exist\u00eancia de crimes conexos de compet\u00eancia da Justi\u00e7a Comum, como corrup\u00e7\u00e3o passiva e lavagem de capitais, n\u00e3o afasta a compet\u00eancia da Justi\u00e7a Eleitoral, por for\u00e7a do art. 35, II, do CE e do art. 78, IV, do CPP. STF. 2\u00aa Turma.PET 7319/DF, Rel. Min. Edson Fachin, julgado em 27/3/2018 (Info 895).\"}]}]}]}]}]}}";const DATA = JSON.parse(RAW);

let hits = 0;

function detectType(t){
  const s=(t||"").toLowerCase();
  if(/cespe|cebraspe|fgv|vunesp|fundatec|ibfc|prova/.test(s)) return "cespe";
  if(/stj|stf|resp|adi|adpf|adc|\bre\b|rms|agrg|info \d|súmula|sumula|julgado/.test(s)) return "stj";
  return "obs";
}

function extractText(n,d=0){
  if(d>4) return n.title||"";
  let p=[n.title||""];
  (n.children||[]).forEach(c=>p.push(extractText(c,d+1)));
  (n.callouts||[]).forEach(c=>p.push(extractText(c,d+1)));
  return p.filter(Boolean).join(" • ");
}

function matches(n,t){
  if(!t) return true;
  if((n.title||"").toLowerCase().includes(t)) return true;
  if((n.children||[]).some(c=>matches(c,t))) return true;
  if((n.callouts||[]).some(c=>matches(c,t))) return true;
  return false;
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function hilite(s,t){
  if(!t) return esc(s);
  const re=new RegExp(`(${t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`,"gi");
  return esc(s).replace(re,"<mark>$1</mark>");
}

function renderCallout(node){
  const tipo=detectType(node.title||"");
  const label={cespe:"CESPE/CEBRASPE",stj:"STF/STJ",obs:"OBS"}[tipo];
  const text=extractText(node);
  const isTrivial=!node.title||/^(obs|callout|atenção)$/i.test((node.title||"").trim());
  const titleHtml=isTrivial?"":(`<div class="callout-title">${hilite(node.title,term)}</div>`);
  return `<div class="callout-box ${tipo}"><div class="callout-label">${label}</div>${titleHtml}<div class="callout-body">${esc(text)}</div></div>`;
}


var _EXAM_RE=/^\s*(CESPE\s*[\/]?\s*CEBRASPE|CEBRASPE|CESPE|FCC|FGV|VUNESP|ESAF|CESGRANRIO|MPT|AOCP|IBFC|IADES|FUNCAB|FUNDEP|QUADRIX|SELECON|OBJETIVA|NUCEPE|CS-UFG|INAZ|CONSULPLAN|NC-UFPR)\b/i;
var _YEAR_RE=/\b(20\d{2}|199\d)\b/;
function _isExam(t){return _EXAM_RE.test(t)&&_YEAR_RE.test(t);}
function _examShort(t){
  var b=t.match(_EXAM_RE);var y=t.match(_YEAR_RE);
  var banca=(b?b[1].replace(/\s*\/\s*CEBRASPE/i,'').replace(/\s*CEBRASPE\s*\/\s*/i,'').trim():'');
  return banca+(y?' '+y[0]:'');
}
var _BANCA_PAT=/(CESPE\s*[\/]?\s*CEBRASPE|CEBRASPE|CESPE|FCC|FGV|VUNESP|ESAF|CESGRANRIO|MPT|AOCP|IBFC|IADES|FUNCAB|FUNDEP|QUADRIX|SELECON|OBJETIVA|NUCEPE|CS-UFG|INAZ|CONSULPLAN|NC-UFPR)\b/gi;
function _inlineExams(t){
  var m,first=null,p=new RegExp(_BANCA_PAT.source,'gi');
  while((m=p.exec(t))!==null){if(_YEAR_RE.test(t.slice(m.index,Math.min(t.length,m.index+120)))){first=m.index;break;}}
  if(first===null||first===0)return null;
  var content=t.slice(0,first).trim(),ep=t.slice(first);
  p.lastIndex=0;var cuts=[0];
  while((m=p.exec(ep))!==null){if(m.index>0)cuts.push(m.index);}
  var tags=[];
  for(var i=0;i<cuts.length;i++){
    var ref=ep.slice(cuts[i],i+1<cuts.length?cuts[i+1]:ep.length).trim().replace(/[-–,\s]+$/,'');
    if(!_YEAR_RE.test(ref))continue;
    var b=ref.match(_EXAM_RE),y=ref.match(_YEAR_RE);
    var sh=(b?b[1].replace(/\s*\/\s*CEBRASPE/i,'').replace(/CEBRASPE\s*\/\s*/i,'').trim():'')+(y?' '+y[0]:'');
    tags.push({full:ref,short:sh.trim()});
  }
  return tags.length?{content:content,tags:tags}:null;
}

function xpand(el,ev){el.classList.toggle('open');ev.stopPropagation();}
function renderNode(n,depth,path){
  const id=path;
  const hasKids=(n.children&&n.children.length)||(n.callouts&&n.callouts.length);
  const isExp=expanded.has(id)||(term&&matches(n,term));
  const isHit=term&&(n.title||"").toLowerCase().includes(term);
  if(isHit) hits++;

  if(n.callout) return renderCallout(n);

  // Exam reference node → pill
  if(_isExam(n.title||'')&&depth>0){
    const full=esc(n.title||'');const short=esc(_examShort(n.title||''));
    return `<div class="node exam-node" id="n${id}"><div class="row"><span class="exam-tag" data-full="${full}">${short}</span></div></div>`;
  }

  const tog=hasKids?(isExp?"▾":"▸"):"·";
  const dc=depth===0?"d0":depth===1?"d1":depth===2?"d2":"dn";
  const rowCls=`row${isHit?" hit":""}`;
  const _ie=_inlineExams(n.title||'');
  let titleHtml;
  if(_ie){
    const pills=_ie.tags.map(function(t){return `<span class="exam-tag" data-full="${esc(t.full)}">${esc(t.short)}</span>`;}).join(' ');
    const _xl=_ie.content.length>120;
    titleHtml=`<span class="txt ${dc}${_xl?' long':''}"${_xl?' onclick="xpand(this,event)"':''} >${hilite(_ie.content,term)}</span> ${pills}`;
  } else {
    const _long=(n.title||"").length>120&&depth>0;
    titleHtml=_long?`<span class="txt ${dc} long" onclick="xpand(this,event)">${hilite(n.title||"",term)}</span>`:`<span class="txt ${dc}">${hilite(n.title||"",term)}</span>`;
  }

  let childHtml="";
  if(isExp&&hasKids){
    childHtml='<div class="children">';
    (n.children||[]).forEach((c,i)=>{if(!term||matches(c,term)) childHtml+=renderNode(c,depth+1,path+"_"+i);});
    (n.callouts||[]).forEach((c,i)=>{if(!term||matches(c,term)) childHtml+=renderNode({...c,callout:true},depth+1,path+"_c"+i);});
    childHtml+="</div>";
  }
  return `<div class="node" id="n${id}"><div class="${rowCls}" onclick="toggle('${id}')"><span class="tog">${tog}</span>${titleHtml}</div>${childHtml}</div>`;
}

function render(){
  const tree=DATA[cur];
  hits=0;
  let html="";
  if(tree.children){
    tree.children.forEach((n,i)=>{
      if(!term||matches(n,term)) html+=renderNode(n,0,"r"+i);
    });
  }
  document.getElementById("content").innerHTML=html||`<p class="no-res">Nenhum resultado para "${esc(term)}"</p>`;const em=document.getElementById("empty-msg");if(em)em.remove();
  const mb=document.getElementById("matchBar");
  if(term){mb.style.display="block";mb.textContent=`${hits} ocorrência(s) para "${term}"`;}
  else{mb.style.display="none";}
}

function renderTabs(){
  document.getElementById("tabs").innerHTML=CHAPTERS.map((k,i)=>{
    const cid='deleitoral_'+i;
    const isDone=_TRK&&_TRK.done&&_TRK.done[cid];
    return `<div class="tab${k===cur?' active':''}" onclick="selChap('${k}')">
      <input type="checkbox" class="_trk_chk" data-cid="${cid}" ${isDone?'checked':''} onclick="event.stopPropagation();_trkToggle('${cid}',this.checked,this)"/>
      <span>${LABELS[k]||k}</span>
    </div>`;
  }).join("");
}

function selChap(k){cur=k;expanded.clear();document.getElementById("search").value="";term="";document.getElementById("matchBar").style.display="none";renderTabs();render();}
function toggle(id){if(expanded.has(id))expanded.delete(id);else expanded.add(id);render();}
function expandAll(){function add(n,p){expanded.add(p);(n.children||[]).forEach((c,i)=>add(c,p+"_"+i));(n.callouts||[]).forEach((c,i)=>add(c,p+"_c"+i));}const t=DATA[cur];(t.children||[]).forEach((n,i)=>add(n,"r"+i));render();}
function collapseAll(){expanded.clear();render();}

let deb;
document.getElementById("search").addEventListener("input",function(){
  clearTimeout(deb);
  deb=setTimeout(()=>{term=this.value.toLowerCase().trim();render();},250);
});

renderTabs();
render();
</script>

<script>
// ── TRACKER INTEGRATION ──
var _TRK = {
  mapId: 'deleitoral',
  total: 14,
  done: {},  // chapter_id -> true
  user: null,
};

// Auth
window.addEventListener('DOMContentLoaded', function(){
  _sb.auth.getSession().then(function(r){
    if(r.data&&r.data.session&&r.data.session.user){
      _TRK.user = r.data.session.user;
      _trkLoad();
    } else {
      _trkRender();
    }
  });
});

async function _trkLoad(){
  try{
    var r = await _sb.from('progress')
      .select('chapter_id,done')
      .eq('user_id', _TRK.user.id);
    _TRK.done = {};
    if(r.data) r.data.forEach(function(row){
      if(row.done && row.chapter_id.startsWith(_TRK.mapId+'_'))
        _TRK.done[row.chapter_id] = true;
    });
    try{ Object.keys(_TRK.done).forEach(function(cid){ localStorage.setItem('_pgprog_'+cid,JSON.stringify({done:true,date:null})); }); }catch(_){}
    _trkRender();
  }catch(e){ console.warn('tracker load err', e); }
}

function _trkRender(){
  var count = Object.keys(_TRK.done).length;
  var pct = _TRK.total ? Math.round(count/_TRK.total*100) : 0;
  // Update both injected header bar and sidebar bar
  ['_trk_fill','trk-fill'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.width=pct+'%';});
  ['_trk_pct','trk-pct'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=pct+'%';});
  ['_trk_cnt','trk-cnt'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=count+'/'+_TRK.total;});
  // Update checkboxes
  document.querySelectorAll('._trk_chk').forEach(function(chk){
    var cid = chk.getAttribute('data-cid');
    chk.checked = !!_TRK.done[cid];
    var w = chk.closest('._chk_wrap');
    if(w) w.classList.toggle('_chk_done', !!_TRK.done[cid]);
  });
  renderTabs();
}

async function _trkToggle(chapterId, done, chk){
  if(!_TRK.user){
    // Try to recover session
    try {
      const r = await _sb.auth.getSession();
      if(r.data && r.data.session && r.data.session.user){
        _TRK.user = r.data.session.user;
      } else {
        console.warn('No session found, cannot save tracker');
        return;
      }
    } catch(e) { console.error('getSession error:', e); return; }
  }
  var now = done ? new Date().toISOString() : null;
  if(done) _TRK.done[chapterId] = true;
  else delete _TRK.done[chapterId];
  _trkRender();
  try{
    await _sb.from('progress').upsert({
      user_id: _TRK.user.id,
      chapter_id: chapterId,
      done: done,
      done_at: now
    }, {onConflict: 'user_id,chapter_id'});
  }catch(e){ console.warn('tracker save err', e); }
  try{ localStorage.setItem('_pgprog_'+chapterId, JSON.stringify({done, date:now})); }catch(_){}
}
</script>
