<!DOCTYPE html>
<html data-theme="dark" lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Direito do Trabalho — Mapas Mentais</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #21253a;
    --border: #2e3350;
    --text: #cdd6f4;
    --muted: #7c8db5;
    --accent: #7aa2f7;
    --accent2: #bb9af7;
    --green: #9ece6a;
    --amber: #e0af68;
    --red: #f7768e;
    --cyan: #7dcfff;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

  /* Header */
  #header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  #header h1 { font-size: 15px; font-weight: 600; color: var(--accent); white-space: nowrap; }
  #search { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 7px 12px; color: var(--text); font-size: 13px; outline: none; }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }
  #header-btns { display: flex; gap: 8px; }
  .hbtn { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--muted); font-size: 12px; padding: 5px 10px; cursor: pointer; white-space: nowrap; }
  .hbtn:hover { color: var(--text); border-color: var(--accent); }
  #match-count { font-size: 12px; color: var(--muted); white-space: nowrap; }

  /* Layout */
  #layout { display: flex; height: calc(100vh - 49px); }

  /* Sidebar */
  #sidebar { width: 240px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 8px 0; }
  .chapter-btn { display: block; width: 100%; text-align: left; background: none; border: none; padding: 8px 16px; color: var(--muted); font-size: 12px; cursor: pointer; border-left: 3px solid transparent; line-height: 1.4; }
  .chapter-btn:hover { color: var(--text); background: var(--surface2); }
  .chapter-btn.active { color: var(--accent); border-left-color: var(--accent); background: rgba(122,162,247,0.08); }

  /* Main */
  #main { flex: 1; overflow-y: auto; padding: 20px 24px; }

  /* Chapter title */
  .chapter-title { font-size: 17px; font-weight: 700; color: var(--accent2); margin-bottom: 18px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }

  /* Tree */
  .tree-root { }
  .node { margin: 0; }
  .node-header { display: flex; align-items: flex-start; gap: 6px; padding: 3px 6px; border-radius: 4px; cursor: pointer; min-height: 26px; line-height: 1.5; }
  .node-header:hover { background: rgba(255,255,255,0.04); }
  .toggle { flex-shrink: 0; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 10px; margin-top: 2px; transition: transform 0.15s; }
  .node.open > .node-header > .toggle { transform: rotate(90deg); }
  .no-toggle { flex-shrink: 0; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; color: var(--border); font-size: 10px; margin-top: 2px; }
  .node-label { flex: 1; white-space: pre-wrap; word-break: break-word; }
  .node-children { margin-left: 22px; border-left: 1px solid var(--border); padding-left: 6px; display: none; }
  .node.open > .node-children { display: block; }

  /* Depth colors */
  .depth-0 > .node-header > .node-label { color: var(--accent); font-weight: 700; font-size: 15px; }
  .depth-1 > .node-header > .node-label { color: var(--accent2); font-weight: 600; font-size: 14px; }
  .depth-2 > .node-header > .node-label { color: var(--cyan); font-weight: 500; }
  .depth-3 > .node-header > .node-label { color: var(--green); }
  .depth-4 > .node-header > .node-label { color: var(--amber); }

  /* CESPE/TST callouts */
  .cespe-tag { display: inline-block; background: rgba(224,175,104,0.15); border: 1px solid var(--amber); color: var(--amber); font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-right: 4px; vertical-align: middle; flex-shrink: 0; }
  .tst-tag { display: inline-block; background: rgba(125,207,255,0.12); border: 1px solid var(--cyan); color: var(--cyan); font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-right: 4px; vertical-align: middle; flex-shrink: 0; }
  .sum-tag { display: inline-block; background: rgba(187,154,247,0.12); border: 1px solid var(--accent2); color: var(--accent2); font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-right: 4px; vertical-align: middle; flex-shrink: 0; }
  .oj-tag { display: inline-block; background: rgba(158,206,106,0.12); border: 1px solid var(--green); color: var(--green); font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-right: 4px; vertical-align: middle; flex-shrink: 0; }

  /* Highlight */
  mark { background: rgba(224,175,104,0.35); color: inherit; border-radius: 2px; }

  /* Hidden during search */
  .node.hidden { display: none; }
  .node.match > .node-header { background: rgba(122,162,247,0.1); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

ção tem como objeto a contratação de parte da produção ou do produto acabado, não havendo fornecimento de mão de obra ou de efetiva prestação de serviços. A contratação se resume a uma relação comercial entre a empresa contratante e a empresa contratada, na qual a empresa de facção (contratada) tem por obrigação fornecer produtos acabados para posterior comercialização pela contratante. Assim, por não existir ingerência do\r\ncontratante na forma de trabalho, bem como na cadeira de produção, não há responsabilidade da empresa contratante.\r\nDe acordo com o entendimento do TST, a relação mantida entre as empresas deve ser meramente comercial, não se admitindo qualquer interferência da contratante em relação à contratada, sob pena de desvirtuar o foco do contrato comercial para uma típica intermediação de mão de obra (terceirização) e, consequentemente, atrair para si a responsabilidade subsidiária, a teor do entendimento firmado na Súmula 331, inciso IV."}]}, {"label": "Contrato de Economato", "children": [{"label": "O instituto jurídico atinente ao contrato de economato já foi apreciado pelo TST em diversas oportunidades. Recentemente (24.11.2021) a 7ª Turma examinou novamente o tema durante o julgamento do recurso de revista nº 100440-87.2017.5.01.0023. \r\n\r\nEssa modalidade de negócio jurídico contratual consiste na cessão onerosa de espaço físico a um terceiro para a exploração de uma atividade econômica empresarial. Contrato de arrendamento de natureza eminentemente civil. \r\n\r\nTrata-se de situação na qual uma empresa (clube, associação, escola) cede espaço físico para outra empresa para que esta explore nesse ambiente a sua atividade econômica que pode estar relacionada, ilustrativamente, a bar, restaurante e lanchonete. O empregado é contratado pela empresa cessionária e presta serviço nas dependências da empresa cedente.\r\n\r\nPosição do TST\r\nConstatada essa situação o TST tem adotado posicionamento no sentido de que o contrato de economato não configura terceirização. Entende que a empresa que cedeu espaço não se beneficia da força de trabalho do empregado contratado pela cessionária, ainda que a energia de trabalho dele seja direcionada para as pessoas que frequentam o ambiente pertencente à cedente. \r\n\r\nNa hipótese de um clube que cede parte de seu espaço físico para uma empresa explorar atividade de lanchonete, o empregado contratado por esta vai prestar seu trabalho em prol das pessoas que frequentam o clube, inclusive, para os empregados do clube. De certa forma, nesse exemplo, o clube se beneficia dessa energia de trabalho. Mas, ainda assim, para o TST não se trata de terceirização.\r\n\r\nTendo em vista que o TST não identifica a presença de terceirização em contrato de economato, tem-se observado a reforma de decisão que aplica a súmula 331 para justificar a responsabilidade subsidiária da empresa cedente por débito trabalhista não adimplido pela empresa cessionária.\r\n\r\nPortanto, para o TST, contrato de economato não revela existência de terceirização. Por isso, em face da empresa cedente não incide o teor da súmula 331, sequer a responsabilidade subsidiária prevista no referido verbete."}]}]}, "5. Contrato Individual de Trabalho": {"label": "5. Contrato\r\n Individual de Trabalho", "children": [{"label": "Contrato Individual de Trabalho", "children": [{"label": "Conceito", "children": [{"label": "Doutrina", "children": [{"label": "Convenção ou Negocio JDCO pela qual um ou varios empregados"}, {"label": "Mediante certa remuneração e em carater nao eventual"}, {"label": "Prestam trabalho pessoal e sob direção do empregador"}]}, {"label": "Conceito da Lei", "children": [{"label": "CT é acordo TACITO ou EXPRESSO correspondente a rel. de emprego"}, {"label": "Se não tenho relação de emprego não há Contrato de Trabalho"}]}]}, {"label": "Forma", "children": [{"label": "Art. 442 da CLT(Pode ser tacito ou expresso)"}, {"label": "COOPERATIVAS(442 § unico)\r\n\r\nexiste vinculo entre ela e os associados? upção do contrato de trabalho, incidindo, analogicamente, o auxílio-doença, devendo a empresa se responsabilizar pelo pagamento dos quinze primeiros dias, ficando o restante do período a cargo do INSS.\r\nSTJ. 6ª Turma. REsp 1757775-SP, Rel. Min. Rogerio Schietti Cruz, julgado em 20/08/2019 (Info 655)."}]}]}, {"label": "15. Convocação da Justiça Eleitoral - Art. 98 da Lei 9.504"}, {"label": "16. LOCKOUT"}, {"label": "17. Representações no Conselho Curador do FGTS e Atividades no CNPS"}, {"label": "18. Reduçõa da Jornada no curso do Aviso Previo"}]}]}, {"label": "Suspensão", "children": [{"label": "INTRO", "children": [{"label": "Não há trabalho e nem pagamento. Não conta como tempo de serviço."}, {"label": "É a paralisação temporaria dos principais efeitos do CT"}, {"label": "Doutrina diz que susta efeitos secundarios do CT"}, {"label": "Durante a suspensao pode ocorrer justa causa"}, {"label": "Sustação ampla e bilateral de efeitos do CT, que preserva sua vigencia(MGD)"}, {"label": "Não há recolhimentos vinculados. Ex: FGTS. \r\nExceções:(2)", "children": [{"label": "Licença por acidente de trabalho"}, {"label": "Serviço militar obrigatorio"}]}]}, {"label": "Ajuda Compensatória Mensal", "children": [{"label": "O empregador poderá conceder ao empregado ajuda compensatória mensal"}, {"label": "SEM natureza salarial, durante o período de suspensão contratual, nos termos da Lei"}, {"label": "Com valor a ser definido em CCT e ACT"}]}, {"label": "Hipoteses", "children": [{"label": "1. Faltas e INTERVALOS INJUSTIFICADOS"}, {"label": "2. Qlq licença não remunerada"}, {"label": "3. Greve(via de regra)"}, {"label": "4. Suspensão Disciplinar", "children": [{"label": "Não pode passar de 30 dias sob pena de ser considerada rescisão injusta"}]}, {"label": "5. Afastamento em caso de Prisão Provisória"}, {"label": "6. Afastamento para Inquerito de apuração de falta grave", "children": [{"label": "É uma faculdade a suspensão do emrpegado(494 da CLT)"}, {"label": "Se a apuração foi // ---- Helpers ----
function isCespe(text) { return /CESPE|CEBRASPE/i.test(text); }
function isTst(text) { return /\bTST\b/i.test(text) && !/CESPE/i.test(text); }
function isSum(text) { return /S(\.|úm|um)\s*\d|SUMULA|SÚMULA/i.test(text); }
function isOj(text) { return /\bOJ\b|ORIENTACAO JURISP/i.test(text); }

function makeTags(text) {
  let tags = '';
  if (isCespe(text)) tags += '<span class="cespe-tag">CESPE</span>';
  if (isTst(text)) tags += '<span class="tst-tag">TST</span>';
  if (isSum(text)) tags += '<span class="sum-tag">SÚM</span>';
  if (isOj(text)) tags += '<span class="oj-tag">OJ</span>';
  return tags;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildTree(node, depth) {
  if (!node || !node.label) return '';
  const hasChildren = node.children && node.children.length > 0;
  const label = (node.label || '').replace(/\r\n/g,'\n').trim();
  const esc = escapeHtml(label);
  const tags = makeTags(label);
  
  let inner = hasChildren ? `<span class="toggle">&#9654;</span>` : `<span class="no-toggle">&#8226;</span>`;
  inner += tags + `<span class="node-label">${esc}</span>`;
  
  let childrenHtml = '';
  if (hasChildren) {
    childrenHtml = `<div class="node-children">`;
    for (const c of node.children) {
      childrenHtml += buildTree(c, depth + 1);
    }
    childrenHtml += `</div>`;
  }
  
  return `<div class="node depth-${Math.min(depth,4)}" data-label="${esc.replace(/"/g,'&quot;')}">
    <div class="node-header">${inner}</div>
    ${childrenHtml}
  </div>`;
}

function selectChapter(idx) {
  currentChapterIdx = idx;
  document.querySelectorAll('.chapter-btn').forEach((b,i) => b.classList.toggle('active', i === idx));
  const [name, rootNode] = chapters[idx];
  mainEl.innerHTML = '<div class="chapter-title">' + escapeHtml(name) + '</div><div class="tree-root">' + buildTree(rootNode, 0) + '</div>';
  mainEl.scrollTop = 0;
  if(typeof _applyAllHL === 'function') _applyAllHL();
}

chapters.forEach(([name, rootNode], idx) => {
  const btn = document.createElement('button');
  btn.className = 'chapter-btn';
  btn.textContent = name;
  btn.dataset.idx = idx;
  btn.onclick = () => selectChapter(idx);
  var w=document.createElement("div");w.className="_chk_wrap";
  var ck=document.createElement("input");ck.type="checkbox";ck.className="_trk_chk";
  var cid="dtrabalho_"+idx;ck.setAttribute("data-cid",cid);
  ck.addEventListener("change",function(e){e.stopPropagation();_trkToggle(cid,e.target.checked);});
  w.appendChild(ck);w.appendChild(btn);sidebar.appendChild(w);
});

mainEl.addEventListener('click', e => {
  if(typeof _curColor !== 'undefined' && _curColor !== null) return;
  const header = e.target.closest('.node-header');
  if (!header) return;
  const node = header.parentElement;
  if (!node.classList.contains('node')) return;
  if (!node.querySelector('.node-children')) return;
  node.classList.toggle('open');
});

function expandAll() { document.querySelectorAll('.node').forEach(n => { if(n.querySelector('.node-children')) n.classList.add('open'); }); }
function collapseAll() { document.querySelectorAll('.node').forEach(n => n.classList.remove('open')); }

// Search across all chapters
let searchTimeout;
const searchInput = document.getElementById('search');
const matchCount = document.getElementById('match-count');
searchInput.addEventListener('input', () => { clearTimeout(searchTimeout); searchTimeout = setTimeout(doSearch, 200); });

function normalizeText(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }

function doSearch() {
  const raw = searchInput.value.trim();
  const q = normalizeText(raw);
  if(!q){ if(currentChapterIdx>=0) selectChapter(currentChapterIdx); if(matchCount) matchCount.textContent=''; return; }
  let results=[];
  chapters.forEach(([name,rootNode],cidx)=>{
    function srch(node){ if(normalizeText(node.label||'').includes(q)) results.push({cidx,name,label:node.label||''}); (node.children||[]).forEach(srch); }
    srch(rootNode);
  });
  if(matchCount) matchCount.textContent = results.length>0 ? results.length+' resultados' : 'Nenhum resultado';
  const grouped={};
  results.forEach(r=>{ if(!grouped[r.cidx]) grouped[r.cidx]=[]; grouped[r.cidx].push(r.label); });
  let out='<div class="chapter-title">Resultados:"'+escapeHtml(raw)+'"</div>';
  Object.entries(grouped).forEach(([cidx,labels])=>{
    out+='<div style="font-size:13px;margin:14px 0 6px;cursor:pointer;color:var(--accent,#7aa2f7);font-weight:600;"onclick="selectChapter('+cidx+')">'+escapeHtml(chapters[cidx][0])+'</div>';
    labels.forEach(l=>{ out+='<div class="node depth-1"><div class="node-header"><span class="no-toggle">&#8226;</span><span class="node-label">'+escapeHtml(l)+'</span></div></div>'; });
  });
  mainEl.innerHTML = out;
}

</script>
