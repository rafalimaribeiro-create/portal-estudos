de 60 dias de emiss\u00e3o da notifica\u00e7\u00e3o\"},{\"title\":\"Exceto\",\"children\":[{\"title\":\"Se comprovar que o emprego cessou\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"\u00c9 constitucional a regra do art. 57, \u00a7 8\u00ba da Lei 8.213/91, que pro\u00edbe o titular da aposentadoria especial de continuar ou voltar a trabalhar com atividades que o exponham a agentes nocivos. Origem: STF - Informativo: 987   Ementa Direito Previdenci\u00e1rio e Constitucional. Constitucionalidade do art. 57, \u00a7 8\u00ba, da Lei n\u00ba 8.213/91. Percep\u00e7\u00e3o do benef\u00edcio de aposentadoria especial independentemente do afastamento do benefici\u00e1rio das atividades laborais nocivas a sua sa\u00fade. Impossibilidade. Recurso extraordin\u00e1rio parcialmente provido.  1. O art. 57,\u00a7 8\u00ba, da Lei n\u00ba 8.213/91 \u00e9 constitucional, inexistindo qualquer tipo de conflito entre ele e os arts. 5\u00ba, inciso XIII; 7\u00ba, inciso XXXIII; e 201,\u00a7 1\u00ba, da Lei Fundamental. (...)  2. \u00c9 vedada a simultaneidade entre a percep\u00e7\u00e3o da aposentadoria especial e o exerc\u00edcio de atividade especial, seja essa \u00faltima aquela que deu causa \u00e0 aposenta\u00e7\u00e3o precoce ou n\u00e3o. A concomit\u00e2ncia entre a aposentadoria e o labor especial acarreta a suspens\u00e3o do pagamento do benef\u00edcio previdenci\u00e1rio. (...).  4. Foi fixada a seguinte tese de repercuss\u00e3o geral: \u201c(i) [\u00e9] constitucional a veda\u00e7\u00e3o de continuidade da percep\u00e7\u00e3o de aposentadoria especial se o benefici\u00e1rio permanece laborando em atividade especial ou a ela retorna, seja essa atividade especial aquela que ensejou a aposenta\u00e7\u00e3o precoce ou n\u00e3o; (ii) nas hip\u00f3teses em que o segurado solicitar a aposentadoria e continuar a exercer o labor especial, a data de in\u00edcio do benef\u00edcio ser\u00e1 a data de entrada do requerimento, remontando a esse marco, inclusive, os efeitos financeiros; efetivada, contudo, seja na via administrativa, seja na judicial, a implanta\u00e7\u00e3o do benef\u00edcio, uma vez verificada a continuidade ou o retorno ao labor nocivo, cessar\u00e1 o benef\u00edcio previdenci\u00e1rio em quest\u00e3o. 5. Recurso extraordin\u00e1rio a que se d\u00e1 parcial provimento. (RE 791961, Relator(a): DIAS TOFFOLI, Tribunal Pleno, julgado em 08/06/2020, PROCESSO ELETR\u00d4NICO REPERCUSS\u00c3O GERAL - M\u00c9RITO DJe-206 DIVULG 18-08-2020 PUBLIC 19-08-2020) Fonte: Buscador Dizer o Direito\"}]}]},{\"title\":\"Se trabanhou sob regime especial e foi p/ o comum\",\"children\":[{\"title\":\"Aplica-se a tabela de convers\u00e3o. Aplica-se a tabela do dia e nao da epoca\"}]}]},{\"title\":\"obs\",\"children\":[{\"title\":\"Me explique melhor o que \u00e9 esse Perfil Profissiogr\u00e1fico Previdenci\u00e1rio (PPP)... O Perfil Profissiogr\u00e1fico Previdenci\u00e1rio (PPP) \u00e9 um documento que mostra o hist\u00f3rico laboral do trabalhador, reunindo diversas informa\u00e7\u00f5es sobre o seu trabalho, inclusive a respeito das condi\u00e7\u00f5es em que ele exercia suas atividades, se estava exposto a agentes nocivos, se a empresa fornecia EPI etc. Os dados que precisam constar no PPP est\u00e3o previstos em instru\u00e7\u00e3o normativa do INSS, devendo esse documento ser atualizado sempre que houver novas informa\u00e7\u00f5es que impliquem na mudan\u00e7a do seu conte\u00fado. Pelo menos uma vez por ano o PPP dever\u00e1 ser atualizado. O PPP ser\u00e1 impresso quando ocorrer a rescis\u00e3o do contrato de trabalho ou sempre que solicitado pelo trabalhador, para fins de requerimento de reconhecimento de per\u00edodos laborados em condi\u00e7\u00f5es especiais. O INSS (e outras autoridades) tamb\u00e9m poder\u00e1 solicitar da empresa uma c\u00f3pia do PPP. Vale ressaltar que o PPP dever\u00e1 indicar o nome do profissional legalmente habilitado que foi o respons\u00e1vel por avaliar a exist\u00eancia ou n\u00e3o dos agentes nocivos ambientais. O PPP ser\u00e1 assinado pelo representante legal da empresa.   E sobre LTCAT, voc\u00ea j\u00e1 ouviu falar? LTCAT \u00e9 a sigla para Laudo T\u00e9cnico das Condi\u00e7\u00f5es Ambientais de Trabalho. Trata-se de um documento, emitido pelo m\u00e9dico do trabalho ou pelo engenheiro de seguran\u00e7a do trabalho, que descreve as circunst\u00e2ncias em que o trabalho era exercido e se o empregado estava exposto a agentes insalubres. O LTCAT tamb\u00e9m \u00e9 mencionado pelo \u00a7 1\u00ba do art. 58 acima transcrito. Veja que o dispositivo fala em \u201claudo t\u00e9cnico de condi\u00e7\u00f5es ambientais do trabalho\u201d. Desse modo, o PPP (formul\u00e1rio) \u00e9 preenchido com base no laudo e se presume que as informa\u00e7\u00f5es nele contidas s\u00e3o ver\u00eddicas, sendo dispens\u00e1vel a produ\u00e7\u00e3o de novo laudo para embasar o documento.\"},{\"title\":\"I \u2013 \u00c9 constitucional a veda\u00e7\u00e3o de continuidade da percep\u00e7\u00e3o de aposentadoria especial se o benefici\u00e1rio permanece laborando em atividade especial ou a ela retorna, seja essa atividade especial aquela que ensejou a aposenta\u00e7\u00e3o precoce ou n\u00e3o. II \u2013 Nas hip\u00f3teses em que o segurado solicitar a aposentadoria e continuar a exercer o labor especial, a data de in\u00edcio do benef\u00edcio ser\u00e1 a data de entrada do requerimento, remontando a esse marco, inclusive, os efeitos financeiros; efetivada, contudo, seja na via administrativa, seja na judicial, a implanta\u00e7\u00e3o do benef\u00edcio, uma vez verificada a continuidade ou o retorno ao labor nocivo, cessar\u00e1 o pagamento do benef\u00edcio previdenci\u00e1rio em quest\u00e3o. STF. Plen\u00e1rio. RE 791961 ED, Rel. Dias Toffoli, julgado em 24/02/2021. Vale ressaltar outro ponto importante: a pessoa que se aposenta na modalidade especial n\u00e3o fica impedida de trabalhar em outras atividades. Caso necessite complementar sua renda, ela poder\u00e1 desempenhar outras atividades, desde que n\u00e3o sejam aquelas que causem danos excessivos \u00e0 sua sa\u00fade e que s\u00e3o tratadas no art. 58 da Lei n\u00ba 8.213/91. Desse modo, o \u00a7 8\u00ba do art. 57 n\u00e3o traz uma proibi\u00e7\u00e3o total ao trabalho ap\u00f3s a obten\u00e7\u00e3o da aposentadoria especial. O aposentado \u00e9 absolutamente livre para laborar no que desejar, sendo colocados obst\u00e1culos apenas no que tange aos servi\u00e7os tidos como prejudiciais \u00e0 sa\u00fade cujo desempenho justamente ensejou sua aposenta\u00e7\u00e3o antecipada. Al\u00e9m disso, mesmo em rela\u00e7\u00e3o ao labor especial, n\u00e3o h\u00e1 propriamente proibi\u00e7\u00e3o, mas sim a coloca\u00e7\u00e3o de uma escolha ao trabalhador: se ele optar por persistir na atividade, ter\u00e1 seu benef\u00edcio suspenso.\"}]}]},{\"title\":\"Aposentadoria da Pessoa com Deficiencia\",\"children\":[{\"title\":\"Fundamento de Validade\",\"children\":[{\"title\":\"Art. 201 \u00a71 da CF\"},{\"title\":\"LC 142/2013\"},{\"title\":\"Conven\u00e7\u00e3o de Nova Iorque de Pessoas com Deficiencia\"}]},{\"title\":\"Aposentadoria por Idade ART. 70-A\",\"children\":[{\"title\":\"Previs\u00e3o - Art. 70-A\",\"children\":[{\"title\":\"A concessao da aposentadoria por Tempo de contribui\u00e7\u00e3o ou ou Idade\"},{\"title\":\"ao segurado que tenha reconhecido pelo INSS, grau de deficiencia LEVE, MODERADA ou GRAVE\"},{\"title\":\"Esta condicionada a comprova\u00e7\u00e3o da condicao de pessoa com deficiencia\"},{\"title\":\"Na data do requerimento ou implementacao dos requisitos para o benefiico\"}]},{\"title\":\"Necessidade Social\",\"children\":[{\"title\":\"Aposentadoria por Idade da pe- ssoa com deficiencia ocorre aos  CESPE / CEBRASPE - 2022 - INSS\",\"children\":[{\"title\":\"Homem\",\"children\":[{\"title\":\"60\"}]},{\"title\":\"Mulher\",\"children\":[{\"title\":\"55\"}]},{\"title\":\"Independnete do grau de deficiencia\",\"children\":[{\"title\":\"Deve comprovar a existencia de deficiencia durante o  Seguridade social. Prazo decadencial. Decad\u00eancia. Lei 8.213/1991, art. 103, caput. \u00abN\u00e3o incide o prazo decadencial previsto no art. 103, caput, da Lei 8.213/1991, nos casos de indeferimento e cessa\u00e7\u00e3o de benef\u00edcios, bem como em rela\u00e7\u00e3o \u00e0s quest\u00f5es n\u00e3o apreciadas pela Administra\u00e7\u00e3o no ato da concess\u00e3o.\u00bb Aplica-se o prazo decadencial de dez anos estabelecido no art. 103, caput, da Lei n\u00ba 8.213/1991 \u00e0s hip\u00f3teses em que a quest\u00e3o controvertida n\u00e3o foi apreciada no ato administrativo de an\u00e1lise de concess\u00e3o de benef\u00edcio previdenci\u00e1rio. STJ. 1\u00aa Se\u00e7\u00e3o. REsp 1644191-RS, Rel. Min. Herman Benjamin, julgado em 11/12/2019 (Recurso Repetitivo \u2013 Tema 975) (Info 676).\"},{\"title\":\"ENTENDIMENTO ATUAL STJ: N\u00e3o \u00e9 poss\u00edvel inviabilizar o pedido de concess\u00e3o do benef\u00edcio previdenci\u00e1rio ou de seu restabelecimento em raz\u00e3o do transcurso de quaisquer lapsos temporais - seja decadencial ou prescricional. Rel. Min. Manoel Erhardt (Desembargador convocado do TRF5), Primeira Turma, por unanimidade, julgado em 17/05/2022. (INFO 737)\"}]}]},{\"title\":\"Parag. Unico -  Prescri\u00e7\u00e3o da prestacao  de parcelas atrasadas\",\"children\":[{\"title\":\"5 anos da data em que deveriam sido pagas\"},{\"title\":\"Ou restitui\u00e7\u00e3o de parcelas, salvo dirieto dos incapazes, ausentes e menores do CC\"}]},{\"title\":\"Art. 103-A(contra INSS)\",\"children\":[{\"title\":\"O direito do INSS de anular atos admin. de que decorram ef. favoraveis...\"},{\"title\":\"...P/ beneficiarios decorre em 10 anos, contados da data da pratica....\"},{\"title\":\"Salvo comprovada m\u00e1 f\u00e9\"},{\"title\":\"obs\",\"children\":[{\"title\":\"Paulo aposentou-se por invalidez em 5 de dezembro de 2015. Joaquim obteve, fraudulentamente, benef\u00edcio previdenci\u00e1rio em 5 de dezembro de 2015. Considerando esses dados hipot\u00e9ticos, julgue o item que se segue.  A previd\u00eancia social pode cassar o benef\u00edcio de Joaquim at\u00e9 o dia 5 de dezembro de 2025.  L. 8.213/1991. Art. 103-A.  O direito da Previd\u00eancia Social de anular os atos administrativos de que decorram efeitos favor\u00e1veis para os seus benefici\u00e1rios decai em dez anos, contados da data em que foram praticados, salvo comprovada m\u00e1-f\u00e9.  CESPE / CEBRASPE - 2022 - INSS - T\u00e9cnico do Seguro Social - (GEX Guarulhos)\"}]}]},{\"title\":\"Prescri\u00e7\u00e3o - A\u00e7\u00e3o de Regresso INSS - Respons\u00e1veis CESPE - 2021 - PGE-MS - Procurador do Estado\",\"children\":[{\"title\":\"LEI 8213/91: Art. 120. A Previd\u00eancia Social ajuizar\u00e1 a\u00e7\u00e3o regressiva contra os respons\u00e1veis nos casos de: (Reda\u00e7\u00e3o dada pela Lei n\u00ba 13.846, de 2019) I - neglig\u00eancia quanto \u00e0s normas padr\u00e3o de seguran\u00e7a e higiene do trabalho indicadas para a prote\u00e7\u00e3o individual e coletiva; (Inclu\u00eddo pela Lei n\u00ba 13.846, de 2019) II - viol\u00eancia dom\u00e9stica e familiar contra a mulher, nos termos da Lei n\u00ba 11.340, de 7 de agosto de 2006. (Inclu\u00eddo pela Lei n\u00ba 13.846, de 2019)\"},{\"title\":\"obs\",\"children\":[{\"title\":\"Ademais, STJ O entende que o prazo prescricional dessas a\u00e7\u00f5es ser\u00e1 de 5 anos, por aplica\u00e7\u00e3o anal\u00f3gica e por isonomia do Decreto 20.910/1932. Logo, quando a demanda indenizat\u00f3ria for ajuizada pelo ente estatal contra o particular, o prazo prescricional tamb\u00e9m dever\u00e1 ser o mesmo, ou seja, 5 anos: ADMINISTRATIVO. RECURSO ESPECIAL. SEGURADO FALECIDO EM ACIDENTE DE TRABALHO. DEMANDA RESSARCIT\u00d3RIA AJUIZADA PELO INSS CONTRA O EMPREGADOR. PRAZO PRESCRICIONAL. INCID\u00caNCIA DO ART. 1\u00ba DO DECRETO N\u00ba 20.910/32. INAPLICABILIDADE DOS ARTS. 103 E 104 DA LEI N\u00ba 8.213/91. 1. Nas demandas ajuizadas pelo INSS contra o empregador do segurado falecido em acidente laboral, visando ao ressarcimento dos danos decorrentes do pagamento da pens\u00e3o por morte, o termo a quo da prescri\u00e7\u00e3o da pretens\u00e3o \u00e9 a data da concess\u00e3o do referido benef\u00edcio previdenci\u00e1rio. 2. Em raz\u00e3o do princ\u00edpio da isonomia, \u00e9 quinquenal, nos termos do art. 1\u00ba do Decreto n\u00ba 20.910/32, o prazo prescricional da a\u00e7\u00e3o de regresso acident\u00e1ria movida pelo INSS em face de particular. 3. A natureza ressarcit\u00f3ria de tal demanda afasta a aplica\u00e7\u00e3o do regime jur\u00eddico-legal previdenci\u00e1rio, n\u00e3o se podendo, por isso, cogitar de imprescritibilidade de seu ajuizamento em face do empregador. 4. Recurso especial a que nega provimento. (STJ - 1\u00aa Turma. REsp 1.457.646-PR, Rel. Min. S\u00e9rgio Kukina, julgado em 14/10/2014 - Info 550)\"}]}]},{\"title\":\"obs\",\"children\":[{\"title\":\"Prova: CESPE / CEBRASPE - 2022 - INSS - T\u00e9cnico do Seguro Social - (GEX Guarulhos) Paulo aposentou-se por invalidez em 5 de dezembro de 2015. ( )Paulo pode solicitar a revis\u00e3o de sua aposentadoria at\u00e9 o dia 1.\u00ba de janeiro de 2026. Art. 103. O prazo de decad\u00eancia do direito ou da a\u00e7\u00e3o do segurado ou benefici\u00e1rio para a revis\u00e3o do ato de concess\u00e3o, indeferimento, cancelamento ou cessa\u00e7\u00e3o de benef\u00edcio e do ato de deferimento, indeferimento ou n\u00e3o concess\u00e3o de revis\u00e3o de benef\u00edcio \u00e9 de 10 (dez) anos, contado:                             I - do dia primeiro do m\u00eas subsequente ao do recebimento da primeira presta\u00e7\u00e3o ou da data em que a presta\u00e7\u00e3o deveria ter sido paga com o valor revisto; ou                   II - do dia em que o segurado tomar conhecimento da decis\u00e3o de indeferimento, cancelamento ou cessa\u00e7\u00e3o do seu pedido de benef\u00edcio ou da decis\u00e3o de deferimento ou indeferimento de revis\u00e3o de benef\u00edcio, no \u00e2mbito administrativo.                            Par\u00e1grafo \u00fanico. Prescreve em cinco anos, a contar da data em que deveriam ter sido pagas, toda e qualquer a\u00e7\u00e3o para haver presta\u00e7\u00f5es vencidas ou quaisquer restitui\u00e7\u00f5es ou diferen\u00e7as devidas pela Previd\u00eancia Social, salvo o direito dos menores, incapazes e ausentes, na forma do C\u00f3digo Civil.\"}]},{\"title\":\"Callout\",\"children\":[{\"title\":\"Callout\",\"children\":[{\"title\":\"VERBAS REMUNERAT\u00d3RIAS  DE SENTEN\u00c7A TRABALHISTA\",\"children\":[{\"title\":\"O marco inicial da flu\u00eancia do prazo decadencial, previsto no caput do art. 103 da Lei n\u00ba 8.213/91, quando houver pedido de revis\u00e3o da renda mensal inicial (RMI) para incluir verbas remunerat\u00f3rias recebidas em a\u00e7\u00e3o trabalhista nos sal\u00e1rios de contribui\u00e7\u00e3o que integraram o per\u00edodo b\u00e1sico de c\u00e1lculo (PBC) do benef\u00edcio, deve ser o tr\u00e2nsito em julgado da senten\u00e7a na respectiva reclamat\u00f3ria. STJ. 1\u00aa Se\u00e7\u00e3o. REsp 1947419-RS, Rel. Min. Gurgel de Faria, julgado em 24/08/2022 (Recurso Repetitivo \u2013 Tema 1117) (Info 746).\"}]}]},{\"title\":\"Decad\u00eancia no custeio --> direito de constituir o cr\u00e9dito = 5 ANOS Prescri\u00e7\u00e3o no custeio --> Extin\u00e7\u00e3o do direito de cobrar judicialmente cr\u00e9dito j\u00e1 constitu\u00eddo = 5 ANOS Decad\u00eancia nos benef\u00edcios --> Revis\u00e3o do ato de concess\u00e3o dos benef\u00edcios OU anular ato administrativo = 10 ANOS Prescri\u00e7\u00e3o nos benef\u00edcios --> A\u00e7\u00e3o para receber presta\u00e7\u00f5es vencidas ou restitu\u00eddas = 5 ANOS\"}]}]},{\"title\":\"Beneficios Acumulaveis ART 124, ART 80 E 86 IESES - 2019 - S\u00e3o Jos\u00e9 - SC - Procurador\",\"children\":[{\"title\":\"Salvo D. Adquirido, n\u00e3o \u00e9 possivel o recebimento conjunto dos seguintes beneficios: - Aposentadoria e Aux. Doen\u00e7a(A+A) - Mais de uma Aposentadoria(A+A) - Aposentadoria e Abono Permanencia em Servi\u00e7o(A + Aps) - Salario Maternidade e Aux. Doen\u00e7a(SM + AD) - Mais de 1 Aux. Acidente(aux\u00edlio acidente com aposentadoria) (A+A) - Mais de uma pens\u00e3o deixada por conjuge ou companheiro, ressalvada direito de op\u00e7\u00e3o(Pm + Pm) - Seguro desemprego e qlq benef\u00edcio de presta\u00e7\u00e3o continuada do RGPS exceto pens\u00e3o por morte ou Aux. Acidente \u00a7 2\u00ba O aux\u00edlio-acidente ser\u00e1 devido a partir do dia seguinte ao da cessa\u00e7\u00e3o do aux\u00edlio-doen\u00e7a, independentemente de qualquer remunera\u00e7\u00e3o ou rendimento auferido pelo acidentado, vedada sua acumula\u00e7\u00e3o com qualquer aposentadoria.           (Reda\u00e7\u00e3o dada pela Lei n\u00ba 9.528, de 1997) CESPE - 2021 - PGE-AL - Procurador do Estado\"},{\"title\":\"obs\",\"children\":[{\"title\":\"Caso concreto: Jo\u00e3o requereu administrativamente a aposentadoria. O INSS indeferiu o pedido. Como n\u00e3o teve direito ao benef\u00edcio, Jo\u00e3o continuou trabalhando. Ele, no entanto, ajuizou a\u00e7\u00e3o pedindo a concess\u00e3o da aposentadoria. O Poder Judici\u00e1rio reconheceu que deveria ter recebido a aposentadoria e concedeu o benef\u00edcio determinando o pagamento retroativo das parcelas desde o requerimento administrativo. Ocorre que Jo\u00e3o havia sido demitido sem justa causa e estava recebendo seguro-desemprego. Assim, durante alguns meses Jo\u00e3o receberia seguro-desemprego mais aposentadoria. Isso \u00e9 poss\u00edvel? N\u00e3o. H\u00e1 veda\u00e7\u00e3o no art. 124, par\u00e1grafo \u00fanico, da Lei n\u00ba 8.213/91: Art. 124 (...) Par\u00e1grafo \u00fanico. \u00c9 vedado o recebimento conjunto do seguro-desemprego com qualquer benef\u00edcio de presta\u00e7\u00e3o continuada da Previd\u00eancia Social, exceto pens\u00e3o por morte ou aux\u00edlio-acidente. O que fazer nesse caso? Dever\u00e3o ser pagos os valores atrasados da aposentadoria, abatendo-se os valores j\u00e1 recebidos a t\u00edtulo de seguro-desemprego do montante devido. Ex: se ele tinha R$ 10 mil para receber de aposentadoria atrasada, mas recebeu R$ 2 mil de seguro-desemprego, ficar\u00e1 com R$ 8 mil. STJ. 1\u00aa Turma.REsp 1982937-SP, Rel. Min. Manoel Erhardt (Desembargador convocado do TRF5), julgado em 05/04/2022 (Info 733).\"},{\"title\":\"A possibilidade de cumula\u00e7\u00e3o do aux\u00edlio-acidente com proventos de aposentadoria pressup\u00f5e que a eclos\u00e3o da les\u00e3o incapacitante, ensejadora do direito ao aux\u00edlio-acidente, e a concess\u00e3o da aposentadoria sejam anteriores \u00e0 altera\u00e7\u00e3o do art. 86, \u00a7\u00a7 2\u00ba e 3\u00ba, da Lei n. 8.213/1991, promovida em 11/11/1997 pela Medida Provis\u00f3ria n. 1.596-14/1997, posteriormente convertida na Lei n. 9.528/1997, sendo irrelevante a data do termo inicial do benef\u00edcio. STJ. 1\u00aa Turma. AgInt no REsp 1907861-RJ, Rel. Min. Gurgel de Faria, Rel. Acd. Min. Regina Helena Costa, julgado em 22/03/2022 (Info 731). Obs: existe uma s\u00famula aprovada em 26/03/2014, que diz isso: S\u00famula 507-STJ: A acumula\u00e7\u00e3o de aux\u00edlio-acidente com aposentadoria pressup\u00f5e que a les\u00e3o incapacitante e a aposentadoria sejam anteriores a 11/11/1997, observado o crit\u00e9rio do artigo 23 da Lei 8.213/91 para defini\u00e7\u00e3o do momento da les\u00e3o nos casos de doen\u00e7a profissional ou do trabalho.\"},{\"title\":\"S\u00famula 36/TNU - 06/03/2007 (Doc. VP 103.3262.5015.2400) Seguridade social. Trabalhador rural. Pens\u00e3o por morte e aposentadoria por invalidez. Cumula\u00e7\u00e3o. Possibilidade. Lei 8.213/1991, art. 124. \u00abN\u00e3o h\u00e1 veda\u00e7\u00e3o legal \u00e0 cumula\u00e7\u00e3o da pens\u00e3o por morte de trabalhador rural com o benef\u00edcio da aposentadoria por invalidez, por apresentarem pressupostos f\u00e1ticos e fatos geradores distintos.\u00bb STJ (Embargos de diverg\u00eancia no recurso especial. Seguridade social. Previdenci\u00e1rio. Aposentadoria. Cumula\u00e7\u00e3o. Pens\u00e3o por morte de rural. \u00d3bito ocorrido antes da Lei Complementar 16/73. Lei 8.213\u20441991).\"}]},{\"title\":\"Callout\",\"children\":[{\"title\":\"Roberto s\u00f3 poder\u00e1 acumular o benef\u00edcio da aposentadoria com o benef\u00edcio do sal\u00e1rio-maternidade, que, nesse caso, deve ser decorrente de ado\u00e7\u00e3o ou de guarda judicial para fins de ado\u00e7\u00e3o de crian\u00e7a de at\u00e9 doze anos de idade (art. 93-A do Decreto n.\u00ba 3.048/1999 ou art. 71-A da Lei n.\u00ba 8.213/91).\"}]}]},{\"title\":\"Servi\u00e7o Social - Ler na LEi\"},{\"title\":\"Habilita\u00e7\u00e3o e Reabilita\u00e7\u00e3o Profissional Ler na Lei\"},{\"title\":\"Contagem reciproca de TC Art. 94 ao 99\",\"children\":[{\"title\":\"Para EFEITO de APOSENTADORIA\"},{\"title\":\"\u00c9 assegurada a CONTAGEM RECIPROCA na Adm. Publica e na Atividade Privada\"},{\"title\":\"Hipotese em que os diferentes sistemas se compensarao financeiramente\"},{\"title\":\"Compensa\u00e7\u00e3o financeira \u00e9 feita ao sistema q o benefici\u00e1rio estiver vinculado ao pedi o beneficio\"},{\"title\":\"L. 8.213/91, art. 99\",\"children\":[{\"title\":\"O benef\u00edcio resultante de contagem de tempo de servi\u00e7o na forma desta Se\u00e7\u00e3o (DA CONTAGEM REC\u00cdPROCA) ser\u00e1 concedido e pago pelo sistema a que o interessado estiver vinculado ao requer\u00ea-lo, e calculado na forma da respectiva legisla\u00e7\u00e3o\"}]}]},{\"title\":\"Aplica\u00e7\u00e3o da Lei Previdenciaria no Tempo\",\"children\":[{\"title\":\"Lei de regencia dos Beneficios \u00e9 aquela que estava vigente ao tempo da reuni\u00e7\u00e3o dos requisitos para concess\u00e3o do benef\u00edcio. Adota-se o Tempus Regit Actum. Mesmo que lei posterior melhore a situa\u00e7\u00e3o do segurado,  ela n\u00e3o \u00e9 aplicada. Tempus Rege o Ato. A sua aplica\u00e7\u00e3o tb independe de qual beneficio pretendido\"}]},{\"title\":\"Benef\u00edcios recebidos indevidamente\",\"children\":[{\"title\":\"Tutela Antecipada\",\"children\":[{\"title\":\"Os valores de benef\u00edcios previdenci\u00e1rios complementares recebidos por for\u00e7a de tutela antecipada posteriormente revogada devem ser devolvidos, observando-se, no caso de desconto em folha de pagamento, o limite de 10% (dez por cento) da renda mensal do benef\u00edcio previdenci\u00e1rio at\u00e9 a satisfa\u00e7\u00e3o integral do valor a ser restitu\u00eddo. Situa\u00e7\u00e3o diferente ocorre no caso em que os valores (parcelas de natureza alimentar) foram recebidos, durante anos, por for\u00e7a de senten\u00e7a transitada em julgado. Neste caso, \u00e9 inequ\u00edvoca a boa-f\u00e9 objetiva da parte. STJ. 4\u00aa Turma. AREsp 1775987-RJ, Rel. Min. Luis Felipe Salom\u00e3o, julgado em 03/05/2022 (Info 735).\"}]},{\"title\":\"Erro Administrativo\",\"children\":[{\"title\":\"Os pagamentos indevidos aos segurados decorrentes de erro administrativo (material ou operacional), n\u00e3o embasado em interpreta\u00e7\u00e3o err\u00f4nea ou equivocada da lei pela Administra\u00e7\u00e3o, s\u00e3o repet\u00edveis, sendo leg\u00edtimo o desconto no percentual de at\u00e9 30% (trinta por cento) de valor do benef\u00edcio pago ao segurado/benefici\u00e1rio, ressalvada a hip\u00f3tese em que o segurado, diante do caso concreto, comprova sua boa-f\u00e9 objetiva, sobretudo com demonstra\u00e7\u00e3o de que n\u00e3o lhe era poss\u00edvel constatar o pagamento indevido. STJ. 1\u00aa Se\u00e7\u00e3o. REsp 1381734/RN, Rel. Min. Benedito Gon\u00e7alves, julgado em 10/03/2021 (Recurso Repetitivo \u2013 Tema 979) (Info 688).\"}]},{\"title\":\"Divida Ativa\",\"children\":[{\"title\":\"(I) As inscri\u00e7\u00f5es em d\u00edvida ativa dos cr\u00e9ditos referentes a benef\u00edcios previdenci\u00e1rios ou assistenciais pagos indevidamente ou al\u00e9m do devido constitu\u00eddos por processos administrativos que tenham sido iniciados antes da vig\u00eancia da Medida Provis\u00f3ria n\u00ba 780, de 2017, convertida na Lei n\u00ba 13.494/2017 (antes de 22/05/2017) s\u00e3o nulas, devendo a constitui\u00e7\u00e3o desses cr\u00e9ditos ser reiniciada atrav\u00e9s de notifica\u00e7\u00f5es/intima\u00e7\u00f5es administrativas a fim de permitir-se o contradit\u00f3rio administrativo e a ampla defesa aos devedores e, ao final, a inscri\u00e7\u00e3o em d\u00edvida ativa, obedecendo-se os prazos prescricionais aplic\u00e1veis; e (II) As inscri\u00e7\u00f5es em d\u00edvida ativa dos cr\u00e9ditos referentes a benef\u00edcios previdenci\u00e1rios ou assistenciais pagos indevidamente ou al\u00e9m do devido contra os terceiros beneficiados que sabiam ou deveriam saber da origem dos benef\u00edcios pagos indevidamente em raz\u00e3o de fraude, dolo ou coa\u00e7\u00e3o, constitu\u00eddos por processos administrativos que tenham sido iniciados antes da vig\u00eancia da Medida Provis\u00f3ria n\u00ba 871, de 2019, convertida na Lei n\u00ba 13.846/2019 (antes de 18/01/2019) s\u00e3o nulas, devendo a constitui\u00e7\u00e3o desses cr\u00e9ditos ser reiniciada atrav\u00e9s de notifica\u00e7\u00f5es/intima\u00e7\u00f5es administrativas a fim de permitir-se o contradit\u00f3rio administrativo e a ampla defesa aos devedores e, ao final, a inscri\u00e7\u00e3o em d\u00edvida ativa, obedecendo-se os prazos prescricionais aplic\u00e1veis. STJ. 1\u00aa Se\u00e7\u00e3o. REsp 1860018-RJ, Rel. Min. Mauro Campbell Marques, julgado em 23/06/2021 (Recurso Repetitivo \u2013 Tema 1064) (Info 702).\"}]}]},{\"title\":\"Seguro Desemprego\",\"children\":[{\"title\":\"Seguro-desemprego \u00e9 um benef\u00edcio em dinheiro pago durante alguns meses ao trabalhador que foi demitido sem justa causa (incluindo a rescis\u00e3o indireta). Tem por objetivo fazer com que o desempregado possa se sustentar enquanto busca uma recoloca\u00e7\u00e3o no mercado de trabalho. O seguro-desemprego tem natureza jur\u00eddica de benef\u00edcio previdenci\u00e1rio, j\u00e1 que uma das finalidades da Previd\u00eancia Social \u00e9 a prote\u00e7\u00e3o ao trabalhador em situa\u00e7\u00e3o de desemprego involunt\u00e1rio (art. 201, III, da CF/88). O seguro-desemprego possui fundamento constitucional, estando prevista no art. 7\u00ba, II e no art. 201, III, da CF/88. O conceito dado acima foi o do seguro-desemprego tradicionalmente conhecido. No entanto, podemos identificar, na legisla\u00e7\u00e3o, quatro modalidades de seguro-desemprego: i) do trabalhador formal (empregado de pessoa jur\u00eddica \u2013 ou f\u00edsica a ela equiparado \u2013 dispensado sem justa causa ou de forma indireta): regido pela Lei n\u00ba 7.998/90; ii) do trabalhador resgatado do regime de trabalho for\u00e7ado ou de condi\u00e7\u00e3o an\u00e1loga \u00e0 escravid\u00e3o: tamb\u00e9m disciplinado pela Lei n\u00ba 7.998/90; iii) do trabalhador dom\u00e9stico: regido pela LC 150/2015; e iv) do pescador artesanal, que far\u00e1 jus ao benef\u00edcio durante a paralisa\u00e7\u00e3o da pesca para a preserva\u00e7\u00e3o das esp\u00e9cies (per\u00edodo de defeso), conforme disp\u00f5e a Lei n\u00ba 10.779/2003.\"}]}]},\"cap8\":{\"title\":\"8. Assist\u00eancia Social\",\"children\":[{\"title\":\"Assistencia Social na CF\",\"children\":[{\"title\":\"Tripe da Seguridade\",\"children\":[{\"title\":\"Previdencia\",\"children\":[{\"title\":\"contributiva\"}]},{\"title\":\"Saude\",\"children\":[{\"title\":\"Disponibilizada a todos\"}]},{\"title\":\"Assistencia social\",\"children\":[{\"title\":\"somente aos necessitados\"},{\"title\":\"Independente de Contrib.\"}]}]},{\"title\":\"Art. 203 da CF - Difini\u00e7\u00e3o e objetivos\",\"children\":[{\"title\":\"Defini\u00e7\u00e3o\",\"children\":[{\"title\":\"Prestada a quem necessitar INDEPENDENTE DE CONTRIB.\",\"children\":[{\"title\":\"OBS\",\"children\":[{\"title\":\"Nao se fala em contribuinte obrigatorio ou contribui\u00e7\u00f5es\"}]}]}]},{\"title\":\"Objetivos\",\"children\":[{\"title\":\"Prote\u00e7\u00e3o a FAMILIA, MATERNIDADE, INFANCIA, ADOLESCENCIA e VELHICE\"},{\"title\":\"Amparo as criancas e adolescentes CARENTES\"},{\"title\ s planos de benef\u00edcios ter\u00e3o privil\u00e9gio especial sobre os ativos garantidores das reservas t\u00e9cnicas e, caso estes n\u00e3o sejam suficientes para a cobertura dos direitos respectivos, privil\u00e9gio geral sobre as demais partes n\u00e3o vinculadas ao ativo.         \u00a7 3o Os participantes que j\u00e1 estiverem recebendo benef\u00edcios, ou que j\u00e1 tiverem adquirido este direito antes de decretada a liquida\u00e7\u00e3o extrajudicial, ter\u00e3o prefer\u00eancia sobre os demais participantes.         \u00a7 4o Os cr\u00e9ditos referidos nos par\u00e1grafos anteriores deste artigo n\u00e3o t\u00eam prefer\u00eancia sobre os cr\u00e9ditos de natureza trabalhista ou tribut\u00e1ria.\"}]}]},{\"title\":\"Ser\u00e3o obrigatoriamente levantados na data da decreta\u00e7\u00e3o da LIQUID\",\"children\":[{\"title\":\"Balan\u00e7o Geral de liquida\u00e7\u00e3o e as Demonst. Contabeis e  Atuariais necessarias a determina\u00e7\u00e3o do valor das reservas individuais\"}]},{\"title\":\"LEVANTAMENTO DA LIQUIDACAO EXTRAJUD.\",\"children\":[{\"title\":\"Pode ser realizado a qlq tempo\"},{\"title\":\"Desde que constatados fatos supervenientes que viabilizem a recupera\u00e7\u00e3o\"}]},{\"title\":\"ENCERRAMENTO DA LIQUID.\",\"children\":[{\"title\":\"Ocorre com aprofa\u00e7\u00e3o pelo OFR das contas finais do liquidante e com baixa nos registros\"},{\"title\":\"Comprovado inexistencia de ativos p/ satisfazer creditos\",\"children\":[{\"title\":\"Deve a situa\u00e7\u00e3o ser comunicada ao juizo competnte\"},{\"title\":\"E Efetivados os devidos registros para encerramento do processo de liquida\u00e7\u00e3o\"}]}]}]},{\"title\":\"Disposi\u00e7\u00f5es Especiais sobre INTERVENCAO e LIQUIDACAO EXTRAJUD.\"}]},{\"title\":\"Regime Disciplinar\",\"children\":[{\"title\":\"Respondem pelos danos que causarem as EPC\",\"children\":[{\"title\":\"Administradores de entidade\"},{\"title\":\"Procuradores COM PODERES DE GESTAO\"},{\"title\":\"Membros de conselhos Estatut egulamento do respectivo plano. \u00a7 2o A concess\u00e3o de benef\u00edcio pela previd\u00eancia complementar n\u00e3o depende da concess\u00e3o de benef\u00edcio pelo regime geral de previd\u00eancia social.\"}]}]},{\"title\":\"Art. 69 - Imposto de RENDA\",\"children\":[{\"title\":\"Caput\",\"children\":[{\"title\":\"Contribuicoes vertidas para entidades\"},{\"title\":\"Destinadas ao custeio de Planos de natureza previd.\"},{\"title\":\"Sao dedutiveis para incidencia do IR\"},{\"title\":\"Nos limites da Lei\"}]},{\"title\":\"\u00a71\",\"children\":[{\"title\":\"Sobre as contribuicoes do caput\"},{\"title\":\"Nao incidem tributa\u00e7ao ou Contribuicoes de qlq natureza\"}]},{\"title\":\"\u00a72\",\"children\":[{\"title\":\"Sobre PORTABILIDADE de recursos de reservas tecnicas, fundos e provisoes\"},{\"title\":\"Nao incidem tributacao e contribuicoes\"}]},{\"title\":\"OBS\",\"children\":[{\"title\":\"N\u00e3o incide a contribui\u00e7\u00e3o previdenci\u00e1ria da Lei n\u00ba 8.212/91 sobre os valores vertidos a planos de previd\u00eancia privada complementar de administradores n\u00e3o empregados, mesmo quando n\u00e3o disponibilizados \u00e0 totalidade de empregados e dirigentes da empresa.  STJ. 1\u00aa Turma. REsp 1.182.060-SC, Rel. Min. S\u00e9rgio Kukina, julgado em 7/11/2023 (Info 794).\"}]}]},{\"title\":\"Art. 71\",\"children\":[{\"title\":\"Caput\",\"children\":[{\"title\":\"\u00c9 vedado as Entidades de Previd. Complementar, realizar qlq op. comercial e financeiras\"},{\"title\":\"Com seus adm., membros dos conselhos estatutarios e respectivos conjuges e com parentes ate 2\u02da GRAU\"},{\"title\":\"Com empresas de que participem pessoas que se refere o inciso anterior, EXCETO, no caso de participa\u00e7ao at\u00e9 5% como acionista de EMPRESA DE CAPITAL ABERTO\"},{\"title\":\"Tendo como contraparte, mesmo que indiretamente, PJ ou PF\"}]},{\"title\":\"Parag. Unico\",\"children\":[{\"title\":\"A vedacao do Art. nao se aplica ao Patrocinador, Participantes e aos assistidos QUE\"},{\"title\":\"Nessas condicoes realizem op. com entidade de Peevid. Complementar\"}]}]},{\"title\":\"Art. 72 - Afastamento do MP\",\"children\":[{\"title\":\"Comepte ao OFR das Entidades Fechadas, zelar pelas sociedades simples e funda\u00e7\u00f5es\"},{\"title\":\"Nao se aplicando a esta o disposto no CC sobre a fiscaliza\u00e3o do MP\"},{\"title\":\"O disposto no CC sobre fiscalizacao do MP\"}]},{\"title\":\"Art. 73\",\"children\":[{\"title\":\"Entidades Abertas serao reguladas tambem no que couber\"},{\"title\":\"Pela legislacao aplicavel as sociedades seguradoras\"}]},{\"title\":\"Art. 75\",\"children\":[{\"title\":\"Sem prejuizo do beneficio\"},{\"title\":\"Prescreve em 5 ANOS o direito a prestacoes nao pagas nem reclamadas na epoca propria\"},{\"title\":\"resguardados dirietos dos menores dependentes, incapazes ou dos ausentes\"}]},{\"title\":\"Art. 76\",\"children\":[{\"title\":\"Caput - Plano de Saude\",\"children\":[{\"title\":\"EFPC que na data da publicacao da Lei\"},{\"title\":\"Prestarem ao participantes e assistidos servicos assist. a saude\"},{\"title\":\"Podem continuar a faze-lo\"},{\"title\":\"Desde que seja estabelecido custeio especifico p/ planos assistenciais\"},{\"title\":\"E que sua contabilizacao e o seu patrim. sejam mantidos em separados\"},{\"title\":\"Em relacao ao plano previd.\"}]},{\"title\":\"\u00a71\",\"children\":[{\"title\":\"Os prog. assistenciais de nat. financeira, devem ser extintos apos a publica\u00e7ao da lei\"},{\"title\":\"Permanecendo em vigencia, at\u00e9 seu termo, apenas compromissos ja firmados\"}]},{\"title\":\"\u00a72\",\"children\":[{\"title\":\"Consideram-se prog. assistenciais de nat. financeira\"},{\"title\":\"Aquele em que o rendimento situa-se abaixo da taxa minima atuarial do plano de benef.\"}]}]}]},{\"title\":\"obs\",\"children\":[{\"title\":\"Morte. Litiscons\u00f3rcio\",\"children\":[{\"title\":\"Caso concreto: participante do plano de previd\u00eancia morreu; companheira ajuizou a\u00e7\u00e3o contra o administrador do plano pedindo a concess\u00e3o de pens\u00e3o por morte; ocorre que junto ao plano j\u00e1 constam outras duas benefici\u00e1rias (m\u00e3e e ex-esposa do falecido); essas duas benefici\u00e1rias devem figurar no polo passivo; h\u00e1 litiscons\u00f3rcio passivo necess\u00e1rio e unit\u00e1rio. Na a\u00e7\u00e3o em que o autor requer a concess\u00e3o do benef\u00edcio de pens\u00e3o por morte, h\u00e1 litiscons\u00f3rcio passivo necess\u00e1rio e unit\u00e1rio entre o administrador do plano de previd\u00eancia complementar e os demais benefici\u00e1rios do falecido participante, considerando que a decis\u00e3o de proced\u00eancia atinge a esfera jur\u00eddica destes, prejudicando-os na medida em que acarreta a redu\u00e7\u00e3o proporcional do valor a eles devido, diante da reparti\u00e7\u00e3o do benef\u00edcio previdenci\u00e1rio. STJ. 3\u00aa Turma. REsp 1993030-SP, Rel. Min. Nancy Andrighi, julgado em 27/09/2022 (Info 752).\"}]},{\"title\":\"REFLEXO DE VERBAS TRABALHISTAS DECORRENTES DE A\u00c7\u00c3O JUDICIAL\",\"children\":[{\"title\":\"I) A concess\u00e3o do benef\u00edcio de previd\u00eancia complementar tem como pressuposto a pr\u00e9via forma\u00e7\u00e3o de reserva matem\u00e1tica, de forma a evitar o desequil\u00edbrio atuarial dos planos. Em tais condi\u00e7\u00f5es, quando j\u00e1 concedido o benef\u00edcio de complementa\u00e7\u00e3o de aposentadoria por entidade fechada de previd\u00eancia privada, \u00e9 invi\u00e1vel a inclus\u00e3o dos reflexos de quaisquer verbas remunerat\u00f3rias reconhecidas pela Justi\u00e7a do Trabalho nos c\u00e1lculos da renda mensal inicial dos benef\u00edcios de complementa\u00e7\u00e3o de aposentadoria.(CESPE / CEBRASPE - 2021 - PGE-AL - Procurador do Estado) II) Os eventuais preju\u00edzos causados ao participante ou ao assistido que n\u00e3o puderam contribuir ao fundo na \u00e9poca apropriada ante o ato il\u00edcito do empregador poder\u00e3o ser reparados por meio de a\u00e7\u00e3o judicial a ser proposta contra a empresa ex-empregadora na Justi\u00e7a do Trabalho. III) Modula\u00e7\u00e3o dos efeitos da decis\u00e3o (art. 927, \u00a7 3\u00ba, do CPC/2015): nas demandas ajuizadas na Justi\u00e7a comum at\u00e9 8/8/2018 (data do julgamento do REsp n. 1.312.736/RS - Tema repetitivo n. 955/STJ) - se ainda for \u00fatil ao participante ou assistido, conforme as peculiaridades da causa -, admite-se a inclus\u00e3o dos reflexos de verbas remunerat\u00f3rias, reconhecidas pela Justi\u00e7a do Trabalho, nos c\u00e1lculos da renda mensal inicial dos benef\u00edcios de complementa\u00e7\u00e3o de aposentadoria, condicionada \u00e0 previs\u00e3o regulamentar de que as parcelas de natureza remunerat\u00f3ria devem compor a base de c\u00e1lculo das contribui\u00e7\u00f5es a serem recolhidas e servir de par\u00e2metro para o c\u00f4mputo da renda mensal inicial do benef\u00edcio, e \u00e0 recomposi\u00e7\u00e3o pr\u00e9via e integral das reservas matem\u00e1ticas com o aporte, a ser vertido pelo participante, de valor a ser apurado por estudo t\u00e9cnico atuarial em cada caso. IV) Nas reclama\u00e7\u00f5es trabalhistas em que o ex-empregador tiver sido condenado a recompor a reserva matem\u00e1tica, e sendo invi\u00e1vel a revis\u00e3o da renda mensal inicial da aposentadoria complementar, os valores correspondentes a tal recomposi\u00e7\u00e3o devem ser entregues ao participante ou assistido a t\u00edtulo de repara\u00e7\u00e3o, evitando-se, igualmente, o enriquecimento sem causa da entidade fechada de previd\u00eancia complementar. STJ. 2\u00aa Se\u00e7\u00e3o. REsp 1740397-RS, Rel. Min. Antonio Carlos Ferreira, julgado em 28/10/2020 (Recurso Repetitivo \u2013 Tema 1021) (Info 684).\"}]},{\"title\":\"Mero atraso no pagamento\",\"children\":[{\"title\":\"O contrato de previd\u00eancia privada com plano de pec\u00falio por morte assemelha-se ao seguro de vida, estendendo-se \u00e0s entidades abertas de previd\u00eancia complementar as normas aplic\u00e1veis \u00e0s sociedades seguradoras, nos termos do art. 73 da LC 109/2001. O mero atraso no pagamento de presta\u00e7\u00e3o do pr\u00eamio do seguro n\u00e3o importa em desfazimento autom\u00e1tico do contrato. Exige-se, ao menos, a pr\u00e9via constitui\u00e7\u00e3o em mora do contratante pela seguradora, mediante interpela\u00e7\u00e3o. Essa \u00e9 a intelig\u00eancia da s\u00famula 616 do STJ. Esse entendimento tamb\u00e9m se aplica para a previd\u00eancia privada com pec\u00falio. Assim, em regra, seria necess\u00e1ria a pr\u00e9via interpela\u00e7\u00e3o. No entanto, diante de um longo per\u00edodo de inadimplemento (aproximadamente sete anos), sem prova de circunst\u00e2ncia excepcional que se afigure apta a justificar o descumprimento da obriga\u00e7\u00e3o, entende-se que ocorreu mais que um \u201cmero inadimplemento\u201d. O que houve foi a inequ\u00edvoca manifesta\u00e7\u00e3o de desinteresse na continuidade da rela\u00e7\u00e3o contratual. Se a entidade fosse condenada a indenizar um segurado inadimplente h\u00e1 tanto tempo assim isso seria agredir a boa-f\u00e9 e a l\u00f3gica do razo\u00e1vel. STJ. 4\u00aa Turma. REsp 1691792-RS, Rel. Min. Ant\u00f4nio Carlos Ferreira, julgado em 23/03/2021 (Info 690).\"}]}]}]},{\"title\":\"LC 108/2001\",\"children\":[{\"title\":\"Introducao\",\"children\":[{\"title\":\"Dispoe sobre a relacao entre U E DF e M e Entes da Adm. Indireta e as EFPC\"},{\"title\":\"Criada p regular rela\u00e7ao entre Adm. Publica e a EFPC dos Servidores Publicos\"},{\"title\":\"Essa Lei tinha carater teorico, mas com a Lei 12.618/2012 - criou a FUNPRESP\"},{\"title\":\"Em 2013 os Estado tambem instituiram seus regimes\"},{\"title\":\"N\u00e3o atinge as EAPC. Somente as EFPC com patrocinio PUBLICO\"},{\"title\":\"Para as EFPC de patrocinio publico aplica-se todas as LC\"},{\"title\":\"A LC 108 \u00e9 especial em rela\u00e7\u00e3o a LC 109, regula temas de forma diferente\"},{\"title\":\"Aplica\u00e7\u00e3o da LC 108\",\"children\":[{\"tit function extractText(n,d=0){
  if(d>4) return n.title||"";
  let p=[n.title||""];
  (n.children||[]).forEach(c=>p.push(extractText(c,d+1)));
  (n.callouts||[]).forEach(c=>p.push(extractText(c,d+1)));
  return p.filter(Boolean).join(" • ");
}

function matches(n,t){
  if(!t) return true;
  if((n.title||"").toLowerCase().includes(t)) return true;
  if((n.children||[]).some(c=>matches(c,t))) return true;
  if((n.callouts||[]).some(c=>matches(c,t))) return true;
  return false;
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function hilite(s,t){
  if(!t) return esc(s);
  const re=new RegExp(`(${t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`,"gi");
  return esc(s).replace(re,"<mark>$1</mark>");
}

function renderCallout(node){
  const tipo=detectType(node.title||"");
  const label={cespe:"CESPE/CEBRASPE",stj:"STF/STJ",obs:"OBS"}[tipo];
  const text=extractText(node);
  const isTrivial=!node.title||/^(obs|callout|atenção)$/i.test((node.title||"").trim());
  const titleHtml=isTrivial?"":(`<div class="callout-title">${hilite(node.title,term)}</div>`);
  return `<div class="callout-box ${tipo}"><div class="callout-label">${label}</div>${titleHtml}<div class="callout-body">${esc(text)}</div></div>`;
}

function renderNode(n,depth,path){
  const id=path;
  const hasKids=(n.children&&n.children.length)||(n.callouts&&n.callouts.length);
  const isExp=expanded.has(id)||(term&&matches(n,term));
  const isHit=term&&(n.title||"").toLowerCase().includes(term);
  if(isHit) hits++;

  if(n.callout) return renderCallout(n);

  const tog=hasKids?(isExp?"▾":"▸"):"·";
  const dc=depth===0?"d0":depth===1?"d1":depth===2?"d2":"dn";
  const rowCls=`row${isHit?" hit":""}`;
  const titleHtml=`<span class="txt ${dc}">${hilite(n.title||"",term)}</span>`;

  let childHtml="";
  if(isExp&&hasKids){
    childHtml='<div class="children">';
    (n.children||[]).forEach((c,i)=>{if(!term||matches(c,term)) childHtml+=renderNode(c,depth+1,path+"_"+i);});
    (n.callouts||[]).forEach((c,i)=>{if(!term||matches(c,term)) childHtml+=renderNode({...c,callout:true},depth+1,path+"_c"+i);});
    childHtml+="</div>";
  }
  return `<div class="node" id="n${id}"><div class="${rowCls}" onclick="toggle('${id}')"><span class="tog">${tog}</span>${titleHtml}</div>${childHtml}</div>`;
}

function render(){
  const tree=DATA[cur];
  hits=0;
  let html="";
  if(tree.children){
    tree.children.forEach((n,i)=>{
      if(!term||matches(n,term)) html+=renderNode(n,0,"r"+i);
    });
  }
  document.getElementById("content").innerHTML=html||`<p class="no-res">Nenhum resultado para "${esc(term)}"</p>`;const em=document.getElementById("empty-msg");if(em)em.remove();
  const mb=document.getElementById("matchBar");
  if(term){mb.style.display="block";mb.textContent=`${hits} ocorrência(s) para "${term}"`;}
  else{mb.style.display="none";}
}

function renderTabs(){
  document.getElementById("tabs").innerHTML=CHAPTERS.map((k,i)=>{
    const cid='dprevidenciario_'+i;
    const isDone=_TRK&&_TRK.done&&_TRK.done[cid];
    return `<div class="tab${k===cur?' active':''}" onclick="selChap('${k}')">
      <input type="checkbox" class="_trk_chk" data-cid="${cid}" ${isDone?'checked':''} onclick="event.stopPropagation();_trkToggle('${cid}',this.checked,this)"/>
      <span>${LABELS[k]||k}</span>
    </div>`;
  }).join("");
}

function selChap(k){cur=k;expanded.clear();document.getElementById("search").value="";term="";document.getElementById("matchBar").style.display="none";renderTabs();render();}
function toggle(id){if(expanded.has(id))expanded.delete(id);else expanded.add(id);render();}
function expandAll(){function add(n,p){expanded.add(p);(n.children||[]).forEach((c,i)=>add(c,p+"_"+i));(n.callouts||[]).forEach((c,i)=>add(c,p+"_c"+i));}const t=DATA[cur];(t.children||[]).forEach((n,i)=>add(n,"r"+i));render();}
function collapseAll(){expanded.clear();render();}

let deb;
document.getElementById("search").addEventListener("input",function(){
  clearTimeout(deb);
  deb=setTimeout(()=>{term=this.value.toLowerCase().trim();render();},250);
});

renderTabs();
render();
</script>

        _TRK.done[row.chapter_id] = true;
    });
    try{ Object.keys(_TRK.done).forEach(function(cid){ localStorage.setItem('_pgprog_'+cid,JSON.stringify({done:true,date:null})); }); }catch(_){}
    _trkRender();
  }catch(e){ console.warn('tracker load err', e); }
}

function _trkRender(){
  var count = Object.keys(_TRK.done).length;
  var pct = _TRK.total ? Math.round(count/_TRK.total*100) : 0;
  // Update both injected header bar and sidebar bar
  ['_trk_fill','trk-fill'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.width=pct+'%';});
  ['_trk_pct','trk-pct'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=pct+'%';});
  ['_trk_cnt','trk-cnt'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=count+'/'+_TRK.total;});
  // Update checkboxes
  document.querySelectorAll('._trk_chk').forEach(function(chk){
    var cid = chk.getAttribute('data-cid');
    chk.checked = !!_TRK.done[cid];
    var w = chk.closest('._chk_wrap');
    if(w) w.classList.toggle('_chk_done', !!_TRK.done[cid]);
  });
  renderTabs();
}

async function _trkToggle(chapterId, done, chk){
  if(!_TRK.user){
    // Try to recover session
    try {
      const r = await _sb.auth.getSession();
      if(r.data && r.data.session && r.data.session.user){
        _TRK.user = r.data.session.user;
      } else {
        console.warn('No session found, cannot save tracker');
        return;
      }
    } catch(e) { console.error('getSession error:', e); return; }
  }
  var now = done ? new Date().toISOString() : null;
  if(done) _TRK.done[chapterId] = true;
  else delete _TRK.done[chapterId];
  _trkRender();
  try{
    await _sb.from('progress').upsert({
      user_id: _TRK.user.id,
      chapter_id: chapterId,
      done: done,
      done_at: now
    }, {onConflict: 'user_id,chapter_id'});
  }catch(e){ console.warn('tracker save err', e); }
  try{ localStorage.setItem('_pgprog_'+chapterId, JSON.stringify({done, date:now})); }catch(_){}
}
</script>

<script id="_mm_js">
;(function(){

function _wt(s,mw){

}
function _layR(r){
  r._cy=0;r._y=-r._h/2;r._x=-r._w/2;r._side=0;

  var eg=E('g');
  nodes.forEach(function(n){_vc(n).forEach(function(c){
    var col=n._depth===0?_P[c._ci]:_P[n._ci];var x1,x2,y1=n._cy,y2=c._cy;
    if(n._depth===0){x1=c._side===1?n._x+n._w:n._x;x2=c._side===1?c._x:c._x+c._w;}

    }
