nformar sobre dado essencial do produto ou servico\"}]},{\"title\":\"Abusiva\",\"children\":[{\"title\":\"\u00c9 a discriminatoria de qlq natureza. Que incite a violencia, explore o medo. Ex: religiosidade\"},{\"title\":\"Se aproveite de deficiencia de julgamento e experiencia da crianca\"},{\"title\":\"Desrespeita valores ambientais\"},{\"title\":\"Capaz de induziro consumidor a agir de forma prejudicial ou perigosa a saude seguran\u00e7a\"},{\"title\":\"ferir valores sociais b\u00e1sicos\"},{\"title\":\"ser anti\u00e9tica e ferir a vulnerabilidade do consumidor.\"}]},{\"title\":\"Entendimento do STJ\",\"children\":[{\"title\":\"Empresas de comunica\u00e7\u00e3o nao respondem por publicidades e propostas abusivas e enganosas\"},{\"title\":\"Essa responsa \u00e9 dos fornecedores\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"\u00c9 enganosa a publicidade televisiva que omite o pre\u00e7o e a forma de pagamento do produto, condicionando a obten\u00e7\u00e3o dessas informa\u00e7\u00f5es \u00e0 realiza\u00e7\u00e3o de liga\u00e7\u00e3o telef\u00f4nica tarifada. STJ. 2\u00aa Turma. REsp 1428801-RJ, Rel. Min. Humberto Martins, julgado em 27/10/2015 (Info 573). O caso concreto \u00e9 exemplo de publicidade enganosa por omiss\u00e3o, pois suprime algumas informa\u00e7\u00f5es essenciais sobre o produto (pre\u00e7o e forma de pagamento), as quais somente ser\u00e3o conhecidas pelo consumidor mediante o \u00f4nus de uma liga\u00e7\u00e3o tarifada, mesmo que a compra n\u00e3o venha a ser concretizada. (REsp n. 1.428.801/RJ, relator Ministro Humberto Martins, Segunda Turma, julgado em 27/10/2015, DJe de 13/11/2015.)  FGV - 2022 - TJ-PE - Juiz Substituto FGV - 2023 - TJ-BA - Juiz Leigo STJ, Jurisprud\u00eancia em Teses, Edi\u00e7\u00e3o 165, Tese 03) A aus\u00eancia de informa\u00e7\u00e3o relativa ao pre\u00e7o, por si s\u00f3, n\u00e3o caracteriza publicidade enganosa. Uma influenciadora digital recebe R$ 50.000,00 para promover determinada marca de batom. Versada em marketing, a influenciadora, em vez de dedicar um post exclusivo iden tificando aquela publicidade, menciona casualmente, em uma rede social, que aquele era seu batom favorito e que s\u00f3 tinha conseguido casar porque estava com ele no dia em que conheceu o marido \u2013 realmente, naquele dia, usava o cosm\u00e9tico. Os seguidores, ent\u00e3o, come\u00e7am a perguntar acerca do pre\u00e7o do famigerado batom. A influenciadora, apesar de saber, remete-os ao call center da fabricante, que poderia informar pre\u00e7o e forma de pagamento, pelo custo de meros R$ 0,31 centavos pela liga\u00e7\u00e3o\"},{\"title\":\"JURISPRUD\u00caNCIA EM TESES DO STJ. ED. 165: 6) Constitui pr\u00e1tica comercial abusiva e propaganda enganosa o lan\u00e7amento de dois modelos diferentes para o mesmo autom\u00f3vel, no mesmo ano, ambos anunciados como novo modelo para o pr\u00f3ximo ano(TJAP)\"},{\"title\":\"A les\u00e3o na oferta enganosa ou abusiva traz, juridicamente falando, conota\u00e7\u00e3o abstrata que, em regra, tem car\u00e1ter coletivo. Apenas circunstancialmente tamb\u00e9m ter\u00e1 repercuss\u00f5es individuais. (REsp 1802787/SP, Rel. Ministro HERMAN BENJAMIN, SEGUNDA TURMA, julgado em 08/10/2019, DJe 11/09/2020)\"}]}]},{\"title\":\"\u00c9 abusiva a publicidade de alimentos direcionada, de forma expl\u00edcita ou impl\u00edcita, ao p\u00fablico infantil.\"},{\"title\":\"Fatos Importantes sobre Publicidade Enganosa\",\"children\":[{\"title\":\"N\u00e3o \u00e9 necessario demonstrar m\u00e1-f\u00e9, dolo ou culpa\"},{\"title\":\"N\u00e3o necessita que o consumidor tenha sido efetivamente enganado\"}]},{\"title\":\"STJ\",\"children\":[{\"title\":\"caveat emptor\",\"children\":[{\"title\":\"O dever de informa\u00e7\u00e3o exige comportamento positivo e ativo do fornecedor. Isso porque o CDC recha\u00e7a a chamada regra caveat emptor* e tamb\u00e9m n\u00e3o aceita que o sil\u00eancio equivalha \u00e0 informa\u00e7\u00e3o. Ao contr\u00e1rio. O sil\u00eancio \u00e9 considerado como \u201cpatologia repreens\u00edvel\u201d, sendo interpretado em desfavor do fornecedor, inclusive como oferta e publicidade enganosa por omiss\u00e3o, punida civil, administrativa e criminalmente pelo CDC. Caveat emptor \u00e9 uma locu\u00e7\u00e3o em latim que, se traduzida literalmente, seria algo como \u201ccomprador, tome seus cuidados\u201d. A regra do caveat emptor significa que o cliente (o comprador ou tomador de servi\u00e7os) \u00e9 quem deve tomar os cuidados de se informar no momento da contrata\u00e7\u00e3o para se resguardar de eventuais danos. Assim, o cliente que teria o \u00f4nus de perguntar tudo do fornecedor e, se ele n\u00e3o perguntasse, teria que arcar com as consequ\u00eancias disso. O CDC n\u00e3o aceita essa regra do caveat emptor. O CDC afirma que o consumidor tem o direito de ser informado(art. 6, inciso III do CDC)\"}]},{\"title\":\"Ausencia de Pre\u00e7o\",\"children\":[{\"title\":\"A aus\u00eancia de informa\u00e7\u00e3o relativa ao pre\u00e7o, por si s\u00f3, n\u00e3o caracteriza publicidade enganosa. Para a caracteriza\u00e7\u00e3o da ilegalidade omissiva, a oculta\u00e7\u00e3o deve ser de qualidade essencial do produto, do servi\u00e7o ou de suas reais condi\u00e7\u00f5es de contrata\u00e7\u00e3o, considerando, na an\u00e1lise do caso concreto, o p\u00fablico alvo do an\u00fancio publicit\u00e1rio. STJ. 4\u00aa Turma. REsp 1705278-MA, Rel. Min. Antonio Carlos Ferreira, julgado em 19/11/2019 (Info 663).\"}]}]}]},{\"title\":\"Invers\u00e3o obrigatoria do  ONUS da PROVA -  Art. 38 do CDC\",\"children\":[{\"title\":\"O ONUS da prova da VERACIDADE e CORRECAO DA INFORMACAO\"},{\"title\":\"CABE a QUEM PATROCINA. N\u00e3o \u00e9 o consumidor que deve provar\"},{\"title\":\"OBS\",\"children\":[{\"title\":\"O Madero, conhecido restaurante nacional especializado em hamb\u00fargueres, utiliza em suas propagandas a frase \u201cThe Best Burger in the World\u201d, traduzida em portugu\u00eas por \u201cO melhor hamb\u00farguer do mundo\u201d. O concorrente Burger King com a\u00e7\u00e3o de obriga\u00e7\u00e3o de n\u00e3o fazer contra o Madero, requerendo que o r\u00e9u se abstivesse de usar a express\u00e3o em seu material publicit\u00e1rio e fachadas de restaurantes, sob pena de multa di\u00e1ria e pagamento de indeniza\u00e7\u00e3o por concorr\u00eancia desleal. O Madero contestou alegando n\u00e3o haver ilegalidade em sua publicidade, pois se trata de uma t\u00e9cnica publicit\u00e1ria conhecida como \u201cpuffing\u201d, que usa exageros na publicidade e n\u00e3o configura propaganda enganosa. O juiz proferiu decis\u00e3o interlocut\u00f3ria dizendo que o caso se enquadra no art. 38 do C\u00f3digo de Defesa do Consumidor e que, portanto, por for\u00e7a de lei, o Madero deveria provar que o seu hamb\u00farguer \u00e9 o melhor do mundo. O STJ n\u00e3o concordou com a decis\u00e3o do magistrado. A aplica\u00e7\u00e3o da norma prevista no art. 38 do CDC \u00e0s rela\u00e7\u00f5es concorrenciais, al\u00e9m de n\u00e3o se mostrar necess\u00e1ria, diante da previs\u00e3o do art. 373, \u00a7 1\u00ba, do CPC, poderia - paradoxalmente - ser utilizada, em determinadas circunst\u00e2ncias, justamente como instrumento anticoncorrencial. Isso porque a parte autora poderia propor a\u00e7\u00f5es temer\u00e1rias e sem fundamento, obrigando a parte r\u00e9 a fazer prova do contr\u00e1rio. Esse abuso do direito de a\u00e7\u00e3o \u00e9 uma das formas poss\u00edveis de se praticar infra\u00e7\u00e3o \u00e0 ordem econ\u00f4mica. Assim, a invers\u00e3o autom\u00e1tica do \u00f4nus da prova prevista pelo art. 38 do CDC poderia facilitar o abuso do direito de a\u00e7\u00e3o, incentivando esse tipo de estrat\u00e9gia anticoncorrencial, uma vez que, a partir do ajuizamento de demanda fr\u00edvola, o \u00f4nus da prova estaria direta e automaticamente imposto ao concorrente com menor porte econ\u00f4mico. STJ. 3\u00aa Turma. REsp 1866232-SP, Rel. Min. Paulo de Tarso Sanseverino, julgado em 21/3/2023 (Info 768).\"}]}]},{\"title\":\"Transparencia na FUNDAMENTACAO publicitaria -  Art. 36, parag. \u00fanico do CDC\",\"children\":[{\"title\":\"O fornecedor, na publicidade de seus produtos ou servicos\"},{\"title\":\"Manter\u00e1, em seu poder, para info. dos legitimos interessados\"},{\"title\":\"Os dados faticos, tecnicos e cientificos que d\u00e3o sustentacao a mensagem\"}]},{\"title\":\"Dever de CONTRAPROPAGANDA -  Art. 60 do CDC\",\"children\":[{\"title\":\"\u00c9 cominada qnd o fornecedor incorrer em publicidade enganosa ou abusiva\"},{\"title\":\"Ser\u00e1 as expensas do infrator\"},{\"title\":\"Deve ser divulgada pelo responsavel da mesma forma, frequencia e dimens\u00e3o\"},{\"title\":\"Preferencialmente no mesmo veiculo da publicidade\"}]}]},{\"title\":\"Publicidade por Correio-Eletronico\",\"children\":[{\"title\":\"Efetiva-se, por exemplo, pelos spans\"},{\"title\":\"Entendimento STJ\",\"children\":[{\"title\":\"\u00c9 possivel recusa de recebimento pela simples exclus\u00e3o\"},{\"title\":\"Assim, n\u00e3o h\u00e1 dano moral\"}]}]},{\"title\":\"Publicidade de BEBIDAS ALCOOLICAs\",\"children\":[{\"title\":\"Sofre restri\u00e7\u00e3o, segundo a CF. Aplica-se o Art. 9\u02da e o Art. 37 \u00a72 do CDC\"}]}]},{\"title\":\"Praticas Abusivas rol do art. 39 \u00e9 taxativo ou exemplificativo? dependem da comprova\u00e7\u00e3o do dano?\",\"children\":[{\"title\":\"Conceito\",\"children\":[{\"title\":\"Desconformidade com os padroes mercadologicos de boa conduta\"},{\"title\":\"As praticas sao abusivas independente do dano efetivo ao consumidor\"},{\"title\":\"H\u00e1 presuncao absoluta de ilicitude, ou seja, NULIDADE\"},{\"title\":\"Rol do Art. 39 \u00e9 exemplificativo\"},{\"title\":\"Independe da comprova\u00e7\u00e3o de dano ao destinatario final\"},{\"title\":\"obs\",\"children\":[{\"title\":\"cancelamento de voos\",\"children\":[{\"title\":\"O transporte a\u00e9reo \u00e9 servi\u00e7o essencial e pressup\u00f5e continuidade. Considera-se pr\u00e1tica abusiva o cancelamento de voos sem raz\u00f5es t\u00e9cnicas ou de seguran\u00e7a inequ\u00edvocas. Tamb\u00e9m \u00e9 pr\u00e1tica abusiva o descumprimento do dever de informar o consumidor, por escrito e justificadamente, quando tais cancelamentos vierem a ocorrer. Nas a\u00e7\u00f5es coletivas ou individuais, a ag\u00eancia reguladora n\u00e3o integra o feito em litiscons\u00f3rcio passivo quando se discute a rela\u00e7\u00e3o de consumo entre concession\u00e1ria e consumidores, e n\u00e3o a regulamenta\u00e7\u00e3o emanada do ente regulador. STJ. 2\u00aa Turma. REsp 1469087-AC, Rel. Min. Humberto Martins, julgado em 18/8/2016 (Info 593).\"}]},{\"title\":\"Milhagem\",\"children\":[{\"title\":\"N\u00e3o \u00e9 abusiva a cl\u00e1usula constante de programa de fidelidade que impede a transfer\u00eancia de pontos/b\u00f4nus de milhagem a\u00e9rea aos sucessores do cliente titular no caso de seu falecimento. STJ. 3\u00aa Turma. REsp 1.878.651-SP, Rel. Min. Moura Ribeiro, julgado em 04/10/2022 (Info 753). DOD Plus \u2013 outro julgado sobre \u201cpontos\u201d de viagem A empresa a\u00e9rea que disponibilizar a op\u00e7\u00e3o de resgate de passagens a\u00e9reas com pontos pela internet \u00e9 obrigada a assegurar que o cancelamento ou reembolso destas seja solicitado pelo mesmo meio O fato de a empresa a\u00e9rea n\u00e3o disponibilizar a op\u00e7\u00e3o de cancelamento de passagem por meio da plataforma digital da empresa (internet) configura pr\u00e1tica abusiva, na forma do art. 39, V, do CDC, especialmente quando a ferramenta \u00e9 disponibilizada ao consumidor no caso de aquisi\u00e7\u00e3o/resgate de passagens. Caso adaptado: Jo\u00e3o adquiriu, pela internet, passagem a\u00e9rea, mediante a utiliza\u00e7\u00e3o de pontos de milhas. Por quest\u00f5es pessoais, precisou cancelar a viagem e solicitou, tamb\u00e9m pela internet, o reembolso das milhas, mas n\u00e3o obteve \u00eaxito. A companhia a\u00e9rea informou que o reembolso de passagens adquiridas com pontos s\u00f3 poderia ser feito no aeroporto, ou por interm\u00e9dio da central de vendas, por telefone, mas n\u00e3o pelo site. O STJ considerou que a conduta foi abusiva (art. 39, V, do CDC). STJ. 4\u00aa Turma REsp 1966032-DF, Rel. Min. Luis Felipe Salom\u00e3o, julgado em 16/08/2022 (Info 745). O fato de a empresa a\u00e9rea n\u00e3o disponibilizar a op\u00e7\u00e3o de cancelamento de passagem por meio da plataforma digital da empresa (internet) configura pr\u00e1tica abusiva, na forma do art. 39, inciso V, do CDC, especialmente quando a ferramenta \u00e9 disponibilizada ao consumidor no caso de aquisi\u00e7\u00e3o/resgate de passagens. A conduta, al\u00e9m de ser desprovida de fundamento t\u00e9cnico ou econ\u00f4mico, evidencia a imposi\u00e7\u00e3o de \u00f4nus excessivo ao consumidor, considerando a necessidade de seu deslocamento \u00e0s lojas f\u00edsicas da empresa (apenas aquelas localizadas nos aeroportos) ou a utiliza\u00e7\u00e3o do call center, medidas indiscutivelmente menos efetivas quando comparadas ao meio eletr\u00f4nico. Nesse passo, configurada a pr\u00e1tica de conduta lesiva ao consumidor, n\u00e3o h\u00e1 falar em inger\u00eancia desmotivada na atividade empresarial. STJ. 4\u00aa Turma. REsp 1.966.032; Proc. 2021/0029736-0; DF; Rel. Min. Luis Felipe Salom\u00e3o, julgado em 16/08/2022, DJE 09/09/2022.\"}]}]}]},{\"title\":\"Art. 39, I do CDC - VENDA CASADA FGV - 2023 - TRF - 1\u00aa REGI\u00c3O - Juiz Federal Substituto\",\"children\":[{\"title\":\"Condicionar o fornecimento ao fornecimento de outro produto ou\"},{\"title\":\"SEM JUSTA CAUSA a limites qquantitativos\"},{\"title\":\"VENDA CASADA ------ VIOLA --------- LIBERDADE DE ESCOLHA.\"},{\"title\":\"Sum. 356 do STJ\",\"children\":[{\"title\":\"\u00c9 legitima cobran\u00e7a de tarifa basica pelo telefone fixo\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"Cheque especial\",\"children\":[{\"title\":\"\u00c9 inconstitucional a cobran\u00e7a de tarifa banc\u00e1ria pela disponibiliza\u00e7\u00e3o de limite para \u201ccheque especial\u201d. Contraria o ordenamento jur\u00eddico-constitucional a permiss\u00e3o dada por resolu\u00e7\u00e3o do Conselho Monet\u00e1rio Nacional (CMN) \u00e0s institui\u00e7\u00f5es financeiras para cobrarem tarifa banc\u00e1ria pela mera disponibiliza\u00e7\u00e3o de cr\u00e9dito ao cliente na modalidade \u201ccheque especial\u201d. STF. Plen\u00e1rio. ADI 6407/DF, Rel. Min. Gilmar Mendes, julgado em 30/4/2021 (Info 1015).\"}]},{\"title\":\"Parcela Minima do  Cart\u00e3o de Credito\",\"children\":[{\"title\":\"N\u00e3o \u00e9 abusiva a cl\u00e1usula do contrato de cart\u00e3o de cr\u00e9dito que autoriza a operadora, em caso de inadimplemento, debitar na conta corrente do titular o pagamento do valor m\u00ednimo da fatura, ainda que contestadas as despesas lan\u00e7adas. STJ. 4\u00aa Turma. REsp 1626997-RJ, Rel. Min. Marco Buzzi, julgado em 01/06/2021 (Info 699). Obs: \u00e9 poss\u00edvel que o entendimento jurisprudencial acima seja alterado. Isso porque a Lei n\u00ba 14.181/2021 acrescentou o inciso I do art. 54-G ao CDC prevendo essa conduta como sendo pr\u00e1tica abusiva. Confira: Art. 54-G. Sem preju\u00edzo do disposto no art. 39 deste C\u00f3digo e na legisla\u00e7\u00e3o aplic\u00e1vel \u00e0 mat\u00e9ria, \u00e9 vedado ao fornecedor de produto ou servi\u00e7o que envolva cr\u00e9dito, entre outras condutas: I - realizar ou proceder \u00e0 cobran\u00e7a ou ao d\u00e9bito em conta de qualquer quantia que houver sido contestada pelo consumidor em compra realizada com cart\u00e3o de cr\u00e9dito ou similar, enquanto n\u00e3o for adequadamente solucionada a controv\u00e9rsia, desde que o consumidor haja notificado a administradora do cart\u00e3o com anteced\u00eancia de pelo menos 10 (dez) dias contados da data de vencimento da fatura, vedada a manuten\u00e7\u00e3o do valor na fatura seguinte e assegurado ao consumidor o direito de deduzir do total da fatura o valor em disputa e efetuar o pagamento da parte n\u00e3o contestada, podendo o emissor lan\u00e7ar como cr\u00e9dito em confian\u00e7a o valor id\u00eantico ao da transa\u00e7\u00e3o contestada que tenha sido cobrada, enquanto n\u00e3o encerrada a apura\u00e7\u00e3o da contesta\u00e7\u00e3o;\"}]},{\"title\":\"EAPC e FILIA\u00c7\u00c3O\",\"children\":[{\"title\":\"\u00c9 poss\u00edvel impor ao consumidor sua pr\u00e9via filia\u00e7\u00e3o \u00e0 entidade aberta de previd\u00eancia complementar como condi\u00e7\u00e3o para contratar com ela empr\u00e9stimo financeiro. Segundo o par\u00e1grafo \u00fanico do art. 71 da LC 109/2001, as entidades de previd\u00eancia privada abertas podem realizar opera\u00e7\u00f5es financeiras apenas com seus patrocinadores, participantes e assistidos. Dessa forma, a entidade de previd\u00eancia, ao exigir que o consumidor, antes de realizar o empr\u00e9stimo, fizesse um plano de previd\u00eancia complementar, n\u00e3o praticou qualquer ato il\u00edcito, considerando que tais entidades somente podem realizar este tipo de opera\u00e7\u00e3o com seus patrocinadores, filiados e assistidos. Logo, sem essa pr\u00e9via filia\u00e7\u00e3o, a entidade estaria impedida de conceder o empr\u00e9stimo. Assim, n\u00e3o se trata de \\\"venda casada\\\" (art. 39, I, do CDC), mas sim de uma provid\u00eancia que \u00e9 imposta por lei. STJ. 4\u00aa Turma. REsp 861830-RS, Rel. Min. Maria Isabel Gallotti, julgado em 5/4/2016 (Info 581).\"}]},{\"title\":\"Institui\u00e7\u00e3o de ensino superior n\u00e3o pode recusar a matr\u00edcula de aluno aprovado em vestibular em raz\u00e3o de inadimpl\u00eancia em curso diverso anteriormente frequentado por ele na mesma institui\u00e7\u00e3o. STJ. 2\u00aa Turma. REsp 1.583.798-SC, Rel. Min. Herman Benjamin, julgado em 24/5/2016 (Info 591).\"},{\"title\":\"Seguro Habitacional no SFH\",\"children\":[{\"title\":\"No \u00e2mbito do SFH, o seguro habitacional ganha conforma\u00e7\u00e3o diferenciada, uma vez que integra a pol\u00edtica nacional de habita\u00e7\u00e3o, destinada a facilitar a aquisi\u00e7\u00e3o da casa pr\u00f3pria, especialmente pelas classes de menor renda da popula\u00e7\u00e3o. Trata-se, portanto de contrato obrigat\u00f3rio que visa \u00e0 prote\u00e7\u00e3o da fam\u00edlia e \u00e0 salvaguarda do im\u00f3vel que garante o respectivo financiamento imobili\u00e1rio, resguardando, assim, os recursos p\u00fablicos direcionados \u00e0 manuten\u00e7\u00e3o do sistema. A partir dessa perspectiva, infere-se que uma das justas expectativas do segurado, ao aderir ao seguro habitacional obrigat\u00f3rio para aquisi\u00e7\u00e3o da casa pr\u00f3pria pelo SFH, \u00e9 a de receber o bem im\u00f3vel pr\u00f3prio e adequado ao uso a que se destina. E a essa expectativa leg\u00edtima de garantia corresponde a de ser devidamente indenizado pelos preju\u00edzos suportados em decorr\u00eancia de danos originados na vig\u00eancia do contrato e geradores dos riscos cobertos pela seguradora, segundo o previsto na ap\u00f3lice, como razoavelmente se pressup\u00f5e ocorrer com os v\u00edcios estruturais de constru\u00e7\u00e3o. STJ. 2\u00aa Se\u00e7\u00e3o. REsp 1804965-SP, Rel. Min. Nancy Andrighi, julgado em 27/05/2020 (Info 672).\"}]},{\"title\":\"Mutuario do SFH pode ser compelido a contratar seguro?\",\"children\":[{\"title\":\"\u2b50\ufe0fS\u00famula 473 do STJ: O mutu\u00e1rio do SFH n\u00e3o pode ser compelido a contratar o seguro habitacional obrigat\u00f3rio com a institui\u00e7\u00e3o financeira mutuante ou com a seguradora por ela indicada. A jurisprud\u00eancia do STJ entende que caso a institui\u00e7\u00e3o financeira obrigue o contratante a realizar o seguro habitacional com ela ou com algum parceiro, seria venda casada. No entanto, a pr\u00f3pria legisla\u00e7\u00e3o do SFH exige que seja contratado um seguro. No caso em tela, o banco exigiu o seguro mas aceitou que fosse feito em institui\u00e7\u00e3o financeira diversa, n\u00e3o caracterizando a venda casada: \u201c1.2. \u00c9 necess\u00e1ria a contrata\u00e7\u00e3o do seguro habitacional, no \u00e2mbito do SFH. Contudo, n\u00e3o h\u00e1 obrigatoriedade de que o mutu\u00e1rio contrate o referido seguro diretamente com o agente financeiro, ou por seguradora indicada por este, exig\u00eancia esta que configura \u201cvenda casada\u201d, vedada pelo art. 39, inciso I, do CDC.\u201d (REsp n. 969.129/MG, relator Ministro Luis Felipe Salom\u00e3o, Segunda Se\u00e7\u00e3o, julgado em 9/12/2009, DJe de 15/12/2009.)\"}]}]}]},{\"title\":\"Art. 39, II do CDC - Recusa no Atendimento\",\"children\":[{\"title\":\"Recusar atendimento aos consumidores, na exata medida de suas disponibilidades E\"},{\"title\":\"E conformidade com usos e costumes\"},{\"title\":\"OBS\",\"children\":[{\"title\":\"Fornecedor nao pode selecionar o consumidor que ira vender\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"CESPE / CEBRASPE - 2022 - Prefeitura de Maring\u00e1 - PR - Procurador Municipal Prevalece no STJ a orienta\u00e7\u00e3o de que nos contratos de aluguel de cofre, N \u00c3 O \u00e9 abusiva a cl\u00e1usula que imp\u00f5e limite aos valores e objetos que podem ser armazenados, sobre os quais incidir\u00e1 a obriga\u00e7\u00e3o de seguran\u00e7a e prote\u00e7\u00e3o. STJ. 4\u00aa Turma. AgInt nos EDcl nos EDcl no REsp 1627962/SP, Rel. Min. Marco Buzzi, julgado em 07/06/2022. ESSE ENTENDIMENTO SE APLICA MESMO EM CASOS DE FURTO/ROUBO: 2. O contrato banc\u00e1rio de loca\u00e7\u00e3o de cofre particular \u00e9 esp\u00e9cie contratual mista que conjuga caracter\u00edsticas tanto de um contrato de dep\u00f3sito quanto de um contrato de loca\u00e7\u00e3o, qualificando-se, ainda, pela verdadeira presta\u00e7\u00e3o dos servi\u00e7os de seguran\u00e7a e guarda oferecidos pela institui\u00e7\u00e3o financeira locadora, ficando o banco locador respons\u00e1vel pela guarda e vigil\u00e2ncia do recipiente locado, respondendo por sua integridade e inviolabilidade. 3. A pr\u00e1tica de crimes por terceiros que importem no arrombamento do cofre locado (roubo/furto) constitui hip\u00f3tese de fortuito interno, revelando grave defeito na presta\u00e7\u00e3o do servi\u00e7o banc\u00e1rio contratado, provocando para a institui\u00e7\u00e3o financeira o dever de indenizar seus consumidores pelos preju\u00edzos eventualmente suportados. 4. N\u00e3o se revela abusiva a cl\u00e1usula meramente limitativa do uso do cofre locado, ou seja, aquela que apenas delimita quais s\u00e3o os objetos pass\u00edveis de serem depositados em seu interior pelo locat\u00e1rio e que, consequentemente, estariam resguardados pelas obriga\u00e7\u00f5es (indiretas) de guarda e prote\u00e7\u00e3o atribu\u00eddas ao banco locador. 5. A n\u00e3o observ\u00e2ncia, pelo consumidor, de regra contratual limitativa que o impedia de, sem pr\u00e9via comunica\u00e7\u00e3o e contrata\u00e7\u00e3o de seguro espec\u00edfico, depositar no interior do cofre bens de valor superior ao expressamente fixado no contrato exime o banco locador do dever de repara\u00e7\u00e3o por preju\u00edzos materiais diretos relativos \u00e0 perda dos bens excedentes ali indevidamente armazenados. Precedente. (AgInt nos EDcl no AREsp n. 1.206.017/SP, relator Ministro Ricardo Villas B\u00f4as Cueva, Terceira Turma, julgado em 25/11/2019, DJe de 27/11/2019); N\u00c3O CONFUNDIR: Em contrato de penhor firmado por consumidor com institui\u00e7\u00e3o financeira, \u00e9 nula a cl\u00e1usula que limite o valor da indeniza\u00e7\u00e3o na hip\u00f3tese de eventual furto, roubo ou extravio do bem empenhado. STJ. 4\u00aa Turma. REsp 1155395-PR, Rel. Min. Raul Ara\u00fajo, julgado em 1\u00ba/10/2013 (Info 529). EM RESUMO: CL\u00c1USULA QUE IMP\u00d5E LIMITE AOS VALORES E OBJETOS QUE PODEM SER ARMAZENADOS: N\u00e3o \u00e9 abusiva, ainda que em casos de roubo/furto. EM CONTRATOS DE PENHOR - CL\u00c1USULA QE LIMITE O VALOR DE INDENIZA\u00c7\u00c3O NA HIP\u00d3TESE DE EVENTUAL FURTO/ROUBO/EXTRAVIO: \u00c9 nula.\"}]}]},{\"title\":\"Art. 39, III do CDC - Entrega de produtos sem req. FCC - 2022 - DPE-CE - Defensor(a) P\u00fablico(a) de Entr\u00e2ncia Inicial\",\"children\":[{\"title\":\"Enviar ou entregar ao consumidor, SEM SOLICITACAO, qlq produto ou servico\"},{\"title\":\"Art. 39, parag. unico - Amostras Gratis\",\"children\":[{\"title\":\"Servicos ou produtos enviados na forma acima\"},{\"title\":\"Equiparam-se a amostas gratis, sendo que inexiste obriga\u00e7\u00e3o de pagto\"},{\"title\":\"Inexiste obriga\u00e7\u00e3o de pagto\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"S\u00famula 532 do STJ: Constitui pr\u00e1tica comercial abusiva o envio de cart\u00e3o de cr\u00e9dito sem pr\u00e9via e expressa solicita\u00e7\u00e3o do consumidor, configurando-se ato il\u00edcito indeniz\u00e1vel e sujeito \u00e0 aplica\u00e7\u00e3o de multa administrativa. Pratica Abusiva Ato indenizavel Sujeito a Multa FCC - 2022 - DPE-MT - Defensor P\u00fablico de 1\u00aa Classe\"}]}]},{\"title\":\"Art. 39, IV do CDC - Hipervulnerabilidade\",\"children\":[{\"title\":\"Prevalecer-se da fraqueza do consumidor p/ impingir-lhe produtos ou serv.\"},{\"title\":\"Entendimento do STJ\",\"children\":[{\"title\":\"\u00c9 abusiva clausula limitativa do tempo em UTI\"}]},{\"title\":\"S\u00famula 597-STJ Carencia Plano de  Saude\",\"children\":[{\"title\":\"A cl\u00e1usula contratual de plano de sa\u00fade que prev\u00ea car\u00eancia para utiliza\u00e7\u00e3o dos servi\u00e7os de assist\u00eancia m\u00e9dica nas situa\u00e7\u00f5es de emerg\u00eancia ou de urg\u00eancia \u00e9 considerada abusiva se ultrapassado o prazo m\u00e1ximo de 24 horas contado da data da contrata\u00e7\u00e3o\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"O art. 12, II, \u201ca\u201d, da Lei n\u00ba 9.656/98 pro\u00edbe que os planos de sa\u00fade limitem o tempo para a interna\u00e7\u00e3o hospitalar. No mesmo sentido, foi editada a s\u00famula do STJ: S\u00famula 302-STJ: \u00c9 abusiva a cl\u00e1usula contratual de plano de sa\u00fade que limita no tempo a interna\u00e7\u00e3o hospitalar do segurado. Vale ressaltar, no entanto, que o disposto no art. 12, II, \u201ca\u201d e na S\u00famula 302 do STJ referem-se, expressamente, \u00e0 segmenta\u00e7\u00e3o hospitalar, e n\u00e3o \u00e0 ambulatorial. Assim, n\u00e3o \u00e9 abusiva a cl\u00e1usula inserta em contrato de plano de sa\u00fade individual que estabelece, para o tratamento emergencial ou de urg\u00eancia, no segmento atendimento ambulatorial, o limite de 12 horas. STJ. 3\u00aa Turma. REsp 1764859-RS, Rel. Min. Marco Aur\u00e9lio Bellizze, julgado em 06/11/2018 (Info 637).\"}]}]},{\"title\":\"Art. 39, V do CDC - Vantagem muito onerosa\",\"children\":[{\"title\":\"Exigir do consumidor vantagem manifestamente excessiva\"},{\"title\":\"Art. 51 \u00a71 do CDC - Presume-se  exagerada a vantagem que\",\"children\":[{\"title\":\"Ofende principios fundamentais\"},{\"title\":\"Restringe direitos fundamentais inerentes ao contrato\"},{\"title\":\"Seja excessivamente onerosa ao consumidor, considerando conteudo e natureza do contrato\"}]}]},{\"title\":\"Art. 39, VI do CDC - Executar sem autorizacao\",\"children\":[{\"title\":\"Executar servicos sem orcamento e autorizacao expressa, salvo praticas recorrentes entre eles\"},{\"title\":\"Art. 40 - Or\u00e7amento\",\"children\":[{\"title\":\"Obrgatoriedade\",\"children\":[{\"title\":\"O fornecedor de servico \u00e9 obrigado a entregar ao consumidor orcamento previo\"},{\"title\":\"Deve discriminar o valor da mao-de-obra, materiais e equipam., cond. de pagto e data de inicio e fim\"}]},{\"title\":\"Prazo de validade do valor or\u00e7ado\",\"children\":[{\"title\":\"Salvo estip. em ocntrario, 10 dias, contados do RECEBIMENTO pelo consumidor\"}]},{\"title\":\"Vincula\u00e7\u00e3o\",\"children\":[{\"title\":\"Aprovado, o orcamento obriga os contraentes\"},{\"title\":\"somente pode ser alterado por ivre negociacao das partes\"}]},{\"title\":\"Onus e Acrescimos da contratac\u00f5a de terceiros\",\"children\":[{\"title\":\"Consumidor nao responde se nao previstos no orcamento\"}]}]}]},{\"title\":\"Art. 39, VII do CDC - Infos depreciativas\",\"children\":[{\"title\":\"Repassar info depreciativa, referente a ato praticado pelo consumidor no ex. de seus direitos\"}]},{\"title\":\"Art. 39, VIII do CDC - Produtos em desacordo\",\"children\":[{\"title\":\"Colocar no mercado produtos em desacordo com normas\"}]},{\"title\":\"Art. 39, IX do CDC - Recusar a venda\",\"children\":[{\"title\":\"Recusar venda a quem disponha adquiri-los mediante pronto pagto, ressalvados casos de intermedia\u00e7\u00e3o previstos em leis especiais\",\"children\":[{\"title\":\"Em regra, nos contratos banc\u00e1rios, envolvendo rela\u00e7\u00f5es din\u00e2micas e dur\u00e1veis, de execu\u00e7\u00e3o continuada, intuito personae - como nos casos de conta-corrente banc\u00e1ria e de cheque especial -, que exigem da institui\u00e7\u00e3o financeira frequentes pesquisa cadastral e an\u00e1lise de riscos, entre outras peculiaridades, n\u00e3o h\u00e1 como se impor, como aos demais fornecedores de produtos e servi\u00e7os de pronto pagamento pelo consumidor, a obriga\u00e7\u00e3o de contratar prevista no inciso IX do art. 39 do CDC. Nas raz\u00f5es de decidir, o STJ ratificou a I N A P L I C A B I L I D A D E do art. 39, IX, do CDC \u00e0s institui\u00e7\u00f5es financeiras citando esse entendimento (dispon\u00edvel no Buscador): https://bit.ly/37wopqZ O art. 39, IX, do CDC \u00e9 inaplic\u00e1vel \u00e0s institui\u00e7\u00f5es financeiras quando do encerramento unilateral de conta banc\u00e1ria, afastando-se a obrigatoriedade de manuten\u00e7\u00e3o do contrato de conta-corrente. Isto porque, o encerramento do contrato de conta corrente consiste em um direito subjetivo exercit\u00e1vel por qualquer das partes contratantes, desde que observada a pr\u00e9via e regular notifica\u00e7\u00e3o. STJ. 4\u00aa Turma. AgInt no REsp 1473795/RJ, Rel. Min. Antonio Carlos Ferreira, julgado em 29/06/2020\"}]}]},{\"title\":\"Art. 39, X do CDC - Elevar precos FCC - 2022 - DPE-CE - Defensor(a) P\u00fablico(a) de Entr\u00e2ncia Inicial\",\"children\":[{\"title\":\"Elevar sem justa causa preco de produtos ou servicos\"}]},{\"title\":\"Art. 39, XII do CDC - Sem prazo e termo inicial FCC - 2022 - DPE-CE - Defensor(a) P\u00fablico(a) de Entr\u00e2ncia Inicial\",\"children\":[{\"title\":\"Deixar de fixar prazo p cumprimento da obrig. ou deixar o termo inicial a seu exclusivo criterio\"}]},{\"title\":\"Art. 39, XIII do CDC - Tabelamento de precos FCC - 2022 - DPE-CE - Defensor(a) P\u00fablico(a) de Entr\u00e2ncia Inicial\",\"children\":[{\"title\":\"Aplicar ofrmula ou indice de reajuste diverso do legal ou contratualmente estabelecido\"},{\"title\":\"Art. 41 - Tabelamento de pre\u00e7os\",\"children\":[{\"title\":\"No caso de fornecimento sujeitos a controle ou tabelamento de precos\"},{\"title\":\"Os fornecedores devem respeitar limites oficiais\"},{\"title\":\"sob pena de restitui\u00e7\u00e3o da quantia recebida em excesso, com att\"},{\"title\":\"Sem prejuizo de outras sancoes\",\"children\":[{\"title\":\"Podendo ainda o consumidor exigir a sua escolha, desfazimento do neg.\"}]}]}]},{\"title\":\"XVII - condicionem ou limitem de qualquer forma o acesso aos \u00f3rg\u00e3os do Poder Judici\u00e1rio\"},{\"title\":\"XVIII - estabele\u00e7am prazos de car\u00eancia em caso de impontualidade das presta\u00e7\u00f5es mensais ou impe\u00e7am orestabelecimento integral dos direitos do consumidor e de seus meios de pagamento a partir da purga\u00e7\u00e3o da mora ou doacordo com os credores;\"},{\"title\":\"Venda Casada e Venda Casada as Avessas Clausula de Decaimento Clausula de N\u00e3o Indenizar Compromisso Arbitral Compuls\u00f3rio\",\"children\":[{\"title\":\"Cl\u00e1usula de decaimento: s\u00e3o as cl\u00e1usulas que estabelecem a perda das parcelas pagas. S\u00famula 543-STJ: Na hip\u00f3tese de resolu\u00e7\u00e3o de contrato de promessa de compra e venda de im\u00f3vel submetido ao C\u00f3digo de Defesa do Consumidor, deve ocorrer a imediata restitui\u00e7\u00e3o das parcelas pagas pelo promitente comprador - integralmente, em caso de culpa exclusiva do promitente vendedor/construtor, ou parcialmente, caso tenha sido o comprador quem deu causa ao desfazimento. Apenas a t\u00edtulo de curiosidade, o tema acima envolve a chamada cl\u00e1usula de decaimento. Cl\u00e1usula de decaimento \u00e9 aquela que estabelece que o adquirente ir\u00e1 perder todas as presta\u00e7\u00f5es pagas durante o contrato caso se mostre inadimplente ou requeira o distrato. A venda casada '\u00e0s avessas', indireta ou dissimulada consiste em se admitir uma conduta de consumo intimamente relacionada a um produto ou servi\u00e7o, mas cujo exerc\u00edcio \u00e9 restringido \u00e0 \u00fanica op\u00e7\u00e3o oferecida pelo pr\u00f3prio fornecedor, limitando, assim, a liberdade de escolha do consumidor. (...) 17. Se os incumbentes optam por submeter os ingressos \u00e0 venda terceirizada em meio virtual (da internet), devem oferecer ao consumidor diversas op\u00e7\u00f5es de compra em diversos s\u00edtios eletr\u00f4nicos, caso contr\u00e1rio, a liberdade dos consumidores de escolha da intermediadora da compra \u00e9 cerceada, limitada unicamente aos servi\u00e7os oferecidos pela recorrida, de modo a ficar configurada a venda casada, nos termos do art. 39, I e IX, do CDC.\u201d (grifamos)  Compromisso arbitral compuls\u00f3rio; Cl\u00e1usula determina a utiliza\u00e7\u00e3o compuls\u00f3ria de arbitragem (art. 51, VII). Viola o acesso aos \u00f3rg\u00e3os judici\u00e1rios e administrativos (art. 6, VII). cl\u00e1usula de n\u00e3o indenizar; \u00c9 cl\u00e1usula que afasta as consequ\u00eancias normais da inexecu\u00e7\u00e3o ou execu\u00e7\u00e3o inadequada de uma obriga\u00e7\u00e3o (art. 51, I). Viola o direito \u00e0 prote\u00e7\u00e3o contra pr\u00e1ticas e cl\u00e1usulas abusivas.\"}]}]},{\"title\":\"Cobran\u00e7a de Dividas\",\"children\":[{\"title\":\"Intro\",\"children\":[{\"title\":\"\u00c9 ato legitimo e n\u00e3o proibido pelo CDC\"},{\"title\":\"consumidor nao pode ser exposto e nem submetido a constrang. ou ameaca\"},{\"title\":\"O art. 940 do CC aplica-se de forma suplementar(exige judicial e m\u00e1 f\u00e9) - PGM Manaus 2018 CEBRASPE)\"},{\"title\":\"Vale ressaltar que o \u00f4nus de provar que houve engano justific\u00e1vel \u00e9 do fornecedor(Juiz TJPR 2014)\"}]},{\"title\":\"Proibicoes Absolutas\",\"children\":[{\"title\":\"Ameacas\"},{\"title\":\"constrangimento fisico ou moral\"},{\"title\":\"Coacao\"},{\"title\":\"emprego de afirmacoes falsas, incorretas ou enganosas\"}]},{\"title\":\"Probicoes RELATIVAS\",\"children\":[{\"title\":\"Exposicao do consumidor a ridiculo\"},{\"title\":\"Interferencia no descanso, trabalho ou lazer\"}]},{\"title\":\"Repeti\u00e7\u00e3o do Indebito Restitui\u00e7\u00e3o em Dobro MP/TO 2012 CESPE MPE/SC 2019 FGV - 2023 - TJ-BA - Conciliador\",\"children\":[{\"title\":\"consumidor cobrado em quantia indevida tem dirieto a repeticao do indebito por valor igual ao DOBRO q PAGOU(n\u00e3o do que foi cobrado) em excesso acrescido de correcao e juros, salvo em casos de ganho justificavel O engano JUSTIFIC\u00c1VEL afasta sim a obriga\u00e7\u00e3o da repeti\u00e7\u00e3o de ind\u00e9bito. Art. 42 (...) Par\u00e1grafo \u00fanico. O consumidor cobrado em quantia indevida tem direito \u00e0 repeti\u00e7\u00e3o do ind\u00e9bito, por valor igual ao dobro do que pagou em excesso, acrescido de corre\u00e7\u00e3o monet\u00e1ria e juros legais, salvo hip\u00f3tese de engano justific\u00e1vel.\"},{\"title\":\"A restitui\u00e7\u00e3o em dobro do ind\u00e9bito (par\u00e1grafo \u00fanico do artigo 42 do CDC) independe da natureza do elemento volitivo do fornecedor que cobrou valor indevido, revelando-se cab\u00edvel quando a cobran\u00e7a indevida consubstanciar conduta contr\u00e1ria \u00e0 boa-f\u00e9 objetiva. STJ. Corte Especial. EAREsp 676608/RS, Rel. Min. Og Fernandes, julgado em 21/10/2020\"},{\"title\":\"obs\",\"children\":[{\"title\":\"Teobaldo recebe uma carta em sua casa, remetida por seu banco, cobrando-lhe por servi\u00e7os n\u00e3o prestados. Teobaldo, imediatamente, aciona o Juizado Especial C\u00edvel para obter a suspens\u00e3o da cobran\u00e7a e a repeti\u00e7\u00e3o em dobro do valor cobrado. J\u00e9ssica paga uma viagem a\u00e9rea e, posteriormente, pede o cancelamento porque suas f\u00e9rias foram redesignadas para outra data. Vai ao juizado especial requerer a repeti\u00e7\u00e3o em dobro dos valores pagos e n\u00e3o devolvidos administrativamente. Leonor verifica em sua conta banc\u00e1ria o desconto de diversos seguros n\u00e3o contratados, por imposi\u00e7\u00e3o unilateral do banco. Aju\u00edza demanda indenizat\u00f3ria, com pedido de repeti\u00e7\u00e3o em dobro. Supondo que todos tenham raz\u00e3o quanto \u00e0 irregularidade da conduta do fornecedor, ter\u00e1(\u00e3o) direito \u00e0 repeti\u00e7\u00e3o em dobro, nos termos do Art. 42, \u00a7 \u00fanico, do CDC: C apenas Leonor;\"}]}]},{\"title\":\"OBS\",\"children\":[{\"title\":\"DA COBRAN\u00c7A DE D\u00cdVIDAS Art. 42 do CDC - Na cobran\u00e7a de d\u00e9bitos, o consumidor inadimplente n\u00e3o ser\u00e1 exposto a rid\u00edculo, nem ser\u00e1 submetido a qualquer tipo de constrangimento ou amea\u00e7a.  Par\u00e1grafo \u00fanico. O consumidor cobrado em quantia indevida tem direito \u00e0 repeti\u00e7\u00e3o do ind\u00e9bito, por valor igual ao dobro do que pagou em excesso, acrescido de corre\u00e7\u00e3o monet\u00e1ria e juros legais, salvo hip\u00f3tese de engano justific\u00e1vel. Das Infra\u00e7\u00f5es Penais Art. 71. Utilizar, na cobran\u00e7a de d\u00edvidas, de amea\u00e7a, coa\u00e7\u00e3o, constrangimento f\u00edsico ou moral, afirma\u00e7\u00f5es falsas incorretas ou enganosas ou de qualquer outro procedimento que exponha o consumidor, injustificadamente, a rid\u00edculo ou interfira com seu trabalho, descanso ou lazer: Pena Deten\u00e7\u00e3o de tr\u00eas meses a um ano e multa. (ATEN\u00c7\u00c3O TODOS OS CRIMES DO CDC S\u00c3O DE MENOR POTENCIAL OFENSIVO)\"},{\"title\":\"Em caso de cobran\u00e7a judicial indevida, \u00e9 poss\u00edvel aplicar a san\u00e7\u00e3o prevista no art. 940 do C\u00f3digo Civil mesmo sendo uma rela\u00e7\u00e3o de consumo. O art. 940 do CC e o art. 42 do CDC incidem em hip\u00f3teses diferentes, tutelando, cada um deles, uma situa\u00e7\u00e3o espec\u00edfica envolvendo a cobran\u00e7a de d\u00edvidas pelos credores. Mesmo diante de uma rela\u00e7\u00e3o de consumo, se inexistentes os pressupostos de aplica\u00e7\u00e3o do art. 42, par\u00e1grafo \u00fanico, do CDC, deve ser aplicado o sistema geral do C\u00f3digo Civil, no que couber. O art. 940 do CC \u00e9 norma complementar ao art. 42, par\u00e1grafo \u00fanico, do CDC e, no caso, sua aplica\u00e7\u00e3o est\u00e1 alinhada ao cumprimento do mandamento constitucional de prote\u00e7\u00e3o do consumidor. STJ. 3\u00aa Turma. REsp 1645589-MS, Rel. Min. Ricardo Villas B\u00f4as Cueva, julgado em 04/02/2020 (Info 664).\"}]}]},{\"title\":\"Banco de dados e  Cadastro de Consumidores\",\"children\":[{\"title\":\"Intro\",\"children\":[{\"title\":\"\u201cEm sua origem, a privacidade estava associada ao direito de ser deixado em paz \u2013 rightto bel et alone. A preocupa\u00e7\u00e3o atual, entretanto, \u00e9 proteger o cidad\u00e3o em rela\u00e7\u00e3o aos modernos \u2013 e cada vez mais eficientes \u2013 mecanismos de inform\u00e1tica de tratamento (coleta, armazenamento e difus\u00e3o) de dados. Some-se a isso a crescente tend\u00eancia de an\u00e1lise, ju\u00edzos de valor das pessoas a partir de um perfil digital, ou seja, de dados obtidos friamente em redes eletr\u00f4nicas, pela internet, por transfer\u00eancias n\u00e3o autorizadas que, invariavelmente, n\u00e3o correspondem a situa\u00e7\u00f5es reais, ensejando tratamento discriminat\u00f3rio, julgamentos r\u00e1pidos e equivocados ou acesso a informa\u00e7\u00f5es que integram dados sens\u00edveis. Esta nova configura\u00e7\u00e3o de tratamento de dados, permitida pelo progresso na \u00e1rea da inform\u00e1tica apresenta, ao lado de benef\u00edcios, amea\u00e7a \u00e0 dignidade da pessoa humana, a direitos da personalidade, podendo significar a perda ou significativa diminui\u00e7\u00e3o de autonomia e liberdade pessoais.\u201d (BESSA, Leonardo Roscoe. Responsabilidade civil dos bancos dos dados de prote\u00e7\u00e3o ao cr\u00e9dito: di\u00e1logo entre o C\u00f3digo de Defesa do Consumidor e a Lei do Cadastro Positivo. Revista de Direito do Consumidor: RDC, v. 23, n. 92, mar./abr. 2014).\"}]},{\"title\":\"Banco de dados e Cadastro tem CONCEITOS distintos\",\"children\":[{\"title\":\"A diferenca surge na fonte da informa\u00e7ao e no seu destino\"},{\"title\":\"Cadastro\",\"children\":[{\"title\":\"O proprio consumidor fornece as informacoes\"},{\"title\":\"O destino \u00e9 fornecedor especifico\"}]},{\"title\":\"Banco de dados\",\"children\":[{\"title\":\"Infos vem dos fornecedores\"},{\"title\":\"Destino final da info. \u00e9 o mercado\"}]}]},{\"title\":\"Disposi\u00e7\u00f5es do CDC CESPE - 2022 - DPE-PA - Defensor Promotor MP/GO 2019 FGV - 2023 - TJ-ES - Juiz Substituto  FCC - 2022 - DPE-CE - Defensor(a) P\u00fablico(a)\",\"children\":[{\"title\":\"Intro\",\"children\":[{\"title\":\"Para o CDC, em rela\u00e7\u00e3o aos Banco de Dados, todos consumidores sao vulneraveis seja PF ou PJ\"},{\"title\":\"Aplica-se o CDC para qlq Banco de Dados, publico ou privado\"},{\"title\":\"Consumidor tem amplo acesso.  A negatvia \u00e9 tutelado via HD\"},{\"title\":\"Objetividade e Linguagem de facil comprees\u00e3o\"}]},{\"title\":\"Carater Publico\",\"children\":[{\"title\":\"Bancos de dados e cadastros s\u00e3o considerados entidades de CARATER PUBLICO\"}]},{\"title\":\"A responsa civil em raz\u00e3o de banco de dados \u00e9 OBJETIVA em decorrencia de registros indevidos\",\"children\":[{\"title\":\"H\u00e1 responsa tanto do banco de dados como do fornecedor\"}]},{\"title\":\"Acesso as Informa\u00e7\u00f5es\",\"children\":[{\"title\":\"O consumidor ter\u00e1 acesso imediato e gratuito a suas infos e as FONTES das infos.\"}]},{\"title\":\"N\u00e3o pode conter informa\u00e7\u00f5es referentes a periodo superior que 5 ANSO\",\"children\":[{\"title\":\"Prazo comeca corre no dia seguinte ao vencimento da divida\"},{\"title\":\"obs\",\"children\":[{\"title\":\"Os cadastros e bancos de dados n\u00e3o poder\u00e3o conter informa\u00e7\u00f5es negativas do consumidor referentes a per\u00edodo superior a 5 anos (art. 43, \u00a7 1\u00ba do CDC). Passado esse prazo, o pr\u00f3prio \u00f3rg\u00e3o de cadastro deve retirar a anota\u00e7\u00e3o negativa, independentemente de como esteja a situa\u00e7\u00e3o da d\u00edvida (n\u00e3o importa se ainda est\u00e1 sendo cobrada em ju\u00edzo ou se ainda n\u00e3o foi prescrita). Qual \u00e9 o termo inicial deste prazo de 5 anos? A partir de quando ele come\u00e7a a ser contado: do dia em que venceu a d\u00edvida ou da data em que o nome do consumidor foi inserido no cadastro? O termo inicial do prazo m\u00e1ximo de cinco anos que o nome de devedor pode ficar inscrito em \u00f3rg\u00e3o de prote\u00e7\u00e3o ao cr\u00e9dito \u00e9 o dia seguinte \u00e0 data de vencimento da d\u00edvida. STJ. 3\u00aa Turma. REsp 1630889-DF, Rel. Min. Nancy Andrighi, julgado em 11/09/2018 (Info 633). STJ. 3\u00aa Turma. REsp 1.316.117-SC, Rel. Min. Jo\u00e3o Ot\u00e1vio de Noronha, Rel. para ac\u00f3rd\u00e3o Min. Paulo de Tarso Sanseverino, julgado em 26/4/2016 (Info 588).\"}]}]},{\"title\":\"Abertura precisa de AR? quem notifica da inscri\u00e7\u00e3o? se preexistente legitima anota\u00e7\u00e3o? quem cabe excluir o nome?\",\"children\":[{\"title\":\"Deve ser comunicada ao Consumidor por escrito, qnd nao solicitada por ele\"},{\"title\":\"S. 404 STJ\",\"children\":[{\"title\":\"\u00c9 dispensavel/prescindivel AR na carta de comunicac\u00e3o\"}]},{\"title\":\"S. 359 STJ\",\"children\":[{\"title\":\"Cabe ao orgao mantenedor do cadastro a notifica\u00e7\u00e3o do CREDOR ANTES de inscreve-lo(ausencia de comunica\u00e7\u00e3o previa enseja danos morais) A responsabilidade pela inclus\u00e3o do nome do devedor no cadastro incumbe \u00e0 entidade que o mant\u00e9m, e n\u00e3o ao credor, que apenas informa a exist\u00eancia da d\u00edvida (STJ AgRg nos EDcl no REsp 907.608/RS).\"}]},{\"title\":\"Sum. 548 do STJ - Exclus\u00e3o do nome\",\"children\":[{\"title\":\"Incumbe ao credor a exclus\u00e3o do registro da divida em nome do devedor\"},{\"title\":\"No prazo de 5 dias, a partir do efetivo e integral pagto\"}]},{\"title\":\"Inexatid\u00e3o nos dados\",\"children\":[{\"title\":\"Nesse caso o consumidor pode exigir a imediata corre\u00e7\u00e3o\"},{\"title\":\"O arquivista tem 5 dias uteis p/ alterar as informa\u00e7\u00f5es\"}]},{\"title\":\"Preexistencia de Legitima Inscri\u00e7\u00e3o\",\"children\":[{\"title\":\"S\u00famula 385-STJ: Da anota\u00e7\u00e3o irregular em cadastro de prote\u00e7\u00e3o ao cr\u00e9dito, n\u00e3o cabe indeniza\u00e7\u00e3o por dano moral, quando preexistente leg\u00edtima inscri\u00e7\u00e3o, ressalvado o direito ao cancelamento.\"}]}]},{\"title\":\"obs\",\"children\":[{\"title\":\"Configura dano moral in re ipsa a aus\u00eancia de comunica\u00e7\u00e3o acerca da disponibiliza\u00e7\u00e3o/comercializa\u00e7\u00e3o de informa\u00e7\u00f5es pessoais em bancos de dados do consumidor. STJ. 3\u00aa Turma. REsp 1758799-MG, Rel. Min. Nancy Andrighi, julgado em 12/11/2019 (Info 660)\"}]},{\"title\":\"Callout\",\"children\":[{\"title\":\"A recusa em fornecer o acesso ou infos \u00e9 crime Art. 72. Impedir ou dificultar o acesso do consumidor \u00e0s informa\u00e7\u00f5es que sobre ele constem em cadastros, banco de dados, fichas e registros: Pena Deten\u00e7\u00e3o de seis meses a um ano ou multa.\"}]}]},{\"title\":\"Disciplina do Cadastro dos Maus Fornecedores\",\"children\":[{\"title\":\"Orgaos publicos devem manter cadastros atualizados de reclamacoes contra fornecedores\"},{\"title\":\"Devem divulga-los anualmente e publicamente\"},{\"title\":\"A publicacao indica se a reclamacao foi atendida ou nao pelo fornecedor\"},{\"title\":\"qlq interessado pode ter acesso\"}]},{\"title\":\"Entendimento STJ - Cartorio e Dados\",\"children\":[{\"title\":\"Diante da presun\u00e7\u00e3o legal de veracidade e publicidade inerente aos\"},{\"title\":\"registros de cartorio de protesto\"},{\"title\":\"A reprod. objetiva, fiel, atualizada e clara desses dados na base do orgao do prot. de credito\"},{\"title\":\"AINDA Q sem a CIENCIA do CONSUMIDOR\"},{\"title\":\"Nao tem condao de ensejar repara\u00e7\u00e3o de danos\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"PLATAFORMAS DE NEGOCIA\u00c7AO DE DIVIDAS\",\"children\":[{\"title\":\"\u00b7       AS PLATAFORMAS DE NEGOCIA\u00c7\u00c3O DE D\u00cdVIDAS (SERASA LIMPA NOME, Quite J\u00e1) n\u00e3o possuem a mesma natureza dos instrumentos de prote\u00e7\u00e3o ao mercado de consumo dos servi\u00e7os de prote\u00e7\u00e3o ao cr\u00e9dito, e os registros delas constantes n\u00e3o configuram negativa\u00e7\u00e3o - inscri\u00e7\u00e3o em cadastros ou banco de dados desabonadores do hist\u00f3rico do consumidor para fins de an\u00e1lise de risco - n\u00e3o estando sujeitos, portanto, ao prazo do art. 43, \u00a71\u00ba da lei 8.078/90 (C\u00f3digo de Defesa do Consumidor) desde que respeitados o sigilo das informa\u00e7\u00f5es e a aus\u00eancia de coer\u00e7\u00e3o para aderir \u00e0s propostas. Tend\u00eancia do Tribunais Estaduais (RS/RN/MG em sede de IRDR). A inser\u00e7\u00e3o de registro de d\u00edvidas prescrita em plataformas de negocia\u00e7\u00e3o \u00e9 leg\u00edtima e n\u00e3o configura indevida restri\u00e7\u00e3o de cr\u00e9dito, por n\u00e3o afetar o credit score do consumidor. O registro de d\u00e9bito, mesmo prescrito, em plataformas eletr\u00f4nicas de negocia\u00e7\u00e3o de d\u00edvida, n\u00e3o configura ato il\u00edcito ensejador de dano moral e, portanto, da correspondente repara\u00e7\u00e3o.\"}]},{\"title\":\"Cadastro de Passagem\",\"children\":[{\"title\":\"O \u201ccadastro de passagem\u201d ou \u201ccadastro de consultas anteriores\u201d \u00e9 um banco de dados de consumo no qual os comerciantes registram consultas feitas a respeito do hist\u00f3rico de cr\u00e9dito de consumidores que com eles tenham realizado tratativas ou solicitado informa\u00e7\u00f5es gerais sobre condi\u00e7\u00f5es de financiamento ou credi\u00e1rio. \u00c9 l\u00edcita a manuten\u00e7\u00e3o do \u201ccadastro de passagem\u201d, ou seja, ele pode existir. No entanto, assim como ocorre com todo e qualquer banco de dados ou cadastro de consumo, o \u201ccadastro de passagem\u201d deve cumprir \u00e0s exig\u00eancias previstas no art. 43 do CDC. Assim, somente poder\u00e3o constar no \u201ccadastro de passagem\u201d informa\u00e7\u00f5es dos consumidores se essa inclus\u00e3o tiver sido previamente comunicada ao respectivo consumidor. A inser\u00e7\u00e3o de informa\u00e7\u00f5es dos consumidores no \u201ccadastro de passagem\u201d sem pr\u00e9via comunica\u00e7\u00e3o \u00e9 pr\u00e1tica il\u00edcita. Vale ressaltar, no entanto, que a pr\u00e1tica \u00e9 que \u00e9 il\u00edcita, n\u00e3o o cadastro em si. STJ. 3\u00aa Turma. REsp 1726270-BA, Rel. Min. Nancy Andrighi, Rel. Acd. Min. Ricardo Villas B\u00f4asCueva, julgado em 27/11/2018 (Info 641).\"}]},{\"title\":\"Infos de cart\u00f3rio de protest\",\"children\":[{\"title\":\"As entidades mantenedoras de cadastros de prote\u00e7\u00e3o ao cr\u00e9dito n\u00e3o devem incluir em sua base de dados informa\u00e7\u00f5es coletadas dos cart\u00f3rios de protestos sem a informa\u00e7\u00e3o do prazo de vencimento da d\u00edvida, sendo respons\u00e1veis pelo controle de ambos os limites temporais estabelecidos no art. 43 da Lei n\u00ba 8.078/90. STJ. 3\u00aa Turma. REsp 1630889-DF, Rel. Min. Nancy Andrighi, julgado em 11/09/2018 (Info 633).\"}]},{\"title\":\"Notifica\u00e7\u00e3o de inscri\u00e7\u00e3o pode ser por SMS ou email?\",\"children\":[{\"title\":\"A notifica\u00e7\u00e3o do consumidor acerca da inscri\u00e7\u00e3o de seu nome em cadastro restritivo de cr\u00e9dito exige o pr\u00e9vio envio de correspond\u00eancia ao seu endere\u00e7o, sendo vedada a notifica\u00e7\u00e3o exclusiva por meio de e-mail ou mensagem de texto de celular (SMS). STJ. 3\u00aa Turma. REsp 2.056.285-RS, Rel. Min. Nancy Andrighi, julgado em 25/4/2023 (Info 773) FGV - 2023 - TJ-ES - Juiz Substituto\"}]},{\"title\":\"score de credito Metodologia de Calculo\",\"children\":[{\"title\":\"O \u201ccredit scoring\u201d pode ser utilizado no Brasil como sistema de avalia\u00e7\u00e3o do risco de concess\u00e3o de cr\u00e9dito? SIM. O STJ entendeu que essa pr\u00e1tica comercial \u00e9 L\u00cdCITA, estando autorizada pelo art. 5\u00ba, IV e pelo art. 7\u00ba, I, da Lei n.\u00b0 12.414/2011 (Lei do Cadastro Positivo), que, ao tratar sobre os direitos do cadastrado nos bancos de dados, menciona indiretamente a possibilidade de existir a an\u00e1lise de risco de cr\u00e9dito. Vale ressaltar, no entanto, que para o \u201ccredit scoring\u201d ser l\u00edcito, \u00e9 necess\u00e1rio que respeite os limites estabelecidos pelo sistema de prote\u00e7\u00e3o do consumidor no sentido da tutela da privacidade e da m\u00e1xima transpar\u00eancia nas rela\u00e7\u00f5es negociais, conforme previs\u00e3o do CDC e da Lei n.\u00b0 12.414/2011. STJ. 2\u00aa Se\u00e7\u00e3o. REsp 1.419.697-RS, Rel. Min. Paulo de Tarso Sanseverino, julgado em 12/11/2014 (recurso repetitivo) (Info 551). S\u00famula 550-STJ: A utiliza\u00e7\u00e3o de escore de cr\u00e9dito, m\u00e9todo estat\u00edstico de avalia\u00e7\u00e3o de risco que n\u00e3o constitui banco de dados, dispensa o consentimento do consumidor, que ter\u00e1 o direito de solicitar esclarecimentos sobre as informa\u00e7\u00f5es pessoais valoradas e as fontes dos dados considerados no respectivo c\u00e1lculo. Al\u00e9m de saber a sua pontua\u00e7\u00e3o, o consumidor tem direito de saber qual foi a metodologia utilizada no c\u00e1lculo? N\u00c3O. O consumidor ter\u00e1 direito de saber a sua pontua\u00e7\u00e3o e as informa\u00e7\u00f5es pessoais utilizadas. No entanto, nem o consumidor nem ningu\u00e9m ter\u00e1 direito de saber a metodologia de c\u00e1lculo, ou seja, qual foi a f\u00f3rmula matem\u00e1tica e os dados estat\u00edsticos utilizados no \u201ccredit scoring\u201d. Isso porque essa f\u00f3rmula \u00e9 fruto de estudos e investimentos, constituindo segredo da atividade empresarial (art. 5\u00ba, IV, da Lei n.\u00b0 12.414\u20442011: ...\\\"resguardado o segredo empresarial\u201d). STJ. 2\u00aa Se\u00e7\u00e3o. REsp 1.419.697-RS, Rel. Min. Paulo de Tarso Sanseverino, julgado em 12/11/2014 (recurso repetitivo) (Info 551).\"}]}]}]},{\"title\":\"Prote\u00e7\u00e3o Contratual\",\"children\":[{\"title\":\"PODE TER CLAUSULA QUE  DIMINUA DIREITOS DO  CONSUMIDOR?\",\"children\":[{\"title\":\"Art. 54, \u00a7 4\u00b0 As cl\u00e1usulas que implicarem limita\u00e7\u00e3o de direito do consumidor dever\u00e3o ser redigidas com destaque, permitindo sua imediata e f\u00e1cil compreens\u00e3o. CESPE / CEBRASPE - 2022 - TJ-MA - Juiz Substituto de Entr\u00e2ncia Inicial\"}]},{\"title\":\"ESCRITOS PARTICULARES\",\"children\":[{\"title\":\"Art. 48. As declara\u00e7\u00f5es de vontade constantes de escritos particulares, recibos e pr\u00e9-contratos relativos \u00e0s rela\u00e7\u00f5es de consumo vinculam o fornecedor, ensejando inclusive execu\u00e7\u00e3o espec\u00edfica, nos termos do art. 84 e par\u00e1grafos. CESPE / CEBRASPE - 2022 - TJ-MA - Juiz Substituto de Entr\u00e2ncia Inicial\"}]},{\"title\":\"OBS\",\"children\":[{\"title\":\"CDC, art. 55, \u00a7 4\u00b0 Os \u00f3rg\u00e3os oficiais poder\u00e3o expedir notifica\u00e7\u00f5es aos fornecedores para que, sob pena de D E S O B E D I E N C I A, prestem informa\u00e7\u00f5es sobre quest\u00f5es de interesse do consumidor, resguardado o segredo industrial. CESPE / CEBRASPE - 2020 - MPE-CE - Promotor de Justi\u00e7a de Entr\u00e2ncia Inicial\"}]}]},{\"title\":\"Clausulas Abusivas - Art. 50(ler)\",\"children\":[{\"title\":\"OBS\",\"children\":[{\"title\":\"TRANSFERENCIA DE PTS\",\"children\":[{\"title\":\"O contrato de programa de fidelidade \u00e9 um contrato de ades\u00e3o. Vale ressaltar, contudo, que nos contratos de ades\u00e3o n\u00e3o existe ilegalidade intr\u00ednseca, raz\u00e3o pela qual s\u00f3 ser\u00e3o declaradas abusivas e, portanto, nulas, aquelas cl\u00e1usulas que estabele\u00e7am obriga\u00e7\u00f5es consideradas in\u00edquas, que coloquem o consumidor em desvantagem exagerada, que tragam desequil\u00edbrio de direitos e obriga\u00e7\u00f5es t\u00edpicos \u00e0quele contrato espec\u00edfico, que frustrem os interesses b\u00e1sicos das partes presentes naquele tipo de rela\u00e7\u00e3o, ou sejam incompat\u00edveis com a boa-f\u00e9 ou equidade, nos termos do art. 51, IV, do CDC. A ades\u00e3o ao programa de fidelidade deve ser considerado como contrato unilateral e ben\u00e9fico considerando que dispensa contrapresta\u00e7\u00e3o pecuni\u00e1ria do seu benefici\u00e1rio e prev\u00ea responsabilidade somente ao seu instituidor. Os contratos ben\u00e9ficos, que por sua natureza s\u00e3o intuito personae, devem ser interpretados restritivamente, consoante disposto no art. 114 do CC/02. STJ. 3\u00aa Turma. REsp 1878651-SP, Rel. Min. Moura Ribeiro, julgado em 04/10/2022 (Info 753).\"}]},{\"title\":\"S\u00e3o l\u00edcitos os descontos de parcelas de empr\u00e9stimos banc\u00e1rios comuns em conta-corrente, ainda que utilizada para recebimento de sal\u00e1rios, desde que previamente autorizados pelo mutu\u00e1rio e enquanto esta autoriza\u00e7\u00e3o perdurar, n\u00e3o sendo aplic\u00e1vel, por analogia, a limita\u00e7\u00e3o prevista no \u00a7 1\u00ba do art. 1\u00ba da Lei n\u00ba 10.820/2003, que disciplina os empr\u00e9stimos consignados em folha de pagamento. STJ. 2\u00aa Se\u00e7\u00e3o. REsp 1863973-SP, Rel. Min. Marco Aur\u00e9lio Bellizze, julgado em 09/03/2022 (Recurso Repetitivo \u2013 Tema 1085) (Info 728).\"}]}]},{\"title\":\"Lei do Superendividamento\",\"children\":[{\"title\":\"Intro\",\"children\":[{\"title\":\"entrou em vigor em 2021. Visa preven\u00e7\u00e3o do superendividamento e educa\u00e7\u00e3o financeira\"},{\"title\":\"Trouxe novos principios e instrumetnos do PNRC\"},{\"title\":\"Cuida do superendividamento e educa\u00e7\u00e3o financeira de consumidores pessoas naturais\"},{\"title\":\"Traz 2 novas clausulas abusivas, preven\u00e7ao e tratamento e concilia\u00e7\u00e3o\"},{\"title\":\"Traz regras sobre a oferta e informa\u00e7\u00e3o no fornecimento de credito\"},{\"title\":\"Cuida do direito a liquida\u00e7\u00e3o antecipada e nao onerosa do d\u00e9bito\"},{\"title\":\"Cuida tambem do que \u00e9 expressamente vedado na oferta\"},{\"title\":\"obs\",\"children\":[{\"title\":\"A institui\u00e7\u00e3o de n\u00facleos de concilia\u00e7\u00e3o e media\u00e7\u00e3o de conflitos oriundos de superendividamento \u00e9 um dos instrumentos para a execu\u00e7\u00e3o da Pol\u00edtica Nacional das Rela\u00e7\u00f5es de Consumo.\"}]}]},{\"title\":\"Conceito Superendividamento CESPE - 2022 - PC-RJ - Delegado CEBRASPE - 2022 - PGE-PA - Procurador\",\"children\":[{\"title\":\"a impossibilidade manifesta de o consumidor pessoa natural, de boa-f\u00e9\"},{\"title\":\"pagar a totalidade de suas d\u00edvidas de consumo, exig\u00edveis e vincendas\"},{\"title\":\"sem comprometer seu m\u00ednimo existencial, nos termos da regulamenta\u00e7\u00e3o\"},{\"title\":\"As dividas englobam:  qlq compromissos financeiros assumidos decorrentes de rela\u00e7\u00e3o do CDC, inclusive opera\u00e7\u00f5es de cr\u00e9dito, compras a prazo e servi\u00e7os de presta\u00e7\u00e3o continuada\"},{\"title\":\"\u201ca impossibilidade global de o devedor, pessoa f\u00edsica, consumidor, leigo, de boa-f\u00e9, pagar todas as suas dividas atuais e futuras de consumo\u201d.(CLM)\"}]},{\"title\":\"Tipos  Cl\u00e1udia Lima Marques\",\"children\":[{\"title\":\"SE Ativo\",\"children\":[{\"title\":\"Aquele em que o devedor participa ativamente ao se colocar numa situa\u00e7\u00e3o de impossibilidade de adimplemento da obriga\u00e7\u00e3o. Ele pode ser: deliberado, consciente ou de m\u00e1-f\u00e9 = o consumidor age de m\u00e1-f\u00e9, pois sabe que n\u00e3o tem recursos para adimplir e sua inten\u00e7\u00e3o \u00e9 n\u00e3o pag\u00e1-las, visando ludibriar o credor. O mesmo n\u00e3o receber\u00e1 prote\u00e7\u00e3o do Estado para recuperar-se, pelo simples fato da aus\u00eancia da boa-f\u00e9, que \u00e9 requisito essencial.   n\u00e3o-deliberado, inconsciente ou de boa-f\u00e9 = o consumidor age de forma irrespons\u00e1vel e impulsiva, deixando de controlar seus gastos. Pode ser chamado tamb\u00e9m de pr\u00f3digo, pois se deixa seduzir pelo mercado, adquirindo produtos sup\u00e9rfluos. Nesse caso, o Estado o auxilia pelo fato de haver onerosidade e vulnerabilidade.\"}]},{\"title\":\"SE passivo\",\"children\":[{\"title\":\"Ocorre quando h\u00e1 uma diminui\u00e7\u00e3o inesperada dos rendimentos do consumidor, derivada de algum caso fortuito ou de for\u00e7a maior, como doen\u00e7a, morte, desemprego, etc.\"}]}]},{\"title\":\"Formas de Prote\u00e7\u00e3o do SE\",\"children\":[{\"title\":\"\u2013 o dever de informa\u00e7\u00e3o; \u2013 as regras relativas \u00e0 publicidade; \u2013 a prote\u00e7\u00e3o da honra e da privacidade do consumidor na cobran\u00e7a de d\u00edvidas; \u2013 a previs\u00e3o das figuras parcelares da boa-f\u00e9 objetiva, o controle de cl\u00e1usulas abusivas, et\"}]},{\"title\":\"N\u00e3o se aplica a Lei\",\"children\":[{\"title\":\"M\u00e1-f\u00e9 do consumidor\"},{\"title\":\"Contratos celebrados dolosamente com proposito de nao pagar\"},{\"title\":\"Produtos e servi\u00e7os de luxo de alto valor\"}]},{\"title\":\"Clausulas Abusivas - Art. 51 Alterado pela Lei 14.181/2021\",\"children\":[{\"title\":\"XVII - condicionem ou limitem de qualquer forma o acesso aos \u00f3rg\u00e3os do Poder Judici\u00e1rio;         (Inclu\u00eddo pela Lei n\u00ba 14.181, de 2021) XVIII - estabele\u00e7am prazos de car\u00eancia em caso de impontualidade das presta\u00e7\u00f5es mensais ou impe\u00e7am o restabelecimento integral dos direitos do consumidor e de seus meios de pagamento a partir da purga\u00e7\u00e3o da mora ou do acordo com os credores;         (Inclu\u00eddo pela Lei n\u00ba 14.181, de 2021)\"}]},{\"title\":\"Oferta em Fornecimento de Credito e Vendas a Prazo Art. 54-B Fornecedor ou Intermedi\u00e1rio\",\"children\":[{\"title\":\"Obrigatoriedade\",\"children\":[{\"title\":\"\u00a7 3\u00ba Sem preju\u00edzo do disposto no art. 37 deste C\u00f3digo, a oferta de cr\u00e9dito ao consumidor e a oferta de venda aprazo, ou a fatura mensal, conforme o caso, devem indicar, no m\u00ednimo, o custo efetivo total, o agente financiador e asoma total a pagar, com e sem financiamento. I - o custo efetivo total e a descri\u00e7\u00e3o dos elementos que o comp\u00f5em; II - a taxa efetiva mensal de juros, bem como a taxa dos juros de mora e o total de encargos, de qualquernatureza, previstos para o atraso no pagamento; III - o montante das presta\u00e7\u00f5es e o prazo de validade da oferta, que deve ser, no m\u00ednimo, de 2 (dois) dias; IV - o nome e o endere\u00e7o, inclusive o eletr\u00f4nico, do fornecedor; V - o direito do consumidor \u00e0 liquida\u00e7\u00e3o antecipada e n\u00e3o onerosa do d\u00e9bito, nos termos do \u00a7 2\u00ba do art. 52 deste C\u00f3digo e da regulamenta\u00e7\u00e3o em vigor.\"}]},{\"title\":\"Forma\",\"children\":[{\"title\":\"Clara e resumida da fatura, instrumento apartado\"},{\"title\":\"Deve ser de facil acesso ao consumidor\"}]}]},{\"title\":\"\u00c9 vedado Expressa ou Implicitamente Art. 54-C\",\"children\":[{\"title\":\"II - indicar que a opera\u00e7\u00e3o de cr\u00e9dito poder\u00e1 ser conclu\u00edda sem consulta a servi\u00e7os de prote\u00e7\u00e3o ao cr\u00e9dito ou semavalia\u00e7\u00e3o da situa\u00e7\u00e3o financeira do consumidor; III - ocultar ou dificultar a compreens\u00e3o sobre os \u00f4nus e os riscos da contrata\u00e7\u00e3o do cr\u00e9dito ou da venda aprazo; IV - assediar ou pressionar o consumidor para contratar o fornecimento de produto, servi\u00e7o ou cr\u00e9dito,principalmente se se tratar de consumidor idoso, analfabeto, doente ou em estado de vulnerabilidade agravada ou se acontrata\u00e7\u00e3o envolver pr\u00eamio; V - condicionar o atendimento de pretens\u00f5es do consumidor ou o in\u00edcio de tratativas \u00e0 ren\u00fancia ou \u00e0 desist\u00eanciade demandas judiciais, ao pagamento de honor\u00e1rios advocat\u00edcios ou a dep\u00f3sitos judiciais.\"}]},{\"title\":\"Concilia\u00e7\u00e3o no SuperEndividamento Art. 104-A - Lei n\u00ba 14.181, de 2021)\",\"children\":[{\"title\":\"Forma(DPEMS) IBFC - 2022 - TJ-MG - Ana\",\"children\":[{\"title\":\"A requerimento do consumidor(NAO \u00c9 DE OFICIO)\"},{\"title\":\"Juiz pode instaurar processo de repactua\u00e7\u00e3o de dividas\"},{\"title\":\"Visando audiencia concliatoria quepode ser feita pelo juiz ou conciliador\"},{\"title\":\"Com presen\u00e7a de todos credores das dividas previstas\"},{\"title\":\"O consumidor deve apresentar plano de pagto com prazo max. de 5 anos\"},{\"title\":\"Eficacia de titulo executivo e for\u00e7a de CJ\"},{\"title\":\"\u00a7 3\u00ba No caso de concilia\u00e7\u00e3o, com qualquer credor, a senten\u00e7a judicial que homologar o acordo descrever\u00e1 o planode pagamento da d\u00edvida e ter\u00e1 efic\u00e1cia de t\u00edtulo executivo e for\u00e7a de coisa julgada. (Inclu\u00eddo pela Lei n\u00ba 14.181, de2021)\"},{\"title\":\"\u00a7 5\u00ba O pedido do consumidor a que se refere o caput deste artigo n\u00e3o importar\u00e1 em declara\u00e7\u00e3o de insolv\u00eancia civile poder\u00e1 ser repetido somente ap\u00f3s decorrido o prazo de 2 (dois) anos, contado da liquida\u00e7\u00e3o das obriga\u00e7\u00f5es previstasno plano de pagamento homologado, sem preju\u00edzo de eventual repactua\u00e7\u00e3o\"}]},{\"title\":\"Todas as dividas?\",\"children\":[{\"title\":\"N\u00e3o. CDC exclue contratos celebrados dolosamente e dividas de contrato de credito com garantia real, finan ciamentos imobiliarios e de credito rural\"}]},{\"title\":\"Credor ou procurador com poderes especiais nao comparecer(3)\",\"children\":[{\"title\":\"suspende a exigibilidade do debito\"},{\"title\":\"Interrompe encargos da mora\"},{\"title\":\"Sujei\u00e7\u00e3o compulsoria ao plano de pagto se o montante devido ao credor ausente for certo e conhecido pelo consumidor, devedo o pagto a esse credor se estipulado p/ ocorrer apenas apos o pagto aos credores presentes na audiencia\"}]},{\"title\":\"Requisitos do plano\"},{\"title\":\"N\u00e3o havendo concilia\u00e7\u00e3o\",\"children\":[{\"title\":\"Juiz a pedido do consumidor instaura processo por SE\"},{\"title\":\"P/ revisao e integra\u00e7\u00e3o dos contratos e repactua\u00e7\u00e3o de dividas\"},{\"title\":\"Vai pela via do plano judicial compuls\u00f3rio\"},{\"title\":\"H\u00e1 cita\u00e7\u00e3o de todos os credores\"},{\"title\":\"Citados, credores tem 15d pra juntar provas e razoes das negativas\"},{\"title\":\"Juiz pode nomear admin.(30d plano de pagto)\"},{\"title\":\"Plano compuls\u00f3rio durante 5 anos. 1\u00ba parcela no max. 180d da homologa\u00e7\u00e3o\"}]}]},{\"title\":\"OBS\",\"children\":[{\"title\":\"A lei 14.181/21, que atualizou o CDC para incluir regras de preven\u00e7\u00e3o ao superendividamento dos consumidores, recebeu 5 vetos do Presidente da Rep\u00fablica, dentre esses estava o inciso I do art.54-C que possu\u00eda a exata reda\u00e7\u00e3o do item da quest\u00e3o. S\u00e3o vedadas, na oferta de cr\u00e9dito ao consumidor, mensagens publicit\u00e1rias ou propagandas com o uso de termos como \u201csem juros\u201d, \u201csem acr\u00e9scimo\u201d ou \u201cjuros zero\u201d.\"},{\"title\":\"Art. 54-F, par. 1\u00ba, do CDC. \u00a7 1\u00ba O exerc\u00edcio do direito de arrependimento nas hip\u00f3teses previstas neste C\u00f3digo, no contrato principal ou no contrato de cr\u00e9dito, implica a resolu\u00e7\u00e3o de pleno direito do contrato que lhe seja conexo. CESPE / CEBRASPE - 2022 - TJ-MA - Juiz Substituto de Entr\u00e2ncia Inicial\"},{\"title\":\"A Lei n\u00ba 14.181/2021 alterou o C\u00f3digo de Defesa do Consumidor, para aperfei\u00e7oar a disciplina do cr\u00e9dito ao consumidor e dispor sobre a preven\u00e7\u00e3o e o tratamento do superendividamento. Essa Lei inseriu o art. 104-A no CDC oferecendo \u00e0 pessoa f\u00edsica, em situa\u00e7\u00e3o de vulnerabilidade (superendividamento), a possibilidade de, perante seus credores, rediscutir, repactuar e, finalmente, cumprir suas obriga\u00e7\u00f5es contratuais/financeiras. Cabe \u00e0 Justi\u00e7a comum estadual e/ou distrital processar e julgar as demandas oriundas de a\u00e7\u00f5es de repactua\u00e7\u00e3o de d\u00edvidas decorrentes de superendividamento - ainda que exista interesse de ente federal (CEF). Isso porque a interpreta\u00e7\u00e3o do art. 109, I, da CF/88, deve ser teleol\u00f3gica de forma a alcan\u00e7ar, na exce\u00e7\u00e3o da compet\u00eancia da Justi\u00e7a Federal, as hip\u00f3teses em que existe o concurso de credores. STJ. 2\u00aa Se\u00e7\u00e3o. CC 193066-DF, Rel. Min. Marco Buzzi, julgado em 22/3/2023 (Info 768).\"}]}]}]}}";const DATA = JSON.parse(RAW);

  let p=[n.title||""];
  (n.children||[]).forEach(c=>p.push(extractText(c,d+1)));
  (n.callouts||[]).forEach(c=>p.push(extractText(c,d+1)));
  return p.filter(Boolean).join(" • ");
}

function matches(n,t){
  if(!t) return true;
  if((n.title||"").toLowerCase().includes(t)) return true;
  if((n.children||[]).some(c=>matches(c,t))) return true;
  if((n.callouts||[]).some(c=>matches(c,t))) return true;
  return false;
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function hilite(s,t){
  if(!t) return esc(s);
  const re=new RegExp(`(${t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`,"gi");
  return esc(s).replace(re,"<mark>$1</mark>");
}

function renderCallout(node){
  const tipo=detectType(node.title||"");
  const label={cespe:"CESPE/CEBRASPE",stj:"STF/STJ",obs:"OBS"}[tipo];
  const text=extractText(node);
  const isTrivial=!node.title||/^(obs|callout|atenção)$/i.test((node.title||"").trim());
  const titleHtml=isTrivial?"":(`<div class="callout-title">${hilite(node.title,term)}</div>`);
  return `<div class="callout-box ${tipo}"><div class="callout-label">${label}</div>${titleHtml}<div class="callout-body">${esc(text)}</div></div>`;
}


var _EXAM_RE=/^\s*(CESPE\s*[\/]?\s*CEBRASPE|CEBRASPE|CESPE|FCC|FGV|VUNESP|ESAF|CESGRANRIO|MPT|AOCP|IBFC|IADES|FUNCAB|FUNDEP|QUADRIX|SELECON|OBJETIVA|NUCEPE|CS-UFG|INAZ|CONSULPLAN|NC-UFPR)\b/i;
var _YEAR_RE=/\b(20\d{2}|199\d)\b/;
function _isExam(t){return _EXAM_RE.test(t)&&_YEAR_RE.test(t);}
function _examShort(t){
  var b=t.match(_EXAM_RE);var y=t.match(_YEAR_RE);
  var banca=(b?b[1].replace(/\s*\/\s*CEBRASPE/i,'').replace(/\s*CEBRASPE\s*\/\s*/i,'').trim():'');
  return banca+(y?' '+y[0]:'');
}

function xpand(el,ev){el.classList.toggle('open');ev.stopPropagation();}
function renderNode(n,depth,path){
  const id=path;
  const hasKids=(n.children&&n.children.length)||(n.callouts&&n.callouts.length);
  const isExp=expanded.has(id)||(term&&matches(n,term));
  const isHit=term&&(n.title||"").toLowerCase().includes(term);
  if(isHit) hits++;

  if(n.callout) return renderCallout(n);

  const tog=hasKids?(isExp?"▾":"▸"):"·";
  const dc=depth===0?"d0":depth===1?"d1":depth===2?"d2":"dn";
  const rowCls=`row${isHit?" hit":""}`;
  const _long=(n.title||"").length>120&&depth>0;
  const titleHtml=_long?`<span class="txt ${dc} long" onclick="xpand(this,event)">${hilite(n.title||"",term)}</span>`:`<span class="txt ${dc}">${hilite(n.title||"",term)}</span>`;

  let childHtml="";
  if(isExp&&hasKids){
    childHtml='<div class="children">';
    (n.children||[]).forEach((c,i)=>{if(!term||matches(c,term)) childHtml+=renderNode(c,depth+1,path+"_"+i);});
    (n.callouts||[]).forEach((c,i)=>{if(!term||matches(c,term)) childHtml+=renderNode({...c,callout:true},depth+1,path+"_c"+i);});
    childHtml+="</div>";
  }
  return `<div class="node" id="n${id}"><div class="${rowCls}" onclick="toggle('${id}')"><span class="tog">${tog}</span>${titleHtml}</div>${childHtml}</div>`;
}

function render(){
  const tree=DATA[cur];
  hits=0;
  let html="";
  if(tree.children){
    tree.children.forEach((n,i)=>{
      if(!term||matches(n,term)) html+=renderNode(n,0,"r"+i);
    });
  }
  document.getElementById("content").innerHTML=html||`<p class="no-res">Nenhum resultado para "${esc(term)}"</p>`;const em=document.getElementById("empty-msg");if(em)em.remove();
  const mb=document.getElementById("matchBar");
  if(term){mb.style.display="block";mb.textContent=`${hits} ocorrência(s) para "${term}"`;}
  else{mb.style.display="none";}
}

function renderTabs(){
  document.getElementById("tabs").innerHTML=CHAPTERS.map((k,i)=>{
    const cid='dconsumidor_'+i;
    const isDone=_TRK&&_TRK.done&&_TRK.done[cid];
    return `<div class="tab${k===cur?' active':''}" onclick="selChap('${k}')">
      <input type="checkbox" class="_trk_chk" data-cid="${cid}" ${isDone?'checked':''} onclick="event.stopPropagation();_trkToggle('${cid}',this.checked,this)"/>
      <span>${LABELS[k]||k}</span>
    </div>`;
  }).join("");
}

function selChap(k){cur=k;expanded.clear();document.getElementById("search").value="";term="";document.getElementById("matchBar").style.display="none";renderTabs();render();}
function toggle(id){if(expanded.has(id))expanded.delete(id);else expanded.add(id);render();}
function expandAll(){function add(n,p){expanded.add(p);(n.children||[]).forEach((c,i)=>add(c,p+"_"+i));(n.callouts||[]).forEach((c,i)=>add(c,p+"_c"+i));}const t=DATA[cur];(t.children||[]).forEach((n,i)=>add(n,"r"+i));render();}
function collapseAll(){expanded.clear();render();}

let deb;
document.getElementById("search").addEventListener("input",function(){
  clearTimeout(deb);
  deb=setTimeout(()=>{term=this.value.toLowerCase().trim();render();},250);
});

renderTabs();
render();
</script>

// ── TRACKER INTEGRATION ──
var _TRK = {
  mapId: 'dconsumidor',
  total: 5,
  done: {},  // chapter_id -> true
  user: null,
};

// Auth
window.addEventListener('DOMContentLoaded', function(){
  _sb.auth.getSession().then(function(r){
    if(r.data&&r.data.session&&r.data.session.user){
      _TRK.user = r.data.session.user;
      _trkLoad();
    } else {
      _trkRender();
    }
  });
});

async function _trkLoad(){
  try{
    var r = await _sb.from('progress')
      .select('chapter_id,done')
      .eq('user_id', _TRK.user.id);
    _TRK.done = {};
    if(r.data) r.data.forEach(function(row){
      if(row.done && row.chapter_id.startsWith(_TRK.mapId+'_'))
        _TRK.done[row.chapter_id] = true;
    });
    try{ Object.keys(_TRK.done).forEach(function(cid){ localStorage.setItem('_pgprog_'+cid,JSON.stringify({done:true,date:null})); }); }catch(_){}
    _trkRender();
  }catch(e){ console.warn('tracker load err', e); }
}

function _trkRender(){
  var count = Object.keys(_TRK.done).length;
  var pct = _TRK.total ? Math.round(count/_TRK.total*100) : 0;
  // Update both injected header bar and sidebar bar
  ['_trk_fill','trk-fill'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.width=pct+'%';});
  ['_trk_pct','trk-pct'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=pct+'%';});
  ['_trk_cnt','trk-cnt'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=count+'/'+_TRK.total;});
  // Update checkboxes
  document.querySelectorAll('._trk_chk').forEach(function(chk){
    var cid = chk.getAttribute('data-cid');
    chk.checked = !!_TRK.done[cid];
    var w = chk.closest('._chk_wrap');
    if(w) w.classList.toggle('_chk_done', !!_TRK.done[cid]);
  });
  renderTabs();
}

async function _trkToggle(chapterId, done, chk){
  if(!_TRK.user){
    // Try to recover session
    try {
      const r = await _sb.auth.getSession();
      if(r.data && r.data.session && r.data.session.user){
        _TRK.user = r.data.session.user;
      } else {
        console.warn('No session found, cannot save tracker');
        return;
      }
    } catch(e) { console.error('getSession error:', e); return; }
  }
  var now = done ? new Date().toISOString() : null;
  if(done) _TRK.done[chapterId] = true;
  else delete _TRK.done[chapterId];
  _trkRender();
  try{
    await _sb.from('progress').upsert({
      user_id: _TRK.user.id,
      chapter_id: chapterId,
      done: done,
      done_at: now
    }, {onConflict: 'user_id,chapter_id'});
  }catch(e){ console.warn('tracker save err', e); }
  try{ localStorage.setItem('_pgprog_'+chapterId, JSON.stringify({done, date:now})); }catch(_){}
}
</script>

<script id="_mm_js">
;(function(){
var _P=['#3b82f6','#10b981','#ef4444','#f97316','#8b5cf6','#eab308','#14b8a6','#ec4899','#ea580c','#22c55e'];

function _wt(s,mw){

}
function _di(s,d){

function _vc(n){return _col.has(n._id)?[]:(n.children||[]);}
function _sh(n){var ch=_vc(n);if(!ch.length)return n._h+_GY;return ch.reduce(function(s,c){return s+_sh(c);},0);}
function _td(n){if(!n.children||!n.children.length)return 0;return n.children.reduce(function(s,c){return s+1+_td(c);},0);}

function _layR(r){
  r._cy=0;r._y=-r._h/2;r._x=-r._w/2;r._side=0;

  var w=document.getElementById('_mm_world');while(w.firstChild)w.removeChild(w.firstChild);
  if(!_cur)return;_layR(_cur);
  var nodes=[];_cl(_cur,nodes);
  document.getElementById('_mm_svg').style.background=iL?'#f4f5f8':'#0f1117';
  var eg=E('g');
  nodes.forEach(function(n){_vc(n).forEach(function(c){
    var col=n._depth===0?_P[c._ci]:_P[n._ci];var x1,x2,y1=n._cy,y2=c._cy;
    if(n._depth===0){x1=c._side===1?n._x+n._w:n._x;x2=c._side===1?c._x:c._x+c._w;}
    else if(n._side===1){x1=n._x+n._w;x2=c._x;}else{x1=n._x;x2=c._x+c._w;}
    var mx=(x1+x2)/2,sw=Math.max(1.2,3.8-c._depth*0.7);

      stroke:col,'stroke-opacity':'0.75','stroke-width':sw,fill:'none','stroke-linecap':'round'}));
  });});
  w.appendChild(eg);
  nodes.forEach(function(n){
    var col=n._depth===0?(iL?'#1a1a2e':'#e2e4ec'):_P[n._ci];
    var rv=parseInt(col.slice(1,3),16),gv=parseInt(col.slice(3,5),16),bv=parseInt(col.slice(5,7),16);
    var rgb=rv+','+gv+','+bv;

        fill:iL?'rgba(0,0,0,0.05)':'rgba(255,255,255,0.06)',stroke:iL?'#888':'#5a5f70','stroke-width':'2'}));
    }else{
      g.appendChild(E('rect',{x:n._x,y:n._y,width:n._w,height:n._h,rx:'5',ry:'5',
