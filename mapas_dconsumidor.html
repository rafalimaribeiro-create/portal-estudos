imoniais e morais,, individuais, coletivos ou difusos, assegurada prote\u00e7\u00e3o juridica, administrativa e tecnica aos necessitados\"},{\"title\":\"FACILITACAO DA DEFESA E SEUS DIREITOS, inclusive com a INVERSAO DO ONUS DA PROVA, a seu favor, no processo civil, quando, A CRITERIO DO JUIZ, for VEROSSIMIL ALEGACAO OU  FOR HIPOSSUFICIENTE, segundo regras ordinarias de experiencia FGV - 2022 - TJ-GO - Juiz Leigo\",\"children\":[{\"title\":\"Fornecedor e consumidor podem fazer acordo de distrib. do onus da prova?\",\"children\":[{\"title\":\"NAO!\"}]},{\"title\":\"\u2022 O CDC adotou o sistema da distribui\u00e7\u00e3o din\u00e2mica do \u00f4nus da prova, ou seja, o magistrado tem o poder de redistribuir (inverter) o \u00f4nus da prova, caso verifique a verossimilhan\u00e7a da alega\u00e7\u00e3o ou a hipossufici\u00eancia do consumidor;\"},{\"title\":\"Pode ser concedida de OFICIO ou a requerimento da parte\"},{\"title\":\"Se o consumidor for hipossuficiente mas o fato inverossimel, aplica-se?\",\"children\":[{\"title\":\"N\u00e3o!\"}]},{\"title\":\"A invers\u00e3o exonera o consumidor do dever de apresentar alguma evidencia?\",\"children\":[{\"title\":\"N\u00e3o. A invers\u00e3o do onus da prova n\u00e3o \u00e9 absoluta, conforme STJ\"}]},{\"title\":\"Se MP for autor, tbm tem essa invers\u00e3o?\",\"children\":[{\"title\":\"Sim, assim como a DP!(CESPE DPE-RN)(DPeMS)\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"A invers\u00e3o do \u00f4nus da prova prevista no art. 6\u00ba, VIII do C\u00f3digo de Defesa do Consumidor \u00e9 regra de instru\u00e7\u00e3o e n\u00e3o regra de julgamento, motivo pelo qual a decis\u00e3o judicial que a determina deve ocorrer antes da etapa instrut\u00f3ria ou, quando proferida em momento posterior, h\u00e1 que se garantir \u00e0 parte a quem foi imposto o \u00f4nus a oportunidade de apresentar suas provas, sob pena de absoluto cerceamento de defesa. STJ. 4\u00aa Turma. REsp 1286273-SP, Rel. Min. Marco Buzzi, julgado em 08/06/2021 (Info 701). FGV - 2023 - TJ-RN - Oficial de Justi\u00e7a - Judici\u00e1ria \u2013 Direito Um paciente prop\u00f4s uma demanda indenizat\u00f3ria em face do hospital que o atendera em uma cirurgia. Sustentou que a prova do fato constitutivo de seu direito podia ser obtida com a juntada do prontu\u00e1rio m\u00e9dico, que se encontrava no poder do r\u00e9u, que revelava o erro m\u00e9dico ocorrido durante o procedimento cir\u00fargico a que foi submetido. Em decis\u00e3o de organiza\u00e7\u00e3o e saneamento do processo, o juiz n\u00e3o definiu a quem cabia o referido \u00f4nus probat\u00f3rio. Ap\u00f3s a regular instru\u00e7\u00e3o do feito, sem a juntada do prontu\u00e1rio m\u00e9dico, foi prolatada a senten\u00e7a, quando o juiz, em decis\u00e3o motivada, aplicou a teoria da distribui\u00e7\u00e3o din\u00e2mica do \u00f4nus da prova e condenou o r\u00e9u na forma do pedido, por entender que cabia a este a prova de que tudo correra na normalidade durante o procedimento m\u00e9dico alegado. nula, por viola\u00e7\u00e3o ao princ\u00edpio do contradit\u00f3rio;\"},{\"title\":\"Jurisprud\u00eancia em teses - STJ 2) A invers\u00e3o do \u00f4nus da prova, nos termos do art. 6\u00ba, VIII, do CDC, n\u00e3o ocorre ope legis, mas ope iudicis, vale dizer, \u00e9 o juiz que, de forma prudente e fundamentada, aprecia os aspectos de verossimilhan\u00e7a das alega\u00e7\u00f5es do consumidor ou de sua hipossufici\u00eancia.\"}]}]},{\"title\":\"Adequada e eficaz presta\u00e7\u00e3o de servicos publicos em geral FUNDATEC - 2022 - Porto Alegre - RS - Procurador Municipal\",\"children\":[{\"title\":\"OBS importante -  Art. 22 do CDC\",\"children\":[{\"title\":\"OS org\u00e3os publicos, por si ou suas empresas\"},{\"title\":\"Concessionarias ou permissionarias ou qlq outra forma\"},{\"title\":\"S\u00e3o obrigadas a fornecer\",\"children\":[{\"title\":\"Servicos adequados, eficientes seguros\"},{\"title\":\"e quanto aos essenciais, de modo continuo\"}]}]}]},{\"title\":\"XI - a garantia de pr\u00e1ticas de cr\u00e9dito respons\u00e1vel, de educa\u00e7\u00e3o financeira e de preven\u00e7\u00e3o e tratamento de situa\u00e7\u00f5es de superendividamento, preservado o m\u00ednimo existencial, nos termos da regulamenta\u00e7\u00e3o, por meio da revis\u00e3o e da repactua\u00e7\u00e3o da d\u00edvida, entre outras medidas;(2021)\"},{\"title\":\"XII - a preserva\u00e7\u00e3o do m\u00ednimo existencial, nos termos da regulamenta\u00e7\u00e3o, na repactua\u00e7\u00e3o de d\u00edvidas e na concess\u00e3o de cr\u00e9dito;(2021). (Nos termos da regulamenta\u00e7\u00e3o)\"},{\"title\":\"XIII - a informa\u00e7\u00e3o acerca dos pre\u00e7os dos produtos por unidade de medida, tal como por quilo, por litro, por metro ou por outra unidade, conforme o caso.      (2021)\"}]}]},\"cap2\":{\"title\":\"2. V\u00edcios e Fatos do Produto\",\"children\":[{\"title\":\"Notas Introdutorias\",\"children\":[{\"title\":\"Intro\",\"children\":[{\"title\":\"No CC a responsabildiade surge de um contrato ou extracontratual(aquli..)\"},{\"title\":\"No CDC essa distin\u00e7\u00e3o n\u00e3o ocorre. A responsa tem origem em rela\u00e7\u00e3o de consumo\"},{\"title\":\"Eventualmente pode-se aplicar o CC, mas \u00e9 somente quando n\u00e3o houver normas e que n\u00e3o sejam contrarias\"}]},{\"title\":\"Resumo\",\"children\":[{\"title\":\"Responsabilidade no CC\",\"children\":[{\"title\":\"Em regra \u00e9 subjetvia, fundada na culpa lato sensu\"},{\"title\":\"Exce\u00e7\u00e3o\",\"children\":[{\"title\":\"Objetiva\"}]}]},{\"title\":\"Responsabilidade no CCDC FGV - 2023 - TJ-ES - Juiz Substituto\",\"children\":[{\"title\":\"Regra\",\"children\":[{\"title\":\"A responsa \u00e9 objetiva\"}]},{\"title\":\"Exce\u00e7\u00e3o CESPE - 2022 - DPE-DF - Ana. CESPE - 2022 - DPE-PA CESPE / CEBRASPE - 2023 - PGE-RR - Procurador FCC - 2022 - TJ-CE - Analista Judici\u00e1rio - \u00c1rea Judici\u00e1ria\",\"children\":[{\"title\":\"Responsabilidade dos Profissionais Liberais - Art. 14 \u00a74 CDC\"},{\"title\":\"\u00c9 apurada mediante verifica\u00e7\u00e3o de culpa, ou seja, a responsabiliza\u00e7\u00e3o \u00e9 subjetiva\"},{\"title\":\"Se trabalhar em alguma empresa, a responsa \u00e9 objetiva da emprsa\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"FCC - 2022 - DPE-CE - Defensor(a) P\u00fablico(a) de Entr\u00e2ncia Inicial A responsabilidade dos profissionais liberais \u00e9 subjetiva e, no caso de cirurgia est\u00e9tica EMBELEZADORA, por se tratar de uma obriga\u00e7\u00e3o de resultado, adota-se a presun\u00e7\u00e3o de culpa do m\u00e9dico, invertendo-se o \u00f4nus probat\u00f3rio: Resp. SUBJETIVA com CULPA PRESUMIDA; RECURSO ESPECIAL. RESPONSABILIDADE CIVIL. ERRO M\u00c9DICO. ART. 14 DO CDC. CIRURGIA PL\u00c1STICA. OBRIGA\u00c7\u00c3O DE RESULTADO. CASO FORTUITO. EXCLUDENTE DE RESPONSABILIDADE. 1. Os procedimentos cir\u00fargicos de fins meramente est\u00e9ticos caracterizam verdadeira obriga\u00e7\u00e3o de resultado, pois neles o cirurgi\u00e3o assume verdadeiro compromisso pelo efeito embelezador prometido.  2. Nas obriga\u00e7\u00f5es de resultado, a responsabilidade do profissional da medicina permanece subjetiva. Cumpre ao m\u00e9dico, contudo, demonstrar que os eventos danosos decorreram de fatores externos e alheios \u00e0 sua atua\u00e7\u00e3o durante a cirurgia.  3. Apesar de n\u00e3o prevista expressamente no CDC, a eximente de caso fortuito possui for\u00e7a liberat\u00f3ria e exclui a responsabilidade do cirurgi\u00e3o pl\u00e1stico, pois rompe o nexo de causalidade entre o dano apontado pelo paciente e o servi\u00e7o prestado pelo profissional.  4. Age com cautela e conforme os ditames da boa-f\u00e9 objetiva o m\u00e9dico que colhe a assinatura do paciente em ?termo de consentimento informado?, de maneira a alert\u00e1-lo acerca de eventuais problemas que possam surgir durante o p\u00f3s-operat\u00f3rio. RECURSO ESPECIAL A QUE SE NEGA PROVIMENTO. (REsp 1180815/MG Rel. Min Nancy Andrighi, Terceira Turma, julgado 19/08/2010)\"},{\"title\":\"Todo paciente possui, como express\u00e3o do princ\u00edpio da autonomia da vontade (autodetermina\u00e7\u00e3o), o direito de saber dos poss\u00edveis riscos, benef\u00edcios e alternativas de um determinado procedimento m\u00e9dico, possibilitando, assim, manifestar, de forma livre e consciente, o seu interesse ou n\u00e3o na realiza\u00e7\u00e3o da terap\u00eautica envolvida, por meio do consentimento informado. Esse dever de informa\u00e7\u00e3o decorre do art. 22 do C\u00f3digo de \u00c9tica M\u00e9dica e dos arts. 6\u00ba, III, e 14 do CDC. Al\u00e9m disso, o C\u00f3digo Civil tamb\u00e9m disciplinou sobre o assunto no art. 15. Justamente por isso, \u00e9 indispens\u00e1vel o consentimento informado do paciente acerca dos riscos inerentes ao procedimento cir\u00fargico. O m\u00e9dico que deixa de informar o paciente acerca dos riscos da cirurgia incorre em neglig\u00eancia, e responde civilmente pelos danos resultantes da opera\u00e7\u00e3o. Vale ressaltar, ainda, que a informa\u00e7\u00e3o prestada pelo m\u00e9dico ao paciente, acerca dos riscos, benef\u00edcios e alternativas ao procedimento indicado, deve ser clara e precisa, n\u00e3o bastando que o profissional de sa\u00fade informe, de maneira gen\u00e9rica ou com termos t\u00e9cnicos, as eventuais repercuss\u00f5es no tratamento, o que comprometeria o consentimento informado do paciente, considerando a defici\u00eancia no dever de informa\u00e7\u00e3o. Com efeito, n\u00e3o se admite o chamado \u201cblanket consente\u201d, isto \u00e9, o consentimento gen\u00e9rico, em que n\u00e3o h\u00e1 individualiza\u00e7\u00e3o das informa\u00e7\u00f5es prestadas ao paciente, dificultando, assim, o exerc\u00edcio de seu direito fundamental \u00e0 autodetermina\u00e7\u00e3o. STJ. 3\u00aa Turma. REsp 1848862-RN, Rel. Min. Marco Aur\u00e9lio Bellizze, julgado em 05/04/2022 (Info 733).\"},{\"title\":\"O hospital responde, objetivamente, pelos danos decorrentes da presta\u00e7\u00e3o defeituosa dos servi\u00e7os relacionados ao exerc\u00edcio da sua pr\u00f3pria atividade. STJ. 4\u00aa Turma. AgInt no AgInt no REsp 1.718.427-RS, Rel. Min. Jo\u00e3o Ot\u00e1vio de Noronha, julgado em 6/3/2023 (Info 768). Voltando ao caso concreto: No caso concreto, ficou comprovado que houve m\u00e1 presta\u00e7\u00e3o de servi\u00e7o pela demora para disponibilizar a sala de cirurgia. Essa conduta gerou a morte do feto. Logo, o estabelecimento hospitalar n\u00e3o foi responsabilizada por ato de terceiro, mas sim por sua pr\u00f3pria culpa, pois configurado o nexo de causalidade entre sua conduta - m\u00e1 presta\u00e7\u00e3o de servi\u00e7o pela demora para disponibilizar a sala de cirurgia - e o dano causado. POR QUE N\u00c3O A LETRA B? Como a m\u00e9dica n\u00e3o tinha v\u00ednculo empregat\u00edcio n\u00e3o h\u00e1 responsabilidade solid\u00e1ria. A responsabilidade das sociedades empres\u00e1rias hospitalares por dano causado ao paciente-consumidor pode ser assim sintetizada: a) as obriga\u00e7\u00f5es assumidas diretamente pelo complexo hospitalar limitam-se ao fornecimento de recursos materiais e humanos auxiliares adequados \u00e0 presta\u00e7\u00e3o dos servi\u00e7os m\u00e9dicos e \u00e0 supervis\u00e3o do paciente, hip\u00f3tese em que a responsabilidade objetiva da institui\u00e7\u00e3o (por ato pr\u00f3prio) exsurge somente em decorr\u00eancia de defeito no servi\u00e7o prestado (art. 14, caput, do CDC); b) os atos t\u00e9cnicos praticados pelos m\u00e9dicos sem v\u00ednculo de emprego ou subordina\u00e7\u00e3o com o hospital s\u00e3o imputados ao profissional pessoalmente, eximindo-se a entidade hospitalar de qualquer responsabilidade (art. 14, \u00a7 4, do CDC), se n\u00e3o concorreu para a ocorr\u00eancia do dano; c) quanto aos atos t\u00e9cnicos praticados de forma defeituosa pelos profissionais da sa\u00fade vinculados de alguma forma ao hospital, respondem solidariamente a institui\u00e7\u00e3o hospitalar e o profissional respons\u00e1vel, apurada a sua culpa profissional. Nesse caso, o hospital \u00e9 responsabilizado indiretamente por ato de terceiro, cuja culpa deve ser comprovada pela v\u00edtima de modo a fazer emergir o dever de indenizar da institui\u00e7\u00e3o, de natureza absoluta (arts. 932 e 933 do CC), sendo cab\u00edvel ao juiz, demonstrada a hipossufici\u00eancia do paciente, determinar a invers\u00e3o do \u00f4nus da prova (art. 6\u00ba, VIII, do CDC).  FGV - 2023 - TJ-ES - Juiz Substituto\"}]},{\"title\":\"Callout\",\"children\":[{\"title\":\"quanto aos atos t\u00e9cnicos praticados de forma defeituosa pelos profissionais da sa\u00fade vinculados de alguma forma ao hospital, respondem solidariamente a institui\u00e7\u00e3o hospitalar e o profissional respons\u00e1vel, apurada a sua culpa profissional. Nesse caso, o hospital \u00e9 responsabilizado indiretamente por ato de terceiro, cuja culpa deve ser comprovada pela v\u00edtima de modo a fazer emergir o dever de indenizar da institui\u00e7\u00e3o, de natureza absoluta (arts. 932 e 933 do CC), sendo cab\u00edvel ao juiz, demonstrada a hipossufici\u00eancia do paciente, determinar a invers\u00e3o do \u00f4nus da prova (art. 6\u00ba, VIII, do CDC). os atos t\u00e9cnicos praticados pelos m\u00e9dicos sem v\u00ednculo de emprego ou subordina\u00e7\u00e3o com o hospital s\u00e3o imputados ao profissional pessoalmente, eximindo-se a entidade hospitalar de qualquer responsabilidade (art. 14, \u00a7 4, do CDC), se n\u00e3o concorreu para a ocorr\u00eancia do dano;\"}]}]}]},{\"title\":\"Elementos necessarios a respnsabilidade no CDC(4) (MPTO)\",\"children\":[{\"title\":\"Conduta\"},{\"title\":\"Nexo\"},{\"title\":\"Dano\"},{\"title\":\"Defeito\"}]},{\"title\":\"Vicio ou Fato(Defeito)\",\"children\":[{\"title\":\"Fato do Produto/Defeito\",\"children\":[{\"title\":\"Func\u00e3o de seguran\u00e7a. O problema extravasa o produto\"},{\"title\":\"\u00c9 o chamado acidente de consumo\"},{\"title\":\"Ex: Ferro explodiu e machucou o consumidor\"},{\"title\":\"Ex: Vender lata de atum com validade expirada e causar infec\u00e7\u00e3o intestinal\"}]},{\"title\":\"Vicio\",\"children\":[{\"title\":\"Refere-se a fun\u00e7\u00e3o economica especifica. O vicio fica restrito ao produto. Mau funcionamento \u00e9 vicio do produto. Ex: Quantidade menor Se um defeito gera danos morais, ele deixa de ser considerado v\u00edcio e passa a ser considerado um fato.(DPE/PI)  CORRETO. O fato do produto ou do servi\u00e7o (art. 12 a 17), \u00e9 o mesmo que acidente de consumo. Haver\u00e1 fato do produto ou do servi\u00e7o sempre que o defeito, al\u00e9m de atingir a incolumidade econ\u00f4mica do consumidor, atinge sua incolumidade f\u00edsica ou ps\u00edquica. Nesse caso, haver\u00e1 danos \u00e0 sa\u00fade f\u00edsica ou psicol\u00f3gica do consumidor. Em outras palavras, o defeito exorbita a esfera do bem de consumo, passando a atingir o consumidor. Ex: Dono leva o cachorro ao petshop que volta com machucado(DPE/MS)\"}]}]},{\"title\":\"Excludentes(STJ)(MPTO)\",\"children\":[{\"title\":\"1) O STJ admite a exist\u00eancia de excludentes de responsabilidade civil, com base no C\u00f3digo de Defesa do Consumidor, elencando as hip\u00f3teses de sua ocorr\u00eancia.\"},{\"title\":\"2) O STJ inverte o \u00f4nus da prova ao impor ao fornecedor a comprova\u00e7\u00e3o acerca da inexist\u00eancia de nexo de causalidade.\"}]},{\"title\":\"A\u00e7\u00e3o de Responsabilidade Civil do Fornecedor\",\"children\":[{\"title\":\"CAP\u00cdTULO III Das A\u00e7\u00f5es de Responsabilidade do Fornecedor de Produtos e Servi\u00e7os         Art. 101. Na a\u00e7\u00e3o de responsabilidade civil do fornecedor de produtos e servi\u00e7os, sem preju\u00edzo do disposto nos Cap\u00edtulos I e II deste t\u00edtulo, ser\u00e3o observadas as seguintes normas:         I - a a\u00e7\u00e3o pode ser proposta no domic\u00edlio do autor;         II - o r\u00e9u que houver contratado seguro de responsabilidade poder\u00e1 chamar ao processo o segurador, vedada a integra\u00e7\u00e3o do contradit\u00f3rio pelo Instituto de Resseguros do Brasil. Nesta hip\u00f3tese, a senten\u00e7a que julgar procedente o pedido condenar\u00e1 o r\u00e9u nos termos do art. 80 do C\u00f3digo de Processo Civil. Se o r\u00e9u houver sido declarado falido, o s\u00edndico ser\u00e1 intimado a informar a exist\u00eancia de seguro de responsabilidade, facultando-se, em caso afirmativo, o ajuizamento de a\u00e7\u00e3o de indeniza\u00e7\u00e3o diretamente contra o segurador, vedada a denuncia\u00e7\u00e3o da lide ao Instituto de Resseguros do Brasil e dispensado o litiscons\u00f3rcio obrigat\u00f3rio com este.         Art. 102. Os legitimados a agir na forma deste c\u00f3digo poder\u00e3o propor a\u00e7\u00e3o visando compelir o Poder P\u00fablico competente a proibir, em todo o territ\u00f3rio nacional, a produ\u00e7\u00e3o, divulga\u00e7\u00e3o distribui\u00e7\u00e3o ou venda, ou a determinar a altera\u00e7\u00e3o na composi\u00e7\u00e3o, estrutura, f\u00f3rmula ou acondicionamento de produto, cujo uso ou consumo regular se revele nocivo ou perigoso \u00e0 sa\u00fade p\u00fablica e \u00e0 incolumidade pessoal.\"}]}]},{\"title\":\"Responsa pelo FATO  do Produto e do servi\u00e7o Aten\u00e7\u00e3o pra INVERSAO DO ONUS DA PROVA DE MODO OPE LEGIS\",\"children\":[{\"title\":\"Fato do Produto Art. 12 FGV - 2022 - TJ-MG - Juiz\",\"children\":[{\"title\":\"Previs\u00e3o legal\",\"children\":[{\"title\":\"FABRICANTE, PRODUTOR, CONSTRUTOR, NACIONAL OU ESTRANGEIRO E O IMPORTADOR\"},{\"title\":\"Respondem, INDEPENDENTEMENTE DE CULPA\"},{\"title\":\"Pela repara\u00e7\u00e3o dos danos causados aos consumidores por defeitos decorrentes de\"},{\"title\":\"Projeto, fabrica\u00e7\u00e3o, constru\u00e7\u00e3o, montagem, formulas, manipula\u00e7\u00e3o, apresenta\u00e7\u00e3o E\"},{\"title\":\"Acondicionamento de produtos e\"},{\"title\":\"infos insuficientes ou inadequadas sobre utiliza\u00e7\u00e3o e riscos\"},{\"title\":\"Produto Defeituoso\",\"children\":[{\"title\":\"Qnd n\u00e3o oferece a seguran\u00e7a que se espera.\"},{\"title\":\"Leva em conta circunstancias relevantes:(3) - Sua apresenta\u00e7\u00e3o - Uso e riscos que razoalmente se esperam - Epoca em que foi colocado em circula\u00e7\u00e3o\"}]},{\"title\":\"\u00a7 2\u00ba O produto n\u00e3o \u00e9 considerado defeituoso pelo fato de outro de melhor qualidade ter sido colocado no mercado.\"}]},{\"title\":\"Doutrina\",\"children\":[{\"title\":\"Estabeleceu 4 modalidades  de responsaveis CESPE ANS 2013:\",\"children\":[{\"title\":\"Real\",\"children\":[{\"title\":\"Para a doutrina, \u00e9 aquele que efetivamente participa do processo de fabrica\u00e7\u00e3o do produto, a exemplo do fabricante, do produtor e do construtor.\"}]},{\"title\":\"Presumido\",\"children\":[{\"title\":\"Importador -  \\\"O fornecedor ou produtor presumido \u00e9 aquele que importou os produtos, ou, ainda, vende produtos sem identifica\u00e7\u00e3o clara do seu fabricante, produtor, importador ou construtor (art. 13, CDC)\\\". \u00c9 aquele que n\u00e3o participa diretamente do processo de fabrica\u00e7\u00e3o/produ\u00e7\u00e3o/constru\u00e7\u00e3o do produto \u00e9, apenas, um intermedi\u00e1rio entre quem fabrica e o consumidor\"}]},{\"title\":\"Aparente Art. 13 CESPE - 2022  - Telebras FGV - 2022 - TCE-TO - Analista FCC - 2022 - DPE-MT - Defensor\",\"children\":[{\"title\":\"\u00c9 aquele que p\u00f5e uma marca nos produtos disponibilizados ao consumidor e cria no mesmo a confian\u00e7a no produto comercializado. Os defeitos desses produtos s\u00e3o de responsabilidade do franqueador. COMERCIANTE(SUBSIDIARIA), quando deixar de identificar o responsavel REAL ou nao conservar adequadamente os produtos pereciveis.\"},{\"title\":\"obs\",\"children\":[{\"title\":\"Art. 13 CDC. O comerciante \u00e9 igualmente respons\u00e1vel, nos termos do artigo anterior, quando:        I - o fabricante, o construtor, o produtor ou o importador n\u00e3o puderem ser identificados;        II - o produto for fornecido sem identifica\u00e7\u00e3o clara do seu fabricante, produtor, construtor ou importador;        III - n\u00e3o conservar adequadamente os produtos perec\u00edveis.        Par\u00e1grafo \u00fanico. Aquele que efetivar o pagamento ao prejudicado poder\u00e1 exercer o direito de regresso contra os demais respons\u00e1veis, segundo sua participa\u00e7\u00e3o na causa\u00e7\u00e3o do evento danoso.\"}]}]},{\"title\":\"Fornecedor por Equipara\u00e7\u00e3o\",\"children\":[{\"title\":\"\\\"Aquele terceiro que na rela\u00e7\u00e3o de consumo serviu como intermedi\u00e1rio ou ajudante para a realiza\u00e7\u00e3o da rela\u00e7\u00e3o principal, mas que atua frente a um consumidor como se fosse o fornecedor. Em outras palavras: ele n\u00e3o \u00e9 o fornecedor do contrato principal, mas como intermedi\u00e1rio \u00e9 o \u201cdono\u201d da rela\u00e7\u00e3o conexa e possui uma posi\u00e7\u00e3o de poder na rela\u00e7\u00e3o com o consumidor\\\" (MARQUES, Cl\u00e1udia Lima, BENJAMIM, Ant\u00f4nio H. V., BESSA, Leonardo Roscoe. Manual de direito do consumidor. S\u00e3o Paulo: Revista dos Tribunais, 2007, p\u00e1g. 83).\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"Maria comprou um autom\u00f3vel novo fabricado no Brasil em uma renomada concession\u00e1ria de ve\u00edculos e, quatro meses ap\u00f3s a entrega do produto, ocorreu um acidente motivado por informa\u00e7\u00e3o equivocada no manual de instru\u00e7\u00f5es. Em raz\u00e3o desse acidente, Paula, prima de Maria, ficou ferida. Com base na situa\u00e7\u00e3o hipot\u00e9tica apresentada e nas regras previstas no C\u00f3digo de Defesa do Consumidor A responsabilidade pelo fato do produto ser\u00e1 do fabricante do ve\u00edculo, pois a concession\u00e1ria, enquanto comerciante, em regra, n\u00e3o responde pelo acidente de consumo.  CESPE / CEBRASPE - 2022 - TRT - 8\u00aa Regi\u00e3o (PA e AP) - Analista Judici\u00e1rio - Oficial de Justi\u00e7a Avaliador\"},{\"title\":\"FGV - 2021 - TJ-PR - Juiz Substituto A responsabilidade solid\u00e1ria precisa ser declarada em processo de conhecimento, sob pena de tornar-se imposs\u00edvel a execu\u00e7\u00e3o do devedor solid\u00e1rio (STJ, REsp 1.423.083, 2014).\"}]}]},{\"title\":\"Na hipotese de ter o produto mais de um FABRICANTE?\",\"children\":[{\"title\":\"Todos respondem solidariamente, com direito a a\u00e7ao regressiva\"}]},{\"title\":\"Tipos de Defeitos\",\"children\":[{\"title\":\"Defeitos de Fabrica\u00e7\u00e3o\",\"children\":[{\"title\":\"Esses defeitos possuem caracteristicas basicas: - Inevitabilidade - Possibildiade de previs\u00e3o estatistica - Manifesta\u00e7\u00e3o de maneira limitada\"}]},{\"title\":\"Defeitos de Concep\u00e7\u00e3o\",\"children\":[{\"title\":\"Pode ocorrer mesmo que o produto n\u00e3o apresente falhas em sua produ\u00e7\u00e3o O defeito \u00e9 preexistente, relacionado  elabora\u00e7\u00e3o do projeto Tambem possui 3 caracteristicas - Inevitabilidade - Dificuldade de se fazer previs\u00e3o estatistica - Manifesta\u00e7\u00e3o universal\"}]},{\"title\":\"Defeitos de Comercializa\u00e7\u00e3o/informa\u00e7\u00e3o\"}]},{\"title\":\"Periculosidade (Qnt a seguran\u00e7a - 2 grupos) Inerente Exagerada Adquirida Juiz TJ/RS Vunesp 2018\",\"children\":[{\"title\":\"Periculosidade Inerente\",\"children\":[{\"title\":\"Esta atrelada ao tipo de produto ou servico e em regra nao \u00e9 indenizavel\"},{\"title\":\"\u00c9 propria de alguns produtos. Caracteristicas marcantes: Normalidade e Previsibilidade\"}]},{\"title\":\"Periculosidade Exagerada\",\"children\":[{\"title\":\"Ocorre que, mesmo com a correta informa\u00e7\u00e3o, n\u00e3o \u00e9 possivel afastar os riscos\"},{\"title\":\"Esses produtos n\u00e3o podem ser comercializados. S\u00e3o considerados defeituosos por fici\u00e7\u00e3o\"}]},{\"title\":\"Periculosidade Adquirida\",\"children\":[{\"title\":\"\u00c9 imprevisivel. Adotam os 3 tipos de defeitos acima\"}]},{\"title\":\"STJ\",\"children\":[{\"title\":\"Para a responsabiliza\u00e7\u00e3o do fornecedor por acidente do produto n\u00e3o basta ficar evidenciado que os danos foram causados pelo medicamento. O defeito do produto deve apresentar-se, concretamente, como sendo o causador do dano experimentado pelo consumidor. Em se tratando de produto de periculosidade inerente (medicamento com contraindica\u00e7\u00f5es), cujos riscos s\u00e3o normais \u00e0 sua natureza e previs\u00edveis, eventual dano por ele causado ao consumidor  N \u00c3 O  enseja a responsabiliza\u00e7\u00e3o do fornecedor. Isso porque, neste caso, N \u00c3 O se pode dizer que o produto \u00e9 defeituoso. STJ. 3\u00aa Turma. REsp 1599405-SP, Rel. Min. Marco Aur\u00e9lio Bellizze, julgado em 4/4/2017 (Info 603). O laborat\u00f3rio tem responsabilidade objetiva na aus\u00eancia de pr\u00e9via informa\u00e7\u00e3o qualificada quanto aos poss\u00edveis efeitos colaterais da medica\u00e7\u00e3o, ainda que se trate do chamado risco de desenvolvimento. STJ. 3\u00aa Turma. REsp 1.774.372-RS, Rel. Min. Nancy Andrighi, julgado em 05/05/2020 (Info 671).\"}]}]}]},{\"title\":\"Art. 12 \u00a7 3 - Causas de Exclus\u00e3o da Responsabilidade (ROL TAXATIVO) A responsa no CC nao \u00e9 INTEGRAL  FGV - 2022 - TJ-MG - Juiz\",\"children\":[{\"title\":\"Rol\",\"children\":[{\"title\":\"Nao colocou o produto no mercado\",\"children\":[{\"title\":\"Ex: Produtos pirateados ou cargas roubadas\"}]},{\"title\":\"Embora, haja colocado o produto, o DEFEITO inexiste\"},{\"title\":\"CULPA EXCLUSIVA DO CONSUMIDOR OU TERCEIRO\"}]},{\"title\":\"Culpa concorrente?\",\"children\":[{\"title\":\"N\u00e3o exclui a responsabilidade, apenas atenua\"}]},{\"title\":\"Caso fortuito e for\u00e7a maior?\",\"children\":[{\"title\":\"Em regra excluem a responsabilidade\"},{\"title\":\"Fortuito interno: incide durante o processo de elabora\u00e7\u00e3o do produto ou execu\u00e7\u00e3o do servi\u00e7o, n\u00e3o eximindo a responsabilidade civil do fornecedor. Fortuito externo: \u00e9 alheio ou estranho ao processo de elabora\u00e7\u00e3o do produto ou execu\u00e7\u00e3o do servi\u00e7o, excluindo a responsabilidade civil. N\u00e3o depende de a\u00e7\u00e3o do fornecedor/fabricante\"},{\"title\":\"obs\",\"children\":[{\"title\":\"S\u00famula 479-STJ: As institui\u00e7\u00f5es financeiras respondem objetivamente pelos danos gerados por fortuito interno relativo a fraudes e delitos praticados por terceiros no \u00e2mbito de opera\u00e7\u00f5es banc\u00e1rias.\"}]}]},{\"title\":\"Riscos de desenvolvimento?\",\"children\":[{\"title\":\"S\u00e3o os defeitos que eram desconhecidos do fabricante na epoca\"},{\"title\":\"e que, em momento posterior, em razao das mudan\u00e7as tecnologicas, tornaram-se conhecidos\"},{\"title\":\"Em regra a responsa nao ser\u00e1 afastada, pois cabe ao produtor acompanhar e controlar seus produtos depois de coloca-los no mercado\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"O STJ, conferindo interpreta\u00e7\u00e3o extensiva \u00e0 S\u00famula 130, entende que estabelecimentos comerciais, tais como grandes shoppings centers e hipermercados, ao oferecerem estacionamento, ainda que gratuito, respondem pelos assaltos \u00e0 m\u00e3o armada praticados contra os clientes quando, apesar de o estacionamento n\u00e3o ser inerente \u00e0 natureza do servi\u00e7o prestado, gera leg\u00edtima expectativa de seguran\u00e7a ao cliente em troca dos benef\u00edcios financeiros indiretos decorrentes desse acr\u00e9scimo de conforto aos consumidores. No entanto, nos casos em que o estacionamento representa mera comodidade, sendo \u00e1rea aberta, gratuita e de livre acesso por todos, o estabelecimento comercial n\u00e3o pode ser responsabilizado por roubo \u00e0 m\u00e3o armada, fato de terceiro que exclui a responsabilidade, por se tratar de fortuito externo. Assim, lanchonete n\u00e3o tem o dever de indenizar consumidor v\u00edtima de roubo ocorrido no estacionamento externo e gratuito do estabelecimento. STJ. 2\u00aa Se\u00e7\u00e3o. EREsp 1.431.606/SP, Rel. Min. Maria Isabel Gallotti, julgado em 27/03/2019 (Info 648).\"},{\"title\":\"Considera-se fortuito externo a queda de passageiro em via f\u00e9rrea de metr\u00f4, por decorr\u00eancia de mal s\u00fabito, n\u00e3o ensejando o dever de repara\u00e7\u00e3o do dano por parte da concession\u00e1ria de servi\u00e7o p\u00fablico, mesmo considerando que n\u00e3o houve ado\u00e7\u00e3o, por parte do transportador, de tecnologia moderna para impedir o tr\u00e1gico evento. N\u00e3o \u00e9 a regra que trens de metr\u00f4s, inclusive em pa\u00edses com alt\u00edssimo n\u00edvel de desenvolvimento econ\u00f4mico e social, tenham as denominadas \u201cportas de plataforma\u201d (Platform Screen Doors - PSD). Caso concreto: jovem de 29 anos teve mal s\u00fabito (convuls\u00e3o por epilepsia) e caiu ao tentar ingressar na composi\u00e7\u00e3o do metr\u00f4, vindo a falecer. STJ. 4\u00aa Turma. REsp 1936743-SP, Rel. Min. Luis Felipe Salom\u00e3o, julgado em 14/06/2022 (Info 741).\"},{\"title\":\"No caso de atropelamento de pedestre em via f\u00e9rrea, configura-se a concorr\u00eancia de causas, para fins de responsabilidade civil, quando: a) a concession\u00e1ria do transporte ferrovi\u00e1rio descumpre o dever de cercar e fiscalizar os limites da linha f\u00e9rrea, mormente em locais urbanos e populosos, adotando conduta negligente no tocante \u00e0s necess\u00e1rias pr\u00e1ticas de cuidado e vigil\u00e2ncia tendentes a evitar a ocorr\u00eancia de sinistros; e b) a v\u00edtima adota conduta imprudente, atravessando a composi\u00e7\u00e3o ferrovi\u00e1ria em local inapropriado. STJ. 2\u00aa Se\u00e7\u00e3o. REsp 1210064-SP, Rel. Min. Luis Felipe Salom\u00e3o, julgado em 8/8/2012 (Recurso Repetitivo \u2013 Tema 517) (Info 501).\"}]}]},{\"title\":\"Art. 13 \u00a71 - Traz o direito de regresso\",\"children\":[{\"title\":\"Aquele que efetivar o pagto ao prejudicado poder\u00e1 exercer o direito de regresso contra os demais responsaveis, segundo sua participa\u00e7\u00e3o no evento danosos\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"Laborat\u00f3rios e Falsos Resultados\",\"children\":[{\"title\":\"\u00c0 luz do art. 14, caput e \u00a7 1\u00ba, do CDC, o fornecedor responde de forma objetiva, ou seja, independentemente de culpa, pelos danos causados por defeito na presta\u00e7\u00e3o do servi\u00e7o, que se considera defeituoso quando n\u00e3o fornece a seguran\u00e7a que o consumidor dele pode esperar. Em se tratando da realiza\u00e7\u00e3o de exames m\u00e9dicos laboratoriais, tem-se por leg\u00edtima a expectativa do consumidor quanto \u00e0 exatid\u00e3o das conclus\u00f5es lan\u00e7adas nos laudos respectivos, de modo que eventual erro de diagn\u00f3stico de patologia ou equ\u00edvoco no atestado de determinada condi\u00e7\u00e3o biol\u00f3gica implica defeito na presta\u00e7\u00e3o do servi\u00e7o, a atrair a responsabilidade objetiva do laborat\u00f3rio. O simples fato do resultado negativo do exame de DNA agride, ainda, de maneira grave, a honra e reputa\u00e7\u00e3o da m\u00e3e, ante os padr\u00f5es culturais que, embora estereotipados, predominam socialmente. Basta a ideia de que a mulher tenha tido envolvimento sexual com mais de um homem, ou de que n\u00e3o saiba quem \u00e9 o pai do seu filho, para que seja questionada sua honestidade e moralidade. STJ. 3\u00aa Turma. REsp 1700827-PR, Rel. Min. Nancy Andrighi, julgado em 05/11/2019 (Info 660) Os laborat\u00f3rios possuem obriga\u00e7\u00e3o de resultado ou obriga\u00e7\u00e3o de meio? Obriga\u00e7\u00e3o de resultado. Os laborat\u00f3rios possuem, na realiza\u00e7\u00e3o de exames m\u00e9dicos, verdadeira obriga\u00e7\u00e3o de resultado, e n\u00e3o de meio, restando caracterizada sua responsabilidade civil na hip\u00f3tese de falso diagn\u00f3stico.\"}]},{\"title\":\"Acordo e Responsa Subsidiaria\",\"children\":[{\"title\":\"Exemplo: Marina adquiriu um suco de caixinha industrializado no supermercado e, depois de tomar o primeiro gole, percebeu que o produto estava contaminado com um corpo estranho. A consumidora ajuizou a\u00e7\u00e3o de indeniza\u00e7\u00e3o por danos morais contra a fabricante do suco e o supermercado. O comerciante (supermercado) resolveu fazer um acordo com a consumidora e pagou R$ 4 mil \u00e0 autora. A fabricante, por sua vez, n\u00e3o participou da transa\u00e7\u00e3o. O juiz, ao homologar a transa\u00e7\u00e3o, ir\u00e1 extinguir o processo apenas no que tange ao supermercado, prosseguindo o feito com rela\u00e7\u00e3o \u00e0 fabricante. A ingest\u00e3o parcial de produto contaminado configura hip\u00f3tese de fato do produto, situa\u00e7\u00e3o na qual o comerciante  N \u00c3 O  possui responsabilidade solid\u00e1ria, mas sim S U B S I D I A R I A (art. 13 do CDC). Sendo a responsabilidade do supermercado subsidi\u00e1ria, o acordo por ele firmado n\u00e3o se estende necessariamente \u00e0 fabricante porque n\u00e3o se aplica o \u00a7 3\u00ba do art. 844 do CC (este dispositivo afirma que se a transa\u00e7\u00e3o foi feita entre um dos devedores solid\u00e1rios e seu credor, ela extingue a d\u00edvida em rela\u00e7\u00e3o aos codevedores). STJ. 3\u00aa Turma. REsp 1968143-RJ, Rel. Min. Marco Aur\u00e9lio Bellizze, julgado em 08/02/2022 (Info 724).\"}]},{\"title\":\"promotora de eventos\",\"children\":[{\"title\":\"A empresa patrocinadora de evento, que n\u00e3o participou da sua organiza\u00e7\u00e3o, n\u00e3o pode ser enquadrada no conceito de fornecedor para fins de responsabiliza\u00e7\u00e3o por acidente de consumo ocorrido no local. STJ. 3\u00aa Turma. REsp 1955083-BA, Rel. Min. Nancy Andrighi, julgado em 15/02/2022 (Info 727).\"}]},{\"title\":\"ROUBOO NA CANCELA DE SHOPPING\",\"children\":[{\"title\":\"Situa\u00e7\u00e3o adaptada: Jo\u00e3o, dirigindo seu ve\u00edculo, parou na cancela de entrada do estacionamento do shopping center para apertar no bot\u00e3o e pegar o ticket de pagamento. Neste momento, foi assaltado por um indiv\u00edduo que, portando arma de fogo, ordenou que a v\u00edtima abaixasse o vidro e exigiu o rel\u00f3gio, o celular e a carteira de Jo\u00e3o. Incide o regramento consumerista no percurso relacionado com a presta\u00e7\u00e3o do servi\u00e7o e, notadamente, quando o fornecedor dele se vale no interesse de atrair o consumidor. Assim, na hip\u00f3tese de se exigir do consumidor determinada conduta para que usufrua do servi\u00e7o prestado pela fornecedora, colocando-o em vulnerabilidade n\u00e3o s\u00f3 jur\u00eddica, mas sobretudo f\u00e1tica, ainda que momentaneamente, se houver falha na presta\u00e7\u00e3o do servi\u00e7o, ser\u00e1 o fornecedor obrigado a indeniz\u00e1-lo. Nessa linha de racioc\u00ednio, quando o consumidor, com a finalidade de ingressar no estacionamento de shopping center, tem de reduzir a velocidade ou at\u00e9 mesmo parar seu ve\u00edculo e se submeter \u00e0 cancela - barreira f\u00edsica imposta pelo fornecedor e em seu benef\u00edcio - incide a prote\u00e7\u00e3o consumerista, ainda que o consumidor n\u00e3o tenha ultrapassado referido obst\u00e1culo e mesmo que este esteja localizado na via p\u00fablica. Nessa hip\u00f3tese, o consumidor se encontra, de fato, na \u00e1rea de presta\u00e7\u00e3o do servi\u00e7o oferecido pelo estabelecimento comercial. Por conseguinte, tamb\u00e9m nessa \u00e1rea incidem os deveres inerentes \u00e0s rela\u00e7\u00f5es consumeristas e ao fornecimento de seguran\u00e7a indispens\u00e1vel que se espera dos estacionamentos de shoppings centers. STJ. 3\u00aa Turma. REsp 2031816-RJ, Rel. Min. Nancy Andrighi, julgado em 14/3/2023 (Info 767).\"}]}]}]},{\"title\":\"Fato do Servi\u00e7o\",\"children\":[{\"title\":\"Previsto no art 14 do CDC que dispoe:\",\"children\":[{\"title\":\"O fornecedor de servicos responde, independente de culpa\"},{\"title\":\"Pela repara\u00e7\u00e3o dos danos causados aos consumidores\"},{\"title\":\"Por defeitos relativos aos servicos, bem como infos insuficientes ou inadequadas\"},{\"title\":\"Decorrencias  do art. 14\",\"children\":[{\"title\":\"Nos casos de danos provocados por defeito do servi\u00e7o, o C\u00f3digo de Defesa do Consumidor autoriza a amplia\u00e7\u00e3o do conceito de fornecedor para alcan\u00e7ar todos os envolvidos na presta\u00e7\u00e3o do servi\u00e7o, possibilitando a responsabiliza\u00e7\u00e3o do terceiro que, embora n\u00e3o o tenha prestado diretamente, tenha integrado a cadeia de consumo.  CESPE / CEBRASPE - 2022 - PG-DF - Procurador do Distrito Federal, Categoria I\"}]}]},{\"title\":\"O defeitos podem ser\",\"children\":[{\"title\":\"De concep\u00e7\u00e3o\",\"children\":[{\"title\":\"Ocorre no momento de planejamento do servico, escolha de produtos, escolha dos metodos\"}]},{\"title\":\"De presta\u00e7ao\",\"children\":[{\"title\":\"Ocorre no momento da presta\u00e7\u00e3o, que se afastados padros de qualidade\"}]},{\"title\":\"De comercializa\u00e7\u00e3o\"}]},{\"title\":\"Causas de Exclus\u00e3o da responsabilidade -  Art.14 \u00a7 3 do CDC\",\"children\":[{\"title\":\"Defeito inexiste\"},{\"title\":\"Culpa exclusiva do consumidor ou terceiro(ex: m\u00e9dico nao empregado)\"},{\"title\":\"Caso fortuito e for\u00e7a maior?\",\"children\":[{\"title\":\"Em regra excluem a responsabilidade\"}]}]},{\"title\":\"Ado\u00e7\u00e3o de novas tecnicas - Art. 14 \u00a7 2 do CDC\",\"children\":[{\"title\":\"O servico nao \u00e9 defeituoso pela adocao de novas tecnicas\"},{\"title\":\"OBS\",\"children\":[{\"title\":\"Em rela\u00e7\u00e3o \u00e0 responsabilidade pelo fato do produto ou do servi\u00e7o, o servi\u00e7o n\u00e3o ser\u00e1 considerado defeituoso pela ado\u00e7\u00e3o de novas t\u00e9cnicas.(FUNDEP (Gest\u00e3o de Concursos) - 2022 - MPE-MG - Promotor de Justi\u00e7a Substituto - Edital n\u00ba LIX)\"}]}]}]},{\"title\":\"Invers\u00e3o do Onus da Prova Temos 2 tipos de invers\u00e3o:  Ope Legis e Ope Judicis ART. 14 \u00a73\",\"children\":[{\"title\":\"Ope Judicis\",\"children\":[{\"title\":\"Ocorre quando o Juiz determinar a invers\u00e3o com base em um desses requisitos\"},{\"title\":\"N\u00e3o \u00e9 obrigatoria\"}]},{\"title\":\"Ope Legis\",\"children\":[{\"title\":\"\u00c9 obrigatoria porque decorre de Lei \u25aa\ufe0e Juris em Teses Ed. 39. 5) Em demanda que trata da responsabilidade pelo fato do produto ou do servi\u00e7o (arts. 12 e 14 do CDC), a invers\u00e3o do \u00f4nus da prova decorre da lei (ope legis), n\u00e3o se aplicando o art. 6\u00ba, inc. VIII, do CDC. \u00d4nus do fornecedor de provar que n\u00e3o colocou o produto no mercado, que ele n\u00e3o \u00e9 defeituoso ou que houve culpa exclusiva do consumidor ou de terceiros pelos danos gerados (art. 12, \u00a73\u00ba, CDC); \u00d4nus do fornecedor de provar que o servi\u00e7o n\u00e3o \u00e9 defeituoso ou que h\u00e1 culpa exclusiva do consumidor ou de terceiro nos danos gerados (art. 14, \u00a73\u00ba, CDC); \u00d4nus do fornecedor de provar a veracidade e corre\u00e7\u00e3o da informa\u00e7\u00e3o ou comunica\u00e7\u00e3o publicit\u00e1ria que patrocina (art. 38, CDC);(DPE-MS)\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"Na hip\u00f3tese em que o consumidor/autor impugnar a autenticidade da assinatura constante em contrato banc\u00e1rio juntado ao processo pela institui\u00e7\u00e3o financeira, caber\u00e1 a esta o \u00f4nus de provar a autenticidade (arts. 6\u00ba, 369 e 429, II, do CPC). STJ. 2\u00aa Se\u00e7\u00e3o. REsp 1846649-MA, Rel. Min. Marco Aur\u00e9lio Bellizze, julgado em 24/11/2021 (Recurso Repetitivo - Tema 1061) (Info 720).\"},{\"title\":\"II- A invers\u00e3o do \u00f4nus da prova n\u00e3o acarreta a autom\u00e1tica invers\u00e3o do custeio de provas requeridas. Todavia, ante a aus\u00eancia de realiza\u00e7\u00e3o da prova, as consequ\u00eancias ser\u00e3o arcadas por quem det\u00e9m o \u00f4nus probat\u00f3rio (ou seja, n\u00e3o se pode obrigar a pagar, mas se pode julgar contra a parte requerida em face da aus\u00eancia da prova).(AgRg no AREsp n. 246.375/PR, relator Ministro Luis Felipe Salom\u00e3o, Quarta Turma, julgado em 4/12/2012, DJe de 14/12/2012.)\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"FGV - 2023 - TJ-PR - Juiz Substituto I - Tratando-se de erro m\u00e9dico, est\u00e1-se diante de responsabilidade por fato do servi\u00e7o, que, como tal, possui previs\u00e3o legal de invers\u00e3o do \u00f4nus da prova, no art. 14, par. 3\u00ba, do CDC. invers\u00e3o legal (ope legis)  Art. 14, \u00a7 3\u00b0 O fornecedor de servi\u00e7os s\u00f3 n\u00e3o ser\u00e1 responsabilizado quando provar: I - que, tendo prestado o servi\u00e7o, o defeito inexiste; II - a culpa exclusiva do consumidor ou de terceiro. III- A denuncia\u00e7\u00e3o da lide \u00e9 expressa e legalmente vedada para a hip\u00f3tese de fato do produto, como se v\u00ea da combina\u00e7\u00e3o do art. 13, par\u00e1grafo \u00fanico, e do art. 88 do CDC.  CONTUDO - PODE CHAMAR QUANDO FOR SEGURADORA. Art. 101. Na a\u00e7\u00e3o de responsabilidade civil do fornecedor de produtos e servi\u00e7os, sem preju\u00edzo do disposto nos Cap\u00edtulos I e II deste t\u00edtulo, ser\u00e3o observadas as seguintes normas: II - o r\u00e9u que houver contratado seguro de responsabilidade poder\u00e1 chamar ao processo o segurador, vedada a integra\u00e7\u00e3o do contradit\u00f3rio pelo Instituto de Resseguros do Brasil. Nesta hip\u00f3tese, a senten\u00e7a que julgar procedente o pedido condenar\u00e1 o r\u00e9u nos termos do art. 80 do C\u00f3digo de Processo Civil. Se o r\u00e9u houver sido declarado falido, o s\u00edndico ser\u00e1 intimado a informar a exist\u00eancia de seguro de responsabilidade, facultando-se, em caso afirmativo, o ajuizamento de a\u00e7\u00e3o de indeniza\u00e7\u00e3o diretamente contra o segurador, vedada a denuncia\u00e7\u00e3o da lide ao Instituto de Resseguros do Brasil e dispensado o litiscons\u00f3rcio obrigat\u00f3rio com este.\"}]}]}]},{\"title\":\"Responsa por Vicio  do Produto ou Servi\u00e7o extracontratual,  objetiva e  solid\u00e1ria. CEBRASPE - 2022 - MPE-SE - Promotor\",\"children\":[{\"title\":\"Regra - Responsa do comerciante\",\"children\":[{\"title\":\"SOLIDARIA\"},{\"title\":\"E pelo Fato?\",\"children\":[{\"title\":\"SUBSIDRIARIA\"}]}]},{\"title\":\"Vicio do Produto CESPE - 2022 - DPE-DF - Ana. CESPE - 2022 - DPE-PA\",\"children\":[{\"title\":\"Vicios de Qualidade e Quantidade\",\"children\":[{\"title\":\"Os fornecedores de produtos de consumo duraveis ou n\u00e3o duraveis\"},{\"title\":\"RESPONDEM SOLIDARIAMENTE pelos  vicios de quantidade e qualidade\"},{\"title\":\"QUE os tornem improprios ou inadeuqados ao consumo ou lhes diminuam o valor\"},{\"title\":\"Assim como aqueles decorrentes de disparidade com indica\u00e7\u00f5es\"},{\"title\":\"do recipiente, embalagem, rotulagem ou mensagem publicitaria\"},{\"title\":\"Respeitadas varia\u00e7\u00f5es de sua natureza\"},{\"title\":\"Podendo o consumidor pedir substitui\u00e7\u00e3o das partes viciadas\"},{\"title\":\"Vicios de qualidade\",\"children\":[{\"title\":\"Existem 3 tipos de vicio\",\"children\":[{\"title\":\"Vicios que tornem o produto improprio ou inadequado\"},{\"title\":\"Vicios que diminuam o valor\"},{\"title\":\"Vicios decorrentes de disparidade\"}]},{\"title\":\"N\u00e3o \u00e9 necessario que o vicio seja grave\"},{\"title\":\"Art. 18 \u00a76 traz o que s\u00e3o improprios(3)\",\"children\":[{\"title\":\"Produtos com prazo de validade vencido\"},{\"title\":\"Produtos deteriorados, alterados, adulterados, avariados, falsiifcados, corrompodiso, fraudados, nocivos a vida ou a saude, perigosos, ou auqles em desacordo com normas regulamentares\"},{\"title\":\"Produtos que se revelem inadeuqados ao fim que se destinam, POR QLQ MOTIVO Ignorancia n\u00e3o exime o fornecedor de resposabilidade\"}]}]}]},{\"title\":\"Vicios de Quantidade\",\"children\":[{\"title\":\"Previsto no art. 19\",\"children\":[{\"title\":\"Os fornecedores respondem SOLIDARIAMENTE pelos vicios de quantidade\"},{\"title\":\"Sempre que, respeitadas variacoes decorrentes de sua natureza\"},{\"title\":\"Seu conteudo liquido for inferior as inidicacoes contantes\"},{\"title\":\"do recipiente, da embalagem, rotulagem ou de mensagem publicitaria,\"},{\"title\":\"podendo o consumidor exigir, ALTERNATIVAMENTE E A SUA ESCOLHA\"}]},{\"title\":\"Ha uma diferenca do que esta explicado na embalagem ou mensagem\"},{\"title\":\"Art. 19 \u00a7 2 do CDC -  Fornecedor Imediato (Comerciante no caso)\",\"children\":[{\"title\":\"\u00c9 responsavel qnd fizer pesagem ou medi\u00e7\u00e3o e o instrumento utilizado nao estiver aferido segundo os padroes oficiais\"}]}]},{\"title\":\"Op\u00e7\u00f5es do CONSUMIDOR\",\"children\":[{\"title\":\"N\u00e3o sendo o vicio sanado no prazo de 30 dias,  pode o consumidor exigir, alternativamente e a sua escolha FGV - 2022 - TJ-DFT - Analista Judici\u00e1rio - \u00c1rea Judici\u00e1ria\",\"children\":[{\"title\":\"Abatimento proporcional\"},{\"title\":\"substitui\u00e7\u00e3o do produto por outro de mesma especie, marca ou modelo, sem os vicios\"},{\"title\":\"Restitui\u00e7\u00e3o imediata da quantia paga, moentariamente att, sem prejuizo das perdas e danos\"}]},{\"title\":\"Esse prazo pode ser  afastado no seguinte caso CESPE - 2022 - DPE-DF - Ana. FGV - 2023 - TJ-BA - Juiz Leigo\",\"children\":[{\"title\":\"1. Razao da extens\u00e3o do vicio, a substitui\u00e7\u00e3o das partes puder comprometer a qualidade ou caracteristicas do produto, diminuir-lhe o valor\"},{\"title\":\"2. OU FOR PRODUTO ESSENCIAL\"}]},{\"title\":\"As partes podem convencionar  amplia\u00e7\u00e3o ou redu\u00e7\u00e3o do prazo LEGAL\",\"children\":[{\"title\":\"N\u00e3o pode ser INFERIOR A 7 E NEM SUPERIOR A 180 DIAS\"},{\"title\":\"EM CONTRATOS DE ADESAO?\",\"children\":[{\"title\":\"Prazo deve ser convencionado em separado, por meio de manifesta\u00e7\u00e3o expressa do consumidor\"}]}]},{\"title\":\"Tendo o consumidor optado pela substitui\u00e7\u00e3o do produto e esta n\u00e3o sendo possivel\",\"children\":[{\"title\":\"Pode haver substituicao por de outra especie, marca ou modelo\"},{\"title\":\"Ocorre complementa\u00e7\u00e3o ou restitui\u00e7\u00e3o da diferenca\"}]}]},{\"title\":\"Fornecimento de produtos in natura CESPE - 2022 - DPE-DF - Ana.\",\"children\":[{\"title\":\"\u00c9 responsavel perante o consumidor o F O R N E C E D O R imediato\"},{\"title\":\"EXCETO qnd identificado seu produtor\"}]},{\"title\":\"OBS\",\"children\":[{\"title\":\"Caso adaptado: Priscila e sua m\u00e3e Regina fizeram uma viagem internacional.Priscila tentou utilizar o cart\u00e3o de cr\u00e9dito que foi indevidamente bloqueado por uma falha da operadora do cart\u00e3o. Regina ajuizou a\u00e7\u00e3o contra a operadora do cart\u00e3o alegando que a sua filha \u00e9 quem iria pagar todas as despesas durante a viagem. Logo, como o cart\u00e3o de cr\u00e9dito de Priscila n\u00e3o funcionou, ela (Regina) passou por constrangimentos e pela ang\u00fastia de n\u00e3o saber se conseguiria pagar as despesas. O STJ afirmou que Regina \u2013 que n\u00e3o eraa titular do cart\u00e3o \u2013 n\u00e3o era destinat\u00e1ria dos servi\u00e7os e, portanto, n\u00e3o possu\u00eda legitimidade ativa para propor a respectiva a\u00e7\u00e3o indenizat\u00f3ria. Vale ressaltar que, por se tratar de v\u00edcio do produto, Regina n\u00e3o pode ser considerada consumidora por equipara\u00e7\u00e3o (bystander), sendo essa figura restrita aos casos de fato do produto ou servi\u00e7o. STJ. 3\u00aa Turma. REsp 1967728-SP, Rel. Min. Nancy Andrighi, julgado em 22/03/2022 (Info 730).\"}]}]},{\"title\":\"Vicio do Servi\u00e7o\",\"children\":[{\"title\":\"Previsto no art. 20 que assim dispoe\",\"children\":[{\"title\":\"O fornecedor de servicos responde pelos vicios de qualidade\"},{\"title\":\"QUE OS TORNEM IMPROPRIOS AO CONSUMO OU LHES DIMINUAM O VALOR\"},{\"title\":\"Assim como por aqueles decorrentes da DISPARIDADE com as indica\u00e7\u00f5es constantes da OFERTA OU MENSAGEM PUBLICITARIA, podendo o consumidor exigir, alternativamente ou a sua escolha: Reexecu\u00e7\u00e3o dos servi\u00e7os Restituic\u00e3o da quantia paga Abatimento proporcional do pre\u00e7o\"}]},{\"title\":\"Servi\u00e7o Improprio - Conceito - Art. 20\u00a7 2 do CDC\",\"children\":[{\"title\":\"S\u00e3o improprios servicos inadequados para os fins que razoavelmente se esperam\"},{\"title\":\"Aqueles que nao atendam as normas regulamentares\"}]},{\"title\":\"Reexecu\u00e7\u00e3o do servico -  pode ser confiada a terceiro Art. 20 \u00a71 do CDC\",\"children\":[{\"title\":\"A reexecu\u00e7\u00e3o do servico pode ser confiada a terceiros devidamente capacitados\"},{\"title\":\"POR CONTA E RISCO DO FORNECEDOR\"}]},{\"title\":\"ART. 21 - USO DE PECAS USADAS\",\"children\":[{\"title\":\"No fornecimento de servicos que tenham por objetivo a repara\u00e7\u00e3o de qlq produto\"},{\"title\":\"Considera-se implicita a obriga\u00e7\u00e3o do fornecedor empregar componentes de reposi\u00e7\u00e3o\"},{\"title\":\"ORIGINAIS, ADEQUADOS E NOVOS\"},{\"title\":\"Ou que mantenham especifica\u00e7\u00f5es tecnicas do fabricante\"},{\"title\":\"SALVO\",\"children\":[{\"title\":\"Se autorizadas pelo Consumidor\"}]}]},{\"title\":\"obs\",\"children\":[{\"title\":\"Overbooking\",\"children\":[{\"title\":\"O dano sofrido pela empresa cujo dirigente n\u00e3o embarcou por excesso de reservas, e por causa disso perdeu atividades programadas no lugar de destino, deve ser indenizado integralmente, nos termos do C\u00f3digo de Defesa do Consumidor. STJ. 4\u00aa Turma. REsp 345.687/CE, Rel. Min. Ruy Rosado de Aguiar, julgado em 16/05/2002. **Existem diversos precedentes no \u00e2mbito do STJ no sentido de que o overbooking causa dano moral \u201cin re ipsa\u201d. J\u00e1 em rela\u00e7\u00e3o ao MERO ATRASO DE VOO, majoritariamente entende-se que n\u00e3o h\u00e1 dano moral \u201cin re ipsa\u201d. Como caiu na prova oral para Juiz Substituto do TJSP: \u201cO overbooking, nos contratos de transporte, gera automaticamente o dever de indenizar? Ou depende da prova do preju\u00edzo?\u201d.\"}]}]}]},{\"title\":\"RESPONSABILIDADE OBJETIVA\",\"children\":[{\"title\":\"Assim como na responsabilidade pelo fato do produto, a responsabilidade pelo vicio \u00e9\"},{\"title\":\"SOLIDARIA entre todos da cadeia de fornecimento\"},{\"title\":\"\u00c9 a solidariedade passiva\"},{\"title\":\"\u00c9 tambem proibida a denuncia\u00e7\u00e3o da lide\",\"children\":[{\"title\":\"Na hipotese do art. 13(A\u00e7\u00e3o de Regresso), essa a\u00e7\u00e3o pode ser ajuizada em processo autonomo\"},{\"title\":\"Facultada possibilidade de proseguir-se nos mesmos autos, VEDADA DENUNCIA\u00c7AO A LIDE\"},{\"title\":\"Aquele que efetivar pgto ao prejudicado podera exercer direito de regresso contra os demais\"},{\"title\":\"obs\",\"children\":[{\"title\":\"FGV - 2023 - TJ-MS - Juiz Substituto Art. 101. Na a\u00e7\u00e3o de responsabilidade civil do fornecedor de produtos e servi\u00e7os, sem preju\u00edzo do disposto nos Cap\u00edtulos I e II deste t\u00edtulo, ser\u00e3o observadas as seguintes normas:       (...)    II - o r\u00e9u que houver contratado seguro de responsabilidade poder\u00e1 chamar ao processo o segurador, vedada a integra\u00e7\u00e3o do contradit\u00f3rio pelo Instituto de Resseguros do Brasil. Nesta hip\u00f3tese, a senten\u00e7a que julgar procedente o pedido condenar\u00e1 o r\u00e9u nos termos do art. 80 do C\u00f3digo de Processo Civil. Se o r\u00e9u houver sido declarado falido, o s\u00edndico ser\u00e1 intimado a informar a exist\u00eancia de seguro de responsabilidade, facultando-se, em caso afirmativo, o ajuizamento de a\u00e7\u00e3o de indeniza\u00e7\u00e3o diretamente contra o segurador, vedada a denuncia\u00e7\u00e3o da lide ao Instituto de Resseguros do Brasil e dispensado o litiscons\u00f3rcio obrigat\u00f3rio com este.\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"Jurisprud\u00eancia em teses-STJ => 4) A veda\u00e7\u00e3o \u00e0 denuncia\u00e7\u00e3o da lide prevista no art. 88 do CDC n\u00e3o se restringe \u00e0 responsabilidade de comerciante por fato do produto (art. 13 do CDC), sendo aplic\u00e1vel tamb\u00e9m nas demais hip\u00f3teses de responsabilidade civil por acidentes de consumo (arts. 12 e 14 do CDC).\"}]}]}]},{\"title\":\"Estipula\u00e7\u00e3o contratual que exonere ou atenue a indeniza\u00e7\u00e3o  - Art. 25 do CDC\",\"children\":[{\"title\":\"\u00c9 vedado qlq clausula nesse sentido\"},{\"title\":\"OBS\",\"children\":[{\"title\":\"Caso adaptado: consumidor celebrou contrato de financiamento para aquisi\u00e7\u00e3o de casa pr\u00f3pria com a empresa \u201cL\u201d, tendo a Caixa Econ\u00f4mica Federal intervindo no ajuste como agente financeiro do SFH. Posteriormente, o consumidor ajuizou a\u00e7\u00e3o contra empresa e a CEF pedindo a restitui\u00e7\u00e3o de valores pagos a mais em raz\u00e3o de c\u00e1lculos incorretos feitos pela empresa. A senten\u00e7a julgou o pedido procedente para condenar os r\u00e9us a devolver as quantias pagas a mais. O consumidor iniciou cumprindo de senten\u00e7a cobrando o valor integral da CEF. O STJ n\u00e3o concordou com o pedido.  A execu\u00e7\u00e3o deve ser, quantitativamente, dividida, em partes iguais e distintas, entre a CEF e a outra empresa. Havendo condena\u00e7\u00e3o de mais de um r\u00e9u, e sendo omissa a senten\u00e7a em rela\u00e7\u00e3o \u00e0 parcela de responsabilidade de cada demandado, a solu\u00e7\u00e3o para essa omiss\u00e3o, na execu\u00e7\u00e3o, deve partir da premissa de que \u201ca solidariedade n\u00e3o se presume; resulta da lei ou da vontade das partes\u201d (art. 265 do CC). No caso, inexiste qualquer previs\u00e3o legal e/ou convencional quanto \u00e0 obriga\u00e7\u00e3o solid\u00e1ria entre os corr\u00e9us, pelo que aplic\u00e1vel a norma do art. 257 do CC, segundo a qual \u201chavendo mais de um devedor ou mais de um credor em obriga\u00e7\u00e3o divis\u00edvel, esta presume-se dividida em tantas obriga\u00e7\u00f5es, iguais e distintas, quantos os credores ou devedores\u201d. A norma do art. 25, \u00a71\u00ba, do CDC, rege a responsabilidade solid\u00e1ria daqueles que provocam dano ao consumidor por v\u00edcio do produto ou do servi\u00e7o, n\u00e3o sendo esta a rela\u00e7\u00e3o jur\u00eddica estabelecida entre as partes, decorrente de revis\u00e3o de contrato de m\u00fatuo, de modo que, por se tratar de exce\u00e7\u00e3o \u00e0 regra geral do art. 265 do CC, a previs\u00e3o de solidariedade contida no supracitado dispositivo deve ser interpretada restritivamente. STJ. 1\u00aa Turma.REsp 1647238-RJ, Rel. Min. Gurgel de Faria, julgado em 17/05/2022 (Info 737).\"}]}]},{\"title\":\"obs\",\"children\":[{\"title\":\"`Papel TermoSenssivel\",\"children\":[{\"title\":\"A institui\u00e7\u00e3o financeira, ao emitir comprovantes de suas opera\u00e7\u00f5es por meio de papel termossens\u00edvel, acabou atraindo para si a responsabilidade pelo v\u00edcio de qualidade do produto. Isso porque, por sua pr\u00f3pria escolha, em troca do aumento dos lucros - j\u00e1 que a impress\u00e3o no papel t\u00e9rmico \u00e9 mais r\u00e1pida e bem mais em conta -, passou a ofertar o servi\u00e7o de forma inadequada, emitindo comprovantes cuja durabilidade n\u00e3o atendem as exig\u00eancias e as necessidades do consumidor, vulnerando o princ\u00edpio da confian\u00e7a. \u00c9 da natureza espec\u00edfica do tipo de servi\u00e7o prestado emitir documentos de longa vida \u00fatil, a fim de permitir que os consumidores possam, quando lhes for exigido, comprovar as opera\u00e7\u00f5es realizadas. A \u201cfragilidade\u201d dos documentos emitidos em papel termossens\u00edvel acaba por ampliar o desequil\u00edbrio na rela\u00e7\u00e3o de consumo, em vista da dificuldade que o consumidor ter\u00e1 em comprovar o seu direito pelo desbotamento das informa\u00e7\u00f5es no comprovante. STJ. 4\u00aa Turma. REsp 1414774/RJ, Rel. Min. Luis Felipe Salom\u00e3o, julgado em 16/05/2019 (Info 650).\"}]},{\"title\":\"Caso adaptado: Regina, gr\u00e1vida, sentiu dores intensas e desconforto p\u00e9lvico. Foi levada por at\u00e9 um hospital particular. Ficou constado que estava em trabalho de parto avan\u00e7ado.A indica\u00e7\u00e3o m\u00e9dica era a realiza\u00e7\u00e3o imediata da ces\u00e1rea, mas n\u00e3o havia sala de cirurgia dispon\u00edvel.Somente depois de um longo tempo, foi disponibilizada uma sala de cirurgia.Em raz\u00e3o da demora para a realiza\u00e7\u00e3o do parto, houve sofrimento fetal agudo e o beb\u00ea j\u00e1 foi retirado sem vida. O estabelecimento hospitalar responde objetivamente pelos danos causados aos pacientes toda vez que o fato gerador for o defeito do seu servi\u00e7o (art. 14, caput, do CDC). Ex: estadia do paciente (interna\u00e7\u00e3o e alimenta\u00e7\u00e3o), instala\u00e7\u00f5es, equipamentos, servi\u00e7os auxiliares (enfermagem, exames, radiologia) etc. Se o defeito estiver relacionado com um desses servi\u00e7os do hospital, a responsabilidade \u00e9 objetiva, como foi no caso concreto. STJ. 4\u00aa Turma. AgInt no AgInt no REsp 1718427-RS, Rel. Min. Jo\u00e3o Ot\u00e1vio de Noronha, julgado em 6/3/2023 (Info 768).\"},{\"title\":\"A administradora responde objetivamente pela falha na presta\u00e7\u00e3o dos servi\u00e7os de intermedia\u00e7\u00e3o imobili\u00e1ria consubstanciada na venda fraudulenta de im\u00f3veis realizada por corretora a ela vinculada. STJ. 3\u00aa Turma. AgInt no REsp 1.893.395-RS, Rel. Min. Humberto Martins, julgado em 26/6/2023 (Info 12 \u2013 Edi\u00e7\u00e3o Extraordin\u00e1ria).\"}]}]},{\"title\":\"Decadencia e Prescri\u00e7\u00e3o no CDC\",\"children\":[{\"title\":\"Intro\",\"children\":[{\"title\":\"Temos 2 artigos no CDC que regulam a materia a Decadencia\"}]},{\"title\":\"Decadencia CESPE - 2022 - PC-RJ - Delegado CESPE - 2022 - DPE-PA\",\"children\":[{\"title\":\"Prazo\",\"children\":[{\"title\":\"O direito de reclamar pelo vicios aparentes ou de facil constatac\u00e3o caduca em Havendo reparo, incide novamente o prazo decadencial\",\"children\":[{\"title\":\"30 dias\",\"children\":[{\"title\":\"Servicos e produtos NAO duraveis\"}]},{\"title\":\"90 dias\",\"children\":[{\"title\":\"Servicos e produtos duraveis\"}]}]},{\"title\":\"INICIO DA CONTAGEM FCC - 2022 - DPE-AP FGV - 2023 - TRF - 1\u00aa REGI\u00c3O - Juiz Federal Substituto\",\"children\":[{\"title\":\"Produtos\",\"children\":[{\"title\":\"Entrega efetiva do produto\"}]},{\"title\":\"Servicos\",\"children\":[{\"title\":\"Termino da execu\u00e7\u00e3o do servico\"}]}]},{\"title\":\"Em caso de Vicio Oculto?\",\"children\":[{\"title\":\"Quando E V I D E N C I A D O defeito\"},{\"title\":\"Se o prazo do CC for melhor? Aplica-se o CC\"}]}]},{\"title\":\"Causas que OBSTAM a decadencia(2)\",\"children\":[{\"title\":\"Reclama\u00e7\u00e3o devidamente formulada pelo consumidor perante o fornecedor ATE A RESPOSTA NEGATIVA CORRESPONDNETE, q deve ser transmitida de forna inequivoca a RECLAMA\u00c7\u00c3O obsta AT\u00c9 tal momento\"},{\"title\":\"Instaurac\u00e3o do Inquerito Civil, ate seu encerramento\"},{\"title\":\"OBS\",\"children\":[{\"title\":\"reclama\u00e7\u00e3o verbal\",\"children\":[{\"title\":\"O CDC prev\u00ea que \u00e9 causa obstativa da decad\u00eancia a reclama\u00e7\u00e3o comprovadamente formulada pelo consumidor perante o fornecedor de produtos e servi\u00e7os at\u00e9 a resposta negativa correspondente, que deve ser transmitida de forma inequ\u00edvoca, nos termos do art. 26, \u00a7 2\u00ba, I: Art. 26 (...)\u00a7 2\u00ba Obstam a decad\u00eancia:I - a reclama\u00e7\u00e3o comprovadamente formulada pelo consumidor perante o fornecedor de produtos e servi\u00e7os at\u00e9 a resposta negativa correspondente, que deve ser transmitida de forma inequ\u00edvoca; De que forma tem que ocorrer essa \u201creclama\u00e7\u00e3o\u201d? Pode ser verbal? SIM. A reclama\u00e7\u00e3o obstativa da decad\u00eancia, prevista no art. 26, \u00a7 2\u00ba, I, do CDC, pode ser feita documentalmente ou verbalmente. STJ. 3\u00aa Turma.REsp 1442597-DF, Rel. Min. Nancy Andrighi, julgado em 24/10/2017 (Info 614).\"}]}]}]},{\"title\":\"obs\",\"children\":[{\"title\":\"S\u00famula 477-STJ: A decad\u00eancia do artigo 26 do CDC n\u00e3o \u00e9 aplic\u00e1vel \u00e0 presta\u00e7\u00e3o de contas para obter esclarecimentos sobre cobran\u00e7a de taxas, tarifas e encargos banc\u00e1rios. STJ. 2\u00aa Se\u00e7\u00e3o, DJe 19/6/2012.\"}]}]},{\"title\":\"Prescri\u00e7\u00e3o -  Art. 27 do CDC CESPE - 2022 - PC-RJ - Delegado CESPE - 2022 - TELEBRAS\",\"children\":[{\"title\":\"Prescreve em 5 ANOS a pretens\u00e3o de repara\u00e7\u00e3o DE danos causados por F A T O S do produto ou servi\u00e7os. Inicio da Contagem: CONHECIMENTO DO DANO OU SUA AUTORIA\"},{\"title\":\"Prazo de Rep. de Dano no CC\",\"children\":[{\"title\":\"3 Anos!\"}]},{\"title\":\"OBS\",\"children\":[{\"title\":\"Qual \u00e9 o prazo prescricional da a\u00e7\u00e3o de responsabilidade civil no caso de acidente a\u00e9reo em voo dom\u00e9stico?5 anos, segundo entendimento do STJ, aplicando-se o CDC. Qual \u00e9 o prazo prescricional da a\u00e7\u00e3o de responsabilidade civil no caso de acidente a\u00e9reo em voo internacional?2 anos, com base no art. 29 da Conven\u00e7\u00e3o de Vars\u00f3via. Nos termos do art. 178 da Constitui\u00e7\u00e3o da Rep\u00fablica, as normas e os tratados internacionais limitadores da responsabilidade das transportadoras a\u00e9reas de passageiros, especialmente as Conven\u00e7\u00f5es de Vars\u00f3via e Montreal, t\u00eam preval\u00eancia em rela\u00e7\u00e3o ao C\u00f3digo de Defesa do Consumidor. STF. Plen\u00e1rio.RE 636331/RJ, Rel. Min. Gilmar Mendes e ARE 766618/SP, Rel. Min. Roberto Barroso, julgados em 25/05/2017 (repercuss\u00e3o geral) (Info 866).\"},{\"title\":\"A parte celebrou contrato de m\u00fatuo com a institui\u00e7\u00e3o financeira e deu uma joia em penhor como garantia do d\u00e9bito. Ocorre que a joia foi furtada de dentro do banco. Diante disso, o devedor (mutu\u00e1rio) ter\u00e1 que pleitear indeniza\u00e7\u00e3o pelos preju\u00edzos sofridos com o furto, sendo de 5 anos o prazo prescricional para essa a\u00e7\u00e3o de ressarcimento. O furto das joias, objeto do penhor, constitui falha do servi\u00e7o prestado pela institui\u00e7\u00e3o financeira, devendo incidir o prazo prescricional de 5 anos para a a\u00e7\u00e3o de indeniza\u00e7\u00e3o, conforme previsto no art. 27 do CDC. STJ. 4\u00aa Turma.REsp 1369579-PR, Rel. Min. Luis Felipe Salom\u00e3o, julgado em 24/10/2017 (Info 616).\"},{\"title\":\"A a\u00e7\u00e3o de indeniza\u00e7\u00e3o por danos materiais proposta por consumidor contra construtora em virtude de v\u00edcios de qualidade e de quantidade do im\u00f3vel adquirido tem prazo prescricional de 10 anos, com fundamento no art. 205 do CC/2002. N\u00e3o se aplica o prazo decadencial do art. 26 do CDC. O art. 26 trata do prazo que o consumidor possui para exigir uma das alternativas previstas no art. 20 do CDC. N\u00e3o se trata de prazo prescricional. N\u00e3o se aplica o prazo do art. 27 do CDC porque este se refere apenas a fato do produto. STJ. 3\u00aa Turma. REsp 1534831-DF, Rel. Min. Ricardo Villas B\u00f4as Cueva, Rel. Acd. Min. Nancy Andrighi, julgado em 20/02/2018 (Info 620).\"}]}]}]},{\"title\":\"Garantia Contratual x Garantia Legal Art. 50 do CDC\",\"children\":[{\"title\":\"A garantia contratual \u00e9 complementar a Legal e ser\u00e1 conferida mediante termo escrito\"},{\"title\":\"Esse termo\",\"children\":[{\"title\":\"Deve ser padronizado esclarecer em que consiste a garantia, a forma, prazo e lugar de exercicio\"},{\"title\":\"Deve prever o onus a cargo do consumidor\"}]},{\"title\":\"STJ - Prazos n\u00e3o correm simutaneamente\",\"children\":[{\"title\":\"OS prazos de garantia n\u00e3o correm conjuntamente. Corre a legal e depois a contratual\"}]},{\"title\":\"Garantia legal independe de termo expresso, vedada exonera\u00e7\u00e3o contratual(24)\"},{\"title\":\"Callout\",\"children\":[{\"title\":\"Ao contr\u00e1rio da garantia legal, que \u00e9 sempre obrigat\u00f3ria, a garantia contratual \u00e9 mera faculdade do fornecedor.\"}]}]},{\"title\":\"Servicos Publicos Art. 22 do CDC\",\"children\":[{\"title\":\"Orgaos publicos, por si ou empresas, concessionarias ou permissinarias, ou sob qlq outra forma\"},{\"title\":\"Sao obrigadas a fornecer servicos adequados, eficientes e seguros\"},{\"title\":\"E se essenciais, CONTINUOS\"},{\"title\":\"Em caos de descumprimento, total ou parcial, das obriga\u00e7\u02dceos desse art., serao as PJ compelidas a cumpri-la e a reparar danos causados\"},{\"title\":\"obs\"}]},{\"title\":\"Desconsidera\u00e7\u00e3o da Personalidade Juridica MAPA DE PJ EM DIREITO CIVIL FGV - 2022 - TJ-MG - Juiz CESPE - 2022 - Maring\u00e1 - PR - Procurador M FGV - 2021 - TJ-PR - Juiz Substituto\",\"children\":[{\"title\":\"1. A desconsidera\u00e7\u00e3o da personalidade jur\u00eddica \u00e9 t\u00e9cnica consistente na inefic\u00e1cia relativa da pr\u00f3pria pessoa jur\u00eddica \u2013 rectius, inefic\u00e1cia do contrato ou estatuto social da empresa -, frente a credores cujos direitos n\u00e3o s\u00e3o satisfeitos, merc\u00ea da autonomia patrimonial criada pelos atos constitutivos da sociedade. 2. Ao se pleitear a supera\u00e7\u00e3o da pessoa jur\u00eddica, depois de verificado o preenchimento dos requisitos autorizadores da medida, \u00e9 exercido verdadeiro direito potestativo de inger\u00eancia na esfera jur\u00eddica de terceiros \u2013 da sociedade e dos s\u00f3cios -, os quais, inicialmente, pactuaram pela separa\u00e7\u00e3o patrimonial. 3. Correspondendo a direito potestativo, sujeito a prazo decadencial, para cujo exerc\u00edcio a lei n\u00e3o previu prazo especial, prevalece a regra geral da inesgotabilidade ou da perpetuidade, segundo a qual os direitos n\u00e3o se extinguem pelo n\u00e3o-uso. Assim, \u00e0 m\u00edngua de previs\u00e3o legal, o pedido de desconsidera\u00e7\u00e3o da personalidade jur\u00eddica, quando preenchidos os requisitos da medida, poder\u00e1 ser realizado a qualquer tempo. 4. Descabe, por amplia\u00e7\u00e3o ou analogia, sem qualquer previs\u00e3o legal, trazer para a desconsidera\u00e7\u00e3o da personalidade jur\u00eddica os prazos prescricionais previstos para os casos de retirada de s\u00f3cio da sociedade (arts. 1003, 1.032 e 1.057 do C\u00f3digo Civil), uma vez que institutos diverso. STJ \u2013 REn\u00ba 1.312.591/RS,\"},{\"title\":\"Teorias\",\"children\":[{\"title\":\"Maior e Menor\",\"children\":[{\"title\":\"Teoria Maior\",\"children\":[{\"title\":\"\u00c9  a teoria adotada pelo CC. Exige 2 requisitos:\",\"children\":[{\"title\":\"Abuso da personalidade juridica\"},{\"title\":\"Prejuizo ao credor\"}]},{\"title\":\"Pelo art. 50 do CC n\u00e3o precisa provar que a empresa esta falida ou insolvente\"}]},{\"title\":\"Teoria Menor\",\"children\":[{\"title\":\"Exige um unico requisito\",\"children\":[{\"title\":\"Prejuizo ao credor\"}]},{\"title\":\"Adotada pela Lei Ambiental(Lei 9.605) e CDC\"},{\"title\":\"BASTA A PROVA DA INSOLVENCIA da pessoa juridica, independente do abuso\"},{\"title\":\"obs\",\"children\":[{\"title\":\"Art. 28. O juiz poder\u00e1 desconsiderar a personalidade jur\u00eddica da sociedade quando, em detrimento do consumidor, houver abuso de direito, excesso de poder, infra\u00e7\u00e3o da lei, fato ou ato il\u00edcito ou viola\u00e7\u00e3o dos estatutos ou contrato social. A desconsidera\u00e7\u00e3o tamb\u00e9m ser\u00e1 efetivada quando houver fal\u00eancia, estado de insolv\u00eancia, encerramento ou inatividade da pessoa jur\u00eddica provocados por m\u00e1 administra\u00e7\u00e3o. \u00a7 2\u00b0 As sociedades integrantes dos grupos societ\u00e1rios e as sociedades controladas, s\u00e3o subsidiariamente respons\u00e1veis pelas obriga\u00e7\u00f5es decorrentes deste c\u00f3digo. \u00a7 3\u00b0 As sociedades conSorciadas s\u00e3o Solidariamente respons\u00e1veis pelas obriga\u00e7\u00f5es decorrentes deste c\u00f3digo. \u00a7 4\u00b0 As sociedades Coligadas s\u00f3 responder\u00e3o por Culpa. \u00a7 5\u00b0 Tamb\u00e9m poder\u00e1 ser desconsiderada a pessoa jur\u00eddica sempre que sua personalidade for, de alguma forma, obst\u00e1culo ao ressarcimento de preju\u00edzos causados aos consumidores.\"}]}]}]},{\"title\":\"Subjetiva e Objetiva\",\"children\":[{\"title\":\"Teoria Subjetiva\",\"children\":[{\"title\":\"Desvio de Finalidade\"}]},{\"title\":\"Teoria Objetiva\",\"children\":[{\"title\":\"Confus\u00e3o patrimonial\"}]}]}]},{\"title\":\"OBS\",\"children\":[{\"title\":\"Para fins de aplica\u00e7\u00e3o da Teoria Menor da desconsidera\u00e7\u00e3o da personalidade jur\u00eddica, o \u00a7 5\u00ba do art. 28 do CDC n\u00e3o d\u00e1 margem para admitir a responsabiliza\u00e7\u00e3o pessoal de quem n\u00e3o integra o quadro societ\u00e1rio da empresa (administrador n\u00e3o s\u00f3cio). STJ. 3\u00aa Turma. REsp 1862557/DF, Rel. Min. Ricardo Villas B\u00f4as Cueva, julgado em 15/6/2021. STJ. 4\u00aa Turma. REsp 1860333-DF, Rel. Min. Marco Buzzi, julgado em 11/10/2022 (Info 754).\"}]}]},{\"title\":\"Responsabilidade entre Emrpesas Controladas, Consorciadas e Coligadas Essa responsabilidade est\u00e1 prevista no art. 28 \u00a7 2 \u00a73 e \u00a74 do CDC CESPE / CEBRASPE - 2019 - TJ-BA - Juiz Leigo FGV - 2023 - TJ-ES - Juiz Substituto FCC - 2022 - DPE-CE - Defensor(a) P\u00fablico(a) de Entr\u00e2ncia Inicial\",\"children\":[{\"title\":\"Sociedades integrantes de GRUPOS SOCIETARIOS e as SOCIEDADES CONTROLADAS\",\"children\":[{\"title\":\"SUBSIDIARIAMENTE RESPONSAVEIS\"},{\"title\":\"Conceito de sociedade Controlada -  Art. 1098 do CC\",\"children\":[{\"title\":\"Sociedade de cujo capital outra sociedade possua maioria dos votos nas delibera\u00e7\u00f5es dos quotistas ou da Assem. Geral e o poder de eleger a maioria dos administradores\"},{\"title\":\"Sociedade cujo controle, referido antes, esteja em poder de outra, mediante a\u00e7oes ou quotas possuidas por sociedades ou sociedades por esta controladas\"}]}]},{\"title\":\"SOCIEDADES CONSORCIADAS\",\"children\":[{\"title\":\"S\u00e3o solidariamnete responsaveis\"}]},{\"title\":\"SOCIEDADES COLIGADAS CC\",\"children\":[{\"title\":\"Respondem somente por Culpa\"},{\"title\":\"Conceito de sociedade coligada -  Art. 1.099 do CC\",\"children\":[{\"title\":\"Diz-se coligada ou filiada a sociedade de cujo capital outra sociedade participa com 10% ou mais, do capital da outra, sem controla-la\"}]}]},{\"title\":\"obs\",\"children\":[{\"title\":\"Como regra geral, as sociedades consorciadas apenas se obrigam nas condi\u00e7\u00f5es previstas no respectivo contrato, respondendo cada uma por suas obriga\u00e7\u00f5es, sem presun\u00e7\u00e3o de solidariedade, de acordo com o disposto no art. 278, \u00a7 1\u00ba, da Lei n\u00ba 6.404/76. Essa regra, no entanto, n\u00e3o \u00e9 absoluta. H\u00e1 solidariedade entre as sociedades consorciadas em rela\u00e7\u00e3o \u00e0s obriga\u00e7\u00f5es derivadas de rela\u00e7\u00e3o de consumo desde que essas obriga\u00e7\u00f5es guardem correla\u00e7\u00e3o com a esfera de atividade do cons\u00f3rcio. Existe previs\u00e3o nesse sentido no art. 28, \u00a7 3\u00ba do CDC, que preconiza: \u201cas sociedades consorciadas s\u00e3o solidariamente respons\u00e1veis pelas obriga\u00e7\u00f5es decorrentes deste c\u00f3digo.\u201d STJ. 3\u00aa Turma. REsp 1635637-RJ, Rel. Min. Nancy Andrighi, julgado em 18/09/2018 (Info 633).\"}]}]}]},\"cap3\":{\"title\":\"3. Infra\u00e7\u00f5es Penais\",\"children\":[{\"title\":\"Infra\u00e7\u00f5es Penais\",\"children\":[{\"title\":\"Intro\",\"children\":[{\"title\":\"Temos no CDC um titulo inteiro destinado a prever infra\u00e7\u00f5es penais\"},{\"title\":\"Todos os crimes do CDC tem pena maxima at\u00e9 2 anos - CRIMES DE MENOR POTENCIAL OFENSIVO. Todos os crimes previstos no CDC s\u00e3o punidos com Deten\u00e7\u00e3o, ou Deten\u00e7\u00e3o e Multa e com pena n\u00e3o superior a 2 anos CESPE / CEBRASPE - 2022 - TJ-MA - Juiz Substituto de Entr\u00e2ncia Inicial\"},{\"title\":\"Muitos tipos penais s\u00e3o NORMAS PENAIS EM BRANCO, inclusive na Lei 8.137\"},{\"title\":\"A san\u00e7\u00e3o penal incide sobre as PF que agem em nome da PJ\"},{\"title\":\"Os crimes do CDC em sua maioria s\u00e3o crimes de perigo abstrato\"},{\"title\":\"Somente em 2 crimes admite-se a modalidade culposa: Art. 63 e 66\"}]},{\"title\":\"Quem deve responder  pela Infra\u00e7\u00e3o Penal -  Art. 75 do CDC\",\"children\":[{\"title\":\"Quem de qlq forma CONCORRER para os crimes referidos neste codigo\"},{\"title\":\"Incide as penas a esses cominadas na medida de sua fbilidade\"},{\"title\":\"Bem como, o DIRETOR, ADMINISTRADOR ou GERENTE da PJ\"}]},{\"title\":\"Individualiza\u00e7\u00e3o e Fixa\u00e7\u00e3o Judicial da Pena\",\"children\":[{\"title\":\"S\u00e3o circunstancias agravantes CESPE- 2022 - PC-RO - Delegado\",\"children\":[{\"title\":\"Cometidos em eopoca de grave crise econ. ou por ocasiao de calamidade\"},{\"title\":\"Ocasionarem grave dano individual ou coletivo\"},{\"title\":\"Dissimular-se a natureza ilicita do procedimento\"},{\"title\":\"Quando cometidos\",\"children\":[{\"title\":\"Por servidor p\u00fablico ou pessoa cuja condicao economica-social seja MANIFESTAMENTE superior a da vitima\"},{\"title\":\"Detrimento de operario ou ruricula;\"},{\"title\":\"Menor de 18 anos ou maior de 60 anos\"},{\"title\":\"Portadores de deficiencia mental interditadas ou nao\"},{\"title\":\"Serem praticadas em opera\u00e7\u00f5es q envolvam alimentos, medicamentos, ou qlq produtos essenciais\"}]},{\"title\":\"OBS\",\"children\":[{\"title\":\"Aplicam-se as circunstancias agravantes previstas no CP\"},{\"title\":\"O juiz deve evitar o bis in idem\"},{\"title\":\"Anafalbetismo n\u00e3o \u00e9 circunstancia agravante\"}]}]},{\"title\":\"Circuntancias Atenuantes -  CDC n\u00e3o dispoe, usa-se do CP\",\"children\":[{\"title\":\"Agenter menor de 21, na data do fato, ou maior de 70 na data da senten\u00e7a\"},{\"title\":\"desconhecimento da Lei\"},{\"title\":\"Ter o agente cometido o crime\",\"children\":[{\"title\":\"Relevante valor social ou moral\"},{\"title\":\"Procurado, por espontanea vontade e eficneica, LOGO APOS O CRIME, evitar e minorar as consequencias, ou ter, antes do julgamento, reparado o dano\"},{\"title\":\"cometido o crime sob coa\u00e7\u00e3o que poderia resistir ou em cumprimento de ordem de autoridade superior, ou sob influencia de violenta emocao, provocada por ato injusto da vitima\"},{\"title\":\"Confessado espontaneamente, perante a autoridade, a autoria do crime\"},{\"title\":\"Cometido crime sob influencia de multidao ou tumulto, se nao o provocou\"}]}]},{\"title\":\"Quanto a Pena de Multa\",\"children\":[{\"title\":\"Deve ser fixada em dias-multa correspondente ao minimo e maximo\"},{\"title\":\"de dias de dura\u00e7\u00e3o da pena privativa de liberdade p/ o crime\"},{\"title\":\"O juiz deve considerar a situa\u00e7\u00e3o economica do reu\"},{\"title\":\"Deve levar em considera\u00e7\u00e3o a gravidade do crime cometido\"},{\"title\":\"A multa pode ser aumentada ate o triplo\",\"children\":[{\"title\":\"Se o juiz considerar que em virtude da situa\u00e7\u00e3o econ. do r\u00e9u \u00e9 ineficaz, embora aplicada ao max\"}]}]},{\"title\":\"Outras penas que podem ser aplciadas cumulativa ou alternativamente\",\"children\":[{\"title\":\"INTERDICAO TEMPORARIA DE DIREITOS, s\u00e3o:\",\"children\":[{\"title\":\"Proibi\u00e7\u00e3o do ex. de cargo, fun\u00e7\u00e3o ou atividade publica e mandato eletivo\"},{\"title\":\"Proibicao do ex. de profissao, atividade ou oficio que dependam de habilitacao especial, licenca ou autoriza\u00e7ao do poder publico\"},{\"title\":\"suspensao de autoriza\u00e7\u00e3o ou habilitacao para dirigir\"},{\"title\":\"proibicao de frequentar determinados lugares\"},{\"title\":\"proibi\u00e7\u00e3o de inscricao em concurso, avalia\u00e7ao ou exames publicos\"}]},{\"title\":\"PUBLICACAO EM ORGAOS DE COMUNICACAO DE GRANDE CIRCULA\u00c7\u00c3O OU ADIENCIA AS EXPENSAS DO CONDENADO, de noticia sobre os fatos e a condenac\u00e3o\"},{\"title\":\"presta\u00e7\u00e3o de servicos a comunidade\",\"children\":[{\"title\":\"\u00c9 aplicavel em condena\u00e7\u00f5es superiores a 6 meses de priva\u00e7\u00e3o da liberdade\"},{\"title\":\"Ocorre em\",\"children\":[{\"title\
