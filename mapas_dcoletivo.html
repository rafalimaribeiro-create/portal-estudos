a\u00e7\u00e3o ou execu\u00e7\u00e3o da sentenca generica\"},{\"title\":\"\u00c9 divisivel, podendo ser decomposto em unidades autonomas, com titularidade propria\"},{\"title\":\"Para o Co-Legitimado\",\"children\":[{\"title\":\"N\u00e3o h\u00e1 divisibilidade, a tutela \u00e9 sempre molecular\"},{\"title\":\"Apenas o tituar do direito pode fragmentar sua tutela\"}]},{\"title\":\"A les\u00e3o \u00e9 reparada na propor\u00e7\u00e3o da respectiva ofensa\"}]},{\"title\":\"Origem do Direito\",\"children\":[{\"title\":\"Ligados entre si por circunstancia de fato ou de direito comum, POSTERIOR a les\u00e3o\"}]}]},{\"title\":\"Decis\u00e3o do STJ - Homogeneidade\",\"children\":[{\"title\":\"O titular da a\u00e7\u00e3o deve provar que existe um numero razoavel de consumidores\"},{\"title\":\"\u00c9 necessario demonstrar a homogeneidade da demanda\"}]},{\"title\":\"Requisitos - Ada Pellegrine\",\"children\":[{\"title\":\"A autora prev\u00ea dois requisitos necess\u00e1rios para tutela desses direitos\"},{\"title\":\"Predominancia das quest\u00f5es comuns sobre as individuais\",\"children\":[{\"title\":\"Serve para eferir se os dirietos em disputa s\u00e3o individuais ou realmente homogeneos\"}]},{\"title\":\"Utilidade da Tutela Coletiva no Caso Concreto\",\"children\":[{\"title\":\"A tutela deve mostrar eficacia\"}]}]},{\"title\":\"Efeitos da CJ\",\"children\":[{\"title\":\"Erga Omnes\"}]}]},{\"title\":\"OBS\",\"children\":[{\"title\":\"Retrata o contexto de defesa e interesse de direito difuso (CESPE / CEBRASPE - 2022 - TJ-MA - Juiz Substituto de Entr\u00e2ncia Inicial). a exposi\u00e7\u00e3o de publicidade enganosa que induza v\u00e1rios consumidores a erro a respeito das caracter\u00edsticas de um produto.\"}]}]}]},{\"title\":\"Legitimados concorrentemente  - Art. 81 do CDC CDC nao preve a DP, mas a juris sim CESPE - 2022 - MPE-AC - Promotor CESPE / CEBRASPE - 2023 - PGE-PA - Procurador\",\"children\":[{\"title\":\"MP\",\"children\":[{\"title\":\"obs\",\"children\":[{\"title\":\"Cobran\u00e7a de Tributo\",\"children\":[{\"title\":\"O Minist\u00e9rio P\u00fablico  N \u00c3 O  tem legitimidade ativa para propor a\u00e7\u00e3o em que se discute a cobran\u00e7a (ou n\u00e3o) de tributo, assumindo a defesa dos interesses do contribuinte, deduzindo pretens\u00e3o referente a direito individual homog\u00eaneo dispon\u00edvel. Foi o que decidiu o STF, tendo sido fixada a seguinte tese: O Minist\u00e9rio P\u00fablico n\u00e3o possui legitimidade ativa ad causam para, em a\u00e7\u00e3o civil p\u00fablica, deduzir em ju\u00edzo pretens\u00e3o de natureza tribut\u00e1ria em defesa dos contribuintes, que vise questionar a constitucionalidade/legalidade de tributo (ARE 694294 RG, Rel. Min. Luiz Fux, julgado em 25/04/2013. Repercuss\u00e3o Geral \u2013 Tema 645). Com base na tese acima, o STJ reconheceu a ilegitimidade ativa do Minist\u00e9rio P\u00fablico para ajuizar a\u00e7\u00e3o civil p\u00fablica objetivando a restitui\u00e7\u00e3o de valores indevidamente recolhidos a t\u00edtulo de E M P R E S T I M O  C O M P U L S \u00d3 R I O  sobre aquisi\u00e7\u00e3o de autom\u00f3veis de passeio e utilit\u00e1rios, nos termos do Decreto-Lei n\u00ba 2.288/1986. STJ. 1\u00aa Turma. REsp 1709093-ES, Rel. Min. Benedito Gon\u00e7alves, julgado em 29/03/2022 (Info 731)\"}]},{\"title\":\"IDH e Nat. Social\",\"children\":[{\"title\":\"O Minist\u00e9rio P\u00fablico possui legitimidade para promover a tutela coletiva de direitos individuais homog\u00eaneos, mesmo que de natureza dispon\u00edvel, desde que o interesse jur\u00eddico tutelado possua relevante natureza social. Se a a\u00e7\u00e3o tem por finalidade apenas evitar a cobran\u00e7a de taxas, supostamente ilegais, por espec\u00edfica associa\u00e7\u00e3o de moradores, essa causa n\u00e3o transcende a esfera de interesses puramente particulares e, consequentemente, n\u00e3o possui a relev\u00e2ncia social exigida para a tutela coletiva. STJ. 4\u00aa Turma. REsp 1585794-MG, Rel. Min. Antonio Carlos Ferreira, julgado em 28/09/2021 (Info 712).\"}]}]}]},{\"title\":\"U E DF e M\",\"children\":[{\"title\":\"obs\",\"children\":[{\"title\":\"Pertinencia Tem\u00e1tica\",\"children\":[{\"title\":\"Munic\u00edpio tem legitimidade ad causam para ajuizar a\u00e7\u00e3o civil p\u00fablica em defesa de direitos consumeristas questionando a cobran\u00e7a de tarifas banc\u00e1rias. Em rela\u00e7\u00e3o ao Minist\u00e9rio P\u00fablico e aos entes pol\u00edticos, que t\u00eam comofinalidades institucionais a prote\u00e7\u00e3o de valores fundamentais, como a defesacoletiva dos consumidores, n\u00e3o se exige pertin\u00eancia tem\u00e1tica e representatividadeadequada. STJ. 3\u00aa Turma. REsp 1509586-SC, Rel. Min. Nancy Andrighi, julgado em 15/05/2018 (Info 626).\"}]}]}]},{\"title\":\"Entidades de org\u00e3o da Administra\u00e7\u00e3o P\u00fablica, direta ou indireta, AINDA QUE sem PERSONALIDADE JURIDICA, especificamente destinados ao interesses protegidos pelo CDC\"},{\"title\":\"Associa\u00e7\u00f5es legalmente constituidas a pelo menos 1 ano FGV - 2023 - TJ-MS - Juiz Substituto\",\"children\":[{\"title\":\"Devem incluir nos fins institucionais a defesa do CDC\"},{\"title\":\"OBS - Autoriza\u00e7\u00e3o Assemblear\",\"children\":[{\"title\":\"\u00c9 DISPENSADA!!!!\"}]},{\"title\":\"Art. 81 \u00a7 1 do CDC -  Dispensa de pr\u00e9-constitui\u00e7\u00e3o\",\"children\":[{\"title\":\"Esse requisito pode ser dispensado PELO juiz\"},{\"title\":\"Em a\u00e7\u00f5es previstas no art. 91 do CDC. Msm caso da ACP\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"DPVAT\",\"children\":[{\"title\":\"Uma associa\u00e7\u00e3o que tenha fins espec\u00edficos de prote\u00e7\u00e3o ao consumidor n\u00e3o possui legitimidade para o ajuizamento de a\u00e7\u00e3o civil p\u00fablica com a finalidade de tutelar interesses coletivos de benefici\u00e1rios do seguro DPVAT. Isso porque o seguro DPVAT n\u00e3o tem natureza consumerista, faltando, portanto, pertin\u00eancia tem\u00e1tica. STJ. 2\u00aa Se\u00e7\u00e3o. REsp 1091756-MG, Rel. Min. Marco Buzzi, Rel. Acd. Min. Marco Aur\u00e9lio Bellizze, julgado em 13/12/2017 (Info 618)\"}]},{\"title\":\"SINDICATOS E AUTORIZA\u00c7\u00c3O Ampla Legitimidade do Sindicato Pq? Pq sindicato \u00e9 substituto!\",\"children\":[{\"title\":\"Os sindicatos possuem ampla legitimidade extraordin\u00e1ria para defender em ju\u00edzo os direitos e interesses coletivos ou individuais dos integrantes da categoria que representam, inclusive nas liquida\u00e7\u00f5es e execu\u00e7\u00f5es de senten\u00e7a, I N D E P E N D E N T E M E N T E de autoriza\u00e7\u00e3o dos substitu\u00eddos. STF. Plen\u00e1rio. RE 883.642/AL, Rel. Ministro P residente, julgado em 18/06/2015 (Repercuss\u00e3o Geral - Tema 823) (Info 791 clipping)\"}]},{\"title\":\"ASSOCIA\u00c7\u00d5ES Autoriza\u00e7\u00e3o Expressa dos Associados\",\"children\":[{\"title\":\"As associa\u00e7\u00f5es possuem legitimidade para defesa dos direitos e dos interesses coletivos ou individuais homog\u00eaneos, independentemente de autoriza\u00e7\u00e3o expressa dos associados. STJ. 2\u00aa Turma. REsp 1796185/RS, Rel. Min. Herman Benjamin, julgado em 28/03/2019. As associa\u00e7\u00f5es de classe atuam como representantes processuais, sendo obrigat\u00f3ria a autoriza\u00e7\u00e3o individual ou assemblear dos associados - STF, RE 573.232. Esse entendimento, todavia, n\u00e3o se aplica na hip\u00f3tese de a associa\u00e7\u00e3o buscar em ju\u00edzo a tutela de interesses ou direitos difusos - art. 82, IV, do CDC. STJ. 4\u00aa Turma. AgInt no REsp 1335681/SP, Rel. Min. Luis Felipe Salom\u00e3o, julgado em 26/02/2019. Por se tratar do regime de substitui\u00e7\u00e3o processual, a autoriza\u00e7\u00e3o para a defesa do interesse coletivo em sentido amplo \u00e9 estabelecida na defini\u00e7\u00e3o dos objetivos institucionais, no pr\u00f3prio ato de cria\u00e7\u00e3o da associa\u00e7\u00e3o, sendo desnecess\u00e1ria nova autoriza\u00e7\u00e3o ou delibera\u00e7\u00e3o assemblear. As teses de repercuss\u00e3o geral resultadas do julgamento do RE 612.043/PR e do RE 573.232/SC tem seu alcance expressamente restringido \u00e0s a\u00e7\u00f5es coletivas de rito ordin\u00e1rio, as quais tratam de interesses meramente individuais, sem \u00edndole coletiva, pois, nessas situa\u00e7\u00f5es, o autor se limita a representar os titulares do direito controvertido, atuando na defesa de interesses alheios e em nome alheio. STJ. 3\u00aa Turma. REsp 1649087/RS, Rel. Min. Nancy Andrighi, julgado em 02/10/2018. STJ. 3\u00aa Turma. AgInt no REsp 1719820/MG, Rel. Min. Marco Aur\u00e9lio Bellizze, julgado em 15/04/2019\"},{\"title\":\"Quando a associa\u00e7\u00e3o aju\u00edza a\u00e7\u00e3o coletiva, ela precisa juntar aos autos autoriza\u00e7\u00e3o expressa dos associados para a propositura dessa a\u00e7\u00e3o e uma lista com os nomes de todas as pessoas que est\u00e3o associadas naquele momento? 1) em caso de a\u00e7\u00e3o coletiva de rito ordin\u00e1rio proposta pela associa\u00e7\u00e3o na defesa dos interesses de seus associados: SIM. A associa\u00e7\u00e3o, quando aju\u00edza a\u00e7\u00e3o na defesa dos interesses de seus associados, atua como REPRESENTANTE PROCESSUAL e, por isso, \u00e9 obrigat\u00f3ria a autoriza\u00e7\u00e3o individual ou assemblear dos associados. 2) em caso de a\u00e7\u00e3o civil p\u00fablica (a\u00e7\u00e3o coletiva proposta na defesa de direitos difusos, coletivos ou individuais homog\u00eaneos): N\u00c3O. A associa\u00e7\u00e3o, quando aju\u00edza a\u00e7\u00e3o na defesa de direitos difusos, coletivos ou individuais homog\u00eaneos, atua como SUBSTITUTA PROCESSUAL e n\u00e3o precisa dessa autoriza\u00e7\u00e3o. O precedente do STF firmado no RE 573232/SC (Tema 82) direcionou-se exclusivamente \u00e0s demandas coletivas em que as Associa\u00e7\u00f5es autoras atuam por representa\u00e7\u00e3o processual, n\u00e3o tendo aplica\u00e7\u00e3o aos casos em que agem em substitui\u00e7\u00e3o. STJ. 2\u00aa Se\u00e7\u00e3o. REsp 1325857-RS, Rel. Min. Luis Felipe Salom\u00e3o, julgado em 30/11/2021 (Info 720).\"},{\"title\":\"ASSOCIA\u00c7\u00d5ES GEN\u00c9RICAS N\u00e3o se aplica \u00e0s associa\u00e7\u00f5es gen\u00e9ricas \u2014 que n\u00e3o representam qualquer categoria econ\u00f4mica ou profissional espec\u00edfica \u2014 a tese firmada no Tema 1.119 da sistem\u00e1tica da repercuss\u00e3o geral, sendo insuficiente a mera regularidade registral da entidade para sua atua\u00e7\u00e3o em sede de mandado de seguran\u00e7a coletivo, pois pass\u00edvel de causar preju\u00edzo aos interesses dos benefici\u00e1rios supostamente defendidos. STF. 2\u00aa Turma. ARE 1339496 AgR/RJ, Rel. Min. Edson Fachin, redator do ac\u00f3rd\u00e3o Min. Andr\u00e9 Mendon\u00e7a, julgado em 7/02/2023 (Info 1082).\"}]},{\"title\":\"Dissolu\u00e7\u00e3o da Associa\u00e7ao em ACP\",\"children\":[{\"title\":\"Caso ocorra dissolu\u00e7\u00e3o da associa\u00e7\u00e3o que ajuizou a\u00e7\u00e3o civil p\u00fablica, \u00e9 poss\u00edvel sua substitui\u00e7\u00e3o no polo ativo por outra associa\u00e7\u00e3o que possua a mesma finalidade tem\u00e1tica. O microssistema de defesa dos interesses coletivos privilegia o aproveitamento do processo coletivo, possibilitando a sucess\u00e3o da parte autora pelo Minist\u00e9rio P\u00fablico ou por algum outro colegitimado (ex: associa\u00e7\u00e3o), mormente em decorr\u00eancia da import\u00e2ncia dos interesses envolvidos em demandas coletivas. STJ. 3\u00aa Turma. EDcl no REsp 1405697-MG, Rel. Min. Marco Aur\u00e9lio Bellizze, julgado em 10/09/2019 (Info 665).\"}]},{\"title\":\"CJ no MS coletivo\",\"children\":[{\"title\":\"A coisa julgada formada no Mandado de Seguran\u00e7a Coletivo 2005.51.01.016159-0 (impetrado pela Associa\u00e7\u00e3o de Oficiais Militares do Estado do Rio de Janeiro - AME/RJ, enquanto substituta processual) beneficia os militares e respectivos pensionistas do antigo Distrito Federal, integrantes da categoria substitu\u00edda - oficiais, independentemente de terem constado da lista apresentada no momento do ajuizamento do mandamus ou de serem filiados \u00e0 associa\u00e7\u00e3o impetrante. Assim, essa decis\u00e3o beneficia todos os Oficiais do antigo Distrito Federal. No entanto, n\u00e3o ir\u00e1 beneficiar outros militares do antigo Distrito Federal que n\u00e3o sejam Oficiais (ex: um Terceiro Sargento). STJ. 1\u00aa Se\u00e7\u00e3o. REsp 1865563-RJ, Rel. Min. S\u00e9rgio Kukina, Rel. Acd. Min. Gurgel de Faria, julgado em 21/10/2021 (Recurso Repetitivo \u2013 Tema 1056) (Info 715).\"}]},{\"title\":\"Glutem\",\"children\":[{\"title\":\"Como regra, para que uma associa\u00e7\u00e3o possa propor ACP, ela dever\u00e1 estar constitu\u00edda h\u00e1 pelo menos 1 ano. Exce\u00e7\u00e3o. Este requisito da pr\u00e9-constitui\u00e7\u00e3o poder\u00e1 ser dispensado pelo juiz, quando haja manifesto interesse social evidenciado pela dimens\u00e3o ou caracter\u00edstica do dano, ou pela relev\u00e2ncia do bem jur\u00eddico a ser protegido (\u00a7 4\u00ba do art. 5\u00ba da Lei n\u00ba 7.347/85). Neste caso, a ACP, mesmo tendo sido proposta por uma associa\u00e7\u00e3o com menos de 1 ano, poder\u00e1 ser conhecida e julgada. Como exemplo da situa\u00e7\u00e3o descrita no \u00a7 4\u00ba do art. 5\u00ba, o STJ decidiu que: \u00c9 dispens\u00e1vel o requisito temporal (pr\u00e9-constitui\u00e7\u00e3o h\u00e1 mais de um ano) para associa\u00e7\u00e3o ajuizar a\u00e7\u00e3o civil p\u00fablica quando o bem jur\u00eddico tutelado for a presta\u00e7\u00e3o de informa\u00e7\u00f5es ao consumidor sobre a exist\u00eancia de gl\u00faten em alimentos. STJ. 2\u00aa Turma. REsp 1600172-GO, Rel. Min. Herman Benjamin, julgado em 15/9/2016 (Info 591).\"}]}]},{\"title\":\"obs\",\"children\":[{\"title\":\"++ (Cart\u00f3rio TJDF2019 CEBRASPE) A express\u00e3o contida no art. 5\u00ba, XXI, da Constitui\u00e7\u00e3o Federal de 1988, refere-se \u00e0 substitui\u00e7\u00e3o processual e n\u00e3o \u00e0 representa\u00e7\u00e3o processual.(errado) ++ (Cart\u00f3rio TJDF2019 CEBRASPE) As associa\u00e7\u00f5es e os sindicatos possuem legitimidade para propor a a\u00e7\u00e3o em defesa de seus filiados, na qualidade de substitutos processuais, independentemente de autoriza\u00e7\u00e3o expressa ou de procura\u00e7\u00e3o individual por eles fornecida. (errado)\"}]}]},{\"title\":\"Callout\",\"children\":[{\"title\":\"CESPE / CEBRASPE - 2023 - PGE-PA - Procurador do Estado do Par\u00e1 I Embora o rol do art. 82 do C\u00f3digo de Defesa do Consumidor (CDC) seja amplo, o pr\u00f3prio consumidor n\u00e3o tem legitimidade para propor a\u00e7\u00e3o coletiva.(c)\"}]}]},{\"title\":\"Obriga\u00e7\u00e3o de Fazer ou N\u00e3o, Tutela espec\u00edfica - 84 CDC FUNDATEC - 2022 - Porto Alegre - RS - Procurador Municipal\",\"children\":[{\"title\":\"Intro\",\"children\":[{\"title\":\"Na a\u00e7\u00f5a que tenha por objeto obrigac\u00e3o de fazer ou n\u00e3o fazer o Juiz conceder\u00e1\"},{\"title\":\"Tutela especifica ou determinara providencia q assegure o resultado pratico\"},{\"title\":\"Qual medidas o juiz pode tomar p/ assegurar a tutela ou resultado pratico?\"},{\"title\":\"Pode o juiz determinar medidas necessarias\"}]},{\"title\":\"Perdas e Danos\",\"children\":[{\"title\":\"Tutela Especifica pode ser  Convertida em Perdas e Danos se(3)\",\"children\":[{\"title\":\"Optar o autor\"},{\"title\":\"N\u00e3o for possivel assegurar o resultado pratico\"},{\"title\":\"Impossivel a tutela especifica\"},{\"title\":\"Doutrina\",\"children\":[{\"title\":\"Diz que a op\u00e7\u00e3o isolada do autor, sem os demais requisitos n\u00e3o \u00e9 suficiente\"}]}]},{\"title\":\"Perdas e Danos ocasiona prejuizo da multa?\",\"children\":[{\"title\":\"N\u00e3o, a indeniza\u00e7\u00e3o em perdas e danos n\u00f5a gera prejuizo da multa\"}]}]},{\"title\":\"Concess\u00e3o Liminar\",\"children\":[{\"title\":\"Sim \u00e9 possivel havendo 2 requisitos\",\"children\":[{\"title\":\"Ser relevante o fundamento da causa\"},{\"title\":\"Havendo justificado receio de ineficacia do provimento final\"}]},{\"title\":\"Pode ser concedida apos a justifica\u00e7\u00e3o previa, citado o r\u00e9u\"}]},{\"title\":\"Multa Diaria depende de pedido do autor?\",\"children\":[{\"title\":\"Impor multa diaria ao r\u00e9u, INDEPENDENTE DE PEDIDO DO AUTOR\"},{\"title\":\"Se for suficiente ou compativel com a obriga\u00e7\u00e3o\"},{\"title\":\"Fixar\u00e1 prazo razoavel para o cumprimento do preceito\"},{\"title\":\"Pide ser fixada na TUTELA ou na SENTENCA\"},{\"title\":\"Deve ser interpretado em consonancia com o CPC\",\"children\":[{\"title\":\"O juiz pode de oficio modificar o valor a peridiocidade da multa\"}]}]}]},{\"title\":\"Art. 87 do CDC -  Custas, Emolumentos, Honorarios FUNDATEC - 2022 - Porto Alegre - RS - Procurador Municipal\",\"children\":[{\"title\":\"Nas ACOES COLETIVAS, deste CDC, n\u00e3o haver\u00e1 adiantamento de custas\"},{\"title\":\"emolumentos, Hon. Periciais e outras despesas e nem\"},{\"title\":\"Condenac\u00e3o da associac\u00e3o autora em horarios de advogados, custas e despesas\"},{\"title\":\"SALVO\",\"children\":[{\"title\":\"EM CASO DE MA-FE\"}]},{\"title\":\"Associa\u00e7\u00e3o\",\"children\":[{\"title\":\"Em caos de LITIGANCIA DE MA FE\"},{\"title\":\"a associa\u00e7\u00e3o autora E OS diretores RESPONSAVEIS pela A\u00e7\u00e3o ser\u00e3o\"},{\"title\":\"SOLIDARIAMENTE CONDENADOS EM HONORARIOS ADVOCATICIOS E\"},{\"title\":\"Ao decuplo das custas, sem prejuizo das perdas e danos\"}]},{\"title\":\"Art. 17 da LACP - Litig\u00e2ncia de M\u00e1-F\u00e9 e Custas e Emolumentos(MAPA LACP - OLHAR)\"},{\"title\":\"STJ\",\"children\":[{\"title\":\"EXECU\u00c7\u00c3O DE TITULO POR SINDICATO\",\"children\":[{\"title\":\"Na execu\u00e7\u00e3o de t\u00edtulo judicial oriundo de a\u00e7\u00e3o coletiva promovida por sindicato na condi\u00e7\u00e3o de substituto processual, n\u00e3o \u00e9 poss\u00edvel destacar os honor\u00e1rios contratuais do montante da condena\u00e7\u00e3o sem que haja autoriza\u00e7\u00e3o expressa dos substitu\u00eddos ou procura\u00e7\u00e3o outorgada por eles aos advogados. STJ. 2\u00aa Turma. REsp 1464567-PB, Rel. Min. Herman Benjamin, julgado em 3/2/2015 (Info 555)\"}]},{\"title\":\"PROCEDIMENTOS INDIVIDUAIS DE EXECU\u00c7\u00c3O\",\"children\":[{\"title\":\"O art. 85, \u00a7 7\u00ba, do CPC/2015 n\u00e3o afasta a aplica\u00e7\u00e3o do entendimento consolidado na S\u00famula 345 do STJ, de modo que s\u00e3o devidos honor\u00e1rios advocat\u00edcios nos procedimentos individuais de cumprimento de senten\u00e7a decorrente de a\u00e7\u00e3o coletiva, ainda que n\u00e3o impugnados e promovidos em litiscons\u00f3rcio. O art. 85, \u00a7 7\u00ba, do CPC/2015 n\u00e3o se aplica para as execu\u00e7\u00f5es individuais, ainda que promovidas em litiscons\u00f3rcio, pedindo o cumprimento de julgado proferido em sede de a\u00e7\u00e3o coletiva lato sensu, a\u00e7\u00e3o civil p\u00fablica ou a\u00e7\u00e3o de classe. Em resumo, a S\u00famula 345 do STJ continua v\u00e1lida mesmo com o art. 85, \u00a7 7\u00ba, do CPC/2015. S\u00famula 345-STJ: S\u00e3o devidos honor\u00e1rios advocat\u00edcios pela Fazenda P\u00fablica nas execu\u00e7\u00f5es individuais de senten\u00e7a proferida em a\u00e7\u00f5es coletivas, ainda que n\u00e3o embargadas. Art. 85. (...) \u00a7 7\u00ba N\u00e3o ser\u00e3o devidos honor\u00e1rios no cumprimento de senten\u00e7a contra a Fazenda P\u00fablica que enseje expedi\u00e7\u00e3o de precat\u00f3rio, desde que n\u00e3o tenha sido impugnada. STJ. Corte Especial. REsp 1648238-RS, Rel. Min. Gurgel de Faria, julgado em 20/06/2018 (recurso repetitivo) (Info 628)\"}]},{\"title\":\"Parte Vencida e Simetria\",\"children\":[{\"title\":\"A parte que foi vencida em a\u00e7\u00e3o civil p\u00fablica N \u00c3 O  tem o dever de pagar honor\u00e1rios advocat\u00edcios em favor do autor da a\u00e7\u00e3o.A justificativa para isso est\u00e1 no princ\u00edpio da simetria.Isso porque se o autor da ACP perder a demanda, ele n\u00e3o ir\u00e1 pagar honor\u00e1rios advocat\u00edcios, salvo se estiver de m\u00e1-f\u00e9 (art. 18 da Lei n\u00ba 7.347/85). Logo, pelo princ\u00edpio da simetria, se o autor vencer a a\u00e7\u00e3o, tamb\u00e9m n\u00e3o deve ter direito de receber a verba. Desse modo, em raz\u00e3o da simetria, descabe a condena\u00e7\u00e3o em honor\u00e1rios advocat\u00edcios da parte requerida em a\u00e7\u00e3o civil p\u00fablica, quando inexistente m\u00e1-f\u00e9, de igual sorte como ocorre com a parte autora. Foi o que restou decidido pela Corte Especial do STJ no EAREsp 962250/SP, Rel. Min. Og Fernandes, julgado em 15/08/2018. EXCE\u00c7\u00c3O: se a a\u00e7\u00e3o tiver sido proposta por associa\u00e7\u00f5es e funda\u00e7\u00f5es privadas e a demanda tiver sido julgada procedente, neste caso, o demandado ter\u00e1 sim que pagar honor\u00e1rios advocat\u00edcios. O entendimento do STJ manifestado no EAREsp 962.250/SP n\u00e3o se deve aplicar a demandas propostas por associa\u00e7\u00f5es e funda\u00e7\u00f5es privadas, pois, do contr\u00e1rio, barrado de fato estaria um dos objetivos mais nobres da Lei 7.347/85, qual seja, o viabilizar e ampliar o acesso \u00e0 justi\u00e7a para a sociedade civil organizada. STJ. 3\u00aa Turma.REsp 1974436-RJ, Rel. Min. Nancy Andrighi, julgado em 22/03/2022 (Info 730).\"}]},{\"title\":\"Custas e Liquida\u00e7\u00e3o de Senten\u00e7a\",\"children\":[{\"title\":\"\u00c9 devido o recolhimento inicial de custas judiciais no \u00e2mbito de liquida\u00e7\u00e3o de senten\u00e7a coletiva gen\u00e9rica, proposta por associa\u00e7\u00e3o, em nome de titulares de direito material espec\u00edfico e determinado (STJ, REsp 1.637.366, 2021).(MPTO) Caso concreto: o IDEC, associa\u00e7\u00e3o de defesa dos consumidores, ingressou com pedido de liquida\u00e7\u00e3o de senten\u00e7a coletiva gen\u00e9rica. Vale ressaltar que o IDEC prop\u00f4s a liquida\u00e7\u00e3o na condi\u00e7\u00e3o de representante processual de um grupo de 10 consumidores. A associa\u00e7\u00e3o ter\u00e1 que adiantar o pagamento das custas judiciais n\u00e3o se aplicando o art. 18 da LACP e do art. 87 do CDC. STJ. 3\u00aa Turma. REsp 1637366-SP, Rel. Min. Marco Aur\u00e9lio Bellizze, julgado em 05/10/2021 (Info 713). A sistem\u00e1tica conferida pelo art. 18 da LACP e pelo art. 87 do CDC aplica-se \u00e0 fase de conhecimento. No entanto, tais benef\u00edcios n\u00e3o incidem na liquida\u00e7\u00e3o individual e/ou cumprimento individual da senten\u00e7a coletiva que forem instaurados, em legitimidade ordin\u00e1ria, pelos titulares do direito material em nome pr\u00f3prio, com a forma\u00e7\u00e3o de novos processos tantos quantos forem as partes requerentes, visto que sobressai, nesse momento processual, o interesse meramente privado de cada parte beneficiada pelo t\u00edtulo judicial gen\u00e9rico.\"}]}]}]},{\"title\":\"Art. 88 do CDC - A\u00e7\u00e3o de Regresso\",\"children\":[{\"title\":\"Pode ser ajuizada em processo autonomo\"},{\"title\":\"Faculta-se a possibilidade de seguir nos mesmos autos\"},{\"title\":\"Sendo que \u00e9 VEDADA a denuncia\u00e7\u00e3o da LIDE\"},{\"title\":\"Na hipotese do Art. 13 do CDC(responsa comerciante por FATO do produto)\"},{\"title\":\"STJ\",\"children\":[{\"title\":\"O C\u00f3digo de Defesa do Consumidor veda expressamente a denuncia\u00e7\u00e3o da lide (art. 98, in fine) nas a\u00e7\u00f5es de responsabilidade civil pelo fato do produto para simplificar o atendimento das pretens\u00f5es do consumidor.  Nesse particular, reprise-se, o STJ, superando uma diverg\u00eancia inicial, consolidou o entendimento de que tal veda\u00e7\u00e3o n\u00e3o se restringe \u00e0 responsabilidade pelo fato do produto (art. 13 do CDC), sendo igualmente aplic\u00e1vel \u00e0s demais hip\u00f3teses de responsabilidade civil por acidentes de consumo (arts. 12 e 14 do CDC)\\\" (ANDRADE, Adriano; MASSON, Cleber Rog\u00e9rio; ANDRADE, Landolfo. Interesses Difusos e Coletivos. Vol. 1. 10\u00aa ed. S\u00e3o Paulo: M\u00e9todo, 2020, p. 790.) Em acr\u00e9scimo, registre-se que o art. 88 do CDC, ao proibir que o fornecedor que foi acionado judicialmente pelo consumidor fa\u00e7a a denuncia\u00e7\u00e3o da lide, constitui norma prevista em benef\u00edcio do consumidor, atuando em prol da brevidade do processo de ressarcimento de seus preju\u00edzos. Por isso, tal norma somente pode ser arguida pelo pr\u00f3prio consumidor, em seu pr\u00f3prio benef\u00edcio. Em outras palavras, n\u00e3o pode o denunciado \u00e0 lide invocar em seu benef\u00edcio a regra de afastamento da denuncia\u00e7\u00e3o (art. 88) para eximir-se de suas responsabilidades perante o denunciante. STJ. 4\u00aa Turma. REsp 913.687-SP, Rel. Min. Raul Ara\u00fajo, julgado em 11/10/2016 (Info 592).\"}]}]},{\"title\":\"A\u00e7\u00f5es Coletivas p/ Defesa de  Interesses Individuais Homogeneos - Art. 82\",\"children\":[{\"title\":\"Legitimidade\",\"children\":[{\"title\":\"Os legitimados podem propor em nome proprio e no interesse da vitima ou sucessores\"},{\"title\":\"A\u00e7\u00e3o civil coletiva de responsa pelos danos individualmente sofridos\"}]},{\"title\":\"MP\",\"children\":[{\"title\":\"SE n\u00e3o ajuizar a a\u00e7\u00e3o atuar\u00e1 SEMPRE como fiscal da Lei\"}]},{\"title\":\"Competencia\",\"children\":[{\"title\":\"Ressalvada competencia da JF, a competencia \u00e9 da Justi\u00e7a Local\"},{\"title\":\"Dano de ambito Local\",\"children\":[{\"title\":\"Foro do lugar em q OCORREU OU DEVA OCORRER O DANO\"}]},{\"title\":\"Danos de ambito nacional ou Regional\",\"children\":[{\"title\":\"Foro da Capital do Estado ou o do DF\"}]},{\"title\":\"Sum. 489 do STJ - Continencia\",\"children\":[{\"title\":\"Reconhecida continencia, devem ser reunidas na JF as ACP propostas na JF e JE\"}]},{\"title\":\"Competencia \u00e9 da JF quando\",\"children\":[{\"title\":\"Uniao, Entidade autarquica e Empresas Publicas Federais\"},{\"title\":\"Forem interessadas na condi\u00e7\u00e3o de autora, res, assistentes ou opoentes\"},{\"title\":\"ACP. Plano de saude.  Interven\u00e7\u00f5a da Uniao Entendimento\",\"children\":[{\"title\":\"A uniao n\u00e3o tem legitimidade para intervir em ACP relativa\"},{\"title\":\"a nulidade de clausulas contratuais de PLANO DE SAUDE.\"},{\"title\":\"A uniao n\u00e3o tem interesse juridico na questao\"}]}]},{\"title\":\"STF\",\"children\":[{\"title\":\"CESPE / CEBRASPE - 2023 - PGE-PA - Procurador do Estado do Par\u00e1 A\u00c7\u00c3O CIVIL P\u00daBLICA COM OBJETO REGIONAL OU NACIONAL: N\u00e3o h\u00e1 regra espec\u00edfica sobre essa compet\u00eancia na LACP, mas h\u00e1 tese de repercuss\u00e3o geral do STF sobre o assunto. Em se tratando de a\u00e7\u00e3o civil p\u00fablica de efeitos nacionais ou regionais, a compet\u00eancia deve observar o art. 93, II, da Lei n\u00ba 8.078/90 (CDC), portanto, sua propositura deve ocorrer no foro, ou na circunscri\u00e7\u00e3o judici\u00e1ria, de capital de Estado ou no Distrito Federal (STF, Tese RG 1.075, Item III, RE 1.101.937, 2021). Ajuizadas m\u00faltiplas a\u00e7\u00f5es civis p\u00fablicas de \u00e2mbito nacional ou regional, firma-se a preven\u00e7\u00e3o do ju\u00edzo que primeiro conheceu de uma delas, para o julgamento de todas as demandas conexas (STF, Tese RG 1.075, Item II, RE 1.101.937, 2021).\"}]}]},{\"title\":\"Art. 94 do CDC - Publica\u00e7\u00e3o de Edital\",\"children\":[{\"title\":\"Proposta a a\u00e7\u00e3o, ser\u00e1 publicado Edital no org\u00e3o oficial, a fim de que interessados\"},{\"title\":\"Possam intervir no processo como litisconsortes, sem prejuizo de ampla divulga\u00e7\u00e3o\"},{\"title\":\"pelos meio de comunica\u00e7\u00e3o social por parte de org\u00e3os de defesa do consumidor\"},{\"title\":\"Os consumidores individualmente n\u00f5a tem legitimidade p/ ajuizar mas, podem entrar como litis\"},{\"title\":\"Litisconsorcio\",\"children\":[{\"title\":\"\u00c9 facultativo e unitario\"}]},{\"title\":\"Ausencia de Cita\u00e7\u00e3o Editalicia gera Nulidade?\",\"children\":[{\"title\":\"N\u00e3o \u00e9 nulidade habil a ensejar extin\u00e7\u00e3o da ACP\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"Em a\u00e7\u00e3o civil p\u00fablica, a falta de publica\u00e7\u00e3o do edital destinado a possibilitar a interven\u00e7\u00e3o de interessados como litisconsortes (art. 94 do CDC) n\u00e3o impede, por si s\u00f3, a produ\u00e7\u00e3o de efeitos erga omnes de senten\u00e7a de proced\u00eancia relativa a direitos individuais homog\u00eaneos. STJ. 2\u00aa Turma. REsp 1377400-SC, Rel. Min. Og Fernandes, julgado em 18/2/2014 (Info 536).\"}]}]},{\"title\":\"Art. 95 do CDC - Condena\u00e7\u00e3o\",\"children\":[{\"title\":\"Em caso de procedencia do pedido, a condena\u00e7\u00e3o SER\u00c1 GEN\u00c9RICA\"},{\"title\":\"Fixando responsa do r\u00e9u pelos danos causados. Nao indivualiza os sujeitos lesados\"},{\"title\":\"Na fase de liquida\u00e7\u00e3o os consumidores devem demonstrar que sofreram o dano\"},{\"title\":\"Entendimento STJ - Causa de Pedir\",\"children\":[{\"title\":\"N\u00e3o \u00e9 necessario que a causa de pedir contemple descri\u00e7\u00e3o pormenorizada das situa\u00e7\u00f5es individuais de todos substituidos\"}]}]}]},{\"title\":\"Execu\u00e7\u00e3o Liquida\u00e7\u00e3o/Execu\u00e7\u00e3o da pretens\u00e3o individual (art. 97 do CDC) Execu\u00e7\u00e3o da pretens\u00e3o individual coletiva (art. 98 do CDC) Execu\u00e7\u00e3o da pretens\u00e3o coletiva residual: \u201cfluid recovery\u201d (repara\u00e7\u00e3o flu\u00edda) - (art. 100 do CDC)\",\"children\":[{\"title\":\"Liquida\u00e7\u00e3o e Execu\u00e7\u00e3o da Pretens\u00e3o Individual\",\"children\":[{\"title\":\"Pode ser promovida pela vitima e seus sucessores, bem como legitimados(COLETIVA)\"},{\"title\":\"Nao ocasiona prejuizo de outras execu\u00e7\u00f5es\"},{\"title\":\"Liquida\u00e7\u00e3o impropria\",\"children\":[{\"title\":\"A liquida\u00e7\u00e3o \u00e9 impropria pois o lesado deve provar que o foi\"}]},{\"title\":\"Deve ser em sentencas liquidas, sentencas iliquidas n\u00e3o podem ser executadas\"},{\"title\":\"Consumidor possui prerrogativa processual do ajuizamento da execu\u00e7\u00e3o individual\"},{\"title\":\"Derivada de decisao proferida no julgamento de a\u00e7\u00e3o coletiva no foro de seu domicilio\"},{\"title\":\"N\u00e3o h\u00e1 preven\u00e7\u00e3o do juizo que examinou o merito da a\u00e7\u00e3o\"}]},{\"title\":\"Execu\u00e7\u00e3o Coletiva FGV - 2022 - MPE-GO - Promotor de Justi\u00e7a Substituto\",\"children\":[{\"title\":\"Feita pelos legitimados do art. 82. Abrange vitimas cujas indeniza\u00e7oes\"},{\"title\":\"Foram fixadas em senten\u00e7a de liquida\u00e7ao, sem prejuizo de outras execu\u00e7\u00f5es\"},{\"title\":\"\u00c9 feita com base em certidao das senten\u00e7as de liquida\u00e7ao onde constar\u00e1 o TJ ou nao\"},{\"title\":\"Callout\",\"children\":[{\"title\":\"O Minist\u00e9rio P\u00fablico n\u00e3o possui legitimidade para promover a execu\u00e7\u00e3o coletiva do art. 98 do CDC por aus\u00eancia de interesse p\u00fablico ou social a justificar sua atua\u00e7\u00e3o: Art. 98. A execu\u00e7\u00e3o poder\u00e1 ser coletiva, sendo promovida pelos legitimados de que trata o art. 82, abrangendo as v\u00edtimas cujas indeniza\u00e7\u00f5es j\u00e1 tiveram sido fixadas em senten\u00e7a de liquida\u00e7\u00e3o, sem preju\u00edzo do ajuizamento de outras execu\u00e7\u00f5es. Nessa execu\u00e7\u00e3o do art. 98, o que se tem \u00e9 a persegui\u00e7\u00e3o de direitos puramente individuais. O objetivo \u00e9 o ressarcimento do dano individualmente experimentado, de modo que a indivisibilidade do objeto cede lugar \u00e0 sua individualiza\u00e7\u00e3o. Essa particularidade da fase de execu\u00e7\u00e3o constitui \u00f3bice \u00e0 atua\u00e7\u00e3o do Minist\u00e9rio P\u00fablico pois o interesse social, que justificaria a atua\u00e7\u00e3o do Parquet, \u00e0 luz do art. 129, III, da Constitui\u00e7\u00e3o Federal, era a homogeneidade do direito que, no caso, n\u00e3o mais existe. STJ. 4\u00aa Turma. REsp 869583-DF, Rel. Min. Luis Felipe Salom\u00e3o, julgado em 05/06/2012. STJ. 3\u00aa Turma. REsp 1801518-RJ, Rel. Min. Paulo de Tarso Sanseverino, julgado em 14/12/2021 (Info 722)\"},{\"title\":\"N\u00e3o cabe ao Minist\u00e9rio P\u00fablico promover a liquida\u00e7\u00e3o da senten\u00e7a coletiva para satisfazer, um a um, os interesses individuais dispon\u00edveis das v\u00edtimas ou seus sucessores, por se tratar de pretens\u00e3o n\u00e3o amparada no CDC e que foge \u00e0s atribui\u00e7\u00f5es institucionais do Parquet. Logo, o requerimento de liquida\u00e7\u00e3o da senten\u00e7a coletiva, acaso seja feito pelo MP, n\u00e3o \u00e9 apto a interromper a prescri\u00e7\u00e3o para o exerc\u00edcio da respectiva pretens\u00e3o pelos verdadeiros titulares do direito tutelado. Em homenagem \u00e0 seguran\u00e7a jur\u00eddica e ao interesse social que envolve a quest\u00e3o, e diante da exist\u00eancia de julgados anteriores desta Corte, nos quais se reconheceu a interrup\u00e7\u00e3o da prescri\u00e7\u00e3o em hip\u00f3teses an\u00e1logas \u00e0 destes autos, gerando nos jurisdicionados uma expectativa leg\u00edtima nesse sentido, faz-se a modula\u00e7\u00e3o dos efeitos desta decis\u00e3o, com base no \u00a7 3\u00ba do art. 927 do CPC/2015, para decretar a efic\u00e1cia prospectiva do novo entendimento, atingindo apenas as situa\u00e7\u00f5es futuras, ou seja, as a\u00e7\u00f5es civil p\u00fablicas cuja senten\u00e7a seja posterior \u00e0 publica\u00e7\u00e3o deste ac\u00f3rd\u00e3o. Conv\u00e9m alertar que a liquida\u00e7\u00e3o das futuras senten\u00e7as coletivas, exaradas nas a\u00e7\u00f5es civis p\u00fablicas propostas pelo Minist\u00e9rio P\u00fablico e relativas a direitos individuais homog\u00eaneos, dever\u00e3o ser promovidas pelas respectivas v\u00edtimas e seus sucessores, independentemente da eventual atua\u00e7\u00e3o do Parquet, sob pena de se sujeitarem os beneficiados \u00e0 decreta\u00e7\u00e3o da prescri\u00e7\u00e3o. STJ. Corte Especial. REsp 1758708-MS, Rel. Min. Nancy Andrighi, julgado em 20/04/2022 (Info 734).\"}]}]},{\"title\":\"Execu\u00e7\u00e3o Provis\u00f3ria\",\"children\":[{\"title\":\"\u00c9 possivel execu\u00e7\u00e3o provis\u00f3ria em sede de a\u00e7\u00e3o coletiva. Obedece o CPC\"},{\"title\":\"Em alguns casos o CPC exige cau\u00e7\u00e3o para levantamento, e tem casos em q dispensa\"}]},{\"title\":\"Comeptencia para  execu\u00e7\u00e3o FGV - 2022 - MPE-GO - Promotor de Justi\u00e7a Substituto\",\"children\":[{\"title\":\"foro do domicilio do executado\"},{\"title\":\"foro do bem expropriado\"},{\"title\":\"O da liquida\u00e7\u00e3o da sentenca\"},{\"title\":\"Foro do exequente ou domicilio do autor(art. 101 I do CDC)\"}]},{\"title\":\"Art. 99 - Concurso de Creditos\",\"children\":[{\"title\":\"Em caso de concurso de creditos decorrentes de condena\u00e7\u00e3o da ACP e de indeniza\u00e7\u00f5es pelo prejuizos individuais resultantes do mesmo evento danoso, ESTAS TERAO PREFERENCIA NO PAGTO\"},{\"title\":\"Para efeito do disposto neste artigo\",\"children\":[{\"title\":\"A destina\u00e7\u00e3o da condena\u00e7\u00e3o ao fundo criado pela ACP\"},{\"title\":\"Ficara sustada, enquanto pendente\"},{\"title\":\"Decisao de segundo grau as a\u00e7oes de indenizacao pelos danos individuais\"},{\"title\":\"Salvo\",\"children\":[{\"title\":\"Hipotese de o patrimonio do devedor ser manifestamente insuficiente para responder a integralidade das dividas\"}]}]},{\"title\":\"O direito subjetivo tem preferencia\"}]},{\"title\":\"Art. 100 - Prazo de 1 ano Fluid Recovery CESPE / CEBRASPE - 2023 - PGE-PA - Procurador\",\"children\":[{\"title\":\"A repara\u00e7\u00e3o fluida (fluid recovery) constitui espec\u00edfica e acidental hip\u00f3tese de EXECU\u00c7\u00c3O COLETIVA de danos causados a interesses individuais homog\u00eaneos, instrumentalizada pela atribui\u00e7\u00e3o de legitimidade subsidi\u00e1ria aos substitutos processuais do art. 82 do CDC para perseguirem a indeniza\u00e7\u00e3o de preju\u00edzos causados individualmente aos consumidores, com o objetivo de preservar a vontade da Lei e impedir o enriquecimento sem causa do fornecedor. Ela ter\u00e1 por objeto a apura\u00e7\u00e3o do preju\u00edzo globalmente causado. Conforme previsto no art. 100 do CDC para a senten\u00e7a gen\u00e9rica que veicula direitos individuais homog\u00eaneos, passado o prazo de 1 (UM) ano sem habilita\u00e7\u00e3o de interessados (sem que requeiram a expedi\u00e7\u00e3o do t\u00edtulo no ju\u00edzo coletivo e promovam a liquida\u00e7\u00e3o em separado), poder\u00e3o os legitimados coletivos fazer uma estimativa de quanto seria a indeniza\u00e7\u00e3o devida individualmente, para cada um e executar. Como se percebe, a legitimidade n\u00e3o restrita ao MP, pois \u00e9 outorgada aos demais legitimados coletivos Decorrido prazo de 1 ANO sem habilita\u00e7\u00e3o de interessados em n\u02da compativel com GRAVIDADE DO DANO podem os legitimados promover liquida\u00e7\u00e3o e execu\u00e7\u00e3o da indeniza\u00e7\u00e3o devida o produto da indeniza\u00e7\u00e3o reverter\u00e1 ao fundo da ACP Fundo- Denominado pela doutrina como FLUIDRECOVERY STJ - Liquida\u00e7\u00e3o residual de sentenca coletiva deve ser por arbitramento, quando os beneficiarios s\u00e3o identificados. N\u00e3o \u00e9 necessario que haja na peti\u00e7\u00e3o inicial pedido de revers\u00e3o ao fundo\"},{\"title\":\"obs\",\"children\":[{\"title\":\"A legitimidade subsidi\u00e1ria da associa\u00e7\u00e3o e dos demais sujeitos previstos no art. 82 do CDC em cumprimento de senten\u00e7a coletiva fica condicionada, passado um ano do tr\u00e2nsito em julgado, a n\u00e3o haver habilita\u00e7\u00e3o por parte dos benefici\u00e1rios ou haver em n\u00famero desproporcional ao preju\u00edzo, nos termos do art. 100 do CDC. STJ. 3\u00aa Turma. REsp 1955899-PR, Rel. Min. Nancy Andrighi, julgado 15/03/2022 (Info 729).\"},{\"title\":\"De acordo com a jurisprud\u00eancia atual do STJ, a natureza jur\u00eddica da chamada repara\u00e7\u00e3o fluida (fluid recovery), prevista no art. 100 do CDC, pode ser residual ou sancionat\u00f3ria, conforme a situa\u00e7\u00e3o concreta. CORRETA. Efetivamente, a norma do art. 100 do CDC atender\u00e1 a necessidade de repara\u00e7\u00e3o residual, quando interpretamos que as v\u00edtimas/benefici\u00e1rias da senten\u00e7a coletiva n\u00e3o perseguem sua indeniza\u00e7\u00e3o individual, de forma a fazer nascer a pretens\u00e3o residual dos demais legitimados em buscar a indeniza\u00e7\u00e3o que integrar\u00e1 o fundo previsto no art. 13 da lei de ACP \\\" Art. 13. Havendo condena\u00e7\u00e3o em dinheiro, a indeniza\u00e7\u00e3o pelo dano causado reverter\u00e1 a um fundo gerido por um Conselho Federal ou por Conselhos Estaduais de que participar\u00e3o necessariamente o Minist\u00e9rio P\u00fablico e representantes da comunidade, sendo seus recursos destinados \u00e0 reconstitui\u00e7\u00e3o dos bens lesados.\\\" Por outro lado, tamb\u00e9m haver\u00e1 a fei\u00e7\u00e3o sancionat\u00f3ria, quando os legitimados residuais assumem um papel de buscar a indeniza\u00e7\u00e3o para coibir as condutas il\u00edcitas, reprimidas pela senten\u00e7a coletiva.\"}]}]},{\"title\":\"obs\",\"children\":[{\"title\":\"O prazo prescricional para a execu\u00e7\u00e3o individual \u00e9 contado do tr\u00e2nsito em julgado da senten\u00e7a coletiva, sendo desnecess\u00e1ria a provid\u00eancia de que trata o art. 94 da Lei n\u00ba 8.078/90 (CDC), ou seja, a publica\u00e7\u00e3o de editais convocando eventuais benefici\u00e1rios. STJ. 1\u00aa Se\u00e7\u00e3o. REsp 1388000-PR, Rel. Min. Napole\u00e3o Nunes Maia Filho, Rel. para ac\u00f3rd\u00e3o Min. Og Fernandes, julgado em 26/8/2015 (recurso repetitivo) (Info 580).\"},{\"title\":\"N\u00e3o viola o art. 100, \u00a7 8\u00ba, da Constitui\u00e7\u00e3o Federal a execu\u00e7\u00e3o individual de senten\u00e7a condenat\u00f3ria gen\u00e9rica proferida contra a Fazenda P\u00fablica em a\u00e7\u00e3o coletiva visando \u00e0 tutela de direitos individuais homog\u00eaneos. STF. Plen\u00e1rio. ARE 925.754/PR, Rel. Min. Teori Zavascki, julgado em 17/12/2015 (Repercuss\u00e3o Geral - Tema 873) (Info 813 clipping)\"},{\"title\":\"A Corte Especial do STJ, quando do julgamento do REsp 1.243.887/PR, decidiu que no caso de t\u00edtulo judicial proferido em A\u00e7\u00e3o Civil P\u00fablica, o exequente pode escolher ingressar com a execu\u00e7\u00e3o individual: i) no foro em que a A\u00e7\u00e3o Coletiva foi processada e julgada; ou ii) no foro do seu domic\u00edlio, nos termos dos arts. 98, \u00a7 2\u00ba, I, e 101, I, do CDC. Ocorre que, se essa execu\u00e7\u00e3o \u00e9 proposta contra a Uni\u00e3o, haver\u00e1 uma terceira op\u00e7\u00e3o: o ajuizamento no Distrito Federal. Por for\u00e7a do art. 109, \u00a7 2\u00ba, da CF, o exequente pode optar por ajuizar no Distrito Federal o cumprimento de senten\u00e7a coletiva contra a Uni\u00e3o. Essa conclus\u00e3o est\u00e1 em harmonia com a m\u00e1xima efetividade do dispositivo constitucional, al\u00e9m do que amplia e facilita o acesso \u00e0 justi\u00e7a. STJ. 1\u00aa Se\u00e7\u00e3o. CC 199.938-SP, Rel. Min. Mauro Campbell Marques, julgado em 11/10/2023 (Info 794).\"}]},{\"title\":\"Callout\",\"children\":[{\"title\":\"Art. 97. A liquida\u00e7\u00e3o e a execu\u00e7\u00e3o de senten\u00e7a poder\u00e3o ser promovidas pela v\u00edtima e seus sucessores, assim como pelos legitimados de que trata o art. 82.         Par\u00e1grafo \u00fanico. (Vetado). Art. 98. A execu\u00e7\u00e3o poder\u00e1 ser coletiva, sendo promovida pelos legitimados de que trata o art. 82, abrangendo as v\u00edtimas cujas indeniza\u00e7\u00f5es j\u00e1 tiveram sido fixadas em senten\u00e7a de liquida\u00e7\u00e3o, sem preju\u00edzo do ajuizamento de outras execu\u00e7\u00f5es.             (Reda\u00e7\u00e3o dada pela Lei n\u00ba 9.008, de 21.3.1995) \u00a7 1\u00b0 A execu\u00e7\u00e3o coletiva far-se-\u00e1 com base em certid\u00e3o das senten\u00e7as de liquida\u00e7\u00e3o, da qual dever\u00e1 constar a ocorr\u00eancia ou n\u00e3o do tr\u00e2nsito em julgado. \u00a7 2\u00b0 \u00c9 competente para a execu\u00e7\u00e3o o ju\u00edzo: I - da liquida\u00e7\u00e3o da senten\u00e7a ou da a\u00e7\u00e3o condenat\u00f3ria, no caso de execu\u00e7\u00e3o individual; II - da a\u00e7\u00e3o condenat\u00f3ria, quando coletiva a execu\u00e7\u00e3o.\"}]}]},{\"title\":\"A\u00e7\u00f5es de Responsabilidade do Fornecedor de Produtos e Servi\u00e7os Art. 101 e 102 FGV - 2022 - TJ-GO - Juiz Leigo\",\"children\":[{\"title\":\"COMPETENCIA\",\"children\":[{\"title\":\"Na a\u00e7\u00e3o de resp. civil do fornecedor a a\u00e7\u00e3o pode ser proposta\",\"children\":[{\"title\":\"No domicilio do autor\"}]},{\"title\":\"O r\u00e9u que houver contratado seguro de responsa poder\u00e1 chamar ao processo o segurador, sendo vedada\",\"children\":[{\"title\":\"Integar\u00e7\u00e3o do contraditorio pelo Instituto de resseguros do Brasil\"}]},{\"title\":\"Nesse caso a condena\u00e7\u00e3o observar\u00e1 o art. 80 do CPC\",\"children\":[{\"title\":\"A senten\u00e7a que condenar os devedores faz titulo executivo em favor de quem satisfizer a divida\"},{\"title\":\"Podendo exigi-la do devedor principal ou para cobranca de quotas\"}]},{\"title\":\"R\u00e9u considerado falido\",\"children\":[{\"title\":\"O sindico sera intimado a informar a existencia de seguro de responsabildiade\"},{\"title\":\"Facultando-se em caso de ter o seguro, ajuizamento da indeniza\u00e7\u00e3o diretamente contra o seguro\"},{\"title\":\"Veda-se\",\"children\":[{\"title\":\"Denuncia\u00e7\u00e3o da Lide do IRB\"}]},{\"title\":\"Dispensa\",\"children\":[{\"title\":\"Litisconsorcio obrigatorio com este\"}]}]},{\"title\":\"A Vitima pode propor A\u00e7\u00e3o diretamente contra a segura quando o fornecedor n\u00e3o estiver falido?\",\"children\":[{\"title\":\"STJ admite tal possibilidade desde q o fornecedor integre o polo passivo tambem\"}]}]},{\"title\":\"A\u00e7\u00e3o p/ Compelir o Poder Pub. a proibir determinado produto ou conduta\",\"children\":[{\"title\":\"Os legitimados podem propor ac\u00e3o visando compelir o poder publico competente a proibir, EM TODO territorio nacional a produ\u00e7\u00e3o, divulga\u00e7\u00e3o, distribui\u00e7\u00e3o, venda, altera\u00e7\u00e3o na composi\u00e7\u00e3o e estrutura formula ou acondicionamento cujo uso ou consumo se revele nocivo ou perigoso a saude publica ou incolumidade pessoal\"},{\"title\":\"\u00c9 uma a\u00e7\u00e3o preventiva de natureza mandamental/Injuncional\"}]}]},{\"title\":\"Coisa Julgada - Art. 103 do CDC\",\"children\":[{\"title\":\"intro\",\"children\":[{\"title\":\"Aplica-se a todas a\u00e7\u00f5es coletivas a abragencia da coisa julgada\"}]},{\"title\":\"Tipos de CJ FGV - 2023 - TJ-PR - Juiz Substituto\",\"children\":[{\"title\":\"IDD\",\"children\":[{\"title\":\"Erga Omnes, exceto se o pedido for julgado improcedente por insuficiencia de provas\"},{\"title\":\"hipotese em que qualquer legitimado, valendo-se de nova prova, pode\"},{\"title\":\"podera intentar outra a\u00e7\u00e3o, com identico fundamento\"},{\"title\":\"Em caso de improcedencia do pedido(merito) quem nao interviu no processo pode ajuizar?\",\"children\":[{\"title\":\"Podem propor A\u00e7\u00e3o de indenizac\u00e3o a titulo individual\"}]}]},{\"title\":\"IDC\",\"children\":[{\"title\":\"Ultrapartes, mas limitadamente ao grupo, categoria ou classe\"},{\"title\":\"salvo improcedencia por insuficiencia de provas\"}]},{\"title\":\"IDH\",\"children\":[{\"title\":\"ERGA OMNES em caso de procedencia do pedido\"},{\"title\":\"p/ beneficiar todas as vitimas e seus sucessores\"},{\"title\":\"Em caso de improcedencia, os que nao intervieram como litis podem ajuizar a\u00e7\u00e3o\"},{\"title\":\"obs\",\"children\":[{\"title\":\"Ap\u00f3s o tr\u00e2nsito em julgado de decis\u00e3o que julga improcedente a\u00e7\u00e3o coletiva proposta em defesa de direitos individuais homog\u00eaneos, independentemente do motivo que tenha fundamentado a rejei\u00e7\u00e3o do pedido, n\u00e3o \u00e9 poss\u00edvel a propositura de nova demanda com o mesmo objeto por outro legitimado coletivo, ainda que em outro Estado da federa\u00e7\u00e3o. STJ. 2\u00aa Se\u00e7\u00e3o. REsp 1302596-SP, Rel. Min. Paulo de Tarso Sanseverino, Rel. para ac\u00f3rd\u00e3o Min. Ricardo Villas B\u00f4as Cueva, julgado em 9/12/2015 (Info 575).\"}]}]}]},{\"title\":\"Os efeitos da coisa Julgada que trata a LACP\",\"children\":[{\"title\":\"N\u00e3o prejudica a\u00e7oes de indeniza\u00e7\u00e3o individuais, propostas individualmente\"},{\"title\":\"Mas se procedentes, beneficiam as vitimas e seus sucessores que poderao\"},{\"title\":\"Liquidar e executar\"},{\"title\":\"Efeitos da CJ em demandas difusas e coletivas n\u00e3o prejudica a\u00e7\u00f5es individuais\"},{\"title\":\"aplica-se a sentenca penal condenatoria\",\"children\":[{\"title\":\"Tbm ocorre o transporte in utilibus. os titulares podem executar a sentenca penal no civel\"}]}]},{\"title\":\"Coisa julgada Secundum Eventum Litis e Secundum Eventum Probationes FGV - 2021 - DPE-RJ - Defensor P\u00fablico\",\"children\":[{\"title\":\"Secundum Eventum Litis\",\"children\":[{\"title\":\"\u00c9 a coisa julgada que se forma somente quando a demanda \u00e9 julgada procedente\"},{\"title\":\"Extens\u00e3o subjetiva dos efeitos da senten\u00e7a\"},{\"title\":\"Individuos nao estao vinculados ao resultado negativo da senten\u00e7a coletiva\"},{\"title\":\"Se a a\u00e7\u00e3o for julgada improcedente ela poder\u00e1 ser reproposta\"}]},{\"title\":\"Secundum Eventum Probationes\",\"children\":[{\"title\":\"\u00c9 aquela que se forma somente  em caso de esgotamento das provas\"},{\"title\":\"Se a demanda for julgada procedente ou improcedente com suficneica de prova\"},{\"title\":\"S\u00f3 faz coisa julgada se esgotados os meios de prova\"},{\"title\":\"OBS\",\"children\":[{\"title\":\"Coisa julgada secundum eventum probationis \u00e9 aquela que s\u00f3 se forma em caso de esgotamento das provas: se a demanda for julgada procedente, que \u00e9 sempre com esgotamento de prova, ou improcedente com sufici\u00eancia de provas. A decis\u00e3o judicial s\u00f3 produzir\u00e1 coisa julgada se forem exauridos todos os meios de prova. Se a decis\u00e3o proferida no processo julgar a demanda improcedente por insufici\u00eancia de provas, n\u00e3o formar\u00e1 coisa julgada. (FREDIE DIDIER JR., Curso de Direito Processual Civil, Processo Coletivo). A coisa julgada ser\u00e1 secundum eventum probationis nas a\u00e7\u00f5es que versem acerca de direitos difusos e coletivos (CDC, Art. 103, I e II). Contudo, a coisa julgada n\u00e3o ser\u00e1 secundum eventum probationis nas a\u00e7\u00f5es que versem sobre direitos individuais homog\u00eaneos, conforme jurisprud\u00eancia do STJ: (...) 1. Cinge-se a controv\u00e9rsia a definir se, ap\u00f3s o tr\u00e2nsito em julgado de decis\u00e3o que julga improcedente a\u00e7\u00e3o coletiva para a defesa de direitos individuais homog\u00eaneos, \u00e9 poss\u00edvel a repeti\u00e7\u00e3o da demanda coletiva com o mesmo objeto por outro legitimado em diferente estado da federa\u00e7\u00e3o. 2. A apura\u00e7\u00e3o da extens\u00e3o dos efeitos da senten\u00e7a transitada em julgado proferida em a\u00e7\u00e3o coletiva para a defesa de direitos individuais homog\u00eaneos passa pela interpreta\u00e7\u00e3o conjugada dos artigos 81, inciso III, e 103, inciso III e \u00a7 2\u00ba, do C\u00f3digo de Defesa do Consumidor. 3. Nas a\u00e7\u00f5es coletivas intentadas para a prote\u00e7\u00e3o de interesses ou direitos individuais homog\u00eaneos, a senten\u00e7a far\u00e1 coisa julgada erga omnes apenas no caso de proced\u00eancia do pedido. No caso de improced\u00eancia, os interessados que n\u00e3o tiverem intervindo no processo como litisconsortes poder\u00e3o propor a\u00e7\u00e3o de indeniza\u00e7\u00e3o a t\u00edtulo individual. 4. N\u00e3o \u00e9 poss\u00edvel a propositura de nova a\u00e7\u00e3o coletiva, mas s\u00e3o resguardados os direitos individuais dos atingidos pelo evento danoso.(...) (REsp 1302596/SP, Rel. Ministro PAULO DE TARSO SANSEVERINO, Rel. p/ Ac\u00f3rd\u00e3o Ministro RICARDO VILLAS B\u00d4AS CUEVA, SEGUNDA SE\u00c7\u00c3O, julgado em 09/12/2015, DJe 01/02/2016) Concluindo: quando se tratar de direito individual homog\u00eaneo, o julgamento de proced\u00eancia ou de improced\u00eancia, independentemente do fundamento (aus\u00eancia de provas ou de direito), ensejar\u00e1 a coisa julgada coletiva. Em todos os casos de improced\u00eancia nos individuais homog\u00eaneos, a consequ\u00eancia ser\u00e1 sempre coisa julgada. N\u00e3o pode repropor a a\u00e7\u00e3o coletiva; mas ainda \u00e9 poss\u00edvel a discuss\u00e3o da quest\u00e3o em a\u00e7\u00f5es individuais.\"},{\"title\":\"Segundo a doutrina, n\u00e3o \u00e9 preciso indica\u00e7\u00e3o expressa da insufici\u00eancia probat\u00f3ria, mas apenas que seja extra\u00eddo da decis\u00e3o que poderia ser diferente o resultado caso o conjunto probat\u00f3rio fosse outro.\"}]}]}]},{\"title\":\"Transporte In Utilibus (S\u00f3 Atinge os Individuos se for para beneficia-los) FGV - 2022 - MPE-GO - Promotor FGV - 2021 - DPE-RJ - Defensor P\u00fablico\",\"children\":[{\"title\":\"O titular de direito individual pode utilizar a senten\u00e7a proferida para executar\"},{\"title\":\"Deve provar a identidade fatica e juridica das situa\u00e7\u00f5es\"},{\"title\":\"Isso no caso dos dirietos difusos e coletivos. Ocorre uma aplia\u00e7\u00e3o do processo coletivo\"},{\"title\":\"OBS\",\"children\":[{\"title\":\"O denominado transporte in utilibus da coisa julgada coletiva nada mais \u00e9 do que a orienta\u00e7\u00e3o, de acordo com a qual, nas a\u00e7\u00f5es coletivas, quando h\u00e1 a proced\u00eancia do pedido, \u00e9 poss\u00edvel utilizar o resultado da senten\u00e7a em demandas individuais, transportando, para estes casos, a coisa julgada ben\u00e9fica (art. 103, \u00a73\u00ba, do CDC). CDC. Art. 103. [...] \u00a7 3\u00b0 Os efeitos da coisa julgada de que cuida o art. 16, combinado com o art. 13 da Lei n\u00b0 7.347, de 24 de julho de 1985, n\u00e3o prejudicar\u00e3o as a\u00e7\u00f5es de indeniza\u00e7\u00e3o por danos pessoalmente sofridos, propostas individualmente ou na forma prevista neste c\u00f3digo, mas, se procedente o pedido, beneficiar\u00e3o as v\u00edtimas e seus sucessores, que poder\u00e3o proceder \u00e0 liquida\u00e7\u00e3o e \u00e0 execu\u00e7\u00e3o, nos termos dos arts. 96 a 99. \u00a7 4\u00ba Aplica-se o disposto no par\u00e1grafo anterior \u00e0 senten\u00e7a penal condenat\u00f3ria.\"}]}]},{\"title\":\"obs\",\"children\":[{\"title\":\"Os autores de a\u00e7\u00f5es individuais em cujos autos n\u00e3o foi dada ci\u00eancia do ajuizamento de a\u00e7\u00e3o coletiva e que n\u00e3o requereram a suspens\u00e3o das demandas individuais podem se beneficiar dos efeitos da coisa julgada formada na a\u00e7\u00e3o coletiva. STJ. 1\u00aa Turma. REsp 1593142-DF, Rel. Min. Napole\u00e3o Nunes Maia Filho, julgado em 7/6/2016 (Info 585).\"},{\"title\":\"Jurisprud\u00eancia em Teses do STJ: Tese 13. Ajuizada a\u00e7\u00e3o coletiva atinente a MACROLIDE geradora de processos MULTITUDIN\u00c1RIOS, suspendem-se as a\u00e7\u00f5es individuais, de of\u00edcio e independentemente do consentimento do autor da respectiva lide individual, no aguardo do julgamento da a\u00e7\u00e3o coletiva.\"}]}]},{\"title\":\"Art. 104 - Litispendencia\",\"children\":[{\"title\":\"Intro\",\"children\":[{\"title\":\"Aplica-se a todas especies de a\u00e7ao coletiva, msm q nao seja sobre consumidor\"},{\"title\":\"Ou seja, a incidencia dos efeitos da CJ n\u00e3o s\u00e3o autom\u00e1ticas\"},{\"title\":\"A a\u00e7\u00e3o individual tem curso independnete da coletiva\"},{\"title\":\"A a\u00e7\u00e3o individual s\u00f3 se suspende por iniciativa de seu autor\"},{\"title\":\"N\u00e3o havendo peidido, a a\u00e7\u00e3o individual nao sofre efeito algum do resultado da demanda\"},{\"title\":\"Quem da a ciencia da existencia da a\u00e7\u00e3o coletiva? a parte r\u00e9\"}]},{\"title\":\"As a\u00e7\u00f5es FGV - 2022 - MPE-GO - Promotor\",\"children\":[{\"title\":\"Interesses Difusos, IDC e IDH. Nao produzem litispendencia p/ a\u00e7\u00f5es individuais\"},{\"title\":\"MAS\",\"children\":[{\"title\":\"Os efeitos da CJ erga omnes ou ultrapartes nao beneficiarao os autores de A\u00e7\u00f5es Individuais\"},{\"title\":\"Se n\u00e3o for requerida suspens\u00e3o no prazo de 30 dias\"},{\"title\":\"A contar da ciencia nos autos do ajuizamento de a\u00e7\u00e3o coletiva\"}]}]},{\"title\":\"Reuni\u00e3o dos processos por conex\u00e3o (Duas ou mais a\u00e7\u00f5es Coletivas) FGV - 2022 - MPE-GO - Promotor\",\"children\":[{\"title\":\"So ocorre qnd se tratar do msm juizo competente p julgar ambas ou diversas causas\"},{\"title\":\"N\u00e3o podem ser reunidas a\u00e7oes coletivas em juizos de competencias diferentes\"}]},{\"title\":\"Right to Opt in/Out FGV - 2022 - MPE-GO - Promotor de Justi\u00e7a Substituto\",\"children\":[{\"title\":\"A classifica\u00e7\u00e3o adotada abandona o campo do direito civil e passa a exigir uma solu\u00e7\u00e3o processual que melhor sirva aos fins da tutela de interesses metaindividuais. \u00c9  o chamado modelo \u201copt-out\u201d e \u201copt-in\u201d. Este mecanismo concede ao cidad\u00e3o a possibilidade de se vincular ou se desvencilhar (a depender do modelo) da decis\u00e3o tomada em sede de a\u00e7\u00e3o coletiva. No sistema \u201copt-in\u201d, utilizado em pa\u00edses como Inglaterra, o juiz assinala um determinado prazo para que os interessados, tamb\u00e9m titulares do direito em Ju\u00edzo, se quiserem, se inscrevam no processo com o intuito de que aquilo que for decidido naquele processo vincule automaticamente o inscrito. Com outras palavras, publicado edital de que a\u00e7\u00e3o coletiva foi propostas, os interessados/lesados poder\u00e3o requerer ao juiz sua inser\u00e7\u00e3o no processo, tanto para que tenham certa participa\u00e7\u00e3o na tutela coletiva, bem como estejam vinculados ao que ali for decidido. \u00c9 nada mais que um pedido e inscri\u00e7\u00e3o no processo coletivo, como se o indiv\u00edduo se convidasse a participar de uma festa, na qual antes n\u00e3o havia sido convidado. No modelo \u201copt-out\u201d, servido nos EUA, ao inv\u00e9s do cidad\u00e3o se inscrever para que os efeitos do julgado o acobertem, o indiv\u00edduo tem um prazo dado pelo magistrado para que, se de seu interesse, se retire do processo, desvinculando qualquer decis\u00e3o naquele processo \u00e0 sua pessoa. A priori, nesta situa\u00e7\u00e3o, o indiv\u00edduo est\u00e1 vinculado aos efeitos do julgado, podendo ou n\u00e3o participar. O julgador assinala determinado prazo para aqueles que n\u00e3o desejem fazer parte do processo se exclua da tutela. Assim, a a\u00e7\u00e3o coletiva, ainda que julgue direito do indiv\u00edduo que se auto excluiu, n\u00e3o surtir\u00e1 qualquer perante este. Este mecanismo evita problemas que ocorrem frequentemente no caso brasileiro. No Brasil, nas A\u00e7\u00f5es Civis P\u00fablicas para defesa de direitos individuais homog\u00eaneos se opera ao contr\u00e1rio do sistema americano. Caso a parte tenha ingressado com uma demanda individual, ter\u00e1 que optar por suspender a o seu processo para que possa ser atingida pelos efeitos do julgamento da a\u00e7\u00e3o coletiva (constru\u00e7\u00e3o parecida ao direito de opt-in americano), pois permanecendo inerte, estaria usando o direito ao opt-out, n\u00e3o se beneficiando do julgado. O CDC contempla o direito de inclus\u00e3o na jurisdi\u00e7\u00e3o coletiva (right to opt in).\"}]}]}]}}";const DATA = JSON.parse(RAW);

const CHAPTERS = ["cap0","cap1","cap2","cap3","cap4","cap5"];
const LABELS = {"cap0": "0. Histórico Legislativo das Ações Coletivas", "cap1": "1. Microssistema Processual Coletivo", "cap2": "2. Princípios e Microssistema Processual Coletivo", "cap3": "3. Princípios do Processo Coletivo", "cap4": "4. Lei de Ação Civil Pública", "cap5": "5. Lei 8.078/1990 — CDC no Processo Coletivo"};

let cur = CHAPTERS[0];
let expanded = new Set();
let term = "";
let hits = 0;

function detectType(t){
  const s=(t||"").toLowerCase();
  if(/cespe|cebraspe|fgv|vunesp|fundatec|ibfc|prova/.test(s)) return "cespe";
  if(/stj|stf|resp|adi|adpf|adc|\bre\b|rms|agrg|info \d|súmula|sumula|julgado/.test(s)) return "stj";
  return "obs";
}

function extractText(n,d=0){
  if(d>4) return n.title||"";
  let p=[n.title||""];
  (n.children||[]).forEach(c=>p.push(extractText(c,d+1)));
  (n.callouts||[]).forEach(c=>p.push(extractText(c,d+1)));
  return p.filter(Boolean).join(" • ");
}

function matches(n,t){
  if(!t) return true;
  if((n.title||"").toLowerCase().includes(t)) return true;
  if((n.children||[]).some(c=>matches(c,t))) return true;
  if((n.callouts||[]).some(c=>matches(c,t))) return true;
  return false;
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function hilite(s,t){
  if(!t) return esc(s);
  const re=new RegExp(`(${t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`,"gi");
  return esc(s).replace(re,"<mark>$1</mark>");
}

function renderCallout(node){
  const tipo=detectType(node.title||"");
  const label={cespe:"CESPE/CEBRASPE",stj:"STF/STJ",obs:"OBS"}[tipo];
  const text=extractText(node);
  const isTrivial=!node.title||/^(obs|callout|atenção)$/i.test((node.title||"").trim());
  const titleHtml=isTrivial?"":(`<div class="callout-title">${hilite(node.title,term)}</div>`);
  return `<div class="callout-box ${tipo}"><div class="callout-label">${label}</div>${titleHtml}<div class="callout-body">${esc(text)}</div></div>`;
}


var _EXAM_RE=/^\s*(CESPE\s*[\/]?\s*CEBRASPE|CEBRASPE|CESPE|FCC|FGV|VUNESP|ESAF|CESGRANRIO|MPT|AOCP|IBFC|IADES|FUNCAB|FUNDEP|QUADRIX|SELECON|OBJETIVA|NUCEPE|CS-UFG|INAZ|CONSULPLAN|NC-UFPR)\b/i;
var _YEAR_RE=/\b(20\d{2}|199\d)\b/;
function _isExam(t){return _EXAM_RE.test(t)&&_YEAR_RE.test(t);}
function _examShort(t){
  var b=t.match(_EXAM_RE);var y=t.match(_YEAR_RE);
  var banca=(b?b[1].replace(/\s*\/\s*CEBRASPE/i,'').replace(/\s*CEBRASPE\s*\/\s*/i,'').trim():'');
  return banca+(y?' '+y[0]:'');
}
var _BANCA_PAT=/(CESPE\s*[\/]?\s*CEBRASPE|CEBRASPE|CESPE|FCC|FGV|VUNESP|ESAF|CESGRANRIO|MPT|AOCP|IBFC|IADES|FUNCAB|FUNDEP|QUADRIX|SELECON|OBJETIVA|NUCEPE|CS-UFG|INAZ|CONSULPLAN|NC-UFPR)\b/gi;
function _inlineExams(t){
  var m,first=null,p=new RegExp(_BANCA_PAT.source,'gi');
  while((m=p.exec(t))!==null){if(_YEAR_RE.test(t.slice(m.index,Math.min(t.length,m.index+120)))){first=m.index;break;}}
  if(first===null||first===0)return null;
  var content=t.slice(0,first).trim(),ep=t.slice(first);
  p.lastIndex=0;var cuts=[0];
  while((m=p.exec(ep))!==null){if(m.index>0)cuts.push(m.index);}
  var tags=[];
  for(var i=0;i<cuts.length;i++){
    var ref=ep.slice(cuts[i],i+1<cuts.length?cuts[i+1]:ep.length).trim().replace(/[-–,\s]+$/,'');
    if(!_YEAR_RE.test(ref))continue;
    var b=ref.match(_EXAM_RE),y=ref.match(_YEAR_RE);
    var sh=(b?b[1].replace(/\s*\/\s*CEBRASPE/i,'').replace(/CEBRASPE\s*\/\s*/i,'').trim():'')+(y?' '+y[0]:'');
    tags.push({full:ref,short:sh.trim()});
  }
  return tags.length?{content:content,tags:tags}:null;
}

function xpand(el,ev){el.classList.toggle('open');ev.stopPropagation();}
function renderNode(n,depth,path){
  const id=path;
  const hasKids=(n.children&&n.children.length)||(n.callouts&&n.callouts.length);
  const isExp=expanded.has(id)||(term&&matches(n,term));
  const isHit=term&&(n.title||"").toLowerCase().includes(term);
  if(isHit) hits++;

  if(n.callout) return renderCallout(n);

  // Exam reference node → pill
  if(_isExam(n.title||'')&&depth>0){
    const full=esc(n.title||'');const short=esc(_examShort(n.title||''));
    return `<div class="node exam-node" id="n${id}"><div class="row"><span class="exam-tag" data-full="${full}">${short}</span></div></div>`;
  }

  const tog=hasKids?(isExp?"▾":"▸"):"·";
  const dc=depth===0?"d0":depth===1?"d1":depth===2?"d2":"dn";
  const rowCls=`row${isHit?" hit":""}`;
  const _ie=depth>0?_inlineExams(n.title||''):null;
  let titleHtml;
  if(_ie){
    const pills=_ie.tags.map(function(t){return `<span class="exam-tag" data-full="${esc(t.full)}">${esc(t.short)}</span>`;}).join(' ');
    const _xl=_ie.content.length>120;
    titleHtml=`<span class="txt ${dc}${_xl?' long':''}"${_xl?' onclick="xpand(this,event)"':''} >${hilite(_ie.content,term)}</span> ${pills}`;
  } else {
    const _long=(n.title||"").length>120&&depth>0;
    titleHtml=_long?`<span class="txt ${dc} long" onclick="xpand(this,event)">${hilite(n.title||"",term)}</span>`:`<span class="txt ${dc}">${hilite(n.title||"",term)}</span>`;
  }

  let childHtml="";
  if(isExp&&hasKids){
    childHtml='<div class="children">';
    (n.children||[]).forEach((c,i)=>{if(!term||matches(c,term)) childHtml+=renderNode(c,depth+1,path+"_"+i);});
    (n.callouts||[]).forEach((c,i)=>{if(!term||matches(c,term)) childHtml+=renderNode({...c,callout:true},depth+1,path+"_c"+i);});
    childHtml+="</div>";
  }
  return `<div class="node" id="n${id}"><div class="${rowCls}" onclick="toggle('${id}')"><span class="tog">${tog}</span>${titleHtml}</div>${childHtml}</div>`;
}

function render(){
  const tree=DATA[cur];
  hits=0;
  let html="";
  if(tree.children){
    tree.children.forEach((n,i)=>{
      if(!term||matches(n,term)) html+=renderNode(n,0,"r"+i);
    });
  }
  document.getElementById("content").innerHTML=html||`<p class="no-res">Nenhum resultado para "${esc(term)}"</p>`;const em=document.getElementById("empty-msg");if(em)em.remove();
  const mb=document.getElementById("matchBar");
  if(term){mb.style.display="block";mb.textContent=`${hits} ocorrência(s) para "${term}"`;}
  else{mb.style.display="none";}
}

function renderTabs(){
  document.getElementById("tabs").innerHTML=CHAPTERS.map((k,i)=>{
    const cid='dcoletivo_'+i;
    const isDone=_TRK&&_TRK.done&&_TRK.done[cid];
    return `<div class="tab${k===cur?' active':''}" onclick="selChap('${k}')">
      <input type="checkbox" class="_trk_chk" data-cid="${cid}" ${isDone?'checked':''} onclick="event.stopPropagation();_trkToggle('${cid}',this.checked,this)"/>
      <span>${LABELS[k]||k}</span>
    </div>`;
  }).join("");
}

function selChap(k){cur=k;expanded.clear();document.getElementById("search").value="";term="";document.getElementById("matchBar").style.display="none";renderTabs();render();}
function toggle(id){if(expanded.has(id))expanded.delete(id);else expanded.add(id);render();}
function expandAll(){function add(n,p){expanded.add(p);(n.children||[]).forEach((c,i)=>add(c,p+"_"+i));(n.callouts||[]).forEach((c,i)=>add(c,p+"_c"+i));}const t=DATA[cur];(t.children||[]).forEach((n,i)=>add(n,"r"+i));render();}
function collapseAll(){expanded.clear();render();}

let deb;
document.getElementById("search").addEventListener("input",function(){
  clearTimeout(deb);
  deb=setTimeout(()=>{term=this.value.toLowerCase().trim();render();},250);
});

renderTabs();
render();
</script>

<script>
// ── TRACKER INTEGRATION ──
var _TRK = {
  mapId: 'dcoletivo',
  total: 6,
  done: {},  // chapter_id -> true
  user: null,
};

// Auth
window.addEventListener('DOMContentLoaded', function(){
  _sb.auth.getSession().then(function(r){
    if(r.data&&r.data.session&&r.data.session.user){
      _TRK.user = r.data.session.user;
      _trkLoad();
    } else {
      _trkRender();
    }
  });
});

async function _trkLoad(){
  try{
    var r = await _sb.from('progress')
      .select('chapter_id,done')
      .eq('user_id', _TRK.user.id);
    _TRK.done = {};
    if(r.data) r.data.forEach(function(row){
      if(row.done && row.chapter_id.startsWith(_TRK.mapId+'_'))
        _TRK.done[row.chapter_id] = true;
    });
    try{ Object.keys(_TRK.done).forEach(function(cid){ localStorage.setItem('_pgprog_'+cid,JSON.stringify({done:true,date:null})); }); }catch(_){}
    _trkRender();
  }catch(e){ console.warn('tracker load err', e); }
}

function _trkRender(){
  var count = Object.keys(_TRK.done).length;
  var pct = _TRK.total ? Math.round(count/_TRK.total*100) : 0;
  // Update both injected header bar and sidebar bar
  ['_trk_fill','trk-fill'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.width=pct+'%';});
  ['_trk_pct','trk-pct'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=pct+'%';});
  ['_trk_cnt','trk-cnt'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=count+'/'+_TRK.total;});
  // Update checkboxes
  document.querySelectorAll('._trk_chk').forEach(function(chk){
    var cid = chk.getAttribute('data-cid');
    chk.checked = !!_TRK.done[cid];
    var w = chk.closest('._chk_wrap');
    if(w) w.classList.toggle('_chk_done', !!_TRK.done[cid]);
  });
  renderTabs();
}

async function _trkToggle(chapterId, done, chk){
  if(!_TRK.user){
    // Try to recover session
    try {
      const r = await _sb.auth.getSession();
      if(r.data && r.data.session && r.data.session.user){
        _TRK.user = r.data.session.user;
      } else {
        console.warn('No session found, cannot save tracker');
        return;
      }
    } catch(e) { console.error('getSession error:', e); return; }
  }
  var now = done ? new Date().toISOString() : null;
  if(done) _TRK.done[chapterId] = true;
  else delete _TRK.done[chapterId];
  _trkRender();
  try{
    await _sb.from('progress').upsert({
      user_id: _TRK.user.id,
      chapter_id: chapterId,
      done: done,
      done_at: now
    }, {onConflict: 'user_id,chapter_id'});
  }catch(e){ console.warn('tracker save err', e); }
  try{ localStorage.setItem('_pgprog_'+chapterId, JSON.stringify({done, date:now})); }catch(_){}
}
</script>
