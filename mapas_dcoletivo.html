\"Previs\u00e3o\",\"children\":[{\"title\":\"Caput\",\"children\":[{\"title\":\"Havendo conde\u00e7\u00e3o em diheiro. A indeniza\u00e7\u00e3o pelo dano causado\"},{\"title\":\"Ser\u00e1 revertido a um fundo, gerido por um Conselho federal ou Estadual\"},{\"title\":\"Devem participar necessariamente o MP e repersentantes da comunidade\"},{\"title\":\"Os recursos s\u00e3o destinados a reconstitui\u00e7\u00e3o dos bens lesados\"},{\"title\":\"Enquanto o fundo n\u00e3o for regulamentado\"},{\"title\":\"O dinheiro fica depositado em estabelecimento oficial de cr\u00e9dito\"},{\"title\":\"Em conta com corre\u00e7\u00e3o monet\u00e1ria\"}]},{\"title\":\"\u00a72\",\"children\":[{\"title\":\"Havnedo acordo ou condenac\u00e3o com fundamento em dano por ato de discrimina\u00e7\u00e3o etnica\"},{\"title\":\"A presta\u00e7\u00e3o em dinheiro reverter\u00e1 diretamente ao fundo de que trata o caput\"},{\"title\":\"e ser\u00e1 utilizada nas a\u00e7\u00f5es de promo\u00e7\u00e3o de igualdade,\"},{\"title\":\"conforme defini\u00e7\u00e3o do Conselho NAcional de promo\u00e7\u00e3o da Igualdade Racial, na hipotesse de extens\u00e3o nacional\"}]}]},{\"title\":\"O fundo tambem recebe recursos advindos de multas e doa\u00e7oes\"},{\"title\":\"O fundo tambem \u00e9 destinado ao fluid recovery\"},{\"title\":\"Trata da regra de repara\u00e7\u00e3o integral do dano causado, toda vez que\"},{\"title\":\"as habilita\u00e7\u00f5es individuais nao apresentem numero suficiente para recompor a gravidade do dano\"},{\"title\":\"Aplica\u00e7\u00e3o deve ter rela\u00e7\u00e3o com a natureza do dano\"},{\"title\":\"Tambem \u00e9 usado na moderniza\u00e7\u00e3o dos org\u00e3os responsaveis pelas politicas da area do dano\"},{\"title\":\"Entrega de bem movel a titulo de indeniza\u00e7\u00e3o\",\"children\":[{\"title\":\"STJ entende que n\u00e3o \u00e9 possivel a entrega de bem movel para uso de org\u00e3o da adm.\"}]}]},{\"title\":\"Art. 14\u02da- Efeito Suspensivo em regra nao tem ef.\",\"children\":[{\"title\":\"O juiz pode conferir efeito suspensivo aos recursos, para evitar dano irreparavel\"},{\"title\":\"Apelac\u00f5es ser\u00e3o recebidas apenas no devolutivo\"},{\"title\":\"Efeitos suspensivo que deve ser requerido\"}]},{\"title\":\"Art. 15\u02da da LACP  Execu\u00e7\u00e3o MPE-SP - 2017 - MPE-SP - Promotor\",\"children\":[{\"title\":\"Decorridos 60 DIAS do transito em julgado, se a associa\u00e7\u00e3o nao iniciar a execu\u00e7\u00e3o\"},{\"title\":\"O MP deve fazer(obrigatoriedade). Faculta-se a iniciativa aos demais legitimados\"},{\"title\":\"Execuc\u00e3o coletiva pode ser proposta por qlq legitimado, ainda q nao tenha participado da a\u00e7ao\"},{\"title\":\"obs\",\"children\":[{\"title\":\"Os sindicatos possuem ampla legitimidade extraordin\u00e1ria para defender em ju\u00edzo os direitos e interesses coletivos ou individuais dos integrantes da categoria que representam, inclusive nas liquida\u00e7\u00f5es e execu\u00e7\u00f5es de senten\u00e7a, independentemente de autoriza\u00e7\u00e3o dos substitu\u00eddos. STF. Plen\u00e1rio. RE 883.642/AL, Rel. Ministro Presidente, julgado em 18/06/2015 (Repercuss\u00e3o Geral - Tema 823) (Info 791 clipping)\"},{\"title\":\"No \u00e2mbito do direito privado, \u00e9 de cinco anos o prazo prescricional para ajuizamento da execu\u00e7\u00e3o individual em pedido de cumprimento de senten\u00e7a proferida em a\u00e7\u00e3o civil p\u00fablica (Tema 515). STJ. 4\u00aa Turma. EDcl no REsp 1569684-SP, Rel. Min. Raul Ara\u00fajo, julgado em 25/10/2022 (Info 756).\"},{\"title\":\"STF, Tema RG 82 - Possibilidade de execu\u00e7\u00e3o de t\u00edtulo judicial, decorrente de a\u00e7\u00e3o ordin\u00e1ria coletiva ajuizada por entidade associativa, por aqueles que n\u00e3o conferiram autoriza\u00e7\u00e3o individual \u00e0 associa\u00e7\u00e3o, n\u00e3o obstante haja previs\u00e3o gen\u00e9rica de representa\u00e7\u00e3o dos associados em cl\u00e1usula do estatuto. Tese: I \u2013 A previs\u00e3o estatut\u00e1ria gen\u00e9rica n\u00e3o \u00e9 suficiente para legitimar a atua\u00e7\u00e3o, em Ju\u00edzo, de associa\u00e7\u00f5es na defesa de direitos dos filiados, sendo indispens\u00e1vel autoriza\u00e7\u00e3o expressa, ainda que deliberada em assembleia, nos termos do artigo 5\u00ba, inciso XXI, da Constitui\u00e7\u00e3o Federal; II \u2013 As balizas subjetivas do t\u00edtulo judicial, formalizado em a\u00e7\u00e3o proposta por associa\u00e7\u00e3o, s\u00e3o definidas pela representa\u00e7\u00e3o no processo de conhecimento, limitada a execu\u00e7\u00e3o aos associados apontados na inicial.\"},{\"title\":\"Subt\u00f3pico 4\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"Lei 7.347 - Art. 15. Decorridos sessenta dias do tr\u00e2nsito em julgado da senten\u00e7a condenat\u00f3ria, sem que a associa\u00e7\u00e3o autora lhe promova a execu\u00e7\u00e3o, dever\u00e1 faz\u00ea-lo o Minist\u00e9rio P\u00fablico, facultada igual iniciativa aos demais legitimados.  CESPE / CEBRASPE - 2023 - PGE-PA - Procurador do Estado do Par\u00e1 O Minist\u00e9rio P\u00fablico tem legitimidade exclusiva para a liquida\u00e7\u00e3o e execu\u00e7\u00e3o da senten\u00e7a coletiva quando decorrido o prazo de um ano sem habilita\u00e7\u00e3o de interessados em n\u00famero compat\u00edvel com a gravidade do dano.(e)\"}]}]},{\"title\":\"Art. 16\u02da da LACP Efeitos da Senten\u00e7a\",\"children\":[{\"title\":\"A senten\u00e7a civil far\u00e1 coisa julgada erga omnes NOS LIMITES DA COMPETENCIA TERRITORIAL\",\"children\":[{\"title\":\"Entendendo\",\"children\":[{\"title\":\"Em outras palavras, o que o art. 16 quis dizer foi o seguinte: a decis\u00e3o do juiz na a\u00e7\u00e3o civil p\u00fablica n\u00e3o produz efeitos no Brasil todo. Ela ir\u00e1 produzir efeitos apenas na comarca (se for Justi\u00e7a Estadual) ou na se\u00e7\u00e3o ou subse\u00e7\u00e3o judici\u00e1ria (se for Justi\u00e7a Federal) do juiz prolator. A doutrina criticou bastante essa altera\u00e7\u00e3o promovida no art. 16 e afirmou que a regra ali prevista n\u00e3o deveria ser aplicada por ser inconstitucional, impertinente e ineficaz. Resumo das principais cr\u00edticas ao dispositivo (DIDIER, Fredie; ZANETI, Hermes): \u2022 Gera preju\u00edzo \u00e0 economia processual e pode ocasionar decis\u00f5es contradit\u00f3rias entre julgados proferidos em Munic\u00edpios ou Estados diferentes; \u2022 Viola o princ\u00edpio da igualdade por tratar de forma diversa os brasileiros (para uns ir\u00e1 \\\"valer\\\" a decis\u00e3o, para outros n\u00e3o); \u2022 Os direitos coletivos \u201clato sensu\u201d s\u00e3o indivis\u00edveis, de forma que n\u00e3o h\u00e1 sentido que a decis\u00e3o que os define seja separada por territ\u00f3rio; \u2022 A reda\u00e7\u00e3o do dispositivo mistura \u201ccompet\u00eancia\u201d com \u201cefic\u00e1cia da decis\u00e3o\u201d, que s\u00e3o conceitos diferentes. O legislador confundiu, ainda, \u201ccoisa julgada\u201d e \u201cefic\u00e1cia da senten\u00e7a\u201d. Sobre esse ponto, vale a pena citar Hugo Nigro Mazzilli:\"},{\"title\":\"STJ A efic\u00e1cia das decis\u00f5es proferidas em a\u00e7\u00f5es civis p\u00fablicas coletivas N\u00c3O deve ficar limitada ao territ\u00f3rio da compet\u00eancia do \u00f3rg\u00e3o jurisdicional que prolatou a decis\u00e3o. STJ. Corte Especial. EREsp 1134957/SP, Rel. Min. Laurita Vaz, julgado em 24/10/2016.\"}]}]},{\"title\":\"Exceto\",\"children\":[{\"title\":\"Pedido julgado improcedente por insuficiencia de provas\"}]},{\"title\":\"Na exce\u00e7\u00e3o qlq legitimado por intentar outra a\u00e7\u00e3o com identico fundamento\"},{\"title\":\"VALENDO-SE DE NOVA PROVA\"},{\"title\":\"obs\",\"children\":[{\"title\":\"O art. 16 da Lei de A\u00e7\u00e3o Civil P\u00fablica (Lei n\u00ba 7.347/85) estabelece o seguinte: O que o art. 16 quis dizer foi o seguinte: a decis\u00e3o do juiz na a\u00e7\u00e3o civil p\u00fablica n\u00e3o produz efeitos no Brasil todo. Ela ir\u00e1 produzir efeitos apenas na comarca (se for Justi\u00e7a Estadual) ou na se\u00e7\u00e3o ou subse\u00e7\u00e3o judici\u00e1ria (se for Justi\u00e7a Federal) do juiz prolator. Para a jurisprud\u00eancia, o art. 16 da LACP \u00e9 v\u00e1lido? A decis\u00e3o do juiz na a\u00e7\u00e3o civil p\u00fablica fica restrita apenas \u00e0 comarca ou \u00e0 se\u00e7\u00e3o (ou subse\u00e7\u00e3o) judici\u00e1ria do juiz prolator? N\u00c3O. A posi\u00e7\u00e3o que prevalece atualmente \u00e9 a seguinte: A efic\u00e1cia das decis\u00f5es proferidas em a\u00e7\u00f5es civis p\u00fablicas coletivas N\u00c3O deve ficar limitada ao territ\u00f3rio da compet\u00eancia do \u00f3rg\u00e3o jurisdicional que prolatou a decis\u00e3o. STJ. Corte Especial. EREsp 1134957/SP, Rel. Min. Laurita Vaz, julgado em 24/10/2016. Os efeitos da senten\u00e7a proferida em a\u00e7\u00e3o civil p\u00fablica versando direitos individuais homog\u00eaneos em rela\u00e7\u00e3o consumerista operam-se erga omnes para al\u00e9m dos limites da compet\u00eancia territorial do \u00f3rg\u00e3o julgador, isto \u00e9, abrangem todo o territ\u00f3rio nacional, beneficiando todas as v\u00edtimas e seus sucessores, j\u00e1 que o art. 16 da Lei n\u00ba 7.347/85 deve ser interpretado de forma harm\u00f4nica com as demais normas que regem a tutela coletiva de direitos. STJ. 3\u00aa Turma. REsp 1594024/SP, Rel. Min. Ricardo Villas B\u00f4as Cueva, julgado em 27/11/2018. \u00c9 inconstitucional a delimita\u00e7\u00e3o dos efeitos da senten\u00e7a proferida em sede de a\u00e7\u00e3o civil p\u00fablica aos limites da compet\u00eancia territorial de seu \u00f3rg\u00e3o prolator I - \u00c9 inconstitucional o art. 16 da Lei n\u00ba 7.347/85, alterada pela Lei n\u00ba 9.494/97. II - Em se tratando de a\u00e7\u00e3o civil p\u00fablica de efeitos nacionais ou regionais, a compet\u00eancia deve observar o art. 93, II, da Lei n\u00ba 8.078/90 (CDC). III - Ajuizadas m\u00faltiplas a\u00e7\u00f5es civis p\u00fablicas de \u00e2mbito nacional ou regional, firma-se a preven\u00e7\u00e3o do ju\u00edzo que primeiro conheceu de uma delas, para o julgamento de todas as demandas conexas. STF. Plen\u00e1rio. RE 1101937/SP, Rel. Min. Alexandre de Moraes, julgado em 7/4/2021 (Repercuss\u00e3o Geral \u2013 Tema 1075) (Info 1012). Juiz Federal TRF2 2018 CESPE / CEBRASPE - 2023 - MPE-AM - Promotor de Justi\u00e7a Substituto\"},{\"title\":\"Jurisprud\u00eancia em Teses do STJ, Ed. 25, Processo Coletivo III, Tema 10): \\\"10) Os efeitos e a efic\u00e1cia da senten\u00e7a no processo coletivo n\u00e3o est\u00e3o circunscritos a lindes geogr\u00e1ficos, mas aos limites objetivos e subjetivos do que foi decidido.\\\"\"},{\"title\":\"No julgamento de uma a\u00e7\u00e3o civil p\u00fablica, o juiz considerou insuficiente o conjunto probat\u00f3rio produzido pela parte autora e julgou improcedente o pedido. Irresignado com o conte\u00fado da senten\u00e7a, apenas o r\u00e9u recorreu e sustentou que a improced\u00eancia deveria se pautar na inexist\u00eancia do direito afirmado na peti\u00e7\u00e3o inicial, e n\u00e3o pela quest\u00e3o probat\u00f3ria. Nesse sentido, \u00e9 correto afirmar que: Art. 16 da Lei n\u00ba7.347/85 A senten\u00e7a civil far\u00e1 coisa julgada erga omnes, nos limites da compet\u00eancia territorial do \u00f3rg\u00e3o prolator, exceto se o pedido for julgado improcedente por insufici\u00eancia de provas, hip\u00f3tese em que qualquer legitimado poder\u00e1 intentar outra a\u00e7\u00e3o com id\u00eantico fundamento, valendo-se de nova prova O julgamento por aus\u00eancia de provas faz coisa julgada formal, raz\u00e3o pela qual h\u00e1 interese recursal por parte da recorrente, que almeja na \\\"inexist\u00eancia do direito afirmado na peti\u00e7\u00e3o inicial\\\" uma coisa julgada material. FGV - 2023 - TCE-ES - Auditor de Controle Externo - Direito\"},{\"title\":\"A senten\u00e7a proferida em a\u00e7\u00e3o coletiva somente surte efeito nos limites da compet\u00eancia territorial do \u00f3rg\u00e3o que a proferiu e exclusivamente em rela\u00e7\u00e3o aos substitu\u00eddos processuais que ali eram domiciliados \u00e0 \u00e9poca da propositura da demanda. Aplica\u00e7\u00e3o do disposto no art. 2\u00ba-A da Lei n. 9.494/97. A efic\u00e1cia subjetiva da senten\u00e7a coletiva pode abranger os substitu\u00eddos domiciliados em todo o territ\u00f3rio nacional desde que: 1) proposta por entidade associativa de \u00e2mbito nacional; 2) contra a Uni\u00e3o; e 3) no Distrito Federal. Essa \u00e9 a interpreta\u00e7\u00e3o do art. 2\u00ba-A da Lei n. 9.494/97 \u00e0 luz do disposto no \u00a7 2\u00ba do art. 109, \u00a7 1\u00ba do art. 18 e inciso XXI do art. 5\u00ba, todos da CF/88. STJ. 1\u00aa Turma. AgInt no AREsp 2.122.178-SP, Rel. Min. Gurgel de Faria, julgado em 21/8/2023 (Info 785).\"}]}]},{\"title\":\"Art. 17 da LACP -  Litig\u00e2ncia de M\u00e1-F\u00e9 e  Custas e Emolumentos VUNESP - 2022 - Prefeitura de SJC - SP - Analista Direito\",\"children\":[{\"title\":\"Em caso de litig\u00e2ncia de m\u00e1-f\u00e9, a associa\u00e7\u00e3o autora e os diretores RESPONSAVEIS pela a\u00e7\u00e3o\"},{\"title\":\"Somente os diretores responsaveis pela a\u00e7\u00e3o ser\u00e3o responsaveis, e n\u00e3o todos os diretores\"},{\"title\":\"SERAO SOLIDARIAMENTE CONDENADOS em HONORARIOS E NO DECUPLO DAS CUSTAS\"},{\"title\":\"Sem prejuizo da responsabilidade por perdas e danos\"},{\"title\":\"STJ - M\u00e1-f\u00e9 do MP\",\"children\":[{\"title\":\"MP pode ser condenado em caso de m\u00e1-f\u00e9\"}]},{\"title\":\"Honorarios Periciais requeridos pelo MP Estadual? CESPE / CEBRASPE - 2023 - MPE-BA - Promotor de Justi\u00e7a Substituto\",\"children\":[{\"title\":\"Ser\u00e1 arcado pela Faz. Publica Estadual\"}]},{\"title\":\"Art. 18 da LACP - Previs\u00e3o\",\"children\":[{\"title\":\"Nas a\u00e7\u00f5es da Lei n\u00e3o haver\u00e1 ADIANTAMENTO DE CUSTAS, EMOLUMENTOS,\"},{\"title\":\"Honorarios periciais OU QLQ OUTRA DESPESA E NEM CONDENA\u00c7\u00c3O DA ASSOCIA\u00c7AO AUTORA\"},{\"title\":\"Nem condena\u00e7\u00e3o da associa\u00e7\u00e3o autora em HONORARIOS DE ADV., CUSTAS E DESPESAS PROC.\"},{\"title\":\"Salvo\",\"children\":[{\"title\":\"M\u00e1-f\u00e9\"}]},{\"title\":\"obs\",\"children\":[{\"title\":\"APLICA-SE A SINDICATOS EM DIH\",\"children\":[{\"title\":\"O art. 18 da Lei 7.347/85 prev\u00ea que o autor da ACP, antes de ajuizar a a\u00e7\u00e3o, n\u00e3o ter\u00e1 que adiantar custas, emolumentos, honor\u00e1rios periciais e quaisquer outras despesas, nem ser\u00e1 condenado em honor\u00e1rios advocat\u00edcios, custas e despesas processuais, salvo comprovada m\u00e1-f\u00e9. O STJ decidiu que esse art. 18 da Lei 7.347/85 \u00e9 aplic\u00e1vel tamb\u00e9m para a a\u00e7\u00e3o civil p\u00fablica movida por SINDICATO na defesa de direitos individuais homog\u00eaneos da categoria que representa. STJ. Corte Especial. EREsp 1322166-PR, Rel. Min. Mauro Campbell Marques, julgado em 4/3/2015 (Info 558).\"}]},{\"title\":\"APLICABILIDADE DA ISEN\u00c7\u00c3O\",\"children\":[{\"title\":\"O art. 18 da LACP e o art. 87 do CDC preveem que, nas a\u00e7\u00f5es de que tratam estas leis, n\u00e3o haver\u00e1 adiantamento de custas, emolumentos, honor\u00e1rios periciais e quaisquer outras despesas, nem condena\u00e7\u00e3o da associa\u00e7\u00e3o autora, salvo comprovada m\u00e1-f\u00e9, em honor\u00e1rios de advogado, custas e despesas processuais. O STJ decidiu que essas regras de isen\u00e7\u00e3o s\u00f3 se aplicam para as custas judiciais em: \u2022 a\u00e7\u00f5es civis p\u00fablicas (qualquer que seja a mat\u00e9ria); \u2022 a\u00e7\u00f5es coletivas que tenham por objeto rela\u00e7\u00e3o de consumo; e \u2022 na a\u00e7\u00e3o cautelar prevista no art. 4\u00ba da LACP (qualquer que seja a mat\u00e9ria). N\u00e3o \u00e9 poss\u00edvel estender, por analogia ou interpreta\u00e7\u00e3o extensiva, essa isen\u00e7\u00e3o para outros tipos de a\u00e7\u00e3o (como a rescis\u00f3ria) ou para incidentes processuais (como a impugna\u00e7\u00e3o ao valor da causa), mesmo que tratem sobre direito do consumidor. STJ. 2\u00aa Se\u00e7\u00e3o. PET 9892-SP, Rel. Min. Luis Felipe Salom\u00e3o, julgado em 11/2/2015 (Info 556).\"}]},{\"title\":\"TRANSA\u00c7\u00c3O EM A\u00c7AO COLETIVA E HONORARIOS\",\"children\":[{\"title\":\"Caso concreto: poupador ingressou, em fevereiro de 2018, com execu\u00e7\u00e3o individual provis\u00f3ria contra o Ita\u00fa cobrando expurgos inflacion\u00e1rios decorrentes do Plano Ver\u00e3o. Esse poupador estava executando uma senten\u00e7a coletiva condenat\u00f3ria que se encontrava, contudo, pendente de aprecia\u00e7\u00e3o pelo STJ em um recurso especial (Resp 253.589/SP). Ocorre que, em 20/04/2018, o STJ homologou acordo coletivo no Resp envolvendo o IDEC e o Ita\u00fa e, com isso, o t\u00edtulo executivo do poupador deixou de existir. Diante desse cen\u00e1rio, o ju\u00edzo extinguiu a execu\u00e7\u00e3o, mas n\u00e3o condenou o exequente a pagar honor\u00e1rios advocat\u00edcios de sucumb\u00eancia. A extin\u00e7\u00e3o do cumprimento provis\u00f3rio de senten\u00e7a por conta de transa\u00e7\u00e3o celebrada em a\u00e7\u00e3o coletiva entre o pr\u00f3prio devedor e o legitimado extraordin\u00e1rio, em preju\u00edzo do exequente, n\u00e3o afasta o princ\u00edpio da causalidade em desfavor da parte executada, nem atrai a sucumb\u00eancia para a parte exequente. A situa\u00e7\u00e3o pode assim ser resumida: 1) se o cumprimento individual e provis\u00f3rio de senten\u00e7a extinto foi ajuizado antes da publica\u00e7\u00e3o de homologa\u00e7\u00e3o do Acordo Coletivo no REsp 253.589/SP, ou seja, at\u00e9 o dia 20/4/2018, deve ser aplicado o princ\u00edpio da causalidade em favor do poupador; e 2) se o cumprimento individual e provis\u00f3rio de senten\u00e7a extinto foi ajuizado no dia 20/4/2018 ou posteriormente a essa data, deve ser aplicado o princ\u00edpio da sucumb\u00eancia, arbitrando-se honor\u00e1rios sucumbenciais em favor dos patronos da institui\u00e7\u00e3o financeira, pela proposi\u00e7\u00e3o de execu\u00e7\u00e3o carente de t\u00edtulo executivo judicial, mesmo que provis\u00f3rio. STJ. 3\u00aa Turma. REsp 2.053.653-SP, Rel. Min. Ricardo Villas B\u00f4as Cueva, julgamento em 16/5/2023 (Info 775).\"}]}]}]}]},{\"title\":\"Art. 20 da LACP - Prazo de regulamenta\u00e7\u00e3o do Fundo\",\"children\":[{\"title\":\"O fundo de que trata o art. 13 ser\u00e1 regulamentado em 90 dias\"}]}]}}";const DATA = JSON.parse(RAW);

const CHAPTERS = ["cap0","cap1","cap2","cap3","cap4"];
const LABELS = {"cap0": "0. Histórico Legislativo das Ações Coletivas", "cap1": "1. Microssistema Processual Coletivo", "cap2": "2. Princípios e Microssistema Processual Coletivo", "cap3": "3. Princípios do Processo Coletivo", "cap4": "4. Lei de Ação Civil Pública"};

let cur = CHAPTERS[0];
let expanded = new Set();
let term = "";
let hits = 0;

function detectType(t){
  const s=(t||"").toLowerCase();
  if(/cespe|cebraspe|fgv|vunesp|fundatec|ibfc|prova/.test(s)) return "cespe";
  if(/stj|stf|resp|adi|adpf|adc|\bre\b|rms|agrg|info \d|súmula|sumula|julgado/.test(s)) return "stj";
  return "obs";
}

function extractText(n,d=0){
  if(d>4) return n.title||"";
  let p=[n.title||""];
  (n.children||[]).forEach(c=>p.push(extractText(c,d+1)));
  (n.callouts||[]).forEach(c=>p.push(extractText(c,d+1)));
  return p.filter(Boolean).join(" • ");
}

function matches(n,t){
  if(!t) return true;
  if((n.title||"").toLowerCase().includes(t)) return true;
  if((n.children||[]).some(c=>matches(c,t))) return true;
  if((n.callouts||[]).some(c=>matches(c,t))) return true;
  return false;
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function hilite(s,t){
  if(!t) return esc(s);
  const re=new RegExp(`(${t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`,"gi");
  return esc(s).replace(re,"<mark>$1</mark>");
}

function renderCallout(node){
  const tipo=detectType(node.title||"");
  const label={cespe:"CESPE/CEBRASPE",stj:"STF/STJ",obs:"OBS"}[tipo];
  const text=extractText(node);
  const isTrivial=!node.title||/^(obs|callout|atenção)$/i.test((node.title||"").trim());
  const titleHtml=isTrivial?"":(`<div class="callout-title">${hilite(node.title,term)}</div>`);
  return `<div class="callout-box ${tipo}"><div class="callout-label">${label}</div>${titleHtml}<div class="callout-body">${esc(text)}</div></div>`;
}

function renderNode(n,depth,path){
  const id=path;
  const hasKids=(n.children&&n.children.length)||(n.callouts&&n.callouts.length);
  const isExp=expanded.has(id)||(term&&matches(n,term));
  const isHit=term&&(n.title||"").toLowerCase().includes(term);
  if(isHit) hits++;

  if(n.callout) return renderCallout(n);

  const tog=hasKids?(isExp?"▾":"▸"):"·";
  const dc=depth===0?"d0":depth===1?"d1":depth===2?"d2":"dn";
  const rowCls=`row${isHit?" hit":""}`;
  const titleHtml=`<span class="txt ${dc}">${hilite(n.title||"",term)}</span>`;

  let childHtml="";
  if(isExp&&hasKids){
    childHtml='<div class="children">';
    (n.children||[]).forEach((c,i)=>{if(!term||matches(c,term)) childHtml+=renderNode(c,depth+1,path+"_"+i);});
    (n.callouts||[]).forEach((c,i)=>{if(!term||matches(c,term)) childHtml+=renderNode({...c,callout:true},depth+1,path+"_c"+i);});
    childHtml+="</div>";
  }
  return `<div class="node" id="n${id}"><div class="${rowCls}" onclick="toggle('${id}')"><span class="tog">${tog}</span>${titleHtml}</div>${childHtml}</div>`;
}

function render(){
  const tree=DATA[cur];
  hits=0;
  let html="";
  if(tree.children){
    tree.children.forEach((n,i)=>{
      if(!term||matches(n,term)) html+=renderNode(n,0,"r"+i);
    });
  }
  document.getElementById("content").innerHTML=html||`<p class="no-res">Nenhum resultado para "${esc(term)}"</p>`;const em=document.getElementById("empty-msg");if(em)em.remove();
  const mb=document.getElementById("matchBar");
  if(term){mb.style.display="block";mb.textContent=`${hits} ocorrência(s) para "${term}"`;}
  else{mb.style.display="none";}
}

function renderTabs(){
  document.getElementById("tabs").innerHTML=CHAPTERS.map((k,i)=>{
    const cid='dcoletivo_'+i;
    const isDone=_TRK&&_TRK.done&&_TRK.done[cid];
    return `<div class="tab${k===cur?' active':''}" onclick="selChap('${k}')">
      <input type="checkbox" class="_trk_chk" data-cid="${cid}" ${isDone?'checked':''} onclick="event.stopPropagation();_trkToggle('${cid}',this.checked,this)"/>
      <span>${LABELS[k]||k}</span>
    </div>`;
  }).join("");
}

function selChap(k){cur=k;expanded.clear();document.getElementById("search").value="";term="";document.getElementById("matchBar").style.display="none";renderTabs();render();}
function toggle(id){if(expanded.has(id))expanded.delete(id);else expanded.add(id);render();}
function expandAll(){function add(n,p){expanded.add(p);(n.children||[]).forEach((c,i)=>add(c,p+"_"+i));(n.callouts||[]).forEach((c,i)=>add(c,p+"_c"+i));}const t=DATA[cur];(t.children||[]).forEach((n,i)=>add(n,"r"+i));render();}
function collapseAll(){expanded.clear();render();}

let deb;
document.getElementById("search").addEventListener("input",function(){
  clearTimeout(deb);
  deb=setTimeout(()=>{term=this.value.toLowerCase().trim();render();},250);
});

renderTabs();
render();
</script>

<script>
// ── TRACKER INTEGRATION ──
var _TRK = {
  mapId: 'dcoletivo',
  total: 5,
  done: {},  // chapter_id -> true
  user: null,
};

// Auth
window.addEventListener('DOMContentLoaded', function(){
  _sb.auth.getSession().then(function(r){
    if(r.data&&r.data.session&&r.data.session.user){
      _TRK.user = r.data.session.user;
      _trkLoad();
    } else {
      _trkRender();
    }
  });
});

async function _trkLoad(){
  try{
    var r = await _sb.from('progress')
      .select('chapter_id,done')
      .eq('user_id', _TRK.user.id);
    _TRK.done = {};
    if(r.data) r.data.forEach(function(row){
      if(row.done && row.chapter_id.startsWith(_TRK.mapId+'_'))
        _TRK.done[row.chapter_id] = true;
    });
    try{ Object.keys(_TRK.done).forEach(function(cid){ localStorage.setItem('_pgprog_'+cid,JSON.stringify({done:true,date:null})); }); }catch(_){}
    _trkRender();
  }catch(e){ console.warn('tracker load err', e); }
}

function _trkRender(){
  var count = Object.keys(_TRK.done).length;
  var pct = _TRK.total ? Math.round(count/_TRK.total*100) : 0;
  // Update both injected header bar and sidebar bar
  ['_trk_fill','trk-fill'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.width=pct+'%';});
  ['_trk_pct','trk-pct'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=pct+'%';});
  ['_trk_cnt','trk-cnt'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=count+'/'+_TRK.total;});
  // Update checkboxes
  document.querySelectorAll('._trk_chk').forEach(function(chk){
    var cid = chk.getAttribute('data-cid');
    chk.checked = !!_TRK.done[cid];
    var w = chk.closest('._chk_wrap');
    if(w) w.classList.toggle('_chk_done', !!_TRK.done[cid]);
  });
  renderTabs();
}

async function _trkToggle(chapterId, done, chk){
  if(!_TRK.user){
    // Try to recover session
    try {
      const r = await _sb.auth.getSession();
      if(r.data && r.data.session && r.data.session.user){
        _TRK.user = r.data.session.user;
      } else {
        console.warn('No session found, cannot save tracker');
        return;
      }
    } catch(e) { console.error('getSession error:', e); return; }
  }
  var now = done ? new Date().toISOString() : null;
  if(done) _TRK.done[chapterId] = true;
  else delete _TRK.done[chapterId];
  _trkRender();
  try{
    await _sb.from('progress').upsert({
      user_id: _TRK.user.id,
      chapter_id: chapterId,
      done: done,
      done_at: now
    }, {onConflict: 'user_id,chapter_id'});
  }catch(e){ console.warn('tracker save err', e); }
  try{ localStorage.setItem('_pgprog_'+chapterId, JSON.stringify({done, date:now})); }catch(_){}
}
</script>
